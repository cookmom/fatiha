<!-- بسم الله الرحمن الرحيم -->
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Fatiha — Meditative Door</title>
<script src="https://cdn.jsdelivr.net/npm/p5@2.0.3/lib/p5.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/p5.brush@2.0.2-beta"></script>
<style>
  * { margin: 0; padding: 0; }
  body { background: #f2eada; overflow: hidden; }
  #tap { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; z-index: 10; cursor: pointer; }
  #tap span { color: rgba(100,90,70,0.4); font: 16px Georgia, serif; }
</style>
</head>
<body>
<div id="tap"><span>tap to begin</span></div>
<script>
// Audio setup
let audioCtx, analyser, audioBuffer, freqData, timeData;
let isPlaying = false, audioStartTime = 0;
let smoothAmp = 0;

async function loadAudio() {
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  analyser = audioCtx.createAnalyser();
  analyser.fftSize = 256;
  analyser.smoothingTimeConstant = 0.92;
  freqData = new Uint8Array(analyser.frequencyBinCount);
  timeData = new Uint8Array(analyser.fftSize);
  const resp = await fetch('bismillah.mp3');
  audioBuffer = await audioCtx.decodeAudioData(await resp.arrayBuffer());
}
function startAudio() {
  if (isPlaying) return;
  const src = audioCtx.createBufferSource();
  src.buffer = audioBuffer;
  src.connect(analyser);
  analyser.connect(audioCtx.destination);
  src.start(0);
  audioStartTime = audioCtx.currentTime;
  isPlaying = true;
  src.onended = () => { isPlaying = false; };
}
function getAmp() {
  if (!isPlaying) return 0;
  analyser.getByteTimeDomainData(timeData);
  let s = 0;
  for (let i = 0; i < timeData.length; i++) s += Math.abs(timeData[i] - 128);
  return s / timeData.length / 128;
}

const W = 1080, H = 1920;
const cx = W/2;
const doorW = 820, doorH = 1700;
const doorX = (W-doorW)/2, doorY = (H-doorH)/2;
const archSpringY = doorY + 480;
const halfDW = doorW/2;

// Phase 1: draw fills ONCE in setup
// Phase 2: draw strokes in draw() loop — animated with flow fields

let fillsDone = false;

function setup() {
  createCanvas(W, H, WEBGL);
  brush.load();
  frameRate(30);
  
  // Register evolving flow field
  brush.addField('meditative', function(t, field) {
    for (let i = 0; i < field.length; i++)
      for (let j = 0; j < field[i].length; j++)
        field[i][j] = 120 * Math.sin(i * 0.015 + t * 0.5) + 60 * Math.cos(j * 0.01 + t * 0.3);
    return field;
  });
  
  translate(-width/2, -height/2);
  background(242, 234, 218);
  
  // === WATERCOLOR FILLS — drawn ONCE, never redrawn ===
  brush.noStroke();
  
  brush.fill('#1040A0', 72);
  brush.fillBleed(0.5, 'out');
  brush.fillTexture(0.5, 0.3);
  brush.rect(doorX + 30, doorY + 50, doorW * 0.55, 520);
  
  brush.fill('#C88800', 65);
  brush.fillBleed(0.45, 'out');
  brush.rect(doorX + 70, archSpringY - 60, doorW * 0.5, 380);
  
  brush.fill('#105830', 75);
  brush.fillBleed(0.5, 'out');
  brush.rect(doorX + 50, archSpringY + 430, doorW * 0.55, 520);
  
  // Section jewels
  brush.fill('#4010A0', 115);
  brush.fillBleed(0.35);
  brush.rect(doorX + 40, archSpringY + 30, doorW * 0.3, 150);
  
  brush.fill('#B01008', 100);
  brush.fillBleed(0.3);
  brush.rect(cx + 40, archSpringY + 350, doorW * 0.3, 160);
  
  brush.noFill();
  fillsDone = true;
  
  loadAudio().then(() => {
    document.getElementById('tap').addEventListener('click', () => {
      document.getElementById('tap').style.display = 'none';
      if (audioCtx.state === 'suspended') audioCtx.resume();
      startAudio();
    });
  });
}

function draw() {
  if (!fillsDone) return;
  
  translate(-width/2, -height/2);
  // NO background() call — fills persist, strokes accumulate
  
  const f = frameCount;
  const rawAmp = getAmp();
  smoothAmp = lerp(smoothAmp, rawAmp, 0.05);
  const amp = isPlaying ? smoothAmp : 0.02 + 0.01 * sin(f * 0.003);
  
  // Evolve flow field VERY slowly
  brush.field('meditative');
  brush.refreshField(f * 0.002);
  brush.wiggle(0.5 + amp);
  
  // Draw a FEW new strokes per frame — painting builds over time
  // Only draw ~2-3 strokes per frame for meditative pace
  
  if (f < 300) { // ~10 seconds of building
    const progress = f / 300;
    
    // Door frame appears gradually
    if (f % 10 === 0) {
      brush.set('2H', '#7a7060', 1.5 + amp * 0.8);
      // One segment of the door frame per call
      const seg = (f / 10) % 8;
      const bot = doorY + doorH;
      const segs = [
        [doorX, archSpringY, doorX + doorW, archSpringY], // top
        [doorX, archSpringY, doorX, bot], // left
        [doorX + doorW, archSpringY, doorX + doorW, bot], // right
        [doorX, bot, doorX + doorW, bot], // bottom
        [cx, archSpringY, cx, bot], // center divider
      ];
      if (seg < segs.length) {
        const s = segs[seg];
        brush.line(s[0], s[1], s[2], s[3]);
      }
    }
    
    // Arch segments appear one by one
    if (f % 5 === 0 && f < 150) {
      const archSeg = Math.floor(f / 5);
      const totalSegs = 30;
      if (archSeg < totalSegs) {
        const co = halfDW * 0.6;
        const R = halfDW + co;
        brush.set('2H', '#9a9080', 0.6 + amp * 0.4);
        
        // Left half
        if (archSeg < totalSegs / 2) {
          const t1 = archSeg / (totalSegs/2);
          const t2 = (archSeg + 1) / (totalSegs/2);
          const x1 = (cx-halfDW) + halfDW * t1;
          const x2 = (cx-halfDW) + halfDW * t2;
          const y1 = archSpringY - sqrt(max(0, R*R - (x1-(cx+co))*(x1-(cx+co))));
          const y2 = archSpringY - sqrt(max(0, R*R - (x2-(cx+co))*(x2-(cx+co))));
          brush.line(x1, y1, x2, y2);
        } else {
          // Right half
          const idx = archSeg - totalSegs/2;
          const t1 = idx / (totalSegs/2);
          const t2 = (idx + 1) / (totalSegs/2);
          const x1 = cx + halfDW * t1;
          const x2 = cx + halfDW * t2;
          const y1 = archSpringY - sqrt(max(0, R*R - (x1-(cx-co))*(x1-(cx-co))));
          const y2 = archSpringY - sqrt(max(0, R*R - (x2-(cx-co))*(x2-(cx-co))));
          brush.line(x1, y1, x2, y2);
        }
      }
    }
    
    // Panel inner frames appear mid-way
    if (f > 100 && f % 15 === 0) {
      const pY = archSpringY + 20, pH = doorY + doorH - 30 - pY;
      const lX = doorX + 18, lW = cx - 16 - lX;
      const rX = cx + 16, rW = doorX + doorW - 18 - rX;
      brush.set('2H', '#a09888', 0.5 + amp * 0.3);
      const panelSeg = ((f - 100) / 15) % 8;
      const ps = [
        [lX, pY, lX+lW, pY], [lX+lW, pY, lX+lW, pY+pH],
        [lX+lW, pY+pH, lX, pY+pH], [lX, pY+pH, lX, pY],
        [rX, pY, rX+rW, pY], [rX+rW, pY, rX+rW, pY+pH],
        [rX+rW, pY+pH, rX, pY+pH], [rX, pY+pH, rX, pY]
      ];
      if (panelSeg < ps.length) {
        const s = ps[panelSeg];
        brush.line(s[0], s[1], s[2], s[3]);
      }
    }
    
    // Hatch appears late
    if (f > 180 && f % 20 === 0 && f < 260) {
      try {
        const pY = archSpringY + 20, pH = doorY + doorH - 30 - pY;
        const lX = doorX + 18, lW = cx - 16 - lX;
        const hatchAngle = 45 + (sin(f * 0.01) * 10);
        brush.hatch(14, hatchAngle, {rand: 0.15});
        brush.hatchStyle('2H', '#b0a890', 0.5);
        brush.rect(lX + 15, pY + 15, lW - 30, pH * 0.3);
        brush.noHatch();
      } catch(e) {}
    }
    
    // Crayon marks appear
    if (f > 200 && f % 30 === 0 && f < 280) {
      brush.set('2B', '#4A7A5A', 1.2 + amp);
      const cx2 = cx + random(-20, 20);
      brush.line(cx2 - 40, archSpringY - 10 + random(-5,5), cx2 + 40, archSpringY + 10 + random(-5,5));
    }
    
    // Rosettes appear
    if (f > 150 && f % 25 === 0 && f < 220) {
      const pY = archSpringY + 20, pH = doorY + doorH - 30 - pY;
      const lX = doorX + 18, lW = cx - 16 - lX;
      const rX2 = cx + 16, rW = doorX + doorW - 18 - rX2;
      brush.set('2H', '#b0a890', 0.4);
      if (f < 180) brush.circle(lX + lW/2, pY + pH * 0.3, 80);
      else brush.circle(rX2 + rW/2, pY + pH * 0.7, 80);
    }
    
    // Flow lines — organic, slow, following the field
    if (f > 60 && f % 8 === 0) {
      brush.set('2H', '#8a806050', 0.6 + amp * 0.3);
      const x = random(doorX + 20, doorX + doorW - 20);
      const y = random(doorY + 20, doorY + doorH - 20);
      brush.flowLine(x, y, random(60, 150), random(0, TWO_PI));
    }
  }
  
  // After building phase: just occasional flow line additions
  if (f >= 300 && f % 20 === 0) {
    brush.set('2H', '#b0a89815', 0.2 + amp * 0.1);
    brush.flowLine(random(doorX, doorX+doorW), random(doorY, doorY+doorH), random(30, 60), random(0, TWO_PI));
  }
  
  brush.noField();
  brush.wiggle(0);
}
</script>
</body>
</html>
