<!-- بسم الله الرحمن الرحيم -->
<!-- SZM v3 — Depth-driven composition from SAM 2 + Depth Anything V2 -->
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<script src="https://cdn.jsdelivr.net/npm/p5@2.0.3/lib/p5.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/p5.brush@2.0.2-beta"></script>
<style>
* { margin:0; }
body { background:#f2eada; overflow:hidden; margin:0; padding:0; }
canvas { object-fit:contain !important; display:block; }
#hud { position:fixed; top:0; left:0; width:100vw; height:100%; pointer-events:none; font-family:'SF Mono','Fira Code',monospace; overflow:hidden; }
.track-box { position:absolute; transition: opacity 0.3s ease, left 0.4s ease, top 0.4s ease, width 0.4s ease, height 0.4s ease; min-width:60px; min-height:60px; overflow:visible; }
.track-box::before, .track-box::after, .track-box .bl::before, .track-box .br::before { content:''; position:absolute; width:30px; height:30px; border-color:#5a5248; border-style:solid; border-width:0; }
.track-box::before { top:-2px; left:-2px; border-top-width:1.5px; border-left-width:1.5px; }
.track-box::after { top:-2px; right:-2px; border-top-width:1.5px; border-right-width:1.5px; }
.track-box .bl::before { bottom:-2px; left:-2px; border-bottom-width:1.5px; border-left-width:1.5px; position:absolute; }
.track-box .br::before { bottom:-2px; right:-2px; border-bottom-width:1.5px; border-right-width:1.5px; position:absolute; }
.corner-circ { position:absolute; width:4px; height:4px; border:1px solid #5a5248; border-radius:50%; }
.corner-circ.tl { top:-2px; left:-2px; } .corner-circ.tr { top:-2px; right:-2px; }
.corner-circ.bl2 { bottom:-2px; left:-2px; } .corner-circ.br2 { bottom:-2px; right:-2px; }
.hud-info { position:absolute; bottom:100%; left:0; margin-bottom:4px; background:rgba(242,234,218,0.88); border:1px solid rgba(90,82,72,0.3); border-radius:4px; padding:4px 8px; white-space:nowrap; }
.hud-label { color:#3a3430; font-weight:500; letter-spacing:0.3px; text-transform:uppercase; margin-bottom:3px; }
.hud-formula { color:#5a5248; font-weight:normal; letter-spacing:0.3px; margin-bottom:2px; }
.hud-coords { color:#8a8278; font-weight:normal; letter-spacing:0.3px; }
.track-box.complete { animation: pulse-complete 0.5s ease; }
@keyframes pulse-complete { 0%{filter:drop-shadow(0 0 4px rgba(90,82,72,0.6))} 50%{filter:drop-shadow(0 0 12px rgba(90,82,72,0.8))} 100%{filter:drop-shadow(0 0 2px rgba(90,82,72,0.1))} }
#pencil-dot { position:absolute; width:14px; height:14px; pointer-events:none; z-index:15; }
#pencil-dot::before { content:''; position:absolute; left:6px; top:0; width:1px; height:14px; background:#5a5248; }
#pencil-dot::after { content:''; position:absolute; top:6px; left:0; width:14px; height:1px; background:#5a5248; }
#pencil-dot .ch-circle { position:absolute; top:4px; left:4px; width:6px; height:6px; border:1px solid #5a5248; border-radius:50%; }
</style>
</head>
<body>
<div id="hud"><div id="pencil-dot" style="display:none"><div class="ch-circle"></div></div></div>
<script>
// =============================================
// SZM v3 — DEPTH-DRIVEN COMPOSITION
// Drawing order: back → front (sky → domes → facade → frame)
// Layer weights from Depth Anything V2 k-means clustering
// =============================================
var PHI = (1 + Math.sqrt(5)) / 2;
var W = 1080, H = 1920, cx = W/2;

// === COMPOSITION from reference photo (674×800) mapped to 9:16 canvas ===
// The photo shows a view THROUGH a pointed arch frame toward the mosque
// Key insight: the arch FRAME occupies the edges, the MOSQUE is seen through it

// CANVAS ZONES (vertical, top to bottom):
// Zone 1: Sky + dome apex (0-20% of H) — distant_sky
// Zone 2: Main dome + drum (20-40%) — background_domes  
// Zone 3: Secondary elements + facade top (40-55%) — mid_facade
// Zone 4: Portal + entrance (55-72%) — mid_facade
// Zone 5: Colonnade + floor (72-90%) — background_domes (lower)
// Zone 6: Ground/base (90-100%) — frame base

// FRAME: The pointed arch spans ~70% width, ~87% height
// Everything INSIDE the arch = the mosque (layers 1-5)
// Everything OUTSIDE = sandstone wall (foreground frame)

// Frame arch
var frameW = W * 0.70;
var frameL = cx - frameW/2, frameR = cx + frameW/2;
var wallW = (W - frameW) / 2;
var frameTop = H * 0.06;  // arch apex
var frameBot = H * 0.95;  // arch base
var frameMidY = H * 0.50; // widest point of arch opening

// Main dome (background — seen through the arch)
var domeR = W * 0.20;  // proportional to arch opening, not to full canvas
var domeCy = H * 0.28;
var drumH = domeR / (PHI*PHI);
var drumTop = domeCy + domeR * 0.15;
var drumBot = drumTop + drumH;
var drumL = cx - domeR * 0.85, drumR2 = cx + domeR * 0.85;

// Secondary dome (smaller, below main)
var secR = domeR / PHI;
var secCy = H * 0.42;

// Finial
var finialTop = domeCy - domeR - 20;
var finialCy = domeCy - domeR;

// Portal (mid_facade — centered in lower half of arch opening)
var portalW = frameW * 0.38;
var portalH = H * 0.18;
var portalCy = H * 0.58;
var portalL = cx - portalW/2, portalR = cx + portalW/2;
var portalTop = portalCy - portalH/2, portalBot = portalCy + portalH/2;

// Colonnade arches (symmetric pair in lower zone)
var colArchW = W * 0.045;
var colArchH = H * 0.08;
var colArchY = H * 0.80;
var colArchLx = cx - frameW * 0.26;
var colArchRx = cx + frameW * 0.26;

// Small colonnade dome
var sColDomeR = colArchW * 0.8;
var sColDomeCy = colArchY - colArchH * 0.7;

// Floor
var floorY = H * 0.78;

var ANNOT_FONT = 13;

// === HELPERS ===
function drawSegments(segs, p) {
  var tl=0,ls=[];
  for(var i=0;i<segs.length;i++){var dx=segs[i].to[0]-segs[i].from[0],dy=segs[i].to[1]-segs[i].from[1];ls.push(Math.sqrt(dx*dx+dy*dy));tl+=ls[i];}
  var target=p*tl,d=0,tx=segs[0].from[0],ty=segs[0].from[1];
  for(var i=0;i<segs.length;i++){if(d+ls[i]<=target){brush.line(segs[i].from[0],segs[i].from[1],segs[i].to[0],segs[i].to[1]);d+=ls[i];tx=segs[i].to[0];ty=segs[i].to[1];}else{var t2=(target-d)/ls[i];var px=segs[i].from[0]+(segs[i].to[0]-segs[i].from[0])*t2;var py=segs[i].from[1]+(segs[i].to[1]-segs[i].from[1])*t2;brush.line(segs[i].from[0],segs[i].from[1],px,py);tx=px;ty=py;break;}}
  return[tx,ty];
}

function domePts(dcx,dcy,dr,n){var pts=[];for(var i=0;i<=n;i++){var t=i/n,a=Math.PI*(1-t);pts.push([dcx+dr*Math.cos(a),dcy-dr*Math.sin(a),0.3+0.7*Math.sin(Math.PI*t)]);}return pts;}

// Pointed arch with specific rise/span ratio
function archPts(acx,springY,halfSpan,riseRatio,n){
  var rise=halfSpan*2*riseRatio;var apexY=springY-rise;
  var pts=[];
  for(var i=0;i<=n;i++){var t=i/n;var x,y;
    if(t<=0.5){var tt=t*2;x=acx-halfSpan+halfSpan*tt;y=springY-rise*Math.sin(Math.PI/2*tt);}
    else{var tt=(t-0.5)*2;x=acx+halfSpan*tt;y=apexY+rise*(1-Math.cos(Math.PI/2*tt));}
    pts.push([x,y,0.3+0.7*Math.sin(Math.PI*t)]);}
  return pts;
}

var mainDomePts = domePts(cx,domeCy,domeR,40);
var secDomePts = domePts(cx,secCy,secR,24);
// Frame arch: lancet, rise/span=1.386
var frameArchPts = archPts(cx,frameMidY+frameW*0.3,frameW/2,1.386,50);

// HUD
var _dimLabels=[],_lastDimStep=-1;
function clearDimLabels(){for(var i=0;i<_dimLabels.length;i++)_dimLabels[i].remove();_dimLabels=[];}
function addDimText(x,y,t,a){for(var i=0;i<_dimLabels.length;i++)if(_dimLabels[i]._t===t)return;var el=document.createElement('div');el._t=t;var s=window._hudScale||1,r=window._canvasEl?window._canvasEl.getBoundingClientRect():{left:0,top:0};el.style.cssText='position:absolute;color:#8a8278;font-family:SF Mono,Fira Code,monospace;font-size:'+Math.max(9,Math.round(ANNOT_FONT*s))+'px;white-space:nowrap;pointer-events:none;letter-spacing:0.3px;';el.style.left=(x*s+r.left)+'px';el.style.top=(y*s+r.top)+'px';if(a==='center')el.style.transform='translateX(-50%)';else if(a==='right')el.style.transform='translateX(-100%)';el.textContent=t;document.getElementById('hud').appendChild(el);_dimLabels.push(el);}

function drawAnnotations(step){
  if(step!==_lastDimStep){clearDimLabels();_lastDimStep=step;}
  if(step>=0){addDimText(cx,frameBot+30,'Traced v3 | SAM\u2082 + Depth Anything V2 | Islamic Synthesis (\u03C6+\u221A2+\u221A3)','center');}
  if(step>=2){addDimText(frameR+15,frameMidY,'frame wt=2.5','left');}
  if(step>=3){addDimText(cx+domeR+10,domeCy,'R='+Math.round(domeR)+' wt=1.2','left');}
  if(step>=7){addDimText(portalR+10,portalCy,'portal wt=1.8','left');}
}

// === DRAWING STEPS — DEPTH ORDER: back → front ===
var FPS = 30;
var STEPS = [
  // --- LAYER 3: DISTANT SKY (weight 0.6) ---
  // Nothing to draw for sky — it's the background color
  
  // --- LAYER 2: BACKGROUND DOMES (weight 1.2) ---
  // 0: Main dome
  {name:'MAIN DOME', formula:'R='+Math.round(domeR)+' | depth: background (wt=1.2)', dur:1.4,
   bbox:[cx-domeR-10,domeCy-domeR-10,cx+domeR+10,drumBot+5],
   draw:function(p){
     if(p<=0.7){brush.set('2H','#7a7268',1.2);var n=Math.max(3,Math.round(p/0.7*40));var pts=mainDomePts.slice(0,n+1);if(pts.length>=2)brush.spline(pts,0.3);var tip=pts[pts.length-1];brush.set('2H','#a09888',0.5);brush.line(cx,domeCy,tip[0],tip[1]);brush.circle(cx,domeCy,4);return[tip[0],tip[1]];}
     brush.set('2H','#7a7268',1.2);brush.spline(mainDomePts,0.3);brush.set('2H','#a09888',0.4);brush.circle(cx,domeCy,3);
     var t=(p-0.7)/0.3;brush.set('2H','#c0b8a8',0.3);var nl=Math.max(1,Math.round(t*5));
     for(var i=0;i<nl;i++){var f=(i+1)/6;var gy=domeCy-domeR+domeR*f;if(gy<domeCy){var dx2=Math.sqrt(domeR*domeR-(gy-domeCy)*(gy-domeCy));brush.line(cx-dx2,gy,cx+dx2,gy);}}
     return[cx+domeR,domeCy];}},

  // 1: Dome drum
  {name:'DOME DRUM', formula:'h = R/\u03C6\u00B2 | 5 blind windows', dur:0.7,
   bbox:[drumL-5,drumTop-5,drumR2+5,drumBot+5],
   draw:function(p){
     brush.set('2H','#7a7268',1.2);
     if(p<=0.4){return drawSegments([{from:[drumL,drumTop],to:[drumR2,drumTop]},{from:[drumR2,drumTop],to:[drumR2,drumBot]},{from:[drumR2,drumBot],to:[drumL,drumBot]},{from:[drumL,drumBot],to:[drumL,drumTop]}],p/0.4);}
     brush.line(drumL,drumTop,drumR2,drumTop);brush.line(drumR2,drumTop,drumR2,drumBot);brush.line(drumR2,drumBot,drumL,drumBot);brush.line(drumL,drumBot,drumL,drumTop);
     var t=(p-0.4)/0.6;brush.set('2H','#9a9288',0.6);var nw=5,wc=Math.max(1,Math.round(t*nw)),dw=drumR2-drumL,dh=drumBot-drumTop,ww=dw*0.07,wh=dh*0.65,wy=drumTop+dh*0.17;
     for(var w=0;w<wc;w++){var wt=(w+1)/(nw+1),wcx=drumL+dw*wt;brush.line(wcx-ww/2,wy+wh,wcx-ww/2,wy+wh*0.3);brush.line(wcx+ww/2,wy+wh,wcx+ww/2,wy+wh*0.3);var ap=[];for(var a=0;a<=8;a++){var at2=a/8;ap.push([wcx-ww/2+ww*at2,wy+wh*0.3-wh*0.2*Math.sin(Math.PI*at2),0.3]);}brush.spline(ap,0.3);brush.line(wcx-ww/2,wy+wh,wcx+ww/2,wy+wh);}
     return[cx,drumBot];}},

  // 2: Crescent finial
  {name:'CRESCENT FINIAL', formula:'apex ornament', dur:0.4,
   bbox:[cx-25,finialTop-5,cx+25,finialCy+15],
   draw:function(p){
     brush.set('2H','#7a7268',1.2);
     if(p<=0.5){var t=p/0.5;brush.line(cx,finialCy+10,cx,finialCy+10-(finialCy+10-finialTop)*t);return[cx,finialCy+10-(finialCy+10-finialTop)*t];}
     brush.line(cx,finialCy+10,cx,finialTop);brush.set('2H','#7a7268',1.0);var t=(p-0.5)/0.5;var cR3=10,n2=Math.max(3,Math.round(t*12)),cPts=[];
     for(var i=0;i<=n2;i++){var a=-Math.PI/2+Math.PI*(i/12);cPts.push([cx+4+cR3*Math.cos(a),finialTop+15+cR3*Math.sin(a),0.4]);}
     if(cPts.length>=2)brush.spline(cPts,0.3);return[cx,finialTop];}},

  // 3: Secondary dome
  {name:'SECONDARY DOME', formula:'R = mainR/\u03C6 = '+Math.round(secR), dur:0.8,
   bbox:[cx-secR-10,secCy-secR-5,cx+secR+10,secCy+10],
   draw:function(p){
     brush.set('2H','#7a7268',1.2);var n=Math.max(3,Math.round(p*24));var pts=secDomePts.slice(0,n+1);if(pts.length>=2)brush.spline(pts,0.3);var tip=pts[pts.length-1];brush.set('2H','#a09888',0.4);brush.line(cx,secCy,tip[0],tip[1]);brush.circle(cx,secCy,3);
     if(p>0.8){brush.set('2H','#7a7268',1.0);brush.line(cx-secR*0.8,secCy,cx+secR*0.8,secCy);}
     return[tip[0],tip[1]];}},

  // 4: Colonnade arches (left)
  {name:'LEFT COLONNADE', formula:'x=0.322 | bilateral pair', dur:0.5,
   bbox:[colArchLx-colArchW-5,colArchY-colArchH-5,colArchLx+colArchW+5,colArchY+15],
   draw:function(p){
     brush.set('2H','#8a8278',1.0);var pts=archPts(colArchLx,colArchY,colArchW,0.8,12);var n=Math.max(3,Math.round(p*12));var sub=pts.slice(0,n+1);if(sub.length>=2)brush.spline(sub,0.3);
     if(p>0.6){brush.line(colArchLx-colArchW,colArchY,colArchLx-colArchW,colArchY+colArchH*0.3);brush.line(colArchLx+colArchW,colArchY,colArchLx+colArchW,colArchY+colArchH*0.3);}
     return[sub[sub.length-1][0],sub[sub.length-1][1]];}},

  // 5: Colonnade arches (right — mirror)
  {name:'RIGHT COLONNADE', formula:'x=0.683 | dev=0.005', dur:0.5,
   bbox:[colArchRx-colArchW-5,colArchY-colArchH-5,colArchRx+colArchW+5,colArchY+15],
   draw:function(p){
     brush.set('2H','#8a8278',1.0);var pts=archPts(colArchRx,colArchY,colArchW,0.8,12);var n=Math.max(3,Math.round(p*12));var sub=pts.slice(0,n+1);if(sub.length>=2)brush.spline(sub,0.3);
     if(p>0.6){brush.line(colArchRx-colArchW,colArchY,colArchRx-colArchW,colArchY+colArchH*0.3);brush.line(colArchRx+colArchW,colArchY,colArchRx+colArchW,colArchY+colArchH*0.3);}
     return[sub[sub.length-1][0],sub[sub.length-1][1]];}},

  // 6: Small colonnade dome
  {name:'COLONNADE DOME', formula:'between arch pair', dur:0.4,
   bbox:[cx-sColDomeR-5,sColDomeCy-sColDomeR-5,cx+sColDomeR+5,sColDomeCy+5],
   draw:function(p){
     brush.set('2H','#8a8278',1.0);var pts=domePts(cx,sColDomeCy,sColDomeR,16);var n=Math.max(3,Math.round(p*16));var sub=pts.slice(0,n+1);if(sub.length>=2)brush.spline(sub,0.3);
     if(p>0.5){brush.line(cx-sColDomeR*0.8,sColDomeCy,cx+sColDomeR*0.8,sColDomeCy);}
     return[sub[sub.length-1][0],sub[sub.length-1][1]];}},

  // --- LAYER 1: MID FACADE (weight 1.8) ---
  // 7: Portal arch
  {name:'PORTAL ARCH', formula:'rise/span=0.586 | depth: mid_facade (wt=1.8)', dur:1.0,
   bbox:[portalL-10,portalTop-20,portalR+10,portalBot+10],
   draw:function(p){
     brush.set('2H','#5a5248',1.8);var pts=archPts(cx,portalBot,portalW/2,0.586,24);
     if(p<=0.7){var n=Math.max(3,Math.round(p/0.7*24));var sub=pts.slice(0,n+1);if(sub.length>=2)brush.spline(sub,0.3);return[sub[sub.length-1][0],sub[sub.length-1][1]];}
     brush.spline(pts,0.3);var t=(p-0.7)/0.3;brush.line(portalL,portalBot,portalL,portalBot+portalH*0.15*t);brush.line(portalR,portalBot,portalR,portalBot+portalH*0.15*t);
     return[portalR,portalBot+portalH*0.15*t];}},

  // 8: Nested inner arches
  {name:'INNER ARCHES', formula:'receding perspective', dur:0.5,
   bbox:[portalL+20,portalTop,portalR-20,portalBot-5],
   draw:function(p){
     brush.set('2H','#8a8278',1.2);var scales=[0.78,0.56];var nc=Math.max(1,Math.round(p*2));
     var tx=cx,ty=portalBot;
     for(var ai=0;ai<nc;ai++){var sc=scales[ai],iw=portalW*sc;var iBot=portalBot-(portalBot-portalTop)*(1-sc)*0.3;var pts=archPts(cx,iBot,iw/2,0.586,14);brush.spline(pts,0.3);brush.line(cx-iw/2,iBot,cx-iw/2,iBot+12);brush.line(cx+iw/2,iBot,cx+iw/2,iBot+12);tx=cx+iw/2;ty=iBot;}
     return[tx,ty];}},

  // 9: Facade panels
  {name:'FACADE PANELS', formula:'flanking portal | geometric grid', dur:0.5,
   bbox:[frameL+15,portalTop-10,frameR-15,portalBot+10],
   draw:function(p){
     brush.set('2H','#8a8278',1.2);var lpL=frameL+25,lpR=portalL-15,lpT=portalTop+10,lpB=portalBot-10;var rpL=portalR+15,rpR=frameR-25;
     if(p<=0.5){return drawSegments([{from:[lpL,lpT],to:[lpR,lpT]},{from:[lpR,lpT],to:[lpR,lpB]},{from:[lpR,lpB],to:[lpL,lpB]},{from:[lpL,lpB],to:[lpL,lpT]}],p/0.5);}
     brush.line(lpL,lpT,lpR,lpT);brush.line(lpR,lpT,lpR,lpB);brush.line(lpR,lpB,lpL,lpB);brush.line(lpL,lpB,lpL,lpT);
     brush.set('2H','#b0a898',0.5);for(var gi=1;gi<3;gi++){brush.line(lpL+(lpR-lpL)*gi/3,lpT+5,lpL+(lpR-lpL)*gi/3,lpB-5);brush.line(lpL+5,lpT+(lpB-lpT)*gi/3,lpR-5,lpT+(lpB-lpT)*gi/3);}
     var t=(p-0.5)/0.5;brush.set('2H','#8a8278',1.2);return drawSegments([{from:[rpL,lpT],to:[rpR,lpT]},{from:[rpR,lpT],to:[rpR,lpB]},{from:[rpR,lpB],to:[rpL,lpB]},{from:[rpL,lpB],to:[rpL,lpT]}],t);}},

  // 10: Floor perspective lines
  {name:'FLOOR PATTERN', formula:'perspective convergence', dur:0.4,
   bbox:[frameL+10,floorY-5,frameR-10,frameBot-20],
   draw:function(p){
     brush.set('2H','#b0a898',0.6);var nl=4,dc=Math.max(1,Math.round(p*nl));
     for(var i=0;i<dc;i++){var ly=floorY+(frameBot-30-floorY)*i/nl;brush.line(frameL+25,ly,frameR-25,ly);}
     if(p>0.5){brush.set('2H','#c0b8a8',0.35);brush.line(cx,floorY,frameL+30,frameBot-30);brush.line(cx,floorY,frameR-30,frameBot-30);}
     return[cx,floorY];}},

  // --- LAYER 0: FOREGROUND FRAME (weight 2.5) ---
  // 11: Ground line
  {name:'GROUND LINE', formula:'frame base | depth: foreground (wt=2.5)', dur:0.3,
   bbox:[20,frameBot-15,W-20,frameBot+5],
   draw:function(p){brush.set('2H','#5a5248',2.5);return drawSegments([{from:[20,frameBot],to:[W-20,frameBot]}],p);}},

  // 12: Left wall
  {name:'LEFT WALL', formula:'w='+Math.round(wallW)+'px | ashlar blocks', dur:0.6,
   bbox:[0,frameTop,frameL+10,frameBot],
   draw:function(p){
     brush.set('2H','#5a5248',2.5);var endY=frameBot-(frameBot-frameTop)*p;
     brush.line(8,frameBot,8,endY);brush.line(frameL,frameBot,frameL,endY);
     if(p>0.2){brush.set('2H','#c0b8a8',0.35);var bh=(frameBot-frameTop)/12;for(var by=frameBot-bh;by>endY;by-=bh)brush.line(14,by,frameL-5,by);}
     return[frameL,endY];}},

  // 13: Right wall
  {name:'RIGHT WALL', formula:'mirror | ashlar blocks', dur:0.6,
   bbox:[frameR-10,frameTop,W,frameBot],
   draw:function(p){
     brush.set('2H','#5a5248',2.5);var endY=frameBot-(frameBot-frameTop)*p;
     brush.line(W-8,frameBot,W-8,endY);brush.line(frameR,frameBot,frameR,endY);
     if(p>0.2){brush.set('2H','#c0b8a8',0.35);var bh=(frameBot-frameTop)/12;for(var by=frameBot-bh;by>endY;by-=bh)brush.line(frameR+5,by,W-14,by);}
     return[frameR,endY];}},

  // 14: Frame arch (the big lancet we look through)
  {name:'FRAME ARCH', formula:'lancet rise/span=1.386 | foreground', dur:1.8,
   bbox:[frameL-15,frameTop-15,frameR+15,frameMidY+frameW*0.3+10],
   draw:function(p){
     brush.set('2H','#5a5248',2.5);var n=Math.max(3,Math.round(p*50));var pts=frameArchPts.slice(0,n+1);
     if(pts.length>=2)brush.spline(pts,0.3);var tip=pts[pts.length-1];
     if(p<0.9){brush.set('2H','#a09888',0.7);brush.line(cx,frameMidY+frameW*0.3,tip[0],tip[1]);brush.circle(cx,frameMidY+frameW*0.3,5);}
     return[tip[0],tip[1]];}},

  // === WASHES ===
  {name:'SKY WASH',formula:'#87CEEB \u03B1=30',dur:0.05,
   bbox:[frameL,frameTop,frameR,frameBot],
   draw:function(p){if(p>=0){randomSeed(4001);brush.noStroke();brush.fill('#87CEEB',30);brush.fillBleed(0.001);brush.fillTexture(0,0);var poly=[];for(var i=0;i<frameArchPts.length;i++)poly.push([frameArchPts[i][0],frameArchPts[i][1]]);brush.polygon(poly);brush.noFill();}return[cx,frameTop];}},

  {name:'DOME WASH',formula:'warm grey \u03B1=20',dur:0.05,
   bbox:[cx-domeR,domeCy-domeR,cx+domeR,domeCy],
   draw:function(p){if(p>=0){randomSeed(4002);brush.noStroke();brush.fill('#D4C5B0',20);brush.fillBleed(0.001);brush.fillTexture(0,0);var poly=[];for(var i=0;i<mainDomePts.length;i++)poly.push([mainDomePts[i][0],mainDomePts[i][1]]);poly.push([cx+domeR,domeCy+5],[cx-domeR,domeCy+5]);brush.polygon(poly);brush.noFill();}return[cx,domeCy];}},

  {name:'GOLD ACCENT',formula:'crescent #C4A35A',dur:0.05,
   bbox:[cx-15,finialTop,cx+15,finialTop+30],
   draw:function(p){if(p>=0){randomSeed(4003);brush.noStroke();brush.fill('#C4A35A',50);brush.fillBleed(0.001);brush.fillTexture(0,0);brush.circle(cx+4,finialTop+15,12);brush.noFill();}return[cx,finialTop];}},

  {name:'PORTAL SHADOW',formula:'depth shadow',dur:0.05,
   bbox:[portalL,portalTop,portalR,portalBot],
   draw:function(p){if(p>=0){randomSeed(4004);brush.noStroke();brush.fill('#4A5568',18);brush.fillBleed(0.001);brush.fillTexture(0,0);brush.rect(portalL+5,portalTop+5,portalW-10,portalH-10);brush.noFill();}return[cx,portalCy];}},

  {name:'WALL TINT',formula:'sandstone \u03B1=30',dur:0.05,
   bbox:[0,frameTop,wallW,frameBot],
   draw:function(p){if(p>=0){randomSeed(4005);brush.noStroke();brush.fill('#C4B89A',30);brush.fillBleed(0.001);brush.fillTexture(0,0);brush.rect(5,frameTop+20,wallW-10,frameBot-frameTop-40);brush.noFill();randomSeed(4006);brush.fill('#C4B89A',30);brush.fillBleed(0.001);brush.fillTexture(0,0);brush.rect(frameR+5,frameTop+20,wallW-10,frameBot-frameTop-40);brush.noFill();}return[cx,frameBot];}},

  {name:'FLOOR WASH',formula:'marble',dur:0.05,
   bbox:[frameL,floorY,frameR,frameBot],
   draw:function(p){if(p>=0){randomSeed(4007);brush.noStroke();brush.fill('#E8DDD0',25);brush.fillBleed(0.001);brush.fillTexture(0,0);brush.rect(frameL+10,floorY,frameW-20,frameBot-30-floorY);brush.noFill();}return[cx,frameBot];}}
];

// === TIMELINE ===
var PAUSE_S=0.14,WASH_START=15;
var frameStarts=[],frameEnds=[],f2=0;
for(var i=0;i<STEPS.length;i++){frameStarts.push(Math.round(f2));f2+=STEPS[i].dur*FPS;frameEnds.push(Math.round(f2));if(i<STEPS.length-1&&i<WASH_START-1)f2+=PAUSE_S*FPS;}
var totalAnimFrames=Math.round(f2);

// === HUD ===
var trackBox=null,pencilDot=null;
function createTrackBox(step){var hud=document.getElementById('hud');if(trackBox)trackBox.remove();var box=document.createElement('div');box.className='track-box';var s=window._hudScale||1,r=window._canvasEl?window._canvasEl.getBoundingClientRect():{left:0,top:0};var b=step.bbox,pad=12*s;var cb0=Math.max(20,b[0]),cb1=Math.max(20,b[1]),cb2=Math.min(W-20,b[2]),cb3=Math.min(H-20,b[3]);box.style.left=(cb0*s+r.left-pad)+'px';box.style.top=(cb1*s+r.top-pad)+'px';box.style.width=((cb2-cb0)*s+pad*2)+'px';box.style.height=((cb3-cb1)*s+pad*2)+'px';['tl','tr','bl2','br2'].forEach(function(c){var ci=document.createElement('div');ci.className='corner-circ '+c;box.appendChild(ci);});var bl=document.createElement('div');bl.className='bl';bl.style.cssText='position:absolute;bottom:0;left:0;width:100%;height:100%;pointer-events:none;';box.appendChild(bl);var br=document.createElement('div');br.className='br';br.style.cssText='position:absolute;bottom:0;right:0;width:100%;height:100%;pointer-events:none;';box.appendChild(br);var _fs=Math.max(9,Math.round(ANNOT_FONT*(window._hudScale||1)))+'px';var info=document.createElement('div');info.className='hud-info';if((cb1*s+r.top-pad)<80){info.style.bottom='auto';info.style.top='6px';info.style.marginBottom='0';}var lbl=document.createElement('div');lbl.className='hud-label';lbl.style.fontSize=_fs;lbl.textContent=step.name;info.appendChild(lbl);var frm=document.createElement('div');frm.className='hud-formula';frm.style.fontSize=_fs;frm.textContent=step.formula;info.appendChild(frm);var crd=document.createElement('div');crd.className='hud-coords';crd.style.fontSize=_fs;crd.id='live-coords';crd.textContent='x:\u2014 y:\u2014';info.appendChild(crd);box.appendChild(info);hud.appendChild(box);trackBox=box;}
function updatePencilDot(x,y){if(!pencilDot)pencilDot=document.getElementById('pencil-dot');pencilDot.style.display='block';var s=window._hudScale||1,r=window._canvasEl?window._canvasEl.getBoundingClientRect():{left:0,top:0};pencilDot.style.left=(x*s+r.left-7)+'px';pencilDot.style.top=(y*s+r.top-7)+'px';var el=document.getElementById('live-coords');if(el)el.textContent='x:'+Math.round(x)+' y:'+Math.round(y);}

// === MAIN LOOP ===
var lastHudStep=-1,_inFillPhase=false;
function setup(){var c=createCanvas(W,H,WEBGL);pixelDensity(1);c.elt.style.width='100vw';c.elt.style.height=(window.innerWidth/(W/H))+'px';c.elt.style.display='block';c.elt.style.margin='0';brush.load();frameRate(FPS);window._hudScale=c.elt.getBoundingClientRect().width/W;window._canvasEl=c.elt;window.addEventListener('resize',function(){window._hudScale=c.elt.getBoundingClientRect().width/W;_lastDimStep=-1;});}
function draw(){
  translate(-width/2,-height/2);var f3=frameCount-1;if(f3>=totalAnimFrames)f3=totalAnimFrames-1;
  var activeStep=0;for(var i=STEPS.length-1;i>=0;i--){if(f3>=frameStarts[i]){activeStep=i;break;}}
  if(activeStep<WASH_START){_inFillPhase=false;background(242,234,218);for(var i=0;i<activeStep;i++)STEPS[i].draw(1);}
  else{if(!_inFillPhase){background(242,234,218);for(var i=0;i<WASH_START;i++)STEPS[i].draw(1);drawAnnotations(WASH_START-1);_inFillPhase=true;}}
  var sf=f3-frameStarts[activeStep],sd=Math.max(1,frameEnds[activeStep]-frameStarts[activeStep]),prog=Math.min(1,sf/sd);var tip=STEPS[activeStep].draw(prog);
  if(!_inFillPhase)drawAnnotations(activeStep-1);
  if(activeStep!==lastHudStep){
    if(lastHudStep>=0&&trackBox&&activeStep<WASH_START){var _s2=window._hudScale||1,_r2=window._canvasEl?window._canvasEl.getBoundingClientRect():{left:0,top:0};var oB=STEPS[lastHudStep].bbox,nB=STEPS[activeStep].bbox,_p2=12*_s2;var ox=oB[0]*_s2+_r2.left-_p2,oy=oB[1]*_s2+_r2.top-_p2,nx=nB[0]*_s2+_r2.left-_p2,ny=nB[1]*_s2+_r2.top-_p2;var ln=document.createElement('div');ln.style.cssText='position:absolute;pointer-events:none;z-index:5;';var dx3=nx-ox,dy3=ny-oy,len=Math.sqrt(dx3*dx3+dy3*dy3),ang=Math.atan2(dy3,dx3)*180/Math.PI;ln.style.left=ox+'px';ln.style.top=oy+'px';ln.style.width=len+'px';ln.style.height='1.5px';ln.style.background='#5a5248';ln.style.transformOrigin='0 0';ln.style.transform='rotate('+ang+'deg)';ln.style.opacity='0.7';ln.style.transition='opacity 0.55s ease';document.getElementById('hud').appendChild(ln);setTimeout(function(){ln.style.opacity='0';},300);setTimeout(function(){ln.remove();},900);}
    createTrackBox(STEPS[activeStep]);lastHudStep=activeStep;}
  if(trackBox){var _r3=window._canvasEl?window._canvasEl.getBoundingClientRect():{left:0,top:0},_s3=window._hudScale||1,_b3=STEPS[activeStep].bbox,_p3=12*_s3;trackBox.style.left=(Math.max(20,_b3[0])*_s3+_r3.left-_p3)+'px';trackBox.style.top=(Math.max(20,_b3[1])*_s3+_r3.top-_p3)+'px';}
  if(tip)updatePencilDot(tip[0],tip[1]);
  if(f3>=totalAnimFrames-1){noLoop();if(pencilDot)pencilDot.style.display='none';if(trackBox)trackBox.remove();trackBox=null;setTimeout(function(){clearDimLabels();_lastDimStep=-1;},6500);setTimeout(function(){window.location.reload();},7000);}
}
</script>
