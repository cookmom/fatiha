<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🍳 chef's daily</title>
<style>
:root {
  --bg: #0a0a0b;
  --bg-card: #131316;
  --bg-card-hover: #1a1a1f;
  --bg-chat: #0e0e11;
  --border: #1e1e24;
  --text: #e4e4e7;
  --text-dim: #71717a;
  --text-muted: #52525b;
  --accent-indigo: #6366f1;
  --accent-indigo-dim: #4f46e5;
  --amber: #f59e0b;
  --purple: #a855f7;
  --cyan: #06b6d4;
  --emerald: #10b981;
  --gray: #6b7280;
  --gold: #eab308;
  --red: #ef4444;
  --yellow: #eab308;
  --green: #22c55e;
  --sidebar-w: 280px;
  --deadline-h: 40px;
  --radius: 10px;
  --transition: .25s cubic-bezier(.4,0,.2,1);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html { scroll-behavior: smooth; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.5;
  min-height: 100vh;
  overflow-x: hidden;
}

/* ── Deadlines Bar ── */
.deadlines-bar {
  position: sticky; top: 0; z-index: 100;
  background: #09090b; border-bottom: 1px solid var(--border);
  cursor: pointer; user-select: none;
  transition: var(--transition);
}
.deadlines-summary {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 20px; font-size: 13px; color: var(--text-dim);
  height: var(--deadline-h);
}
.deadlines-summary .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.deadlines-summary .countdown { color: var(--text); font-weight: 500; margin-right: 4px; }
.deadlines-summary .chevron {
  margin-left: auto; transition: transform var(--transition);
  font-size: 10px; color: var(--text-muted);
}
.deadlines-bar.open .chevron { transform: rotate(180deg); }
.deadlines-all {
  max-height: 0; overflow: hidden; transition: max-height .3s ease;
  border-top: 1px solid transparent;
}
.deadlines-bar.open .deadlines-all {
  max-height: 300px; border-top-color: var(--border);
}
.deadline-row {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 20px; font-size: 13px; color: var(--text-dim);
}
.deadline-row .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.deadline-row .dl-date { color: var(--text-muted); min-width: 70px; }
.deadline-row .dl-name { color: var(--text); }

/* ── Layout ── */
.app {
  display: grid;
  grid-template-columns: var(--sidebar-w) 1fr;
  min-height: calc(100vh - var(--deadline-h));
}

/* ── Chat Sidebar ── */
.chat-sidebar {
  background: var(--bg-chat);
  border-right: 1px solid var(--border);
  display: flex; flex-direction: column;
  height: calc(100vh - var(--deadline-h));
  position: sticky; top: var(--deadline-h);
}
.chat-header {
  padding: 16px; border-bottom: 1px solid var(--border);
  font-size: 13px; font-weight: 600; color: var(--text-dim);
  letter-spacing: .04em; text-transform: uppercase;
}
.chat-messages {
  flex: 1; overflow-y: auto; padding: 12px;
  display: flex; flex-direction: column; gap: 8px;
  scrollbar-width: thin; scrollbar-color: var(--border) transparent;
}
.chat-msg {
  max-width: 88%; padding: 8px 12px; border-radius: 12px;
  font-size: 13px; line-height: 1.45; word-break: break-word;
}
.chat-msg.user {
  align-self: flex-end; background: var(--accent-indigo); color: #fff;
  border-bottom-right-radius: 4px;
}
.chat-msg.chef {
  align-self: flex-start; background: #1e1e24; color: var(--text);
  border-bottom-left-radius: 4px;
}
.chat-msg .msg-time {
  display: block; font-size: 10px; margin-top: 4px;
  opacity: .5;
}
.chat-msg .link-card {
  display: block; margin-top: 6px; padding: 6px 8px;
  background: rgba(255,255,255,.06); border-radius: 6px;
  color: var(--cyan); font-size: 12px; text-decoration: none;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  transition: background var(--transition);
}
.chat-msg .link-card:hover { background: rgba(255,255,255,.1); }
.chat-input-wrap {
  padding: 12px; border-top: 1px solid var(--border);
  display: flex; gap: 8px;
}
.chat-input-wrap input {
  flex: 1; background: #1a1a1f; border: 1px solid var(--border);
  border-radius: 8px; padding: 8px 12px; color: var(--text);
  font-size: 13px; outline: none; transition: border-color var(--transition);
}
.chat-input-wrap input:focus { border-color: var(--accent-indigo); }
.chat-input-wrap button {
  background: var(--accent-indigo); border: none; border-radius: 8px;
  color: #fff; padding: 0 14px; font-size: 13px; cursor: pointer;
  transition: background var(--transition);
}
.chat-input-wrap button:hover { background: var(--accent-indigo-dim); }

/* ── Main Content ── */
.main { padding: 32px 40px 60px; max-width: 900px; }

/* Header */
.header { margin-bottom: 32px; }
.header h1 { font-size: 28px; font-weight: 700; letter-spacing: -.02em; }
.header .date { font-size: 14px; color: var(--text-dim); margin-top: 2px; }
.header .greeting {
  font-size: 15px; color: var(--text-muted); margin-top: 8px;
  animation: fadeInUp .8s ease both;
}

@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

/* ── Spotlight ── */
.spotlight {
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 32px; margin-bottom: 32px;
  min-height: 160px; position: relative;
  transition: var(--transition);
}
.spotlight-default { animation: spotlightFade 1s ease both; }
.spotlight-default .quote {
  font-size: 20px; font-weight: 600; letter-spacing: -.01em;
  line-height: 1.4; max-width: 600px;
}
.spotlight-default .quote-body {
  font-size: 14px; color: var(--text-dim); margin-top: 12px;
  font-style: italic; line-height: 1.6;
}

@keyframes spotlightFade {
  from { opacity: 0; }
  to { opacity: 1; }
}

.spotlight-detail { animation: spotlightFade .4s ease both; }
.spotlight-detail .cat-pill {
  display: inline-block; padding: 3px 10px; border-radius: 20px;
  font-size: 11px; font-weight: 600; text-transform: uppercase;
  letter-spacing: .05em; margin-bottom: 12px;
}
.spotlight-detail h2 {
  font-size: 22px; font-weight: 700; letter-spacing: -.01em;
  margin-bottom: 12px;
}
.spotlight-detail .desc {
  font-size: 14px; color: var(--text-dim); line-height: 1.7;
  margin-bottom: 16px;
}
.spotlight-detail .source-link {
  display: inline-block; color: var(--cyan); font-size: 13px;
  text-decoration: none; border-bottom: 1px solid transparent;
  transition: border-color var(--transition);
}
.spotlight-detail .source-link:hover { border-bottom-color: var(--cyan); }
.spotlight-nav {
  display: flex; align-items: center; gap: 12px; margin-top: 20px;
  padding-top: 16px; border-top: 1px solid var(--border);
}
.spotlight-nav button {
  background: #1a1a1f; border: 1px solid var(--border); border-radius: 6px;
  color: var(--text); padding: 6px 14px; font-size: 13px; cursor: pointer;
  transition: var(--transition);
}
.spotlight-nav button:hover { background: var(--bg-card-hover); border-color: #333; }
.spotlight-nav .back-btn {
  margin-left: auto; color: var(--text-muted); background: transparent;
  border: none; font-size: 12px; cursor: pointer;
}
.spotlight-nav .back-btn:hover { color: var(--text); }

/* ── Inspiration Grid ── */
.section-title {
  font-size: 12px; font-weight: 600; color: var(--text-muted);
  text-transform: uppercase; letter-spacing: .06em;
  margin-bottom: 16px;
}
.inspiration-grid {
  display: grid; grid-template-columns: 1fr 1fr; gap: 12px;
  margin-bottom: 40px;
}
.insp-card {
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 16px; cursor: pointer;
  transition: transform var(--transition), box-shadow var(--transition), border-color var(--transition);
}
.insp-card:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 24px rgba(0,0,0,.3);
  border-color: #2a2a32;
}
.insp-card .cat-pill {
  display: inline-block; padding: 2px 8px; border-radius: 20px;
  font-size: 10px; font-weight: 600; text-transform: uppercase;
  letter-spacing: .05em; margin-bottom: 8px;
}
.insp-card h3 { font-size: 14px; font-weight: 600; margin-bottom: 6px; line-height: 1.35; }
.insp-card .desc {
  font-size: 12px; color: var(--text-muted); line-height: 1.5;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
  overflow: hidden;
}

/* Category colors */
.cat-kinetic { background: rgba(245,158,11,.15); color: var(--amber); }
.cat-generative { background: rgba(168,85,247,.15); color: var(--purple); }
.cat-sound { background: rgba(6,182,212,.15); color: var(--cyan); }
.cat-faith { background: rgba(16,185,129,.15); color: var(--emerald); }
.cat-industry { background: rgba(107,114,128,.15); color: var(--gray); }
.cat-concept { background: rgba(234,179,8,.15); color: var(--gold); }

/* ── Concepts Browser ── */
.concepts { margin-bottom: 40px; }
.concepts-nav {
  display: flex; gap: 6px; margin-bottom: 16px; flex-wrap: wrap;
}
.concepts-nav input[type="radio"] { display: none; }
.concepts-nav label {
  display: inline-flex; align-items: center; justify-content: center;
  width: 32px; height: 32px; border-radius: 50%;
  background: var(--bg-card); border: 1px solid var(--border);
  font-size: 12px; font-weight: 600; color: var(--text-muted);
  cursor: pointer; transition: var(--transition);
}
.concepts-nav input[type="radio"]:checked + label {
  background: var(--gold); color: #000; border-color: var(--gold);
}
.concept-panel {
  display: none; background: var(--bg-card); border: 1px solid var(--border);
  border-left: 3px solid var(--gold); border-radius: var(--radius);
  padding: 20px 24px;
}
#c1:checked ~ .concept-panels .cp1,
#c2:checked ~ .concept-panels .cp2,
#c3:checked ~ .concept-panels .cp3,
#c4:checked ~ .concept-panels .cp4,
#c5:checked ~ .concept-panels .cp5,
#c6:checked ~ .concept-panels .cp6,
#c7:checked ~ .concept-panels .cp7,
#c8:checked ~ .concept-panels .cp8 { display: block; animation: spotlightFade .3s ease; }

.concept-panel h3 { font-size: 16px; font-weight: 700; margin-bottom: 8px; color: var(--gold); }
.concept-panel p { font-size: 14px; color: var(--text-dim); font-style: italic; line-height: 1.7; }

/* ── Mobile Chat FAB ── */
.chat-fab {
  display: none; position: fixed; bottom: 20px; right: 20px; z-index: 200;
  width: 52px; height: 52px; border-radius: 50%;
  background: var(--accent-indigo); border: none; color: #fff;
  font-size: 22px; cursor: pointer; box-shadow: 0 4px 20px rgba(99,102,241,.4);
  transition: transform var(--transition);
}
.chat-fab:hover { transform: scale(1.08); }

.chat-sheet {
  display: none; position: fixed; bottom: 0; left: 0; right: 0;
  z-index: 201; background: var(--bg-chat);
  border-top: 1px solid var(--border);
  border-radius: 16px 16px 0 0;
  transform: translateY(100%);
  transition: transform .35s cubic-bezier(.4,0,.2,1);
  max-height: 70vh;
  flex-direction: column;
}
.chat-sheet.open { transform: translateY(0); }
.chat-sheet-handle {
  width: 36px; height: 4px; background: var(--border); border-radius: 2px;
  margin: 10px auto 6px;
}
.chat-sheet .chat-messages { flex: 1; overflow-y: auto; padding: 12px; display: flex; flex-direction: column; gap: 8px; }
.chat-sheet .chat-input-wrap { padding: 12px; border-top: 1px solid var(--border); display: flex; gap: 8px; }
.chat-sheet .chat-input-wrap input {
  flex: 1; background: #1a1a1f; border: 1px solid var(--border);
  border-radius: 8px; padding: 8px 12px; color: var(--text);
  font-size: 13px; outline: none;
}
.chat-sheet .chat-input-wrap button {
  background: var(--accent-indigo); border: none; border-radius: 8px;
  color: #fff; padding: 0 14px; font-size: 13px; cursor: pointer;
}
.chat-overlay {
  display: none; position: fixed; inset: 0; z-index: 200;
  background: rgba(0,0,0,.5);
}

/* ── Responsive ── */
@media (max-width: 768px) {
  .app { grid-template-columns: 1fr; }
  .chat-sidebar { display: none; }
  .chat-fab { display: flex; align-items: center; justify-content: center; }
  .chat-sheet { display: flex; }
  .main { padding: 20px 16px 80px; }
  .inspiration-grid { grid-template-columns: 1fr; }
  .spotlight { padding: 20px; }
  .header h1 { font-size: 22px; }
}

/* scrollbar */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>

<!-- Deadlines Bar -->
<div class="deadlines-bar" id="deadlinesBar">
  <div class="deadlines-summary" id="deadlinesSummary">
    <span class="dot" id="nearestDot"></span>
    <span class="countdown" id="nearestCountdown"></span>
    <span id="nearestName"></span>
    <span class="chevron">▼</span>
  </div>
  <div class="deadlines-all" id="deadlinesAll"></div>
</div>

<div class="app">
  <!-- Chat Sidebar (Desktop) -->
  <aside class="chat-sidebar">
    <div class="chat-header">💬 Messages</div>
    <div class="chat-messages" id="chatMessages"></div>
    <div class="chat-input-wrap">
      <input type="text" id="chatInput" placeholder="Send a message…" autocomplete="off">
      <button id="chatSend">→</button>
    </div>
  </aside>

  <!-- Main Content -->
  <main class="main">
    <div class="header">
      <h1>🍳 chef's daily</h1>
      <div class="date" id="headerDate"></div>
      <div class="greeting" id="greeting"></div>
    </div>

    <!-- Spotlight -->
    <div class="spotlight" id="spotlight"></div>

    <!-- Inspiration Grid -->
    <div class="section-title">Inspiration</div>
    <div class="inspiration-grid" id="inspGrid"></div>

    <!-- Concepts Browser -->
    <div class="section-title">Concepts</div>
    <div class="concepts" id="conceptsWrap"></div>
  </main>
</div>

<!-- Mobile Chat -->
<button class="chat-fab" id="chatFab">💬</button>
<div class="chat-overlay" id="chatOverlay"></div>
<div class="chat-sheet" id="chatSheet">
  <div class="chat-sheet-handle"></div>
  <div class="chat-messages" id="chatMessagesMobile"></div>
  <div class="chat-input-wrap">
    <input type="text" id="chatInputMobile" placeholder="Send a message…" autocomplete="off">
    <button id="chatSendMobile">→</button>
  </div>
</div>

<script>
// ── Data ──
const INSPIRATIONS = [
  { id: 'hulten', cat: 'sound', title: 'Love Hultén — Ferrofluid Synth Guitar', desc: 'Modified Arturia MicroFreak in hand-built body with dancing ferrofluid visualizer, steel rod pitch control, magnetic sequencer. The ferrofluid shows the sound before you hear it.', link: 'https://www.designboom.com/technology/love-hulten-guitar-synth-instrument-ferrofluid-09-22-2025/' },
  { id: 'vtol', cat: 'kinetic', title: '::vtol:: (Dmitry Morozov) — Kinetic Code Sculptures', desc: 'Electronic installations reacting to environment + viewers. "Reading My Body" turns tattoos into music. "Last Breath" — wearable mask organ. Showed at Sónar+D June 2025.', link: 'https://www.designboom.com/technology/inside-world-vtol-kinetic-sculptures-robotics-code-driven-installations-dmitry-morozov-interview-08-18-2025/' },
  { id: 'eightnote', cat: 'sound', title: 'EightNote — Kinetic Magnetic MIDI Controller', desc: 'MIDI.org Innovation Award 2025. Magnetic balls on a sliding 8-lane panel — rhythm as physical gesture. Open-source firmware planned.', link: 'https://midi.org/innovation-award/eightnote' },
  { id: 'zimoun', cat: 'kinetic', title: 'Zimoun — Sound Installations', desc: 'Hundreds of identical motors + everyday materials = emergent sonic landscapes. New commission: Staatsschauspiel Dresden 2026.', link: 'https://zimoun.net/' },
  { id: 'trimpin', cat: 'sound', title: 'Trimpin — The OG MIDI Sculptor', desc: '30+ years of electromechanical sculptures via MIDI + microcontrollers. Building-scale instruments that play themselves.', link: 'https://en.wikipedia.org/wiki/Trimpin' },
  { id: 'diriyah', cat: 'faith', title: 'Diriyah Biennale — Generative Islamic Patterns', desc: 'Workshop: photograph architectural motifs → AI → digital artworks with natural elements. Watch for cycle 3 open call.', link: 'https://biennale.org.sa/en/program/generative-art-in-islamic-patterns' },
  { id: 'transient', cat: 'industry', title: 'Transient Labs — Creator Platform', desc: '1/1s, editions, zero seller fees. Preferred minting platform. Strong for premium pieces.', link: 'https://transient.xyz' },
  { id: 'fxhash', cat: 'generative', title: 'fxhash Protocol Update', desc: 'FXH token + "art coins" + "open-form generative art." New economics for onchain generative art.', link: 'https://beta.fxhash.xyz/' },
];

const CONCEPTS = [
  { title: 'The Callback Machine', body: 'Islamic geometric patterns generated by one rule repeated. Generative piece starts as chaos, reveals the single rotation underneath. Perceptual one-way door applied to sacred geometry.' },
  { title: 'The Instrument That Watches You Back', body: 'Camera tracking watching a performer\'s body tension/breath/posture. Instrument reacts: softens when anxious, pushes back when confident. Not AI — reactive physics. Duet discovered.' },
  { title: 'Zimoun\'s Law', body: 'One motor + one cotton ball = boring. 139 = living organism. Your art needs ONE elegant rule iterated 10,000 times. Beauty is in the moment the audience realizes the rule.' },
  { title: 'The Muezzin\'s Delay', body: 'Adhan cascades across cities as each muezzin starts moments apart. Spatial canon written by architecture. Sound installation with speakers at cascading distances. The room becomes the instrument.' },
  { title: 'Tattoo Machine Score', body: 'Generative system creates visual score, robotic arm draws it as ink in real-time. Paper = record. Drawing IS the music frozen. Frame it. Play it back with a camera.' },
  { title: 'The Prayer Rug Sequencer', body: 'Prayer rug geometric patterns as step sequencer grid. Conductive thread at intersections = trigger points. Sacred geometry literally becomes music. The math that made these patterns = Euclidean rhythms.' },
  { title: 'Crown Shyness Code', body: 'Particles grow and fill space but never overlap. Run it long enough and it looks like Islamic geometric patterns. Nature and sacred geometry share a codebase.' },
  { title: 'The Ferrofluid Qibla', body: 'Ferrofluid cell with hidden magnet toward Mecca. Fluid perpetually reaches one direction. Visitors don\'t know why until the label. Liquid compass performing devotion.' },
];

const DEADLINES = [
  { emoji: '🌙', name: 'Ramadan begins', date: new Date('2026-02-17') },
  { emoji: '🔴', name: 'Sónar+D Barcelona', date: new Date('2026-02-19') },
  { emoji: '🟡', name: 'Hasselblad Masters', date: new Date('2026-02-28') },
  { emoji: '🟢', name: 'Art Blocks Marfa RSVP', date: new Date('2026-03-15') },
  { emoji: '🟢', name: 'Art Blocks Marfa Weekend', date: new Date('2026-10-22') },
];

const GREETINGS = [
  'Another day to make something that didn\'t exist yesterday.',
  'The studio is open. What are we building?',
  'Sacred geometry won\'t code itself. Let\'s go.',
  'Ferrofluid is waiting. Ideas are waiting. You\'re here.',
  'One elegant rule, iterated 10,000 times.',
];

// ── Helpers ──
const $ = s => document.querySelector(s);
const $$ = s => document.querySelectorAll(s);
const now = new Date();

function daysBetween(a, b) { return Math.ceil((b - a) / 86400000); }

function formatTime(d) {
  return new Date(d).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
}

function urlify(text) {
  const urlRe = /(https?:\/\/[^\s]+)/g;
  const parts = text.split(urlRe);
  return parts.map(p => urlRe.test(p) ? `<span>${escHtml(p.replace(urlRe, ''))}</span><a class="link-card" href="${escHtml(p)}" target="_blank" rel="noopener">${escHtml(p)}</a>` : escHtml(p)).join('');
}

// re-test since split consumes the regex
function urlify2(text) {
  const re = /(https?:\/\/[^\s]+)/g;
  let out = '', m, last = 0;
  while ((m = re.exec(text)) !== null) {
    if (m.index > last) out += escHtml(text.slice(last, m.index));
    out += `<a class="link-card" href="${escHtml(m[1])}" target="_blank" rel="noopener">${escHtml(m[1])}</a>`;
    last = re.lastIndex;
  }
  if (last < text.length) out += escHtml(text.slice(last));
  return out;
}

function escHtml(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

// ── Header ──
$('#headerDate').textContent = now.toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
$('#greeting').textContent = GREETINGS[Math.floor(Math.random() * GREETINGS.length)];

// ── Deadlines ──
(function initDeadlines() {
  const sorted = [...DEADLINES].sort((a, b) => a.date - b.date);
  const nearest = sorted.find(d => d.date >= now) || sorted[sorted.length - 1];
  const days = daysBetween(now, nearest.date);
  const dotColor = days < 7 ? 'var(--red)' : days < 30 ? 'var(--yellow)' : 'var(--green)';
  $('#nearestDot').style.background = dotColor;
  $('#nearestCountdown').textContent = days + 'd';
  $('#nearestName').textContent = nearest.emoji + ' ' + nearest.name;

  const allHtml = sorted.map(d => {
    const dd = daysBetween(now, d.date);
    const c = dd < 7 ? 'var(--red)' : dd < 30 ? 'var(--yellow)' : 'var(--green)';
    return `<div class="deadline-row"><span class="dot" style="background:${c}"></span><span class="dl-date">${d.date.toLocaleDateString('en-US', { month: 'short', day: 'numeric' })}</span><span class="dl-name">${d.emoji} ${escHtml(d.name)}</span><span style="margin-left:auto;color:var(--text-muted);font-size:12px">${dd}d</span></div>`;
  }).join('');
  $('#deadlinesAll').innerHTML = allHtml;

  $('#deadlinesBar').addEventListener('click', () => {
    $('#deadlinesBar').classList.toggle('open');
  });
})();

// ── Spotlight ──
let spotlightIdx = Math.floor(Math.random() * CONCEPTS.length);
let spotlightMode = 'default'; // 'default' | 'detail'
let spotlightItemIdx = null;

function renderSpotlightDefault() {
  spotlightMode = 'default';
  const c = CONCEPTS[spotlightIdx];
  $('#spotlight').innerHTML = `<div class="spotlight-default"><div class="quote">"${escHtml(c.title)}"</div><div class="quote-body">${escHtml(c.body)}</div></div>`;
}

function renderSpotlightDetail(idx) {
  spotlightMode = 'detail';
  spotlightItemIdx = idx;
  const item = INSPIRATIONS[idx];
  const sameCat = INSPIRATIONS.map((it, i) => ({ ...it, idx: i })).filter(it => it.cat === item.cat);
  const posInCat = sameCat.findIndex(it => it.idx === idx);
  const prevIdx = sameCat[(posInCat - 1 + sameCat.length) % sameCat.length].idx;
  const nextIdx = sameCat[(posInCat + 1) % sameCat.length].idx;

  $('#spotlight').innerHTML = `<div class="spotlight-detail">
    <span class="cat-pill cat-${item.cat}">${item.cat}</span>
    <h2>${escHtml(item.title)}</h2>
    <div class="desc">${escHtml(item.desc)}</div>
    <a class="source-link" href="${escHtml(item.link)}" target="_blank" rel="noopener">View source ↗</a>
    <div class="spotlight-nav">
      <button onclick="renderSpotlightDetail(${prevIdx})">← prev</button>
      <button onclick="renderSpotlightDetail(${nextIdx})">next →</button>
      <button class="back-btn" onclick="renderSpotlightDefault()">✕ Back to overview</button>
    </div>
  </div>`;

  // Track interaction
  try {
    const interactions = JSON.parse(localStorage.getItem('chef-workspace-interactions') || '{}');
    interactions[item.id] = (interactions[item.id] || 0) + 1;
    interactions._lastClick = { id: item.id, time: Date.now() };
    localStorage.setItem('chef-workspace-interactions', JSON.stringify(interactions));
  } catch (e) {}

  // Store spotlight state
  try { localStorage.setItem('chef-workspace-spotlight', JSON.stringify({ mode: 'detail', idx })); } catch (e) {}

  $('#spotlight').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

// Rotate quotes
let quoteTimer;
function startQuoteRotation() {
  clearInterval(quoteTimer);
  quoteTimer = setInterval(() => {
    if (spotlightMode !== 'default') return;
    spotlightIdx = (spotlightIdx + 1) % CONCEPTS.length;
    renderSpotlightDefault();
  }, 8000);
}

// Restore spotlight state
try {
  const saved = JSON.parse(localStorage.getItem('chef-workspace-spotlight'));
  if (saved && saved.mode === 'detail' && saved.idx != null) {
    renderSpotlightDetail(saved.idx);
  } else { renderSpotlightDefault(); }
} catch (e) { renderSpotlightDefault(); }
startQuoteRotation();

// ── Inspiration Grid ──
$('#inspGrid').innerHTML = INSPIRATIONS.map((item, i) => `
  <div class="insp-card" onclick="renderSpotlightDetail(${i})">
    <span class="cat-pill cat-${item.cat}">${item.cat}</span>
    <h3>${escHtml(item.title)}</h3>
    <div class="desc">${escHtml(item.desc)}</div>
  </div>
`).join('');

// ── Concepts Browser (pure CSS + minimal JS for generating HTML) ──
(function initConcepts() {
  const wrap = $('#conceptsWrap');
  let html = '<div class="concepts-nav">';
  CONCEPTS.forEach((_, i) => {
    const checked = i === 0 ? 'checked' : '';
    html += `<input type="radio" name="concept" id="c${i+1}" ${checked}><label for="c${i+1}">${i+1}</label>`;
  });
  html += '<div class="concept-panels">';
  CONCEPTS.forEach((c, i) => {
    html += `<div class="concept-panel cp${i+1}"><h3>"${escHtml(c.title)}"</h3><p>${escHtml(c.body)}</p></div>`;
  });
  html += '</div></div>';
  wrap.innerHTML = html;
})();

// ── Chat ──
const CHAT_KEY = 'chef-workspace-chat';

function loadMessages() {
  try { return JSON.parse(localStorage.getItem(CHAT_KEY) || '[]'); } catch (e) { return []; }
}

function saveMessages(msgs) {
  try { localStorage.setItem(CHAT_KEY, JSON.stringify(msgs)); } catch (e) {}
}

function renderMessages() {
  const msgs = loadMessages();
  const html = msgs.map(m => {
    const cls = m.sender === 'user' ? 'user' : 'chef';
    return `<div class="chat-msg ${cls}">${urlify2(m.text)}<span class="msg-time">${formatTime(m.timestamp)}</span></div>`;
  }).join('');
  const el = $('#chatMessages');
  if (el) { el.innerHTML = html; el.scrollTop = el.scrollHeight; }
  const el2 = $('#chatMessagesMobile');
  if (el2) { el2.innerHTML = html; el2.scrollTop = el2.scrollHeight; }
}

function sendMessage(text) {
  if (!text.trim()) return;
  const msgs = loadMessages();
  msgs.push({ text: text.trim(), timestamp: Date.now(), sender: 'user' });
  // Auto-reply
  setTimeout(() => {
    const m = loadMessages();
    m.push({ text: 'Message received — I\'ll respond via Telegram shortly.', timestamp: Date.now(), sender: 'chef' });
    saveMessages(m);
    renderMessages();
  }, 600);
  saveMessages(msgs);
  renderMessages();
}

// Desktop chat
$('#chatSend').addEventListener('click', () => { sendMessage($('#chatInput').value); $('#chatInput').value = ''; });
$('#chatInput').addEventListener('keydown', e => { if (e.key === 'Enter') { sendMessage($('#chatInput').value); $('#chatInput').value = ''; } });

// Mobile chat
$('#chatFab').addEventListener('click', () => {
  $('#chatSheet').classList.add('open');
  $('#chatOverlay').style.display = 'block';
  renderMessages();
});
$('#chatOverlay').addEventListener('click', () => {
  $('#chatSheet').classList.remove('open');
  $('#chatOverlay').style.display = 'none';
});
$('#chatSendMobile').addEventListener('click', () => { sendMessage($('#chatInputMobile').value); $('#chatInputMobile').value = ''; });
$('#chatInputMobile').addEventListener('keydown', e => { if (e.key === 'Enter') { sendMessage($('#chatInputMobile').value); $('#chatInputMobile').value = ''; } });

renderMessages();
</script>
</body>
</html>
