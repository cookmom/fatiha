<!-- بسم الله الرحمن الرحيم -->
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8">
<title>Eid Mubarak</title>
<style>
  * { margin: 0; padding: 0; }
  body { background: #f0e8d8; overflow: hidden; }
</style>
<script src="https://cdn.jsdelivr.net/npm/p5@2.0.3/lib/p5.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/p5.brush@2.0.2-beta"></script>
<script src="mixbox.js"></script>
</head>
<body>
<script>
const W = 1080, H = 1920;
let svgLayers = [];
let paperImg;
let paintQueue = [];
let paintIdx = 0;
let gardenQueue = [];
let gardenIdx = 0;
let frame = 0;

// Colors
const INK_GREEN = [26, 58, 30];    // dark green
const INK_SAGE = [74, 120, 74];    // sage
const GOLD = [154, 122, 48];       // gold ink
const CRIMSON = [138, 26, 42];     // deep crimson
const CREAM = [196, 164, 74];      // light gold

function preload() {
  paperImg = loadImage('paper-texture.jpg');
}

function setup() {
  createCanvas(W, H, WEBGL);
  brush.load();
  frameRate(30);
  
  // Draw paper background
  background(240, 228, 210);
  push();
  translate(-W/2, -H/2);
  image(paperImg, 0, 0, W, H);
  pop();
  
  // Load SVG and build paint queue
  loadSVGPaths();
}

async function loadSVGPaths() {
  const resp = await fetch('eid-traced-color.svg');
  const svgText = await resp.text();
  const parser = new DOMParser();
  const doc = parser.parseFromString(svgText, 'image/svg+xml');
  const paths = doc.querySelectorAll('path');
  
  // Scale SVG 800x800 to canvas
  const targetW = W * 0.88;
  const sc = targetW / 800;
  const ox = (W - targetW) / 2;
  const oy = H * 0.16;
  
  for (const p of paths) {
    const fill = p.getAttribute('fill') || '#000';
    const hex = fill.replace('#','');
    const r = parseInt(hex.substr(0,2),16);
    const g = parseInt(hex.substr(2,2),16);
    const b = parseInt(hex.substr(4,2),16);
    const brightness = (r + g + b) / 3;
    if (brightness > 175) continue; // skip bg
    
    const transform = p.getAttribute('transform') || '';
    let tx = 0, ty = 0;
    const m = transform.match(/translate\(([^,)]+)[,\s]([^)]+)\)/);
    if (m) { tx = parseFloat(m[1]); ty = parseFloat(m[2]); }
    
    // Sample points along the path contour
    const d = p.getAttribute('d');
    const points = sampleSVGPath(d, tx, ty, sc, ox, oy);
    
    if (points.length < 3) continue;
    
    const type = brightness < 130 ? 'main' : 'accent';
    svgLayers.push({ points, type });
  }
  
  console.log('Layers:', svgLayers.length);
  
  // Build paint queue: brush strokes along each contour
  for (const layer of svgLayers) {
    const color = layer.type === 'main' ? INK_GREEN : GOLD;
    const pts = layer.points;
    
    // Paint the filled contour with overlapping brush strokes
    // Scan through points in segments
    for (let i = 0; i < pts.length - 1; i += 2) {
      paintQueue.push({
        x1: pts[i].x, y1: pts[i].y,
        x2: pts[i+1].x, y2: pts[i+1].y,
        color, type: layer.type,
        weight: 8 + Math.random() * 6
      });
    }
  }
  
  // Garden elements queue
  const gardenSeed = 500;
  let gs = gardenSeed;
  function gRand() { gs=(gs*16807)%2147483647; return(gs-1)/2147483646; }
  
  for (let i = 0; i < 40; i++) {
    const a = gRand() * Math.PI * 2;
    const r = 320 + gRand() * 300;
    gardenQueue.push({
      type: 'leaf',
      x: W/2 + Math.cos(a) * r,
      y: H*0.36 + Math.sin(a) * r * 0.45,
      angle: a + 1 + gRand() * 0.6,
      size: 25 + gRand() * 40,
      color: [INK_GREEN, INK_SAGE, [42, 100, 58]][i%3]
    });
  }
  
  gs = 600;
  for (let i = 0; i < 8; i++) {
    const a = gRand() * Math.PI * 2;
    const r = 360 + gRand() * 220;
    gardenQueue.push({
      type: 'rose',
      x: W/2 + Math.cos(a) * r,
      y: H*0.36 + Math.sin(a) * r * 0.4,
      size: 14 + gRand() * 22,
      color: [CRIMSON, [194, 40, 74], [212, 64, 96]][i%3]
    });
  }
  
  console.log('Paint queue:', paintQueue.length, 'Garden:', gardenQueue.length);
}

function sampleSVGPath(d, tx, ty, scale, ox, oy) {
  // Simple SVG path parser — extract M, L, C, Z points
  const pts = [];
  const cmds = d.match(/[MLHVCSQTAZ][^MLHVCSQTAZ]*/gi) || [];
  let cx = 0, cy = 0;
  
  for (const cmd of cmds) {
    const type = cmd[0];
    const nums = cmd.slice(1).trim().split(/[\s,]+/).map(Number);
    
    if (type === 'M' || type === 'm') {
      cx = type === 'M' ? nums[0] : cx + nums[0];
      cy = type === 'M' ? nums[1] : cy + nums[1];
      pts.push({ x: (cx + tx) * scale + ox, y: (cy + ty) * scale + oy });
    } else if (type === 'L' || type === 'l') {
      for (let i = 0; i < nums.length; i += 2) {
        cx = type === 'L' ? nums[i] : cx + nums[i];
        cy = type === 'L' ? nums[i+1] : cy + nums[i+1];
        pts.push({ x: (cx + tx) * scale + ox, y: (cy + ty) * scale + oy });
      }
    } else if (type === 'C' || type === 'c') {
      for (let i = 0; i < nums.length; i += 6) {
        let x1,y1,x2,y2,x3,y3;
        if (type === 'C') {
          x3 = nums[i+4]; y3 = nums[i+5];
        } else {
          x3 = cx + nums[i+4]; y3 = cy + nums[i+5];
        }
        // Sample cubic bezier
        for (let t = 0.33; t <= 1; t += 0.33) {
          const mt = 1 - t;
          // Simplified — just endpoint
          pts.push({ x: (x3 + tx) * scale + ox, y: (y3 + ty) * scale + oy });
        }
        cx = x3; cy = y3;
      }
    } else if (type === 'Z' || type === 'z') {
      // Close — add first point again
      if (pts.length > 0) pts.push({...pts[0]});
    }
  }
  return pts;
}

function draw() {
  frame++;
  
  // Paint calligraphy strokes progressively
  const strokesPerFrame = Math.ceil(paintQueue.length / 120); // ~4s to paint all
  
  push();
  translate(-W/2, -H/2);
  
  for (let s = 0; s < strokesPerFrame && paintIdx < paintQueue.length; s++) {
    const stroke = paintQueue[paintIdx++];
    const [r, g, b] = stroke.color;
    
    brush.set(stroke.type === 'main' ? 'marker' : 'HB', r, g, b, Math.random() * 80 + 60);
    brush.strokeWeight(stroke.weight);
    brush.line(stroke.x1, stroke.y1, stroke.x2, stroke.y2);
  }
  
  // Garden elements after calligraphy 60% done
  if (paintIdx > paintQueue.length * 0.5) {
    const gardenPerFrame = 1;
    for (let g = 0; g < gardenPerFrame && gardenIdx < gardenQueue.length; g++) {
      const item = gardenQueue[gardenIdx++];
      const [r, gv, b] = item.color;
      
      if (item.type === 'leaf') {
        brush.set('marker', r, gv, b, 120);
        brush.strokeWeight(item.size * 0.4);
        const ex = item.x + Math.cos(item.angle) * item.size;
        const ey = item.y + Math.sin(item.angle) * item.size;
        brush.line(item.x, item.y, ex, ey);
        // Second stroke for leaf width
        brush.strokeWeight(item.size * 0.25);
        brush.line(
          item.x + Math.cos(item.angle + 0.3) * item.size * 0.3,
          item.y + Math.sin(item.angle + 0.3) * item.size * 0.3,
          ex, ey
        );
      } else if (item.type === 'rose') {
        // Paint petals as short strokes radiating out
        const petals = 6;
        for (let p = 0; p < petals; p++) {
          const a = (p / petals) * Math.PI * 2 + Math.random() * 0.3;
          brush.set('marker', r, gv, b, 80 + Math.random() * 60);
          brush.strokeWeight(item.size * 0.3);
          brush.line(
            item.x + Math.cos(a) * item.size * 0.15,
            item.y + Math.sin(a) * item.size * 0.15,
            item.x + Math.cos(a) * item.size * 0.5,
            item.y + Math.sin(a) * item.size * 0.5
          );
        }
        // Gold center
        brush.set('HB', ...CREAM, 160);
        brush.strokeWeight(item.size * 0.2);
        brush.point(item.x, item.y);
      }
    }
  }
  
  pop();
  
  window._frame = frame;
  window._done = paintIdx >= paintQueue.length && gardenIdx >= gardenQueue.length;
  
  if (window._done && frame > 180) noLoop(); // stop after completion + hold
}
</script>
</body>
</html>
