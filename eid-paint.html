<!-- بسم الله الرحمن الرحيم -->
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8">
<title>Eid Mubarak</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Aref+Ruqaa:wght@400;700&display=swap');
  * { margin: 0; padding: 0; }
  body { background: #0d0d12; overflow: hidden; display: flex; align-items: center; justify-content: center; height: 100vh; }
</style>
</head>
<body>
<script>
const W = 1080, H = 1920;
const canvas = document.createElement('canvas');
canvas.width = W; canvas.height = H;
document.body.appendChild(canvas);
canvas.style.maxWidth = '100vw';
canvas.style.maxHeight = '100vh';
canvas.style.objectFit = 'contain';
const ctx = canvas.getContext('2d');

// Offscreen canvas for text mask
const maskCanvas = document.createElement('canvas');
maskCanvas.width = W; maskCanvas.height = H;
const maskCtx = maskCanvas.getContext('2d');

// Palette
const BG = '#0a0a10';
const GOLD = '#c9a84c';
const GOLD_LIGHT = '#e8d090';
const DARK_GREEN = '#1a5a32';
const SAGE = '#4a8a5a';
const CREAM = '#f5e8d0';
const CRIMSON = '#b82040';

let seed = 42;
function sRand() { seed=(seed*16807)%2147483647; return(seed-1)/2147483646; }

function drawLeaf(x, y, angle, size, color) {
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(angle);
  ctx.globalAlpha = 0.6;
  ctx.beginPath();
  ctx.moveTo(0, 0);
  ctx.bezierCurveTo(size*.35, -size*.5, size*.85, -size*.25, size, 0);
  ctx.bezierCurveTo(size*.85, size*.25, size*.35, size*.5, 0, 0);
  ctx.fillStyle = color;
  ctx.fill();
  // vein
  ctx.globalAlpha = 0.2;
  ctx.beginPath();
  ctx.moveTo(size*.1, 0);
  ctx.lineTo(size*.8, 0);
  ctx.strokeStyle = '#082010';
  ctx.lineWidth = 1;
  ctx.stroke();
  ctx.restore();
}

function drawRose(x, y, size, color) {
  ctx.save();
  ctx.translate(x, y);
  for (let ring = 2; ring >= 0; ring--) {
    const rs = size * (0.4 + ring * 0.35);
    const np = 5 + Math.floor(sRand() * 3);
    for (let i = 0; i < np; i++) {
      const a = (i/np) * Math.PI*2 + ring*0.4 + sRand()*0.3;
      ctx.save();
      ctx.rotate(a);
      ctx.globalAlpha = 0.3 + ring*0.12;
      ctx.beginPath();
      ctx.ellipse(rs*0.45, 0, rs*0.45, rs*0.2, 0, 0, Math.PI*2);
      ctx.fillStyle = color;
      ctx.fill();
      ctx.restore();
    }
  }
  ctx.globalAlpha = 0.8;
  ctx.beginPath();
  ctx.arc(0, 0, size*0.1, 0, Math.PI*2);
  ctx.fillStyle = GOLD_LIGHT;
  ctx.fill();
  ctx.restore();
}

let frame = 0;
const FPS = 30, DUR = 8, TOTAL = FPS * DUR;

// Wait for font
document.fonts.ready.then(() => {
  console.log('Fonts ready');
  requestAnimationFrame(loop);
});

function loop() {
  frame++;
  const t = Math.min(frame / TOTAL, 1.0);
  
  // Clear
  ctx.fillStyle = BG;
  ctx.fillRect(0, 0, W, H);
  
  // Warm vignette
  const vig = ctx.createRadialGradient(W/2, H*.42, 80, W/2, H*.42, H*.5);
  vig.addColorStop(0, 'rgba(35,28,18,0.3)');
  vig.addColorStop(1, 'rgba(10,10,16,0)');
  ctx.fillStyle = vig;
  ctx.fillRect(0, 0, W, H);
  
  // === CALLIGRAPHY ===
  // Two lines: عيد (big) and مبارك (slightly smaller below)
  const textReveal = Math.min(t * 2.0, 1.0);
  
  if (textReveal > 0) {
    // Draw text to mask (white on black)
    maskCtx.fillStyle = '#000';
    maskCtx.fillRect(0, 0, W, H);
    maskCtx.fillStyle = '#fff';
    maskCtx.textAlign = 'center';
    maskCtx.textBaseline = 'middle';
    
    // عيد — large
    maskCtx.font = 'bold 220px "Aref Ruqaa", serif';
    maskCtx.fillText('عيد', W/2, H*0.36);
    
    // مبارك — slightly smaller
    maskCtx.font = 'bold 180px "Aref Ruqaa", serif';
    maskCtx.fillText('مبارك', W/2, H*0.48);
    
    const maskData = maskCtx.getImageData(0, 0, W, H);
    
    // Paint calligraphy using mask — layered approach
    seed = 200;
    const passes = Math.floor(textReveal * 10);
    
    // Layer 1: Solid fill (clean readable text)
    ctx.save();
    ctx.globalAlpha = 0.85 * textReveal;
    ctx.fillStyle = GOLD;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.font = 'bold 220px "Aref Ruqaa", serif';
    ctx.fillText('عيد', W/2, H*0.36);
    ctx.font = 'bold 180px "Aref Ruqaa", serif';
    ctx.fillText('مبارك', W/2, H*0.48);
    ctx.restore();
    
    // Layer 2: Watercolor texture overlay (scatter dots on text)
    for (let pass = 0; pass < passes; pass++) {
      const nDots = 800;
      for (let d = 0; d < nDots; d++) {
        const x = Math.floor(sRand() * W);
        const y = Math.floor(H*0.25 + sRand() * H*0.35);
        const idx = (y * W + x) * 4;
        if (maskData.data[idx] < 128) continue;
        
        ctx.save();
        ctx.globalAlpha = 0.04 + sRand() * 0.06;
        ctx.beginPath();
        const r = 3 + sRand() * 8;
        ctx.arc(x + (sRand()-.5)*4, y + (sRand()-.5)*4, r, 0, Math.PI*2);
        
        if (pass < 4) ctx.fillStyle = '#6a4a1a';
        else if (pass < 7) ctx.fillStyle = GOLD_LIGHT;
        else ctx.fillStyle = CREAM;
        
        ctx.fill();
        ctx.restore();
      }
    }
    
    // Gold outline pass (thin)
    if (textReveal > 0.5) {
      const outlineAlpha = Math.min((textReveal - 0.5) * 2, 1.0) * 0.4;
      ctx.save();
      ctx.globalAlpha = outlineAlpha;
      ctx.fillStyle = GOLD;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      
      ctx.font = 'bold 220px "Aref Ruqaa", serif';
      ctx.strokeStyle = GOLD;
      ctx.lineWidth = 2;
      ctx.strokeText('عيد', W/2, H*0.36);
      
      ctx.font = 'bold 180px "Aref Ruqaa", serif';
      ctx.strokeText('مبارك', W/2, H*0.48);
      ctx.restore();
    }
  }
  
  // === GARDEN ELEMENTS ===
  if (t > 0.3) {
    const gp = Math.min((t - 0.3) / 0.5, 1.0);
    seed = 500;
    
    // Leaves wreathing the text
    const nl = Math.floor(gp * 36);
    for (let i = 0; i < nl; i++) {
      const a = sRand() * Math.PI * 2;
      const r = 240 + sRand() * 300;
      drawLeaf(
        W/2 + Math.cos(a) * r,
        H*0.42 + Math.sin(a) * r * 0.35,
        a + 1 + sRand(),
        24 + sRand() * 40,
        [DARK_GREEN, SAGE, '#2a7a42', '#3a6a4a'][i%4]
      );
    }
    
    // Roses
    const nr = Math.floor(gp * 8);
    seed = 600;
    for (let i = 0; i < nr; i++) {
      const a = sRand() * Math.PI * 2;
      const r = 300 + sRand() * 200;
      drawRose(
        W/2 + Math.cos(a) * r,
        H*0.42 + Math.sin(a) * r * 0.35,
        15 + sRand() * 25,
        [CRIMSON, '#E83E6C', '#d44060', '#c2284a'][i%4]
      );
    }
    
    // Gold dust
    seed = 700;
    const nd = Math.floor(gp * 50);
    for (let i = 0; i < nd; i++) {
      const x = W*0.1 + sRand()*W*0.8;
      const y = H*0.22 + sRand()*H*0.4;
      ctx.save();
      ctx.globalAlpha = 0.25 + sRand() * 0.4;
      ctx.beginPath();
      ctx.arc(x, y, 1 + sRand()*3, 0, Math.PI*2);
      ctx.fillStyle = GOLD;
      ctx.fill();
      ctx.restore();
    }
  }
  
  // English subtitle
  if (t > 0.6) {
    const sa = Math.min((t - 0.6) / 0.15, 1.0) * 0.4;
    ctx.save();
    ctx.globalAlpha = sa;
    ctx.fillStyle = GOLD;
    ctx.font = '300 30px Georgia, serif';
    ctx.textAlign = 'center';
    ctx.fillText('Eid Mubarak', W/2, H * 0.58);
    ctx.restore();
  }
  
  window._frame = frame;
  window._done = frame >= TOTAL;
  
  if (frame < TOTAL) requestAnimationFrame(loop);
}
</script>
</body>
</html>
