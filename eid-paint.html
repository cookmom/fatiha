<!-- بسم الله الرحمن الرحيم -->
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8">
<title>Eid Mubarak</title>
<style>
  * { margin: 0; padding: 0; }
  body { background: #f2ead8; overflow: hidden; }
</style>
<script src="https://cdn.jsdelivr.net/npm/p5@2.0.3/lib/p5.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/p5.brush@2.0.2-beta"></script>
</head>
<body>
<script>
const W = 1080, H = 1920;
let calliData = null;
let paintQueue = [];
let paintIdx = 0;
let gardenQueue = [];
let gardenIdx = 0;
let frame = 0;
let setupDone = false;

function setup() {
  createCanvas(W, H, WEBGL);
  brush.load();
  frameRate(30);
  background(242, 234, 218);
  
  // Add subtle paper texture with brush
  brush.set('2H', 220, 215, 200, 15);
  brush.strokeWeight(0.5);
  for (let i = 0; i < 300; i++) {
    const x = random(W);
    const y = random(H);
    brush.line(x, y, x + random(-30, 30), y + random(-30, 30));
  }
  
  loadCalligraphy();
}

async function loadCalligraphy() {
  const resp = await fetch('eid-calligraphy.json');
  calliData = await resp.json();
  
  // Scale and center
  const scale1 = (W * 0.65) / calliData.line1.width;
  const scale2 = (W * 0.65) / calliData.line2.width;
  
  const cx = W / 2;
  const line1Y = H * 0.34;
  const line2Y = H * 0.48;
  
  // Build paint strokes for each contour
  function buildStrokes(contours, textWidth, scale, centerY) {
    const ox = cx - (textWidth * scale) / 2;
    
    for (const contour of contours) {
      const pts = contour.map(p => ({
        x: p.x * scale + ox,
        y: -p.y * scale + centerY  // flip Y
      }));
      
      // Paint along contour in segments
      for (let i = 0; i < pts.length - 1; i++) {
        paintQueue.push({
          x1: pts[i].x, y1: pts[i].y,
          x2: pts[i+1].x, y2: pts[i+1].y,
          layer: 'base'
        });
      }
      
      // Second pass: fill interior with cross-strokes
      const bbox = pts.reduce((b, p) => ({
        minX: Math.min(b.minX, p.x), maxX: Math.max(b.maxX, p.x),
        minY: Math.min(b.minY, p.y), maxY: Math.max(b.maxY, p.y)
      }), {minX:Infinity, maxX:-Infinity, minY:Infinity, maxY:-Infinity});
      
      // Horizontal fill strokes inside the contour
      for (let y = bbox.minY; y < bbox.maxY; y += 4) {
        // Find intersections with contour at this Y
        const intersections = [];
        for (let i = 0; i < pts.length - 1; i++) {
          const p1 = pts[i], p2 = pts[i+1];
          if ((p1.y <= y && p2.y > y) || (p2.y <= y && p1.y > y)) {
            const t = (y - p1.y) / (p2.y - p1.y);
            intersections.push(p1.x + t * (p2.x - p1.x));
          }
        }
        intersections.sort((a,b) => a - b);
        
        for (let j = 0; j < intersections.length - 1; j += 2) {
          paintQueue.push({
            x1: intersections[j], y1: y,
            x2: intersections[j+1], y2: y,
            layer: 'fill'
          });
        }
      }
    }
  }
  
  buildStrokes(calliData.line1.contours, calliData.line1.width, scale1, line1Y);
  buildStrokes(calliData.line2.contours, calliData.line2.width, scale2, line2Y);
  
  console.log('Paint queue:', paintQueue.length);
  
  // Garden elements
  let gs = 500;
  function gRand() { gs=(gs*16807)%2147483647; return(gs-1)/2147483646; }
  
  // Leaves
  for (let i = 0; i < 45; i++) {
    const a = gRand() * Math.PI * 2;
    const r = 280 + gRand() * 320;
    gardenQueue.push({
      type: 'leaf',
      x: cx + Math.cos(a) * r,
      y: H*0.40 + Math.sin(a) * r * 0.40,
      angle: a + 1 + gRand() * 0.8,
      size: 20 + gRand() * 45,
      colorIdx: i % 3
    });
  }
  
  // Roses
  gs = 600;
  for (let i = 0; i < 10; i++) {
    const a = gRand() * Math.PI * 2;
    const r = 330 + gRand() * 250;
    gardenQueue.push({
      type: 'rose',
      x: cx + Math.cos(a) * r,
      y: H*0.40 + Math.sin(a) * r * 0.38,
      size: 12 + gRand() * 20,
      colorIdx: i % 3
    });
  }
  
  setupDone = true;
}

function draw() {
  if (!setupDone) return;
  frame++;
  
  push();
  translate(-W/2, -H/2);
  
  // Paint calligraphy
  const strokesPerFrame = Math.max(Math.ceil(paintQueue.length / 150), 8);
  
  for (let s = 0; s < strokesPerFrame && paintIdx < paintQueue.length; s++) {
    const st = paintQueue[paintIdx++];
    
    if (st.layer === 'base') {
      // Outline strokes — dark green ink
      brush.set('marker', color(22, 82, 38), random(100, 180));
      brush.strokeWeight(random(2, 4));
      brush.line(st.x1, st.y1, st.x2, st.y2);
    } else {
      // Fill strokes — slightly lighter green
      brush.set('HB', color(35, 95, 45), random(30, 70));
      brush.strokeWeight(random(1.5, 3));
      brush.line(st.x1, st.y1, st.x2, st.y2);
    }
  }
  
  // Garden after 40% calligraphy done
  if (paintIdx > paintQueue.length * 0.4) {
    const gardenPerFrame = 1;
    for (let g = 0; g < gardenPerFrame && gardenIdx < gardenQueue.length; g++) {
      const item = gardenQueue[gardenIdx++];
      
      if (item.type === 'leaf') {
        const colors = [[22,58,28], [58,100,58], [34,86,46]][item.colorIdx];
        brush.set('marker', color(...colors), random(80, 140));
        brush.strokeWeight(item.size * 0.35);
        const ex = item.x + Math.cos(item.angle) * item.size;
        const ey = item.y + Math.sin(item.angle) * item.size;
        brush.line(item.x, item.y, ex, ey);
        // Width stroke
        brush.strokeWeight(item.size * 0.2);
        brush.set('HB', color(...colors), random(60, 100));
        brush.line(
          item.x + Math.cos(item.angle+0.4)*item.size*0.25,
          item.y + Math.sin(item.angle+0.4)*item.size*0.25,
          ex, ey
        );
      } else if (item.type === 'rose') {
        const colors = [[138,26,42], [194,40,74], [178,50,66]][item.colorIdx];
        for (let p = 0; p < 6; p++) {
          const a = (p/6)*Math.PI*2 + random(0.2);
          brush.set('marker', color(...colors), random(60, 120));
          brush.strokeWeight(item.size * 0.28);
          brush.line(
            item.x + Math.cos(a)*item.size*0.12,
            item.y + Math.sin(a)*item.size*0.12,
            item.x + Math.cos(a)*item.size*0.45,
            item.y + Math.sin(a)*item.size*0.45
          );
        }
        // Gold center
        brush.set('HB', color(180, 150, 60), 160);
        brush.strokeWeight(item.size * 0.15);
        brush.line(item.x-1, item.y, item.x+1, item.y);
      }
    }
  }
  
  pop();
  
  window._frame = frame;
  window._done = paintIdx >= paintQueue.length && gardenIdx >= gardenQueue.length;
  if (window._done && frame > 200) noLoop();
}
</script>
</body>
</html>
