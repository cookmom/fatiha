<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🍳 kitchen v3</title>
<style>
:root {
  --bg: #0a0a0b;
  --bg-sidebar: #0e0e11;
  --bg-card: #131316;
  --bg-card-hover: #1a1a1f;
  --border: #1e1e24;
  --text: #e4e4e7;
  --text-sec: #a1a1aa;
  --text-muted: #52525b;
  --indigo: #6366f1;
  --indigo-dim: #4f46e5;
  --amber: #f59e0b;
  --purple: #a855f7;
  --cyan: #06b6d4;
  --emerald: #10b981;
  --gray: #6b7280;
  --gold: #eab308;
  --red: #ef4444;
  --chat-w: 420px;
  --ref-w: 420px;
  --deadline-h: 36px;
  --radius: 8px;
  --tr: .2s ease;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;background:var(--bg);color:var(--text);line-height:1.5;}

/* Deadline Bar */
.deadline-bar{position:sticky;top:0;z-index:100;height:var(--deadline-h);background:#09090b;border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 16px;font-size:12px;color:var(--text-sec);cursor:pointer;user-select:none;flex-shrink:0;}
.deadline-bar .dot{width:7px;height:7px;border-radius:50%;margin-right:8px;flex-shrink:0;}
.deadline-bar .countdown{color:var(--text);font-weight:600;margin-right:6px;}
.deadline-bar .chevron{margin-left:auto;font-size:9px;color:var(--text-muted);transition:transform var(--tr);}
.deadline-bar.open .chevron{transform:rotate(180deg);}
.deadline-expand{position:absolute;top:var(--deadline-h);left:0;right:0;background:#09090b;border-bottom:1px solid var(--border);max-height:0;overflow:hidden;transition:max-height .3s ease;z-index:99;}
.deadline-bar.open+.deadline-expand{max-height:200px;}
.dl-row{display:flex;align-items:center;gap:8px;padding:6px 16px;font-size:12px;color:var(--text-sec);}
.dl-row .dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.dl-row .dl-days{margin-left:auto;color:var(--text-muted);font-size:11px;}

/* App Layout */
.app{display:flex;height:calc(100vh - var(--deadline-h));overflow:hidden;padding-bottom:36px;}

/* Code Canvas (Column 2) */
.code-canvas{flex:1;min-width:0;background:var(--bg-sidebar);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;}
.col-header{display:flex;align-items:center;height:40px;padding:0 14px;border-bottom:1px solid var(--border);gap:8px;flex-shrink:0;box-sizing:border-box;}
.col-header .stage-title{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--text-muted);}
.code-canvas-header{display:flex;align-items:center;height:40px;padding:0 14px;border-bottom:1px solid var(--border);gap:8px;flex-shrink:0;box-sizing:border-box;}
.code-canvas-header .stage-title{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--text-muted);}
.code-canvas-tabs{display:flex;gap:4px;margin-left:auto;}
.code-canvas-tab{padding:3px 12px;border-radius:14px;border:1px solid var(--border);background:var(--bg-card);color:var(--text-muted);font-size:10px;font-weight:600;cursor:pointer;transition:var(--tr);}
.code-canvas-tab:hover{color:var(--text);background:var(--bg-card-hover);}
.code-canvas-tab.active{background:var(--gold);color:#000;border-color:var(--gold);}

/* Spotlight Viewer (Column 3) */
.spotlight-viewer{flex:1;display:flex;flex-direction:column;min-width:0;overflow:hidden;background:var(--bg);border-right:1px solid var(--border);}
.spotlight-placeholder{flex:1;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:12px;color:var(--text-muted);user-select:none;}
.spotlight-placeholder .sp-icon{font-size:48px;opacity:.3;}
.spotlight-placeholder .sp-text{font-size:13px;opacity:.5;}
.spotlight-content{flex:1;overflow-y:auto;padding:32px;display:none;}
.spotlight-content.active{display:block;}
.spotlight-content .cat-pill{display:inline-block;padding:3px 10px;border-radius:20px;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;margin-bottom:10px;}
.spotlight-content h2{font-size:22px;font-weight:700;margin-bottom:12px;}
.spotlight-content .desc{font-size:14px;color:var(--text-sec);line-height:1.7;margin-bottom:16px;}
.spotlight-content .source-link{color:var(--cyan);font-size:12px;text-decoration:none;}
.spotlight-content .source-link:hover{text-decoration:underline;}
.spotlight-content .insp-nav{display:flex;gap:8px;margin-top:16px;padding-top:14px;border-top:1px solid var(--border);}
.spotlight-content .insp-nav button{background:#1a1a1f;border:1px solid var(--border);border-radius:6px;color:var(--text);padding:5px 12px;font-size:12px;cursor:pointer;transition:var(--tr);}
.spotlight-content .insp-nav button:hover{background:var(--bg-card-hover);}
.spotlight-content .insp-nav .back-btn{margin-left:auto;background:transparent;border:none;color:var(--text-muted);font-size:11px;cursor:pointer;}
.spotlight-content .insp-nav .back-btn:hover{color:var(--text);}

/* AI Analysis */
.analysis-section{margin-top:18px;padding-top:16px;border-top:1px solid var(--border);}
.analyze-btn{background:var(--bg-card);border:1px solid var(--border);border-radius:6px;color:var(--cyan);padding:6px 14px;font-size:12px;font-weight:600;cursor:pointer;transition:var(--tr);}
.analyze-btn:hover{background:var(--bg-card-hover);border-color:var(--cyan);}
.analyze-btn:disabled{opacity:.5;cursor:not-allowed;}
.analysis-progress{display:none;margin-top:8px;}
.analysis-progress-label{font-size:11px;color:var(--text-muted);margin-bottom:4px;}
.analysis-progress-track{height:3px;background:var(--border);border-radius:2px;overflow:hidden;}
.analysis-progress-bar{height:100%;background:var(--cyan);width:0%;transition:width .3s;}
#analysisOutput{display:none;margin-top:12px;padding:12px;background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);font-size:12px;line-height:1.7;color:var(--text-sec);white-space:pre-wrap;}
#analysisOutput .ai-label{font-weight:700;color:var(--cyan);}
#analysisTps{display:none;margin-top:4px;font-size:10px;color:var(--text-muted);}
.webgpu-warn{font-size:11px;color:var(--text-muted);margin-top:6px;opacity:.7;}

/* Chat Panel */
.chat-panel{width:var(--chat-w);min-width:var(--chat-w);background:var(--bg-sidebar);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;}
.chat-header{height:40px;padding:0 14px;border-bottom:1px solid var(--border);font-size:11px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.05em;display:flex;align-items:center;justify-content:space-between;box-sizing:border-box;}
.chat-header button{background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:14px;}
.chat-messages{flex:1;overflow-y:auto;padding:10px;display:flex;flex-direction:column;gap:6px;scrollbar-width:thin;scrollbar-color:var(--border) transparent;}
.chat-msg{max-width:90%;padding:7px 10px;border-radius:10px;font-size:12px;line-height:1.4;word-break:break-word;}
.chat-msg.user{align-self:flex-end;background:var(--indigo);color:#fff;border-bottom-right-radius:3px;}
.chat-msg.chef{align-self:flex-start;background:#1e1e24;color:var(--text);border-bottom-left-radius:3px;}
.chat-msg .msg-time{display:block;font-size:9px;margin-top:3px;opacity:.5;}
.chat-msg .link-card{display:block;margin-top:4px;padding:4px 6px;background:rgba(255,255,255,.06);border-radius:5px;color:var(--cyan);font-size:11px;text-decoration:none;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.chat-msg .link-card:hover{background:rgba(255,255,255,.1);}
.chat-input-area{padding:10px;border-top:1px solid var(--border);display:flex;gap:6px;}
.chat-input-area input{flex:1;background:#1a1a1f;border:1px solid var(--border);border-radius:6px;padding:7px 10px;color:var(--text);font-size:12px;outline:none;}
.chat-input-area input:focus{border-color:var(--indigo);}
.chat-input-area button{background:var(--indigo);border:none;border-radius:6px;color:#fff;padding:0 12px;font-size:12px;cursor:pointer;}

/* AI Chat Pop-out */
.ai-chat-popout{position:fixed;background:var(--bg-sidebar);border:1px solid var(--border);border-radius:var(--radius);box-shadow:0 8px 32px rgba(0,0,0,.7);z-index:300;min-width:300px;min-height:200px;resize:both;overflow:hidden;display:flex;flex-direction:column;}
.ai-chat-popout-header{display:flex;align-items:center;padding:8px 12px;border-bottom:1px solid var(--border);cursor:move;user-select:none;flex-shrink:0;gap:8px;background:var(--bg-card);}
.ai-chat-popout-title{flex:1;font-size:11px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.05em;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.ai-chat-popout-close{background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:14px;padding:0 4px;line-height:1;transition:color var(--tr);}
.ai-chat-popout-close:hover{color:var(--text);}
.ai-chat-popout-body{flex:1;overflow-y:auto;padding:10px;scrollbar-width:thin;scrollbar-color:var(--border) transparent;}
.ai-chat-popout-input{display:flex;gap:6px;padding:10px;border-top:1px solid var(--border);flex-shrink:0;}
.ai-chat-popout-input input{flex:1;background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:6px 10px;font-size:12px;color:var(--text);outline:none;}
.ai-chat-popout-input input:focus{border-color:var(--cyan);}
.ai-chat-popout-input button{background:var(--cyan);border:none;border-radius:6px;color:#000;padding:6px 12px;font-size:11px;font-weight:600;cursor:pointer;}

/* Stage title shared */
.stage-title{font-size:14px;font-weight:600;}

/* Canvas pane (inside code-canvas column) */
.canvas-view{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.canvas-view.hidden{display:none;}
.canvas-container{flex:1;background:#000;display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative;}
.canvas-container iframe{border:none;background:#0a0a0b;}
.aspect-bar{display:flex;align-items:center;gap:6px;padding:6px 12px;border-top:1px solid var(--border);font-size:11px;color:var(--text-muted);flex-shrink:0;}
.aspect-btn{padding:3px 10px;border-radius:4px;border:1px solid var(--border);background:transparent;color:var(--text-muted);font-size:10px;cursor:pointer;transition:var(--tr);}
.aspect-btn.active{background:var(--indigo);color:#fff;border-color:var(--indigo);}

/* Code pane */
.code-view{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.code-view.hidden{display:none;}
.code-toolbar{display:flex;align-items:center;gap:6px;padding:8px 12px;border-bottom:1px solid var(--border);flex-wrap:wrap;flex-shrink:0;}
.code-toolbar button,.code-toolbar select,.code-toolbar label{font-size:11px;border-radius:5px;border:1px solid var(--border);background:#1a1a1f;color:var(--text);padding:4px 10px;cursor:pointer;transition:var(--tr);}
.code-toolbar button:hover{background:var(--bg-card-hover);}
.code-toolbar .run-btn{background:var(--emerald);color:#000;border-color:var(--emerald);font-weight:600;}
.code-toolbar .run-btn:hover{background:#0d9668;}
.code-toolbar .auto-toggle{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--text-sec);border:none;background:none;}
.code-toolbar .auto-toggle input{accent-color:var(--gold);}
.code-toolbar .save-name{background:#1a1a1f;border:1px solid var(--border);border-radius:5px;color:var(--text);padding:4px 8px;font-size:11px;width:110px;}
.code-editor-wrap{flex:1;position:relative;overflow:hidden;}
.line-numbers{position:absolute;top:0;left:0;width:36px;padding:14px 6px 14px 0;text-align:right;font-family:'SF Mono','Fira Code','Consolas',monospace;font-size:12px;line-height:1.5;color:var(--text-muted);pointer-events:none;user-select:none;overflow:hidden;}
.code-editor{width:100%;height:100%;resize:none;background:#1a1a1e;color:#e4e4e7;border:none;padding:14px 14px 14px 44px;font-family:'SF Mono','Fira Code','Consolas',monospace;font-size:12px;line-height:1.5;outline:none;tab-size:2;}

/* Reference Panel */
.ref-panel{width:var(--ref-w);min-width:var(--ref-w);background:var(--bg-sidebar);display:flex;flex-direction:column;flex-shrink:0;overflow:hidden;}
.ref-tabs{display:flex;height:40px;border-bottom:1px solid var(--border);flex-shrink:0;box-sizing:border-box;align-items:center;}
.ref-tab{flex:1;padding:8px 4px;text-align:center;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.04em;color:var(--text-muted);cursor:pointer;transition:var(--tr);border-bottom:2px solid transparent;}
.ref-tab:hover{color:var(--text);}
.ref-tab.active{color:var(--gold);border-bottom-color:var(--gold);}
.ref-content{flex:1;overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--border) transparent;}
.ref-pane{display:none;padding:10px;}
.ref-pane.active{display:block;}

/* Inspiration cards (sidebar) */
.insp-card-s{padding:10px;background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:6px;cursor:pointer;transition:transform var(--tr),border-color var(--tr);}
.insp-card-s:hover{transform:translateY(-1px);border-color:#2a2a32;}
.insp-card-s .cat-pill{display:inline-block;padding:1px 7px;border-radius:12px;font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.04em;margin-bottom:5px;}
.insp-card-s h4{font-size:12px;font-weight:600;margin-bottom:3px;line-height:1.3;}
.insp-card-s .desc{font-size:10px;color:var(--text-muted);line-height:1.4;display:-webkit-box;-webkit-line-clamp:1;-webkit-box-orient:vertical;overflow:hidden;}

/* Technique cards (sidebar) */
.tech-card-s{padding:10px;background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:6px;display:flex;align-items:center;gap:8px;transition:border-color var(--tr);}
.tech-card-s:hover{border-color:#2a2a32;}
.tech-card-s .info{flex:1;min-width:0;}
.tech-card-s h4{font-size:11px;font-weight:600;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.tech-card-s .cat-pill{display:inline-block;padding:1px 6px;border-radius:12px;font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.04em;}
.tech-card-s .load-btn{padding:3px 10px;border-radius:5px;border:1px solid var(--border);background:#1a1a1f;color:var(--text);font-size:10px;cursor:pointer;transition:var(--tr);font-weight:500;flex-shrink:0;}
.tech-card-s .load-btn:hover{background:var(--gold);color:#000;border-color:var(--gold);}

/* Concepts (sidebar) */
.concepts-wrap{padding:10px;}
.concepts-nav{display:flex;gap:4px;margin-bottom:10px;flex-wrap:wrap;}
.concepts-nav input[type="radio"]{display:none;}
.concepts-nav label{display:inline-flex;align-items:center;justify-content:center;width:28px;height:28px;border-radius:50%;background:var(--bg-card);border:1px solid var(--border);font-size:11px;font-weight:600;color:var(--text-muted);cursor:pointer;transition:var(--tr);}
.concepts-nav input[type="radio"]:checked+label{background:var(--gold);color:#000;border-color:var(--gold);}
.concept-panel{display:none;background:var(--bg-card);border:1px solid var(--border);border-left:3px solid var(--gold);border-radius:var(--radius);padding:14px 16px;}
#c1:checked~.concept-panels .cp1,#c2:checked~.concept-panels .cp2,#c3:checked~.concept-panels .cp3,#c4:checked~.concept-panels .cp4,#c5:checked~.concept-panels .cp5,#c6:checked~.concept-panels .cp6,#c7:checked~.concept-panels .cp7,#c8:checked~.concept-panels .cp8{display:block;}
.concept-panel h3{font-size:13px;font-weight:700;margin-bottom:6px;color:var(--gold);}
.concept-panel p{font-size:12px;color:var(--text-sec);font-style:italic;line-height:1.6;}

/* Category colors */
.cat-kinetic{background:rgba(245,158,11,.15);color:var(--amber);}
.cat-generative{background:rgba(168,85,247,.15);color:var(--purple);}
.cat-sound{background:rgba(6,182,212,.15);color:var(--cyan);}
.cat-faith{background:rgba(16,185,129,.15);color:var(--emerald);}
.cat-industry{background:rgba(107,114,128,.15);color:var(--gray);}
.cat-noise{background:rgba(6,182,212,.15);color:var(--cyan);}
.cat-growth{background:rgba(16,185,129,.15);color:var(--emerald);}
.cat-cellular{background:rgba(168,85,247,.15);color:var(--purple);}
.cat-geometry{background:rgba(245,158,11,.15);color:var(--amber);}
.cat-physics{background:rgba(6,182,212,.15);color:var(--cyan);}
.cat-data{background:rgba(107,114,128,.15);color:var(--gray);}

/* Team Drawer */
.team-drawer{position:fixed;bottom:0;left:0;right:0;z-index:200;background:var(--bg-sidebar);border-top:1px solid var(--border);max-height:36px;overflow:hidden;}
.team-drawer.open{max-height:none;height:376px;}
.team-drawer-resize{position:absolute;top:0;left:0;right:0;height:5px;cursor:ns-resize;z-index:10;background:transparent;}
.team-drawer-resize:hover{background:var(--indigo);opacity:0.4;}
.team-drawer-handle{height:36px;display:flex;align-items:center;padding:0 14px;cursor:pointer;user-select:none;gap:8px;}
.team-drawer-handle .td-label{font-size:11px;font-weight:600;color:var(--text-sec);}
.team-drawer-handle .td-dots{display:flex;gap:5px;margin-left:8px;}
.team-drawer-handle .td-dot{width:6px;height:6px;border-radius:50%;background:var(--text-muted);transition:background .5s;}
.team-drawer-handle .td-chevron{margin-left:auto;font-size:9px;color:var(--text-muted);transition:transform var(--tr);}
.team-drawer.open .td-chevron{transform:rotate(180deg);}
.team-drawer.full{max-height:100vh !important;height:100vh !important;top:0 !important;bottom:0 !important;left:0;right:0;z-index:300;}
.team-drawer.full .team-drawer-content{height:calc(100vh - 68px);}
.td-expand{margin-left:auto;background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:13px;padding:2px 6px;line-height:1;transition:color var(--tr);}
.td-expand:hover{color:var(--gold);}
.team-drawer-tabs{display:flex;height:32px;border-bottom:1px solid var(--border);align-items:center;padding:0 8px;gap:2px;}
.team-drawer-tab{padding:4px 14px;font-size:10px;font-weight:600;color:var(--text-muted);cursor:pointer;border-bottom:2px solid transparent;transition:var(--tr);text-transform:uppercase;letter-spacing:.04em;}
.team-drawer-tab:hover{color:var(--text);}
.team-drawer-tab.active{color:var(--gold);border-bottom-color:var(--gold);}
.team-drawer-content{height:308px;overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--border) transparent;}
.team-drawer-pane{display:none;height:100%;overflow-y:auto;}
.team-drawer-pane.active{display:block;}

/* Mobile chat FAB + sheet */
.chat-fab{display:none;position:fixed;bottom:16px;left:16px;z-index:200;width:48px;height:48px;border-radius:50%;background:var(--indigo);border:none;color:#fff;font-size:20px;cursor:pointer;box-shadow:0 4px 16px rgba(99,102,241,.4);}
.chat-overlay{display:none;position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.5);}
.chat-sheet{display:none;position:fixed;bottom:0;left:0;right:0;z-index:201;background:var(--bg-sidebar);border-top:1px solid var(--border);border-radius:14px 14px 0 0;transform:translateY(100%);transition:transform .3s ease;max-height:70vh;flex-direction:column;}
.chat-sheet.open{transform:translateY(0);}
.chat-sheet-handle{width:32px;height:4px;background:var(--border);border-radius:2px;margin:8px auto 4px;}
.chat-sheet .chat-messages{flex:1;overflow-y:auto;padding:10px;display:flex;flex-direction:column;gap:6px;}
.chat-sheet .chat-input-area{padding:10px;border-top:1px solid var(--border);display:flex;gap:6px;}
.chat-sheet .chat-input-area input{flex:1;background:#1a1a1f;border:1px solid var(--border);border-radius:6px;padding:7px 10px;color:var(--text);font-size:12px;outline:none;}
.chat-sheet .chat-input-area button{background:var(--indigo);border:none;border-radius:6px;color:#fff;padding:0 12px;font-size:12px;cursor:pointer;}

/* Mobile bottom tab bar */
.mobile-tabs{display:none;position:fixed;bottom:0;left:0;right:0;z-index:150;background:#09090b;border-top:1px solid var(--border);height:52px;}
.mobile-tabs .m-tab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:9px;font-weight:600;color:var(--text-muted);cursor:pointer;gap:2px;text-transform:uppercase;letter-spacing:.03em;}
.mobile-tabs .m-tab.active{color:var(--gold);}
.mobile-tabs .m-tab .m-icon{font-size:18px;}

/* Responsive: Tablet */
@media(max-width:1280px){
  .chat-panel{display:none;}
  .chat-fab{display:flex;align-items:center;justify-content:center;}
  .chat-sheet{display:flex;}
  .spotlight-viewer{min-width:280px;}
}
@media(max-width:1024px){
  .ref-panel{width:260px;min-width:260px;}
}
/* Responsive: Mobile */
@media(max-width:768px){
  .ref-panel{display:none;}
  .chat-panel{display:none;}
  .code-canvas{display:none;}
  .spotlight-viewer{display:none;}
  .chat-fab{display:none;}
  .mobile-tabs{display:flex;}
  .app{height:calc(100vh - var(--deadline-h) - 52px);}

const TECHNIQUES = [
  { name:'Perlin Noise Flow Field', cat:'noise', desc:'Particles follow invisible vector fields created by noise functions', code:`let particles = [];
function setup() {
  createCanvas(windowWidth, windowHeight);
  background(10, 10, 11);
  for (let i = 0; i < 800; i++) particles.push(createVector(random(width), random(height)));
  textAlign(CENTER, CENTER); textFont('monospace');
}
function draw() {
  fill(10, 10, 11, 15); noStroke(); rect(0, 0, width, height);
  let t = frameCount * 0.002;
  for (let p of particles) {
    let a = noise(p.x * 0.003, p.y * 0.003, t) * TWO_PI * 2;
    p.x += cos(a) * 1.5; p.y += sin(a) * 1.5;
    let b = map(noise(p.x*0.005, p.y*0.005), 0, 1, 60, 255);
    fill(b); textSize(10); text('+', p.x, p.y);

  { name:'L-Systems', cat:'growth', desc:'Recursive string-rewriting rules that generate organic branching structures', code:`let sentence, rules, angle, len;
function setup() {
  createCanvas(windowWidth, windowHeight);
  background(10, 10, 11);
  angle = radians(25); len = max(height * 0.22, 60);
  sentence = 'F'; rules = [{a:'F', b:'FF+[+F-F-F]-[-F+F+F]'}];
  for (let i = 0; i < 4; i++) generate();
  drawTree();
}
function generate() {
  let next = '';
  for (let c of sentence) {
    let found = rules.find(r => r.a === c);
    next += found ? found.b : c;
  }
  sentence = next;
}
function drawTree() {
  background(10, 10, 11);
  stroke(80, 200, 120); strokeWeight(1); noFill();
  resetMatrix(); translate(width/2, height);
  let l = len * pow(0.5, 4);
  for (let c of sentence) {
    if (c === 'F') { line(0,0,0,-l); translate(0,-l); }
    else if (c === '+') rotate(angle);
    else if (c === '-') rotate(-angle);
    else if (c === '[') push();
    else if (c === ']') pop();
  }
}
function mousePressed() { noiseSeed(random(10000)); angle = radians(random(15,35)); sentence='F'; for(let i=0;i<4;i++) generate(); drawTree(); }` },
  { name:"Conway's Game of Life", cat:'cellular', desc:'Simple birth/death rules on a grid produce emergent complexity', code:`let grid, cols, rows, sz = 10;
function setup() {
  createCanvas(windowWidth, windowHeight);
  textAlign(CENTER, CENTER); textFont('monospace'); textSize(sz);
  cols = floor(width/sz); rows = floor(height/sz);
  grid = Array.from({length:cols}, ()=>Array.from({length:rows}, ()=>random()>.7?1:0));
}
function draw() {
  background(10, 10, 11);
  fill(168, 85, 247);
  for (let x=0; x<cols; x++) for (let y=0; y<rows; y++) {
    if (grid[x][y]) text('+', x*sz+sz/2, y*sz+sz/2);
  }
  let next = Array.from({length:cols}, ()=>Array(rows).fill(0));
  for (let x=0; x<cols; x++) for (let y=0; y<rows; y++) {
    let s = 0;
    for (let dx=-1; dx<=1; dx++) for (let dy=-1; dy<=1; dy++) {
      if (dx===0&&dy===0) continue;
      let nx=(x+dx+cols)%cols, ny=(y+dy+rows)%rows;
      s += grid[nx][ny];
    }
    if (grid[x][y]) next[x][y] = (s===2||s===3)?1:0;
    else next[x][y] = s===3?1:0;
  }
  grid = next;
}` },
  { name:'Voronoi Tessellation', cat:'geometry', desc:"Space partitioned by nearest-neighbor distance — nature's tiling algorithm", code:`let pts = [];
function setup() {
  createCanvas(windowWidth, windowHeight);
  for (let i = 0; i < 30; i++) pts.push({x:random(width),y:random(height),vx:random(-0.5,0.5),vy:random(-0.5,0.5)});
  noStroke(); textAlign(CENTER,CENTER); textFont('monospace');
}
function draw() {
  background(10,10,11);
  let step = 8;
  for (let px=0; px<width; px+=step) for (let py=0; py<height; py+=step) {
    let minD=Infinity, ci=0;
    for (let i=0;i<pts.length;i++) {
      let d=dist(px,py,pts[i].x,pts[i].y);
      if (d<minD){minD=d; ci=i;}
    }
    let h = (ci*37)%360;
    fill(h,40,max(20,70-minD*0.15));
    textSize(step); text('+', px, py);
  }
  for (let p of pts) {
    p.x+=p.vx; p.y+=p.vy;
    if(p.x<0||p.x>width) p.vx*=-1;
    if(p.y<0||p.y>height) p.vy*=-1;
  }
}` },
  { name:'Circle Packing', cat:'geometry', desc:'Fill space with non-overlapping circles — crown shyness in 2D', code:`let circles = [];
function setup() {
  createCanvas(windowWidth, windowHeight);
  background(10,10,11);
  textAlign(CENTER,CENTER); textFont('monospace');
}
function draw() {
  background(10,10,11);
  for (let i = 0; i < 10; i++) {
    let c = {x:random(width),y:random(height),r:2,growing:true};
    let ok = true;
    for (let o of circles) if (dist(c.x,c.y,o.x,o.y)<o.r+c.r+2) { ok=false; break; }
    if (ok && circles.length < 500) circles.push(c);
  }
  for (let c of circles) {
    if (!c.growing) continue;
    c.r += 0.4;
    if (c.x-c.r<0||c.x+c.r>width||c.y-c.r<0||c.y+c.r>height) { c.growing=false; continue; }
    for (let o of circles) {
      if (o===c) continue;
      if (dist(c.x,c.y,o.x,o.y)<c.r+o.r+2) { c.growing=false; break; }
    }
  }
  noStroke();
  for (let c of circles) {
    let b = map(c.r, 2, 80, 40, 220);
    fill(b); textSize(max(6, c.r*0.6));

// ── Pantry (Supabase) ──────────────────────────────────────────────────────
const KITCHEN_API='http://localhost:4100';
const PANTRY_CAT_COLORS={'vp':'#4a9eff','ai':'#ff6b6b','tools':'#50c878','synths-eurorack':'#c084fc','art':'#f59e0b','creative-coding':'#06b6d4','research':'#8b5cf6','opportunities':'#ef4444','discovery':'#10b981','concepts':'#f472b6','favorites':'#eab308'};
const TODAY_STR=new Date().toISOString().slice(0,10);
let pantryAllItems=[];
let pantryViewDate=TODAY_STR;
let pantryActiveCategories=new Set();
let pantrySearchQuery='';

async function fetchPantryFromSupabase(){
  const el=document.getElementById('pantryItems');
  if(el) el.innerHTML='<div style="padding:20px;color:var(--text-muted);font-size:12px;text-align:center;">Loading…</div>';
  try{
    const res=await fetch(`${KITCHEN_API}/api/items?limit=500`);
    if(!res.ok) throw new Error('HTTP '+res.status);
    pantryAllItems=await res.json();
    console.log('Pantry: loaded',pantryAllItems.length,'items');
    const dates=getPantryDates();
    if(dates.length&&!pantryAllItems.find(i=>i.date===pantryViewDate)) pantryViewDate=dates[0];
    renderPantryView();
  }catch(e){
    console.error('Pantry fetch failed:',e);
    if(el) el.innerHTML='<div style="padding:20px;color:var(--red);font-size:12px;text-align:center;">Failed to load pantry</div>';
  }
}

function getPantryDates(){
  return [...new Set(pantryAllItems.map(i=>i.date))].sort().reverse();
}

function formatPantryDate(dateStr){
  if(dateStr===TODAY_STR) return 'Today';
  const d=new Date(dateStr+'T12:00:00');
  return d.toLocaleDateString('en-US',{month:'short',day:'numeric'});
}

function pantryNavigate(direction){
  const dates=getPantryDates();
  if(!dates.length) return;
  const idx=dates.indexOf(pantryViewDate);
  if(direction==='prev'&&idx<dates.length-1) pantryViewDate=dates[idx+1];
  else if(direction==='next'&&idx>0) pantryViewDate=dates[idx-1];
  renderPantryView();
}

function renderPantryView(){
  const dateLabel=document.getElementById('pantryDateLabel');
  if(dateLabel) dateLabel.textContent=formatPantryDate(pantryViewDate);
  let items=pantryAllItems.filter(i=>i.date===pantryViewDate);
  if(pantryActiveCategories.size>0) items=items.filter(i=>{
    if(pantryActiveCategories.has(i.category)) return true;
    if(pantryActiveCategories.has('favorites')&&Array.isArray(i.tags)&&i.tags.includes('favorite')) return true;
    return false;
  });
  if(pantrySearchQuery){
    const q=pantrySearchQuery.toLowerCase();
    items=items.filter(i=>(i.title||'').toLowerCase().includes(q)||(i.summary||'').toLowerCase().includes(q)||(i.category||'').toLowerCase().includes(q)||(Array.isArray(i.tags)?i.tags.some(t=>(t||'').toLowerCase().includes(q)):false));
  }
  const container=document.getElementById('pantryItems');
  if(!container) return;
  if(!items.length){
    container.innerHTML='<div style="padding:20px;color:var(--text-muted);font-size:12px;text-align:center;">No items for this date</div>';
    return;
  }
  container.innerHTML=items.map(item=>{
    const color=PANTRY_CAT_COLORS[item.category]||'#6b7280';
    const bg=color+'22';
    const catPill=`<span class="pi-cat" style="background:${bg};color:${color}">${esc(item.category||'')}</span>`;
    const badge=item.priority==='high'?'<span class="pantry-deadline">DEADLINE</span>':'';
    const titleEl=item.url?`<a href="${esc(item.url)}" target="_blank" rel="noopener">${esc(item.title||'Untitled')}</a>`:esc(item.title||'Untitled');
    const isFav=Array.isArray(item.tags)&&item.tags.includes('favorite');
    const starBtn=`<span class="pi-star${isFav?' active':''}" onclick="event.stopPropagation();toggleFavorite('${esc(item.id)}',this)" title="Favorite">★</span>`;
    return `<div class="pantry-item" data-pantry-id="${esc(item.id||'')}" onclick="openPantrySpotlight(this)" data-item='${JSON.stringify(item).replace(/'/g,"&#39;")}'><div class="pi-meta">${catPill}${badge}${starBtn}</div><div class="pi-title">${titleEl}</div>${item.summary?`<div class="pi-summary">${esc(item.summary)}</div>`:''}</div>`;
  }).join('');
}

async function toggleFavorite(itemId, el){
  const item=pantryAllItems.find(i=>i.id===itemId);
  if(!item)return;
  let tags=Array.isArray(item.tags)?[...item.tags]:[];
  const idx=tags.indexOf('favorite');
  if(idx>=0){tags.splice(idx,1);}else{tags.push('favorite');}

  // Update UI immediately
  if(el){el.classList.toggle('active');}

// ── AI Analysis (Qwen3.5-2B via WebGPU + Transformers.js) ───────────────────

const HAS_WEBGPU = !!navigator.gpu;

let aiWorker = null;
let aiModelReady = false;
let aiModelLoading = false;
let currentAnalysisItem = null;

const AI_WORKER_CODE = `
import { AutoTokenizer, AutoModelForCausalLM, TextStreamer, InterruptableStoppingCriteria } from 'https://cdn.jsdelivr.net/npm/@huggingface/transformers@3';

class TextGenerationPipeline {
  static model_id = 'onnx-community/Qwen3-4B-ONNX';
  static tokenizer = null;
  static model = null;

  static async getInstance(progress_callback = null) {
    if (!this.tokenizer) {
      this.tokenizer = AutoTokenizer.from_pretrained(this.model_id, { progress_callback });
    }
    if (!this.model) {
      this.model = AutoModelForCausalLM.from_pretrained(this.model_id, {
        dtype: 'q4f16',
        device: 'webgpu',
        progress_callback,
      });
    }
    return Promise.all([this.tokenizer, this.model]);
  }
}

const stopping_criteria = new InterruptableStoppingCriteria();
let isGenerating = false;

self.addEventListener('message', async (e) => {
  const { type, data } = e.data;

  if (type === 'check') {
    self.postMessage({ status: 'ready', modelReady: TextGenerationPipeline.model !== null });
    return;
  }

  if (type === 'interrupt') {
    stopping_criteria.interrupt();
    return;
  }

  if (type === 'load') {
    try {
      await TextGenerationPipeline.getInstance((progress) => {
        if (progress.status === 'progress') {
          self.postMessage({ status: 'loading', file: progress.file, progress: progress.progress });
        } else if (progress.status === 'done') {
          self.postMessage({ status: 'fileLoaded', file: progress.file });
        } else if (progress.status === 'initiate') {
          self.postMessage({ status: 'fileStart', file: progress.file });
        }
      });
      self.postMessage({ status: 'modelReady' });
    } catch(err) {
      self.postMessage({ status: 'error', error: err.message });
    }
    return;
  }

  if (type === 'generate') {
    isGenerating = true;
    stopping_criteria.reset();
    try {
      const [tokenizer, model] = await TextGenerationPipeline.getInstance();
      const { messages } = data;

      const inputs = await tokenizer.apply_chat_template(messages, {
        add_generation_prompt: true,
        return_dict: true,
        enable_thinking: false,
      });

      let outputText = '';
      let startTime = null;
      let numTokens = 0;
      let tps = 0;

      const streamer = new TextStreamer(tokenizer, {
        skip_prompt: true,
        skip_special_tokens: true,
        callback_function: (text) => {
          if (startTime === null) startTime = performance.now();
          numTokens++;
          outputText += text;
          tps = numTokens / ((performance.now() - startTime) / 1000);
          self.postMessage({ status: 'update', output: outputText, tps, numTokens });
        },
      });

      await model.generate({
        ...inputs,
        max_new_tokens: 512,
        do_sample: false,
        streamer,
        stopping_criteria,
      });

      self.postMessage({ status: 'complete', output: outputText, tps, numTokens });
    } catch(err) {
      self.postMessage({ status: 'error', error: err.message });
    }
    isGenerating = false;
    return;
  }
});
`;

function initAIWorker() {
  if (aiWorker) return;
  const blob = new Blob([AI_WORKER_CODE], { type: 'text/javascript' });
  aiWorker = new Worker(URL.createObjectURL(blob), { type: 'module' });
  aiWorker.onmessage = handleWorkerMessage;
}

function handleWorkerMessage(e) {
  const { status, output, tps, numTokens, file, progress, error } = e.data;
  const btn = document.getElementById('analyzeBtn');
  const progressWrap = document.getElementById('modelProgress');
  const progressBar = document.getElementById('modelProgressBar');
  const progressLabel = document.getElementById('modelProgressLabel');
  const outputEl = document.getElementById('analysisOutput');
  const tpsEl = document.getElementById('analysisTps');

  if (status === 'loading') {
    aiModelLoading = true;
    if (progressWrap) progressWrap.style.display = 'block';
    const pct = progress != null ? Math.min(Math.round(progress), 100) : 0;
    if (progressBar) progressBar.style.width = pct + '%';
    const shortFile = file ? file.split('/').pop() : '';
    if (progressLabel) progressLabel.textContent = `Loading ${shortFile} (${pct}%)…`;
  } else if (status === 'fileLoaded') {
    if (progressBar) progressBar.style.width = '100%';
  } else if (status === 'modelReady') {
    aiModelReady = true;
    aiModelLoading = false;
    if (progressWrap) progressWrap.style.display = 'none';
    if (btn) btn.disabled = false;
    // Auto-kick off generation now that model is ready
    if (currentAnalysisItem) doGenerate(currentAnalysisItem);
  } else if (status === 'update') {
    if (outputEl) {
      outputEl.style.display = 'block';
      outputEl.innerHTML = formatAnalysisOutput(output);
    }
    if (tpsEl) { tpsEl.style.display = 'block'; tpsEl.textContent = `${tps.toFixed(1)} tok/s`; }
  } else if (status === 'complete') {
    if (outputEl && output) {
      outputEl.innerHTML = formatAnalysisOutput(output);
    }
    if (tpsEl) tpsEl.textContent = `Done · ${tps.toFixed(1)} tok/s · ${numTokens} tokens`;
    if (btn) { btn.disabled = false; btn.textContent = '🔬 Re-analyze'; }
    // Save analysis to chat context + show chat
    if (output) aiChatMessages.push({ role: 'assistant', content: output });
    const chatSec = document.getElementById('aiChatSection');
    if (chatSec) chatSec.style.display = 'block';
    const chatHistory = document.getElementById('aiChatHistory');
    if (chatHistory) chatHistory.innerHTML = ''; // clear previous chat on new analysis
  } else if (status === 'error') {
    if (outputEl) { outputEl.style.display = 'block'; outputEl.textContent = '⚠ Error: ' + error; }
    if (btn) { btn.disabled = false; btn.textContent = '🔬 Analyze'; }
    if (progressWrap) progressWrap.style.display = 'none';
    console.error('AI worker error:', error);
  }
}

function formatAnalysisOutput(text) {
  const labels = ['WHO','WHAT','WHERE','HOW','OPPORTUNITIES','IMPLEMENT','ALGO'];
  let html = text;
  labels.forEach(lbl => {
    html = html.replace(new RegExp('(^|\\n)(' + lbl + ':)', 'g'),
      (_, pre, match) => (pre || '') + '<span class="ai-label">' + match + '</span>');
  });
  return html;
}

// AI Chat — follow-up conversation with the model about the current item
let aiChatMessages = []; // tracks full conversation for context
const itemChatHistories = new Map(); // per-item chat history: id -> {messages, html}
let currentSpotlightItemId = null; // id of item currently in spotlight
let chatIsPopped = false; // whether chat is in pop-out mode

async function sendAiChat() {
  const input = chatIsPopped ? document.getElementById('aiChatInputPopped') : document.getElementById('aiChatInput');
  const history = chatIsPopped ? document.getElementById('aiChatHistoryPopped') : document.getElementById('aiChatHistory');
  if (!input || !input.value.trim()) return;

  const msg = input.value.trim();
  input.value = '';

  // Add user message to history display
  history.innerHTML += '<div style="margin-bottom:8px;"><span style="font-weight:600;color:var(--text);">You:</span> <span style="color:var(--text-sec);font-size:12px;">'+esc(msg)+'</span></div>';
  history.innerHTML += '<div id="aiChatReply" style="margin-bottom:8px;"><span style="font-weight:600;color:var(--cyan);">AI:</span> <span id="aiChatReplyText" style="color:var(--text-sec);font-size:12px;">…</span></div>';
  history.scrollTop = history.scrollHeight;

  aiChatMessages.push({ role: 'user', content: msg });

  // Stream from Ollama
  let chatOutput = '';
  try {
    const res = await fetch('http://localhost:11434/api/chat', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({model:'qwen3.5:35b-a3b', messages: aiChatMessages.slice(-20), stream: true, options:{num_predict:2048}, think: false})
    });
    if (!res.ok) throw new Error('Ollama HTTP '+res.status);
    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    while (true) {
      const {done, value} = await reader.read();
      if (done) break;
      const chunk = decoder.decode(value, {stream:true});
      for (const line of chunk.split('\n')) {
        if (!line.trim()) continue;
        try {
          const j = JSON.parse(line);
          if (j.message && j.message.content) {
            chatOutput += j.message.content;
            const replyText = document.getElementById('aiChatReplyText');
            if (replyText) replyText.innerHTML = formatAnalysisOutput(chatOutput);
            history.scrollTop = history.scrollHeight;
          }
        } catch(e) {}
      }
    }
  } catch(e) {
    chatOutput = '❌ ' + e.message;
  }

  const replyText = document.getElementById('aiChatReplyText');
  if (replyText) replyText.innerHTML = formatAnalysisOutput(chatOutput);
  const replyEl = document.getElementById('aiChatReply');
  if (replyEl) replyEl.removeAttribute('id');
  const replyTextEl = document.getElementById('aiChatReplyText');
  if (replyTextEl) replyTextEl.removeAttribute('id');
  aiChatMessages.push({ role: 'assistant', content: chatOutput });
  history.scrollTop = history.scrollHeight;
}
window.sendAiChat = sendAiChat;

    dragOffY = e.clientY - rect.top;

  });
  document.addEventListener('mousemove', function(e) {
    if (!isDragging) return;
    popout.style.left = (e.clientX - dragOffX) + 'px';
    popout.style.top = (e.clientY - dragOffY) + 'px';
    popout.style.right = 'auto';
    popout.style.bottom = 'auto';
  });
  document.addEventListener('mouseup', function() { isDragging = false; });
}

async function fetchPageContent(url) {
  try {
    const resp = await fetch('https://api.allorigins.win/raw?url=' + encodeURIComponent(url));
    const html = await resp.text();
    const div = document.createElement('div');
    div.innerHTML = html;
    const text = div.textContent || div.innerText || '';
    return text.replace(/\s+/g, ' ').trim().slice(0, 2000);
  } catch(e) {
    return '(Could not fetch source content)';
  }
}

async function doGenerate(item) {
  const btn = document.getElementById('analyzeBtn');
  const outputEl = document.getElementById('analysisOutput');
  const tpsEl = document.getElementById('analysisTps');
  if (btn) { btn.disabled = true; btn.textContent = '⏳ Analyzing…'; }
  if (outputEl) { outputEl.style.display = 'none'; outputEl.textContent = ''; }
  if (tpsEl) { tpsEl.style.display = 'none'; tpsEl.textContent = ''; }

  const pageContent = item.url ? await fetchPageContent(item.url) : '(no source URL)';
  const prompt = `You are an intelligence analyst for a creative technologist working in virtual production, generative art, and music technology. Analyze this item and provide a structured brief:

TITLE: ${item.title || ''}
CATEGORY: ${item.category || ''}
SUMMARY: ${item.summary || ''}
SOURCE CONTENT: ${pageContent}

Provide your analysis in this exact format:

WHO: Key people, companies, or contacts mentioned
WHAT: Core technology, product, concept, or announcement
WHERE: Location, platform, availability, or venue
HOW: Technical implementation, approach, or method
OPPORTUNITIES: How this could benefit a VP engineer/creative technologist
IMPLEMENT: Concrete ways to use or build on this
ALGO: Inferred algorithm, pattern, or technique that could be extracted

Keep each section to 1-3 sentences. Be specific and actionable.`;

  // Seed chat context with the analysis prompt
  aiChatMessages = [
    { role: 'system', content: 'You are an intelligence analyst for a creative technologist working in virtual production, generative art, and music technology. Be concise and actionable.' },
    { role: 'user', content: prompt }
  ];
  aiWorker.postMessage({ type: 'generate', data: { messages: aiChatMessages, reasonEnabled: false } });
}

async function runAnalysis(item) {
  if (!HAS_WEBGPU) return;
  currentAnalysisItem = item;
  initAIWorker();

  const btn = document.getElementById('analyzeBtn');

    if (aiModelLoading) return; // already loading

}

const $=s=>document.querySelector(s);

function daysBetween(a,b){return Math.ceil((b-a)/86400000);}
function formatTime(d){return new Date(d).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});}
function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML;}
function urlify(text){
  const re=/(https?:\/\/[^\s]+)/g;let out='',m,last=0;
  while((m=re.exec(text))!==null){
    if(m.index>last) out+=esc(text.slice(last,m.index));
    out+=`<a class="link-card" href="${esc(m[1])}" target="_blank" rel="noopener">${esc(m[1])}</a>`;
    last=re.lastIndex;
  }
  if(last<text.length) out+=esc(text.slice(last));
  return out;
}

// Extract text from message content (handles string and array formats)
function extractText(msg){
  if(!msg)return null;
  if(typeof msg==='string')return msg;
  if(typeof msg.content==='string')return msg.content;
  if(Array.isArray(msg.content)){
    return msg.content.filter(c=>c.type==='text').map(c=>c.text||'').join('');
  }
  if(Array.isArray(msg)){
    return msg.filter(c=>c.type==='text').map(c=>c.text||'').join('');
  }
  return null;
}

    return '<div class="chat-msg '+cls+'">'+urlify(m.text)+'<span class="msg-time">'+formatTime(m.timestamp)+'</span></div>';

function wsConnect(){
  const token=GW_TOKEN;
  
  try{ ws=new WebSocket(GW_URL); }catch(e){ console.error('WS create failed:',e); addChefMsg('❌ WebSocket failed: '+e.message); return; }
  ws.onopen=()=>{
    console.log('WS open, sending connect...');
    ws.send(JSON.stringify({type:'req',method:'connect',id:'c1',params:{auth:{token},minProtocol:3,maxProtocol:3,client:{id:'webchat-ui',version:'0.3',platform:'web',mode:'webchat'}}}));
  };
  ws.onmessage=(e)=>{
    try{
      const msg=JSON.parse(e.data);
      console.log('WS msg:',msg.type,msg.method||msg.event||msg.id,msg.error||'');
      // Connection error
      if(msg.type==='res'&&msg.id==='c1'&&msg.error){
        addChefMsg('❌ Gateway: '+(msg.error.message||JSON.stringify(msg.error)));
        updateChatStatus('error');
        return;
      }
      // Connection ack
      if(msg.type==='res'&&msg.id==='c1'){
        wsReady=true;
        updateChatStatus('connected');
        // Load history
        ws.send(JSON.stringify({type:'req',method:'chat.history',id:'h1',params:{sessionKey:'agent:main:main',limit:50}}));
      }
      // Chat history response
      const resData=msg.result||msg.payload;
      if(msg.type==='res'&&(msg.id==='h1'||msg.id==='h2')&&resData&&resData.messages){
        const stored=[];
        resData.messages.forEach(m=>{
          const text = typeof m.content==='string' ? m.content : 
            (Array.isArray(m.content) ? m.content.filter(c=>c.type==='text').map(c=>c.text).join('') : '');
          if(!text)return;
          if(m.role==='user') stored.push({text,timestamp:m.ts||Date.now(),sender:'user'});
          else if(m.role==='assistant'&&!text.match(/^(NO_REPLY|HEARTBEAT_OK)$/)) stored.push({text,timestamp:m.ts||Date.now(),sender:'chef'});
        });
        if(msg.id==='h2'&&stored.length){
          const lastChef=stored.filter(s=>s.sender==='chef').pop();
          if(lastChef) updateLastChefMsg(lastChef.text);
        } else if(stored.length){
          saveMsgs(stored);renderMsgs();
        }
      }
      // chat.send ack
      if(msg.type==='res'&&msg.id==='s1'){
        const sendRes=msg.result||msg.payload;
        currentRunId=sendRes?.runId||null;
        if(sendRes?.status==='started'){streamBuffer='';addChefMsg('⏳...');}
      }
      // Pantry push via WS (from cron sub-agents)
      if(msg.type==='event'&&msg.event==='pantry.add'){
        const d=msg.payload||msg.data||{};
        if(d.date&&d.category&&d.items){
          addPantryItems(d.date,d.category,d.items);
        }
      }
      // Streaming chat events (matches control UI protocol)
      if(msg.type==='event'&&msg.event==='chat'){
        const d=msg.payload||msg.data||{};
        console.log('chat event:',JSON.stringify(d).slice(0,200));
        if(d.state==='delta'){
          const text=extractText(d.message);
          if(text){streamBuffer=text;updateLastChefMsg(streamBuffer);}
        }
        if(d.state==='final'){
          const text=extractText(d.message);
          if(text)updateLastChefMsg(text);
          else if(streamBuffer)updateLastChefMsg(streamBuffer);
          else { fetchLastResponse(); }
          streamBuffer='';currentRunId=null;
        }
        if(d.state==='error'||d.state==='aborted'){
          if(d.errorMessage)updateLastChefMsg('❌ '+d.errorMessage);
          else if(streamBuffer)updateLastChefMsg(streamBuffer);
          streamBuffer='';currentRunId=null;
        }
        if(d.kind==='text-delta'&&d.delta){streamBuffer+=d.delta;updateLastChefMsg(streamBuffer);}
        if(d.kind==='text-done'&&d.text){updateLastChefMsg(d.text);streamBuffer='';currentRunId=null;}
        if(d.kind==='done'){if(streamBuffer)updateLastChefMsg(streamBuffer);streamBuffer='';currentRunId=null;}
      }
    }catch(err){console.error('WS parse error',err);}
  };
  ws.onclose=()=>{wsReady=false;updateChatStatus('disconnected');setTimeout(()=>wsConnect(),5000);};
  ws.onerror=()=>{wsReady=false;updateChatStatus('error');};
}

function updateChatStatus(s){
  const dot=s==='connected'?'🟢':s==='disconnected'?'🔴':'🟡';
  const el=$('#chatStatus');if(el)el.textContent=dot;
  const el2=$('#chatStatusMobile');if(el2)el2.textContent=dot;
}

function fetchLastResponse(){
  if(!wsReady||!ws)return;
  ws.send(JSON.stringify({type:'req',method:'chat.history',id:'h2',params:{sessionKey:'agent:main:main',limit:5}}));
}

function sendMsg(text){
  if(!text.trim())return;
  const msgs=loadMsgs();
  msgs.push({text:text.trim(),timestamp:Date.now(),sender:'user'});
  saveMsgs(msgs);renderMsgs();
  
  if(wsReady&&ws){
    ws.send(JSON.stringify({type:'req',method:'chat.send',id:'s1',params:{message:text.trim(),sessionKey:'agent:main:main',deliver:true,idempotencyKey:'k-'+Date.now()}}));
  } else {
    addChefMsg("⚠️ Not connected to gateway. Paste token in chat or check that OpenClaw is running on localhost:18789");
  }
}

// ── Team Drawer ──────────────────────────────────────────────────────────
(function teamDrawer(){
  const drawer = document.getElementById('teamDrawer');
  const handle = document.getElementById('teamDrawerHandle');
  let activeAgent = 'bob';
  let agentPollers = {}; // agent -> stop function

  const tdExp = document.getElementById('tdExpand');
  handle.addEventListener('click', ()=>{ drawer.classList.remove('full'); drawer.classList.toggle('open'); if(drawer.classList.contains('open')&&!drawer.style.height) drawer.style.height='376px'; tdExp.textContent='⤢'; });

  // Drag-to-resize
  const resizeHandle = document.getElementById('teamDrawerResize');
  let dragging=false, startY=0, startH=0;
  resizeHandle.addEventListener('mousedown', e=>{
    if(!drawer.classList.contains('open')) return;
    dragging=true; startY=e.clientY; startH=drawer.offsetHeight;
    document.body.style.userSelect='none'; document.body.style.cursor='ns-resize';
    e.preventDefault();
  });
  document.addEventListener('mousemove', e=>{
    if(!dragging) return;
    const delta=startY-e.clientY;
    const newH=Math.min(Math.max(startH+delta,120),window.innerHeight);
    drawer.style.height=newH+'px';
    drawer.querySelector('.team-drawer-content').style.height=(newH-68)+'px';
  });
  document.addEventListener('mouseup', ()=>{ if(dragging){dragging=false;document.body.style.userSelect='';document.body.style.cursor='';} });
  tdExp.addEventListener('click', (e)=>{ e.stopPropagation(); if(!drawer.classList.contains('open')) return; const isFull=drawer.classList.toggle('full'); tdExp.textContent=isFull?'⤡':'⤢'; });

  // Tab switching
  $$('.team-drawer-tab').forEach(tab=>{
    tab.addEventListener('click', ()=>{
      const agent = tab.dataset.agent;
      $$('.team-drawer-tab').forEach(t=>t.classList.toggle('active', t.dataset.agent===agent));
      $$('.team-drawer-pane').forEach(p=>p.classList.toggle('active', p.dataset.agentpane===agent));
      // Stop old poller, start new
      if(agentPollers[activeAgent]) agentPollers[activeAgent]();
      activeAgent = agent;
      // Dispatch a custom event so dashboards can listen
      document.dispatchEvent(new CustomEvent('team-tab-switch', {detail:{agent}}));
    });
  });

  // Register poller stop functions from dashboards
  window._registerAgentPoller = function(agent, stopFn){ agentPollers[agent] = stopFn; };

  // Status dot sync every 5s
  function syncDots(){
    const map = {bob:'bobDot', brett:'brettDot', devon:'devonDot', chef:'chefDot'};
    const tdMap = {bob:'tdBobDot', brett:'tdBrettDot', devon:'tdDevonDot', chef:'tdChefDot'};
    for(const [agent, srcId] of Object.entries(map)){
      const src = document.getElementById(srcId);
      const dst = document.getElementById(tdMap[agent]);
      if(src && dst) dst.style.background = getComputedStyle(src).backgroundColor;
    }
  }
  setInterval(syncDots, 5000);
  setTimeout(syncDots, 2000);
})();

  async function pollMilestones(){
    try {
      const r = await fetch(BOB_MILES + '?_=' + Date.now());
      if(!r.ok) return;
      const text = await r.text();
      const entries = text.trim().split('\n').filter(Boolean);
      if(!entries.length) return;

      milestonesSection.style.display = 'block';
      // entries format: "N /path/file.png" OR "timestamp|/path/file.png|desc"
      const existing = new Set([...renders.querySelectorAll('img')].map(i=>i.dataset.src.split('?')[0]));
      entries.forEach((entry, idx)=>{
        const t = entry.trim();
        let fname, n;
        if(t.includes('|')){
          const parts = t.split('|');
          fname = (parts[1]||'').split('/').pop();
          n = idx+1;
        } else {
          const parts = t.split(/\s+/);
          n = parts[0]; fname = (parts[1]||'').split('/').pop();
        }
        if(!fname) return;
        const url = `http://localhost:7749/canvas/kitchen/tmp-proxy/${fname}?_=${Date.now()}`;
        if(existing.has(url.split('?')[0])) return;
        const thumb = document.createElement('div');
        thumb.className = 'bob-render-thumb';
        thumb.innerHTML = `<img src="${url}" data-src="${url}" alt="milestone ${n}"><div class="bob-render-label">Milestone ${n}</div>`;
        thumb.querySelector('img').addEventListener('click', e=>{
          lbImg.src = e.target.src;
          lightbox.classList.add('open');
        });
        renders.appendChild(thumb);
        renders.scrollLeft = renders.scrollWidth;
      });
    } catch(_){}
  }

  function escHtml(s){
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function pollBob(){
    pollLog();
    pollMilestones();
  }

  // Auto-start polling when Bob tab is active

  function startBobPolling(){
    if(bobTimer) return;
    pollBob();
    bobTimer = setInterval(pollBob, POLL_MS);
  }
  function stopBobPolling(){
    if(bobTimer){ clearInterval(bobTimer); bobTimer = null; }
  }

  // Intercept tab clicks via drawer events
  document.addEventListener('team-tab-switch', e=>{ if(e.detail.agent==='bob') startBobPolling(); });
  window._registerAgentPoller&&window._registerAgentPoller('bob', stopBobPolling);
  // Bob is default active tab — start polling when drawer opens
  document.getElementById('teamDrawerHandle').addEventListener('click', ()=>{
    if(document.getElementById('teamDrawer').classList.contains('open')&&document.querySelector('.team-drawer-tab[data-agent="bob"]').classList.contains('active')) startBobPolling();
  });

})();
</script>
