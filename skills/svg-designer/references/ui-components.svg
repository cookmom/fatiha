<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 900">
  <title>UI Wireframe Component Library</title>
  <desc>Reusable wireframe UI elements for mockups</desc>
  <defs>
    <!-- Primary Button -->
    <g id="btn-primary">
      <rect width="120" height="40" rx="8" fill="#111827"/>
      <text x="60" y="20" text-anchor="middle" dominant-baseline="central" font-size="14" fill="#FFFFFF" font-family="system-ui, sans-serif">Button</text>
    </g>
    <!-- Secondary Button -->
    <g id="btn-secondary">
      <rect width="120" height="40" rx="8" fill="none" stroke="#374151" stroke-width="1.5"/>
      <text x="60" y="20" text-anchor="middle" dominant-baseline="central" font-size="14" fill="#374151" font-family="system-ui, sans-serif">Button</text>
    </g>
    <!-- Text Input -->
    <g id="text-input">
      <rect width="280" height="40" rx="6" fill="#FFFFFF" stroke="#D1D5DB" stroke-width="1"/>
      <text x="12" y="20" dominant-baseline="central" font-size="13" fill="#9CA3AF" font-family="system-ui, sans-serif">Placeholder</text>
    </g>
    <!-- Checkbox (unchecked) -->
    <g id="checkbox">
      <rect width="18" height="18" rx="3" fill="none" stroke="#D1D5DB" stroke-width="1.5"/>
    </g>
    <!-- Checkbox (checked) -->
    <g id="checkbox-checked">
      <rect width="18" height="18" rx="3" fill="#111827" stroke="#111827" stroke-width="1.5"/>
      <polyline points="4,9 8,13 14,5" fill="none" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
    <!-- Toggle (off) -->
    <g id="toggle-off">
      <rect width="44" height="24" rx="12" fill="#D1D5DB"/>
      <circle cx="12" cy="12" r="9" fill="#FFFFFF"/>
    </g>
    <!-- Toggle (on) -->
    <g id="toggle-on">
      <rect width="44" height="24" rx="12" fill="#111827"/>
      <circle cx="32" cy="12" r="9" fill="#FFFFFF"/>
    </g>
    <!-- Avatar circle -->
    <g id="avatar">
      <circle cx="20" cy="20" r="20" fill="#E5E7EB"/>
      <path d="M20,18 a5,5 0 1,0 0.01,0 M10,32 a10,8 0 0,1 20,0" fill="none" stroke="#9CA3AF" stroke-width="1.5"/>
    </g>
    <!-- Card -->
    <g id="card">
      <rect width="300" height="180" rx="12" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1"/>
    </g>
    <!-- Image placeholder -->
    <g id="img-placeholder">
      <rect width="200" height="150" rx="4" fill="#F3F4F6"/>
      <line x1="0" y1="0" x2="200" y2="150" stroke="#D1D5DB" stroke-width="1"/>
      <line x1="200" y1="0" x2="0" y2="150" stroke="#D1D5DB" stroke-width="1"/>
      <text x="100" y="75" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#9CA3AF" font-family="system-ui, sans-serif">Image</text>
    </g>
    <!-- Text placeholder line -->
    <g id="text-line">
      <rect width="200" height="8" rx="4" fill="#E5E7EB"/>
    </g>
    <!-- Navigation bar -->
    <g id="navbar">
      <rect width="375" height="56" fill="#FFFFFF"/>
      <line x1="0" y1="56" x2="375" y2="56" stroke="#E5E7EB" stroke-width="1"/>
      <text x="187" y="28" text-anchor="middle" dominant-baseline="central" font-size="17" font-weight="bold" fill="#111827" font-family="system-ui, sans-serif">Title</text>
    </g>
    <!-- Tab bar -->
    <g id="tabbar">
      <rect width="375" height="50" fill="#FFFFFF"/>
      <line x1="0" y1="0" x2="375" y2="0" stroke="#E5E7EB" stroke-width="1"/>
    </g>
  </defs>
  <!-- Preview -->
  <g font-family="system-ui, sans-serif">
    <text x="20" y="30" font-size="16" font-weight="bold" fill="#111827">UI Components</text>
    <use href="#btn-primary" x="20" y="50"/>
    <use href="#btn-secondary" x="160" y="50"/>
    <use href="#text-input" x="20" y="110"/>
    <use href="#checkbox" x="20" y="170"/>
    <use href="#checkbox-checked" x="55" y="170"/>
    <use href="#toggle-off" x="100" y="168"/>
    <use href="#toggle-on" x="160" y="168"/>
    <use href="#avatar" x="20" y="210"/>
    <use href="#img-placeholder" x="20" y="270"/>
    <use href="#card" x="20" y="450"/>
  </g>
</svg>
