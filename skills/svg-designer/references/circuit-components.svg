<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <title>Circuit Component Library</title>
  <desc>Reusable circuit schematic symbols for use with the svg-designer skill</desc>
  <defs>
    <!-- Resistor (US zigzag, horizontal, 60px wide) -->
    <g id="resistor-h">
      <path d="M-30,0 -20,0 -15,-10 -5,10 5,-10 15,10 20,0 30,0" fill="none" stroke="#374151" stroke-width="2"/>
    </g>
    <!-- Resistor vertical -->
    <g id="resistor-v">
      <path d="M0,-30 0,-20 -10,-15 10,-5 -10,5 10,15 0,20 0,30" fill="none" stroke="#374151" stroke-width="2"/>
    </g>
    <!-- Capacitor (horizontal) -->
    <g id="capacitor-h">
      <path d="M-30,0 -5,0 M-5,-12 -5,12 M5,-12 5,12 M5,0 30,0" fill="none" stroke="#374151" stroke-width="2"/>
    </g>
    <!-- Polarized capacitor -->
    <g id="capacitor-pol-h">
      <path d="M-30,0 -5,0 M-5,-12 -5,12 M5,0 30,0" fill="none" stroke="#374151" stroke-width="2"/>
      <path d="M3,-12 Q8,0 3,12" fill="none" stroke="#374151" stroke-width="2"/>
      <text x="-12" y="-8" font-size="10" fill="#374151" font-family="system-ui">+</text>
    </g>
    <!-- Inductor (horizontal) -->
    <g id="inductor-h">
      <path d="M-30,0 -20,0 A5,5 0 0,1 -10,0 A5,5 0 0,1 0,0 A5,5 0 0,1 10,0 A5,5 0 0,1 20,0 L30,0" fill="none" stroke="#374151" stroke-width="2"/>
    </g>
    <!-- Diode -->
    <g id="diode-h">
      <path d="M-30,0 -8,0 M-8,-10 -8,10 8,0Z M8,-10 8,10 M8,0 30,0" fill="none" stroke="#374151" stroke-width="2"/>
    </g>
    <!-- LED -->
    <g id="led-h">
      <path d="M-30,0 -8,0 M-8,-10 -8,10 8,0Z M8,-10 8,10 M8,0 30,0" fill="none" stroke="#374151" stroke-width="2"/>
      <path d="M2,-16 8,-22 M6,-22 8,-22 8,-20" fill="none" stroke="#374151" stroke-width="1.5"/>
      <path d="M-2,-18 4,-24 M2,-24 4,-24 4,-22" fill="none" stroke="#374151" stroke-width="1.5"/>
    </g>
    <!-- NPN Transistor -->
    <g id="npn">
      <circle cx="0" cy="0" r="18" fill="none" stroke="#374151" stroke-width="1.5"/>
      <line x1="-18" y1="0" x2="-6" y2="0" stroke="#374151" stroke-width="2"/>
      <line x1="-6" y1="-12" x2="-6" y2="12" stroke="#374151" stroke-width="2"/>
      <line x1="-6" y1="-6" x2="12" y2="-16" stroke="#374151" stroke-width="2"/>
      <line x1="-6" y1="6" x2="12" y2="16" stroke="#374151" stroke-width="2"/>
      <polygon points="8,16 12,16 10,10" fill="#374151"/>
    </g>
    <!-- Ground -->
    <g id="ground">
      <path d="M0,0 0,8 M-10,8 10,8 M-6,13 6,13 M-2,18 2,18" fill="none" stroke="#374151" stroke-width="2"/>
    </g>
    <!-- VCC/Power -->
    <g id="vcc">
      <path d="M0,0 0,-8" fill="none" stroke="#374151" stroke-width="2"/>
      <text x="0" y="-12" text-anchor="middle" font-size="11" fill="#374151" font-family="system-ui">VCC</text>
    </g>
    <!-- Battery -->
    <g id="battery">
      <path d="M-20,0 -4,0 M-4,-10 -4,10 M4,-5 4,5 M4,0 20,0" fill="none" stroke="#374151" stroke-width="2"/>
      <text x="-8" y="-14" font-size="10" fill="#374151" font-family="system-ui">+</text>
    </g>
    <!-- Switch (SPST) -->
    <g id="switch">
      <path d="M-20,0 -8,0" fill="none" stroke="#374151" stroke-width="2"/>
      <circle cx="-8" cy="0" r="2" fill="#374151"/>
      <line x1="-8" y1="0" x2="8" y2="-10" stroke="#374151" stroke-width="2"/>
      <circle cx="8" cy="0" r="2" fill="#374151"/>
      <path d="M8,0 20,0" fill="none" stroke="#374151" stroke-width="2"/>
    </g>
    <!-- IC/Chip (generic 8-pin DIP) -->
    <g id="ic-8pin">
      <rect x="-30" y="-40" width="60" height="80" rx="2" fill="#FFFFFF" stroke="#374151" stroke-width="2"/>
      <circle cx="-20" cy="-30" r="3" fill="none" stroke="#374151" stroke-width="1"/>
      <!-- Left pins -->
      <line x1="-50" y1="-25" x2="-30" y2="-25" stroke="#374151" stroke-width="2"/>
      <line x1="-50" y1="-8" x2="-30" y2="-8" stroke="#374151" stroke-width="2"/>
      <line x1="-50" y1="9" x2="-30" y2="9" stroke="#374151" stroke-width="2"/>
      <line x1="-50" y1="25" x2="-30" y2="25" stroke="#374151" stroke-width="2"/>
      <!-- Right pins -->
      <line x1="30" y1="-25" x2="50" y2="-25" stroke="#374151" stroke-width="2"/>
      <line x1="30" y1="-8" x2="50" y2="-8" stroke="#374151" stroke-width="2"/>
      <line x1="30" y1="9" x2="50" y2="9" stroke="#374151" stroke-width="2"/>
      <line x1="30" y1="25" x2="50" y2="25" stroke="#374151" stroke-width="2"/>
    </g>
    <!-- Wire junction dot -->
    <g id="junction">
      <circle cx="0" cy="0" r="3" fill="#374151"/>
    </g>
  </defs>
  <!-- Preview layout -->
  <g font-family="system-ui, sans-serif" font-size="12" fill="#374151">
    <use href="#resistor-h" x="100" y="50"/>
    <text x="100" y="30" text-anchor="middle">Resistor</text>
    <use href="#capacitor-h" x="250" y="50"/>
    <text x="250" y="30" text-anchor="middle">Capacitor</text>
    <use href="#inductor-h" x="400" y="50"/>
    <text x="400" y="30" text-anchor="middle">Inductor</text>
    <use href="#diode-h" x="550" y="50"/>
    <text x="550" y="30" text-anchor="middle">Diode</text>
    <use href="#led-h" x="700" y="55"/>
    <text x="700" y="30" text-anchor="middle">LED</text>
    <use href="#npn" x="100" y="150"/>
    <text x="100" y="120" text-anchor="middle">NPN</text>
    <use href="#ground" x="250" y="140"/>
    <text x="250" y="120" text-anchor="middle">Ground</text>
    <use href="#battery" x="400" y="150"/>
    <text x="400" y="120" text-anchor="middle">Battery</text>
    <use href="#switch" x="550" y="150"/>
    <text x="550" y="120" text-anchor="middle">Switch</text>
    <use href="#ic-8pin" x="700" y="155"/>
    <text x="700" y="100" text-anchor="middle">IC (8-pin)</text>
  </g>
</svg>
