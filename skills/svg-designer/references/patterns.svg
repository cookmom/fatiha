<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600">
  <title>Decorative SVG Patterns</title>
  <desc>Reusable fill patterns for illustrations and backgrounds</desc>
  <defs>
    <!-- Dots -->
    <pattern id="dots" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="10" cy="10" r="2" fill="#D1D5DB"/>
    </pattern>
    <!-- Diagonal lines -->
    <pattern id="diagonal-lines" x="0" y="0" width="10" height="10" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="10" stroke="#D1D5DB" stroke-width="1"/>
    </pattern>
    <!-- Crosshatch -->
    <pattern id="crosshatch" x="0" y="0" width="10" height="10" patternUnits="userSpaceOnUse">
      <path d="M0,0 L10,10 M10,0 L0,10" stroke="#D1D5DB" stroke-width="0.5"/>
    </pattern>
    <!-- Grid -->
    <pattern id="grid" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M20,0 L0,0 0,20" fill="none" stroke="#E5E7EB" stroke-width="0.5"/>
    </pattern>
    <!-- Horizontal stripes -->
    <pattern id="h-stripes" x="0" y="0" width="10" height="10" patternUnits="userSpaceOnUse">
      <line x1="0" y1="5" x2="10" y2="5" stroke="#D1D5DB" stroke-width="2"/>
    </pattern>
    <!-- Zigzag -->
    <pattern id="zigzag" x="0" y="0" width="20" height="10" patternUnits="userSpaceOnUse">
      <polyline points="0,10 5,0 10,10 15,0 20,10" fill="none" stroke="#D1D5DB" stroke-width="1"/>
    </pattern>
    <!-- Hexagons -->
    <pattern id="hexagons" x="0" y="0" width="30" height="52" patternUnits="userSpaceOnUse">
      <polygon points="15,0 28,8 28,22 15,30 2,22 2,8" fill="none" stroke="#D1D5DB" stroke-width="0.5"/>
      <polygon points="0,26 13,34 13,48 0,56 -13,48 -13,34" fill="none" stroke="#D1D5DB" stroke-width="0.5"/>
      <polygon points="30,26 43,34 43,48 30,56 17,48 17,34" fill="none" stroke="#D1D5DB" stroke-width="0.5"/>
    </pattern>
    <!-- Waves -->
    <pattern id="waves" x="0" y="0" width="40" height="20" patternUnits="userSpaceOnUse">
      <path d="M0,10 Q10,0 20,10 Q30,20 40,10" fill="none" stroke="#D1D5DB" stroke-width="1"/>
    </pattern>
  </defs>
  <!-- Preview swatches -->
  <g font-family="system-ui, sans-serif" font-size="11" fill="#374151">
    <rect x="20" y="20" width="100" height="100" fill="url(#dots)" stroke="#E5E7EB"/>
    <text x="70" y="140" text-anchor="middle">Dots</text>
    <rect x="140" y="20" width="100" height="100" fill="url(#diagonal-lines)" stroke="#E5E7EB"/>
    <text x="190" y="140" text-anchor="middle">Diagonal</text>
    <rect x="260" y="20" width="100" height="100" fill="url(#crosshatch)" stroke="#E5E7EB"/>
    <text x="310" y="140" text-anchor="middle">Crosshatch</text>
    <rect x="380" y="20" width="100" height="100" fill="url(#grid)" stroke="#E5E7EB"/>
    <text x="430" y="140" text-anchor="middle">Grid</text>
    <rect x="20" y="170" width="100" height="100" fill="url(#h-stripes)" stroke="#E5E7EB"/>
    <text x="70" y="290" text-anchor="middle">Stripes</text>
    <rect x="140" y="170" width="100" height="100" fill="url(#zigzag)" stroke="#E5E7EB"/>
    <text x="190" y="290" text-anchor="middle">Zigzag</text>
    <rect x="260" y="170" width="100" height="100" fill="url(#hexagons)" stroke="#E5E7EB"/>
    <text x="310" y="290" text-anchor="middle">Hexagons</text>
    <rect x="380" y="170" width="100" height="100" fill="url(#waves)" stroke="#E5E7EB"/>
    <text x="430" y="290" text-anchor="middle">Waves</text>
  </g>
</svg>
