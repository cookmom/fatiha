<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 375 812" role="img" aria-labelledby="title desc">
  <title id="title">A Gift of Time — Three-Mode Navigation Mockup</title>
  <desc id="desc">iPhone mockup showing sticky header, 3D cube zone, and floating mode pill with primitive geometric icons</desc>

  <defs>
    <!-- Dark background gradient -->
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d0d12"/>
      <stop offset="60%" stop-color="#111118"/>
      <stop offset="100%" stop-color="#0a0a10"/>
    </linearGradient>

    <!-- Frosted glass material -->
    <filter id="frost" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="8" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="1 0 0 0 0.05  0 1 0 0 0.05  0 0 1 0 0.07  0 0 0 0.78 0"/>
    </filter>

    <!-- Subtle glow for active icon -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Golden ratio reference: φ = 1.618 -->
    <!-- Pill width: 375 / φ ≈ 232px -->
    <!-- Icon spacing: 232 / (2 + φ) ≈ 64px between centers, with margins -->
  </defs>

  <!-- ═══ BACKGROUND ═══ -->
  <rect width="375" height="812" fill="url(#bgGrad)"/>

  <!-- ═══ DEVICE FRAME (subtle) ═══ -->
  <rect x="0" y="0" width="375" height="812" rx="40" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>

  <!-- ═══ STATUS BAR (iOS) ═══ -->
  <g id="status-bar" font-family="SF Pro, system-ui, sans-serif" font-size="12" fill="rgba(232,228,220,0.7)">
    <text x="30" y="18" font-weight="600" font-size="14">5:15</text>
    <!-- Signal, WiFi, Battery indicators (simplified) -->
    <g transform="translate(310, 8)">
      <rect x="0" y="2" width="4" height="6" rx="1" fill="rgba(232,228,220,0.5)"/>
      <rect x="6" y="1" width="4" height="7" rx="1" fill="rgba(232,228,220,0.5)"/>
      <rect x="12" y="0" width="4" height="8" rx="1" fill="rgba(232,228,220,0.6)"/>
      <rect x="18" y="0" width="4" height="8" rx="1" fill="rgba(232,228,220,0.7)"/>
      <!-- Battery -->
      <rect x="30" y="1" width="20" height="8" rx="2" fill="none" stroke="rgba(232,228,220,0.5)" stroke-width="1"/>
      <rect x="31" y="2.5" width="14" height="5" rx="1" fill="rgba(232,228,220,0.5)"/>
      <rect x="50.5" y="3" width="1.5" height="4" rx="0.5" fill="rgba(232,228,220,0.3)"/>
    </g>
  </g>

  <!-- ═══ STICKY HEADER ═══ -->
  <!-- Frosted glass header: countdown + hijri + prayer times -->
  <g id="sticky-header">
    <!-- Frosted background -->
    <rect x="0" y="28" width="375" height="88" fill="rgba(13,13,18,0.75)" filter="url(#frost)"/>
    <line x1="0" y1="116" x2="375" y2="116" stroke="rgba(255,255,255,0.04)" stroke-width="0.5"/>

    <!-- Countdown (top-left, bold) -->
    <text x="16" y="52" font-family="SF Pro, system-ui, sans-serif" font-size="10" font-weight="300" letter-spacing="0.06em" fill="rgba(232,228,220,0.45)" text-transform="uppercase">UNTIL FAJR</text>
    <text x="16" y="72" font-family="SF Mono, monospace" font-size="22" font-weight="600" fill="rgba(232,228,220,0.85)" letter-spacing="-0.02em">6:29:28</text>

    <!-- Hijri date (center) -->
    <text x="188" y="90" text-anchor="middle" font-family="SF Pro, system-ui, sans-serif" font-size="11" font-weight="300" fill="rgba(232,228,220,0.4)" letter-spacing="0.03em">11 Ramaḍān 1447 AH · رَمَضَان</text>

    <!-- Prayer times bar -->
    <text x="188" y="108" text-anchor="middle" font-family="SF Pro, system-ui, sans-serif" font-size="9" font-weight="300" fill="rgba(232,228,220,0.35)" letter-spacing="0.02em">Fajr 05:15 · Sunrise 06:24 · Dhuhr 12:07 · Asr 15:21 · Maghrib 17:49 · Isha 18:57</text>
  </g>

  <!-- ═══ CUBE ZONE (rule of thirds: vertical 1/3 line at y=271) ═══ -->
  <!-- The cube sits at the intersection of rule-of-thirds lines -->
  <!-- Vertical thirds: 812/3 ≈ 271, 541 -->
  <!-- Horizontal thirds: 375/3 = 125, 250 -->
  <!-- Cube center: ~(188, 340) — slightly above center, on upper third -->

  <g id="cube-zone" opacity="0.9">
    <!-- Simplified cube representation (the real one is 3D WebGL) -->
    <!-- Cube outline to show position -->
    <g transform="translate(188, 320)">
      <!-- Top face -->
      <path d="M0,-55 L65,-25 L0,5 L-65,-25 Z" fill="rgba(140,150,180,0.12)" stroke="rgba(180,190,220,0.2)" stroke-width="0.5"/>
      <!-- Left face -->
      <path d="M-65,-25 L0,5 L0,75 L-65,45 Z" fill="rgba(100,110,150,0.1)" stroke="rgba(180,190,220,0.15)" stroke-width="0.5"/>
      <!-- Right face -->
      <path d="M65,-25 L0,5 L0,75 L65,45 Z" fill="rgba(120,130,170,0.1)" stroke="rgba(180,190,220,0.15)" stroke-width="0.5"/>

      <!-- Subtle dichroic shimmer on diagonal -->
      <path d="M0,-55 L0,75" stroke="rgba(120,200,255,0.15)" stroke-width="1"/>
      <path d="M-65,-25 L65,45" stroke="rgba(200,120,255,0.1)" stroke-width="1"/>

      <!-- Rainbow refraction hint -->
      <g opacity="0.3">
        <ellipse cx="-8" cy="50" rx="12" ry="4" fill="rgba(100,140,255,0.4)"/>
        <ellipse cx="5" cy="55" rx="10" ry="3" fill="rgba(100,255,180,0.3)"/>
        <ellipse cx="15" cy="52" rx="8" ry="3" fill="rgba(255,200,100,0.3)"/>
      </g>

      <!-- Gobo spotlight glow on top -->
      <ellipse cx="0" cy="-35" rx="40" ry="15" fill="rgba(200,210,240,0.08)"/>
    </g>

    <!-- Floor glow (prayer window hint) -->
    <ellipse cx="188" cy="530" rx="120" ry="40" fill="rgba(100,80,200,0.04)"/>

    <!-- Second hand beam (white, toward 12 o'clock) -->
    <line x1="188" y1="320" x2="188" y2="180" stroke="rgba(255,255,255,0.12)" stroke-width="1.5"/>
  </g>

  <!-- ═══ GOLDEN RATIO COMPOSITION GUIDES (hidden, for reference) ═══ -->
  <!-- Uncomment to see the grid -->
  <!--
  <g id="guides" stroke="rgba(255,0,0,0.15)" stroke-width="0.5" stroke-dasharray="4 4">
    <line x1="125" y1="0" x2="125" y2="812"/>
    <line x1="250" y1="0" x2="250" y2="812"/>
    <line x1="0" y1="271" x2="375" y2="271"/>
    <line x1="0" y1="541" x2="375" y2="541"/>
    <line x1="0" y1="502" x2="375" y2="502" stroke="rgba(255,215,0,0.2)"/>
  </g>
  -->

  <!-- ═══ FLOATING MODE PILL ═══ -->
  <!-- Width: 375/φ ≈ 232px. Centered. -->
  <!-- Position: golden ratio from bottom: 812/φ² ≈ 310px from top → 502px from top → 310px from bottom -->
  <!-- Actually: place above safe area, bottom ~80px -->
  <g id="mode-pill" transform="translate(72, 710)">
    <!-- Pill background: frosted glass -->
    <rect x="0" y="0" width="232" height="48" rx="24" fill="rgba(18,18,22,0.75)" stroke="rgba(255,255,255,0.06)" stroke-width="0.5"/>

    <!-- φ spacing: pill is 232px. 3 icons. -->
    <!-- Margins: 232/(2+φ) ≈ 64px center-to-center -->
    <!-- Centers at: 52, 116, 180 (evenly spaced for 3, with 52px margins) -->

    <!-- ○ CIRCLE — Clock mode (ACTIVE) -->
    <g id="icon-clock" transform="translate(52, 24)" filter="url(#glow)">
      <circle cx="0" cy="0" r="11" fill="none" stroke="rgba(232,228,220,0.9)" stroke-width="1.2"/>
      <!-- Subtle active glow -->
      <circle cx="0" cy="0" r="11" fill="none" stroke="rgba(180,200,255,0.2)" stroke-width="3"/>
      <!-- Active dot below -->
      <circle cx="0" cy="20" r="2" fill="rgba(232,228,220,0.7)"/>
    </g>

    <!-- ◇ DIAMOND — Compass mode (inactive) -->
    <g id="icon-compass" transform="translate(116, 24)" opacity="0.35">
      <rect x="-9" y="-9" width="18" height="18" rx="2" fill="none" stroke="rgba(232,228,220,0.9)" stroke-width="1.2" transform="rotate(45)"/>
    </g>

    <!-- △ TRIANGLE — Info mode (inactive) -->
    <g id="icon-info" transform="translate(180, 24)" opacity="0.35">
      <polygon points="0,-11 10.5,8 -10.5,8" fill="none" stroke="rgba(232,228,220,0.9)" stroke-width="1.2" stroke-linejoin="round"/>
    </g>
  </g>

  <!-- ═══ MODE PILL LABEL (appears on first load, fades) ═══ -->
  <text x="188" y="700" text-anchor="middle" font-family="SF Pro, system-ui, sans-serif" font-size="10" font-weight="300" letter-spacing="0.05em" fill="rgba(232,228,220,0.25)">clock · compass · info</text>

  <!-- ═══ HOME INDICATOR ═══ -->
  <rect x="128" y="795" width="120" height="4" rx="2" fill="rgba(232,228,220,0.15)"/>

  <!-- ═══ ANNOTATION LAYER (design notes — remove for production) ═══ -->
  <g id="annotations" font-family="SF Mono, monospace" font-size="7" fill="rgba(255,200,100,0.0)">
    <!-- Set opacity to see annotations -->
    <text x="8" y="135">← Sticky header: countdown + hijri + prayers</text>
    <text x="8" y="345">← Cube at rule-of-thirds intersection (188, 320)</text>
    <text x="8" y="725">← Pill width: 375/φ = 232px</text>
    <text x="8" y="740">← Icons: ○ circle  ◇ diamond  △ triangle</text>
    <text x="8" y="755">← Icon spacing: golden ratio intervals</text>
  </g>
</svg>
