<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🍳 kitchen v2</title>
<style>
:root {
  --bg: #0a0a0b;
  --bg-card: #131316;
  --bg-card-hover: #1a1a1f;
  --bg-chat: #0e0e11;
  --border: #1e1e24;
  --text: #e4e4e7;
  --text-dim: #71717a;
  --text-muted: #52525b;
  --accent-indigo: #6366f1;
  --accent-indigo-dim: #4f46e5;
  --amber: #f59e0b;
  --purple: #a855f7;
  --cyan: #06b6d4;
  --emerald: #10b981;
  --gray: #6b7280;
  --gold: #eab308;
  --red: #ef4444;
  --yellow: #eab308;
  --green: #22c55e;
  --sidebar-w: 280px;
  --deadline-h: 40px;
  --radius: 10px;
  --transition: .25s cubic-bezier(.4,0,.2,1);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
  background: var(--bg); color: var(--text); line-height: 1.5;
  min-height: 100vh; overflow-x: hidden;
}

/* ── Deadlines Bar ── */
.deadlines-bar {
  position: sticky; top: 0; z-index: 100;
  background: #09090b; border-bottom: 1px solid var(--border);
  cursor: pointer; user-select: none; transition: var(--transition);
}
.deadlines-summary {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 20px; font-size: 13px; color: var(--text-dim);
  height: var(--deadline-h);
}
.deadlines-summary .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.deadlines-summary .countdown { color: var(--text); font-weight: 500; margin-right: 4px; }
.deadlines-summary .chevron { margin-left: auto; transition: transform var(--transition); font-size: 10px; color: var(--text-muted); }
.deadlines-bar.open .chevron { transform: rotate(180deg); }
.deadlines-all { max-height: 0; overflow: hidden; transition: max-height .3s ease; border-top: 1px solid transparent; }
.deadlines-bar.open .deadlines-all { max-height: 300px; border-top-color: var(--border); }
.deadline-row { display: flex; align-items: center; gap: 10px; padding: 8px 20px; font-size: 13px; color: var(--text-dim); }
.deadline-row .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.deadline-row .dl-date { color: var(--text-muted); min-width: 70px; }
.deadline-row .dl-name { color: var(--text); }

/* ── Layout ── */
.app { display: grid; grid-template-columns: var(--sidebar-w) 1fr; min-height: calc(100vh - var(--deadline-h)); }

/* ── Chat Sidebar ── */
.chat-sidebar {
  background: var(--bg-chat); border-right: 1px solid var(--border);
  display: flex; flex-direction: column;
  height: calc(100vh - var(--deadline-h)); position: sticky; top: var(--deadline-h);
}
.chat-header { padding: 16px; border-bottom: 1px solid var(--border); font-size: 13px; font-weight: 600; color: var(--text-dim); letter-spacing: .04em; text-transform: uppercase; }
.chat-messages { flex: 1; overflow-y: auto; padding: 12px; display: flex; flex-direction: column; gap: 8px; scrollbar-width: thin; scrollbar-color: var(--border) transparent; }
.chat-msg { max-width: 88%; padding: 8px 12px; border-radius: 12px; font-size: 13px; line-height: 1.45; word-break: break-word; }
.chat-msg.user { align-self: flex-end; background: var(--accent-indigo); color: #fff; border-bottom-right-radius: 4px; }
.chat-msg.chef { align-self: flex-start; background: #1e1e24; color: var(--text); border-bottom-left-radius: 4px; }
.chat-msg .msg-time { display: block; font-size: 10px; margin-top: 4px; opacity: .5; }
.chat-msg .link-card { display: block; margin-top: 6px; padding: 6px 8px; background: rgba(255,255,255,.06); border-radius: 6px; color: var(--cyan); font-size: 12px; text-decoration: none; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; transition: background var(--transition); }
.chat-msg .link-card:hover { background: rgba(255,255,255,.1); }
.chat-input-wrap { padding: 12px; border-top: 1px solid var(--border); display: flex; gap: 8px; }
.chat-input-wrap input { flex: 1; background: #1a1a1f; border: 1px solid var(--border); border-radius: 8px; padding: 8px 12px; color: var(--text); font-size: 13px; outline: none; transition: border-color var(--transition); }
.chat-input-wrap input:focus { border-color: var(--accent-indigo); }
.chat-input-wrap button { background: var(--accent-indigo); border: none; border-radius: 8px; color: #fff; padding: 0 14px; font-size: 13px; cursor: pointer; transition: background var(--transition); }
.chat-input-wrap button:hover { background: var(--accent-indigo-dim); }

/* ── Main Content ── */
.main { padding: 32px 40px 60px; max-width: 900px; }
.header { margin-bottom: 32px; }
.header h1 { font-size: 28px; font-weight: 700; letter-spacing: -.02em; }
.header .date { font-size: 14px; color: var(--text-dim); margin-top: 2px; }
.header .greeting { font-size: 15px; color: var(--text-muted); margin-top: 8px; animation: fadeInUp .8s ease both; }

@keyframes fadeInUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
@keyframes spotlightFade { from { opacity: 0; } to { opacity: 1; } }

/* ── Spotlight ── */
.spotlight {
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: var(--radius); margin-bottom: 32px;
  min-height: 160px; position: relative; transition: var(--transition); overflow: hidden;
}

/* Spotlight Tabs */
.spotlight-tabs {
  display: flex; gap: 4px; padding: 12px 16px 0;
  border-bottom: 1px solid var(--border); padding-bottom: 12px;
}
.spotlight-tab {
  padding: 5px 16px; border-radius: 20px; border: 1px solid var(--border);
  background: var(--bg-card); color: var(--text-muted); font-size: 12px;
  font-weight: 600; cursor: pointer; transition: var(--transition);
}
.spotlight-tab:hover { background: var(--bg-card-hover); color: var(--text); }
.spotlight-tab.active { background: var(--gold); color: #000; border-color: var(--gold); }
.spotlight-pane { display: none; padding: 24px; }
.spotlight-pane.active { display: block; animation: spotlightFade .3s ease; }

/* Canvas pane */
.canvas-pane { padding: 0 !important; display: none; flex-direction: column; }
.canvas-pane.active { display: flex !important; }
.canvas-toolbar {
  display: flex; align-items: center; gap: 8px; padding: 10px 16px;
  border-bottom: 1px solid var(--border); flex-wrap: wrap;
}
.canvas-toolbar button, .canvas-toolbar select, .canvas-toolbar label {
  font-size: 12px; border-radius: 6px; border: 1px solid var(--border);
  background: #1a1a1f; color: var(--text); padding: 5px 10px; cursor: pointer;
  transition: var(--transition);
}
.canvas-toolbar button:hover { background: var(--bg-card-hover); }
.canvas-toolbar .run-btn { background: var(--emerald); color: #000; border-color: var(--emerald); font-weight: 600; }
.canvas-toolbar .run-btn:hover { background: #0d9668; }
.canvas-toolbar .auto-toggle { display: flex; align-items: center; gap: 4px; font-size: 12px; color: var(--text-dim); }
.canvas-toolbar .auto-toggle input { accent-color: var(--gold); }
.canvas-toolbar .save-name { background: #1a1a1f; border: 1px solid var(--border); border-radius: 6px; color: var(--text); padding: 5px 8px; font-size: 12px; width: 120px; }

.canvas-aspect-wrap {
  position: relative; width: 100%; background: #000;
}
.canvas-aspect-wrap iframe {
  width: 100%; border: none; display: block; background: #0a0a0b;
}

/* Code pane */
.code-pane { padding: 0 !important; display: none; flex-direction: column; }
.code-pane.active { display: flex !important; }
.code-editor-wrap { position: relative; flex: 1; }
.code-editor {
  width: 100%; min-height: 400px; resize: vertical;
  background: #1a1a1e; color: #e4e4e7; border: none; padding: 16px 16px 16px 52px;
  font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
  font-size: 13px; line-height: 1.5; outline: none; tab-size: 2;
}
.line-numbers {
  position: absolute; top: 0; left: 0; width: 40px; padding: 16px 8px 16px 0;
  text-align: right; font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
  font-size: 13px; line-height: 1.5; color: var(--text-muted); pointer-events: none;
  user-select: none; overflow: hidden;
}

/* Inspiration pane (existing spotlight content) */
.insp-pane { padding: 32px; }

.spotlight-default .quote { font-size: 20px; font-weight: 600; letter-spacing: -.01em; line-height: 1.4; max-width: 600px; }
.spotlight-default .quote-body { font-size: 14px; color: var(--text-dim); margin-top: 12px; font-style: italic; line-height: 1.6; }
.spotlight-detail .cat-pill { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .05em; margin-bottom: 12px; }
.spotlight-detail h2 { font-size: 22px; font-weight: 700; letter-spacing: -.01em; margin-bottom: 12px; }
.spotlight-detail .desc { font-size: 14px; color: var(--text-dim); line-height: 1.7; margin-bottom: 16px; }
.spotlight-detail .source-link { display: inline-block; color: var(--cyan); font-size: 13px; text-decoration: none; border-bottom: 1px solid transparent; transition: border-color var(--transition); }
.spotlight-detail .source-link:hover { border-bottom-color: var(--cyan); }
.spotlight-nav { display: flex; align-items: center; gap: 12px; margin-top: 20px; padding-top: 16px; border-top: 1px solid var(--border); }
.spotlight-nav button { background: #1a1a1f; border: 1px solid var(--border); border-radius: 6px; color: var(--text); padding: 6px 14px; font-size: 13px; cursor: pointer; transition: var(--transition); }
.spotlight-nav button:hover { background: var(--bg-card-hover); border-color: #333; }
.spotlight-nav .back-btn { margin-left: auto; color: var(--text-muted); background: transparent; border: none; font-size: 12px; cursor: pointer; }
.spotlight-nav .back-btn:hover { color: var(--text); }

/* ── Inspiration Grid ── */
.section-title { font-size: 12px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 16px; }
.inspiration-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 40px; }
.insp-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; cursor: pointer; transition: transform var(--transition), box-shadow var(--transition), border-color var(--transition); }
.insp-card:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,.3); border-color: #2a2a32; }
.insp-card .cat-pill { display: inline-block; padding: 2px 8px; border-radius: 20px; font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: .05em; margin-bottom: 8px; }
.insp-card h3 { font-size: 14px; font-weight: 600; margin-bottom: 6px; line-height: 1.35; }
.insp-card .desc { font-size: 12px; color: var(--text-muted); line-height: 1.5; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

/* Category colors */
.cat-kinetic { background: rgba(245,158,11,.15); color: var(--amber); }
.cat-generative { background: rgba(168,85,247,.15); color: var(--purple); }
.cat-sound { background: rgba(6,182,212,.15); color: var(--cyan); }
.cat-faith { background: rgba(16,185,129,.15); color: var(--emerald); }
.cat-industry { background: rgba(107,114,128,.15); color: var(--gray); }
.cat-concept { background: rgba(234,179,8,.15); color: var(--gold); }
.cat-noise { background: rgba(6,182,212,.15); color: var(--cyan); }
.cat-growth { background: rgba(16,185,129,.15); color: var(--emerald); }
.cat-cellular { background: rgba(168,85,247,.15); color: var(--purple); }
.cat-geometry { background: rgba(245,158,11,.15); color: var(--amber); }
.cat-physics { background: rgba(6,182,212,.15); color: var(--cyan); }
.cat-data { background: rgba(107,114,128,.15); color: var(--gray); }

/* ── Techniques Library ── */
.techniques-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 40px; }
.tech-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; transition: transform var(--transition), box-shadow var(--transition), border-color var(--transition); }
.tech-card:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,.3); border-color: #2a2a32; }
.tech-card h3 { font-size: 14px; font-weight: 600; margin-bottom: 4px; }
.tech-card .desc { font-size: 12px; color: var(--text-muted); line-height: 1.5; margin-bottom: 10px; }
.tech-card .load-btn {
  padding: 4px 12px; border-radius: 6px; border: 1px solid var(--border);
  background: #1a1a1f; color: var(--text); font-size: 11px; cursor: pointer;
  transition: var(--transition); font-weight: 500;
}
.tech-card .load-btn:hover { background: var(--gold); color: #000; border-color: var(--gold); }

/* ── Concepts Browser ── */
.concepts { margin-bottom: 40px; }
.concepts-nav { display: flex; gap: 6px; margin-bottom: 16px; flex-wrap: wrap; }
.concepts-nav input[type="radio"] { display: none; }
.concepts-nav label { display: inline-flex; align-items: center; justify-content: center; width: 32px; height: 32px; border-radius: 50%; background: var(--bg-card); border: 1px solid var(--border); font-size: 12px; font-weight: 600; color: var(--text-muted); cursor: pointer; transition: var(--transition); }
.concepts-nav input[type="radio"]:checked + label { background: var(--gold); color: #000; border-color: var(--gold); }
.concept-panel { display: none; background: var(--bg-card); border: 1px solid var(--border); border-left: 3px solid var(--gold); border-radius: var(--radius); padding: 20px 24px; }
#c1:checked ~ .concept-panels .cp1, #c2:checked ~ .concept-panels .cp2, #c3:checked ~ .concept-panels .cp3, #c4:checked ~ .concept-panels .cp4, #c5:checked ~ .concept-panels .cp5, #c6:checked ~ .concept-panels .cp6, #c7:checked ~ .concept-panels .cp7, #c8:checked ~ .concept-panels .cp8 { display: block; animation: spotlightFade .3s ease; }
.concept-panel h3 { font-size: 16px; font-weight: 700; margin-bottom: 8px; color: var(--gold); }
.concept-panel p { font-size: 14px; color: var(--text-dim); font-style: italic; line-height: 1.7; }

/* ── Mobile Chat FAB ── */
.chat-fab { display: none; position: fixed; bottom: 20px; right: 20px; z-index: 200; width: 52px; height: 52px; border-radius: 50%; background: var(--accent-indigo); border: none; color: #fff; font-size: 22px; cursor: pointer; box-shadow: 0 4px 20px rgba(99,102,241,.4); transition: transform var(--transition); }
.chat-fab:hover { transform: scale(1.08); }
.chat-sheet { display: none; position: fixed; bottom: 0; left: 0; right: 0; z-index: 201; background: var(--bg-chat); border-top: 1px solid var(--border); border-radius: 16px 16px 0 0; transform: translateY(100%); transition: transform .35s cubic-bezier(.4,0,.2,1); max-height: 70vh; flex-direction: column; }
.chat-sheet.open { transform: translateY(0); }
.chat-sheet-handle { width: 36px; height: 4px; background: var(--border); border-radius: 2px; margin: 10px auto 6px; }
.chat-sheet .chat-messages { flex: 1; overflow-y: auto; padding: 12px; display: flex; flex-direction: column; gap: 8px; }
.chat-sheet .chat-input-wrap { padding: 12px; border-top: 1px solid var(--border); display: flex; gap: 8px; }
.chat-sheet .chat-input-wrap input { flex: 1; background: #1a1a1f; border: 1px solid var(--border); border-radius: 8px; padding: 8px 12px; color: var(--text); font-size: 13px; outline: none; }
.chat-sheet .chat-input-wrap button { background: var(--accent-indigo); border: none; border-radius: 8px; color: #fff; padding: 0 14px; font-size: 13px; cursor: pointer; }
.chat-overlay { display: none; position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,.5); }

/* ── Responsive ── */
@media (max-width: 768px) {
  .app { grid-template-columns: 1fr; }
  .chat-sidebar { display: none; }
  .chat-fab { display: flex; align-items: center; justify-content: center; }
  .chat-sheet { display: flex; }
  .main { padding: 20px 16px 80px; }
  .inspiration-grid, .techniques-grid { grid-template-columns: 1fr; }
  .spotlight { padding: 0; }
  .header h1 { font-size: 22px; }
  .code-editor { min-height: 300px; }
}

::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>

<!-- Deadlines Bar -->
<div class="deadlines-bar" id="deadlinesBar">
  <div class="deadlines-summary" id="deadlinesSummary">
    <span class="dot" id="nearestDot"></span>
    <span class="countdown" id="nearestCountdown"></span>
    <span id="nearestName"></span>
    <span class="chevron">▼</span>
  </div>
  <div class="deadlines-all" id="deadlinesAll"></div>
</div>

<div class="app">
  <aside class="chat-sidebar">
    <div class="chat-header">💬 Messages</div>
    <div class="chat-messages" id="chatMessages"></div>
    <div class="chat-input-wrap">
      <input type="text" id="chatInput" placeholder="Send a message…" autocomplete="off">
      <button id="chatSend">→</button>
    </div>
  </aside>

  <main class="main">
    <div class="header">
      <h1>🍳 kitchen</h1>
      <div class="date" id="headerDate"></div>
      <div class="greeting" id="greeting"></div>
    </div>

    <!-- Spotlight with Tabs -->
    <div class="spotlight" id="spotlight">
      <div class="spotlight-tabs">
        <div class="spotlight-tab active" data-tab="canvas">Canvas</div>
        <div class="spotlight-tab" data-tab="code">Code</div>
        <div class="spotlight-tab" data-tab="inspiration">Inspiration</div>
      </div>

      <!-- Canvas Pane -->
      <div class="spotlight-pane canvas-pane active" data-pane="canvas">
        <div class="canvas-toolbar">
          <button class="run-btn" id="runBtn">▶ Run</button>
          <label class="auto-toggle"><input type="checkbox" id="autoRun"> Auto-run</label>
          <select id="aspectSelect">
            <option value="1:1">1:1 Square</option>
            <option value="9:16">9:16 Vertical</option>
            <option value="16:9">16:9 Landscape</option>
          </select>
          <input type="text" class="save-name" id="saveName" placeholder="Sketch name…">
          <button id="saveBtn">Save</button>
          <select id="loadSelect"><option value="">Load sketch…</option></select>
        </div>
        <div class="canvas-aspect-wrap" id="canvasWrap">
          <iframe id="canvasFrame" sandbox="allow-scripts" style="height:400px;"></iframe>
        </div>
      </div>

      <!-- Code Pane -->
      <div class="spotlight-pane code-pane" data-pane="code">
        <div class="code-editor-wrap">
          <div class="line-numbers" id="lineNumbers"></div>
          <textarea class="code-editor" id="codeEditor" spellcheck="false"></textarea>
        </div>
      </div>

      <!-- Inspiration Pane -->
      <div class="spotlight-pane insp-pane" data-pane="inspiration" id="inspPane"></div>
    </div>

    <!-- Inspiration Grid -->
    <div class="section-title">Inspiration</div>
    <div class="inspiration-grid" id="inspGrid"></div>

    <!-- Techniques Library -->
    <div class="section-title">Techniques Library</div>
    <div class="techniques-grid" id="techGrid"></div>

    <!-- Concepts Browser -->
    <div class="section-title">Concepts</div>
    <div class="concepts" id="conceptsWrap"></div>
  </main>
</div>

<button class="chat-fab" id="chatFab">💬</button>
<div class="chat-overlay" id="chatOverlay"></div>
<div class="chat-sheet" id="chatSheet">
  <div class="chat-sheet-handle"></div>
  <div class="chat-messages" id="chatMessagesMobile"></div>
  <div class="chat-input-wrap">
    <input type="text" id="chatInputMobile" placeholder="Send a message…" autocomplete="off">
    <button id="chatSendMobile">→</button>
  </div>
</div>

<script>
// ── Data ──
const INSPIRATIONS = [
  { id: 'hulten', cat: 'sound', title: 'Love Hultén — Ferrofluid Synth Guitar', desc: 'Modified Arturia MicroFreak in hand-built body with dancing ferrofluid visualizer, steel rod pitch control, magnetic sequencer. The ferrofluid shows the sound before you hear it.', link: 'https://www.designboom.com/technology/love-hulten-guitar-synth-instrument-ferrofluid-09-22-2025/' },
  { id: 'vtol', cat: 'kinetic', title: '::vtol:: (Dmitry Morozov) — Kinetic Code Sculptures', desc: 'Electronic installations reacting to environment + viewers. "Reading My Body" turns tattoos into music. "Last Breath" — wearable mask organ. Showed at Sónar+D June 2025.', link: 'https://www.designboom.com/technology/inside-world-vtol-kinetic-sculptures-robotics-code-driven-installations-dmitry-morozov-interview-08-18-2025/' },
  { id: 'eightnote', cat: 'sound', title: 'EightNote — Kinetic Magnetic MIDI Controller', desc: 'MIDI.org Innovation Award 2025. Magnetic balls on a sliding 8-lane panel — rhythm as physical gesture. Open-source firmware planned.', link: 'https://midi.org/innovation-award/eightnote' },
  { id: 'zimoun', cat: 'kinetic', title: 'Zimoun — Sound Installations', desc: 'Hundreds of identical motors + everyday materials = emergent sonic landscapes. New commission: Staatsschauspiel Dresden 2026.', link: 'https://zimoun.net/' },
  { id: 'trimpin', cat: 'sound', title: 'Trimpin — The OG MIDI Sculptor', desc: '30+ years of electromechanical sculptures via MIDI + microcontrollers. Building-scale instruments that play themselves.', link: 'https://en.wikipedia.org/wiki/Trimpin' },
  { id: 'diriyah', cat: 'faith', title: 'Diriyah Biennale — Generative Islamic Patterns', desc: 'Workshop: photograph architectural motifs → AI → digital artworks with natural elements. Watch for cycle 3 open call.', link: 'https://biennale.org.sa/en/program/generative-art-in-islamic-patterns' },
  { id: 'transient', cat: 'industry', title: 'Transient Labs — Creator Platform', desc: '1/1s, editions, zero seller fees. Preferred minting platform. Strong for premium pieces.', link: 'https://transient.xyz' },
  { id: 'fxhash', cat: 'generative', title: 'fxhash Protocol Update', desc: 'FXH token + "art coins" + "open-form generative art." New economics for onchain generative art.', link: 'https://beta.fxhash.xyz/' },
];

const CONCEPTS = [
  { title: 'The Callback Machine', body: 'Islamic geometric patterns generated by one rule repeated. Generative piece starts as chaos, reveals the single rotation underneath. Perceptual one-way door applied to sacred geometry.' },

// ── Helpers ──
const $ = s => document.querySelector(s);
const $$ = s => document.querySelectorAll(s);
const now = new Date();

function daysBetween(a, b) { return Math.ceil((b - a) / 86400000); }
function formatTime(d) { return new Date(d).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }); }
function escHtml(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

function urlify2(text) {
  const re = /(https?:\/\/[^\s]+)/g;
  let out = '', m, last = 0;
  while ((m = re.exec(text)) !== null) {
    if (m.index > last) out += escHtml(text.slice(last, m.index));
    out += `<a class="link-card" href="${escHtml(m[1])}" target="_blank" rel="noopener">${escHtml(m[1])}</a>`;
    last = re.lastIndex;
  }
  if (last < text.length) out += escHtml(text.slice(last));
  return out;
}

let spotlightIdx = Math.floor(Math.random() * CONCEPTS.length);
let quoteTimer;

function renderInspDefault() {
  const c = CONCEPTS[spotlightIdx];
  $('#inspPane').innerHTML = `<div class="spotlight-default"><div class="quote">"${escHtml(c.title)}"</div><div class="quote-body">${escHtml(c.body)}</div></div>`;
}

function renderInspDetail(idx) {
  const item = INSPIRATIONS[idx];
  const sameCat = INSPIRATIONS.map((it, i) => ({ ...it, idx: i })).filter(it => it.cat === item.cat);
  const posInCat = sameCat.findIndex(it => it.idx === idx);
  const prevIdx = sameCat[(posInCat - 1 + sameCat.length) % sameCat.length].idx;
  const nextIdx = sameCat[(posInCat + 1) % sameCat.length].idx;
  $('#inspPane').innerHTML = `<div class="spotlight-detail">
    <span class="cat-pill cat-${item.cat}">${item.cat}</span>
    <h2>${escHtml(item.title)}</h2>
    <div class="desc">${escHtml(item.desc)}</div>
    <a class="source-link" href="${escHtml(item.link)}" target="_blank" rel="noopener">View source ↗</a>
    <div class="spotlight-nav">
      <button onclick="renderInspDetail(${prevIdx})">← prev</button>
      <button onclick="renderInspDetail(${nextIdx})">next →</button>
      <button class="back-btn" onclick="renderInspDefault()">✕ Back to overview</button>
    </div>
  </div>`;
  switchTab('inspiration');
  try {
    const interactions = JSON.parse(localStorage.getItem('chef-workspace-interactions') || '{}');
    interactions[item.id] = (interactions[item.id] || 0) + 1;
    interactions._lastClick = { id: item.id, time: Date.now() };
    localStorage.setItem('chef-workspace-interactions', JSON.stringify(interactions));
  } catch (e) {}
}

renderInspDefault();
function startQuoteRotation() {
  clearInterval(quoteTimer);
  quoteTimer = setInterval(() => { spotlightIdx = (spotlightIdx + 1) % CONCEPTS.length; renderInspDefault(); }, 8000);
}
startQuoteRotation();

// ── Inspiration Grid ──
$('#inspGrid').innerHTML = INSPIRATIONS.map((item, i) => `
  <div class="insp-card" onclick="renderInspDetail(${i})">
    <span class="cat-pill cat-${item.cat}">${item.cat}</span>
    <h3>${escHtml(item.title)}</h3>
    <div class="desc">${escHtml(item.desc)}</div>
  </div>
`).join('');

// ── Techniques Library ──
function loadTechnique(idx) {
  const t = TECHNIQUES[idx];
  codeEditor.value = t.code;
  updateLineNumbers();
  switchTab('code');
  setTimeout(() => { switchTab('canvas'); runCode(); }, 500);
  $('#spotlight').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

$('#techGrid').innerHTML = TECHNIQUES.map((t, i) => `
  <div class="tech-card">
    <span class="cat-pill cat-${t.cat}" style="display:inline-block;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px;">${t.cat}</span>
    <h3>${escHtml(t.name)}</h3>
    <div class="desc">${escHtml(t.desc)}</div>
    <button class="load-btn" onclick="loadTechnique(${i})">Load Example →</button>
  </div>
`).join('');

// ── Concepts Browser ──
(function initConcepts() {
  const wrap = $('#conceptsWrap');
  let html = '<div class="concepts-nav">';
  CONCEPTS.forEach((_, i) => {
    const checked = i === 0 ? 'checked' : '';
    html += `<input type="radio" name="concept" id="c${i+1}" ${checked}><label for="c${i+1}">${i+1}</label>`;
  });
  html += '<div class="concept-panels">';
  CONCEPTS.forEach((c, i) => {
    html += `<div class="concept-panel cp${i+1}"><h3>"${escHtml(c.title)}"</h3><p>${escHtml(c.body)}</p></div>`;
  });
  html += '</div></div>';
  wrap.innerHTML = html;
})();

// ── Chat ──
const CHAT_KEY = 'chef-workspace-chat';
function loadMessages() { try { return JSON.parse(localStorage.getItem(CHAT_KEY) || '[]'); } catch (e) { return []; } }
function saveMessages(msgs) { try { localStorage.setItem(CHAT_KEY, JSON.stringify(msgs)); } catch (e) {} }
function renderMessages() {
  const msgs = loadMessages();
  const html = msgs.map(m => {
    const cls = m.sender === 'user' ? 'user' : 'chef';
    return `<div class="chat-msg ${cls}">${urlify2(m.text)}<span class="msg-time">${formatTime(m.timestamp)}</span></div>`;
  }).join('');
  const el = $('#chatMessages'); if (el) { el.innerHTML = html; el.scrollTop = el.scrollHeight; }
  const el2 = $('#chatMessagesMobile'); if (el2) { el2.innerHTML = html; el2.scrollTop = el2.scrollHeight; }
}
function sendMessage(text) {
  if (!text.trim()) return;
  const msgs = loadMessages();
  msgs.push({ text: text.trim(), timestamp: Date.now(), sender: 'user' });
  setTimeout(() => { const m = loadMessages(); m.push({ text: 'Message received — I\'ll respond via Telegram shortly.', timestamp: Date.now(), sender: 'chef' }); saveMessages(m); renderMessages(); }, 600);
  saveMessages(msgs); renderMessages();
}

$('#chatSend').addEventListener('click', () => { sendMessage($('#chatInput').value); $('#chatInput').value = ''; });
$('#chatInput').addEventListener('keydown', e => { if (e.key === 'Enter') { sendMessage($('#chatInput').value); $('#chatInput').value = ''; } });
$('#chatFab').addEventListener('click', () => { $('#chatSheet').classList.add('open'); $('#chatOverlay').style.display = 'block'; renderMessages(); });
$('#chatOverlay').addEventListener('click', () => { $('#chatSheet').classList.remove('open'); $('#chatOverlay').style.display = 'none'; });
$('#chatSendMobile').addEventListener('click', () => { sendMessage($('#chatInputMobile').value); $('#chatInputMobile').value = ''; });
$('#chatInputMobile').addEventListener('keydown', e => { if (e.key === 'Enter') { sendMessage($('#chatInputMobile').value); $('#chatInputMobile').value = ''; } });
renderMessages();
</script>
