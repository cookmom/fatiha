<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Ottoman Garden — Skill Test</title>
<script src="https://cdn.jsdelivr.net/npm/p5@2/lib/p5.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/p5.brush@2.0.0-beta"></script>
<style>
  html, body { margin: 0; padding: 0; overflow: hidden; background: #0d0d0d; display: flex; justify-content: center; align-items: center; height: 100vh; }
  canvas { display: block; }
</style>
</head>
<body>
<script>
// ============================================================
// OTTOMAN GARDEN SKILL TEST
// Hybrid: 2D p5.Graphics for Tyler Hobbs watercolor
//         WEBGL main canvas for p5.brush strokes
// ============================================================

const OTTOMAN = {
  crimson: "#c41e3a", crimsonLight: "#d73c5a", crimsonDark: "#911a2a",
  gold: "#c5a030", goldLight: "#dab94e", goldDark: "#8b7020",
  forestGreen: "#266428", forestGreenLight: "#3a8a3c", forestGreenDark: "#1a4a1a",
};

// ============================================================
// Tyler Hobbs Watercolor Engine (2D canvas operations)
// ============================================================
function gaussRand(m, s) {
  const u1 = Math.random(), u2 = Math.random();
  return m + s * Math.sqrt(-2 * Math.log(u1 || 0.001)) * Math.cos(2 * Math.PI * u2);
}

function deformOnce(poly, variances) {
  const result = [], nv = [];
  for (let i = 0; i < poly.length; i++) {
    const a = poly[i], c = poly[(i + 1) % poly.length];
    result.push([a[0], a[1]]);
    const v = variances[i];
    const mx = (a[0]+c[0])/2, my = (a[1]+c[1])/2;
    const dx = c[0]-a[0], dy = c[1]-a[1];
    const len = Math.sqrt(dx*dx+dy*dy);
    if (len < 0.5) { result.push([mx,my]); nv.push(v,v); continue; }
    const nx = -dy/len, ny = dx/len;
    const off = gaussRand(0, v * len);
    result.push([mx+nx*off, my+ny*off]);
    nv.push(v*(0.6+Math.random()*0.6), v*(0.6+Math.random()*0.6));
  }
  return { poly: result, variances: nv };
}

function deformN(poly, n, variance) {
  let p = poly.map(pt => [pt[0], pt[1]]);
  let vars = poly.map(() => variance);
  for (let i = 0; i < n; i++) {
    const r = deformOnce(p, vars);
    p = r.poly; vars = r.variances;
  }
  return p;
}

let wcGfx;

function watercolorFill(polygon, r, g, b, layers, alpha, variance) {
  const basePoly = deformN(polygon, 5, variance || 0.15);
  const ctx = wcGfx.drawingContext;

  for (let i = 0; i < layers; i++) {
    const lp = deformN(basePoly, 3, (variance || 0.15) * 0.7);
    ctx.save();
    ctx.globalAlpha = alpha / 255;
    const jr = Math.max(0,Math.min(255,Math.round(r + gaussRand(0,6))));
    const jg = Math.max(0,Math.min(255,Math.round(g + gaussRand(0,5))));
    const jb = Math.max(0,Math.min(255,Math.round(b + gaussRand(0,5))));
    ctx.fillStyle = `rgb(${jr},${jg},${jb})`;
    ctx.beginPath();
    ctx.moveTo(lp[0][0], lp[0][1]);
    for (let j = 1; j < lp.length; j++) ctx.lineTo(lp[j][0], lp[j][1]);
    ctx.closePath();
    ctx.fill();
    ctx.restore();
  }
}

function hexRgb(h) { return [parseInt(h.slice(1,3),16), parseInt(h.slice(3,5),16), parseInt(h.slice(5,7),16)]; }

// Petal polygon (ogee shape)
function ogeePetal(px, py, angle, len, w) {
  const pts = [], steps = 16;
  const ca = Math.cos(angle), sa = Math.sin(angle), nx = -sa, ny = ca;
  for (let s = 0; s <= steps; s++) {
    const t = s/steps;
    let wf; // width factor
    if (t < 0.12) wf = t/0.12*0.3;
    else if (t < 0.45) wf = 0.3 + (t-0.12)/0.33*0.7;
    else if (t < 0.75) wf = 1.0 - (t-0.45)/0.3*0.35;
    else wf = 0.65*(1-(t-0.75)/0.25);
    pts.push([px+ca*t*len+nx*wf*w*0.55, py+sa*t*len+ny*wf*w*0.55]);
  }
  for (let s = steps; s >= 0; s--) {
    const t = s/steps;
    let wf;
    if (t < 0.12) wf = t/0.12*0.3;
    else if (t < 0.45) wf = 0.3 + (t-0.12)/0.33*0.7;
    else if (t < 0.75) wf = 1.0 - (t-0.45)/0.3*0.35;
    else wf = 0.65*(1-(t-0.75)/0.25);
    pts.push([px+ca*t*len-nx*wf*w*0.35, py+sa*t*len-ny*wf*w*0.35]);
  }
  return pts;
}

// Saz leaf polygon
function sazPoly(cx, cy, a, len, w) {
  const pts = [], steps = 18;
  const ca = Math.cos(a), sa = Math.sin(a), nx = -sa, ny = ca;
  for (let i = 0; i <= steps; i++) {
    const t = i/steps;
    const wf = Math.sin(t*Math.PI) * w * (0.5+0.5*Math.sin(t*Math.PI*0.8));
    const sc = Math.sin(t*Math.PI*1.2) * w * 0.12;
    pts.push([cx+ca*t*len+nx*(wf+sc), cy+sa*t*len+ny*(wf+sc)]);
  }
  for (let i = steps; i >= 0; i--) {
    const t = i/steps;
    const wf = Math.sin(t*Math.PI) * w * 0.3;
    const sc = Math.sin(t*Math.PI*1.2) * w * 0.08;
    pts.push([cx+ca*t*len-nx*(wf-sc), cy+sa*t*len-ny*(wf-sc)]);
  }
  return pts;
}

// Golden spiral
function spiral(cx, cy, r0, turns, n) {
  const phi = (1+Math.sqrt(5))/2, pts = [];
  for (let i = 0; i <= n; i++) {
    const t = i/n, a = t*turns*Math.PI*2;
    const r = r0 * Math.pow(phi, a/(Math.PI*2));
    if (r > 400) break;
    pts.push([cx+Math.cos(a)*r, cy+Math.sin(a)*r, a]);
  }
  return pts;
}

// ============================================================
// SETUP
// ============================================================
function setup() {
  createCanvas(430, 932, WEBGL);
  brush.load();
  translate(-width/2, -height/2);
  randomSeed(777);
  background(13, 13, 13);

  // Register brushes
  brush.add("tahrir", {
    type: "default", weight: 0.3, scatter: 0.1, sharpness: 0.9,
    grain: 3, opacity: 180, spacing: 0.08,
    pressure: [0.8, 1.0, 0.8], rotate: "natural"
  });
  brush.add("gold_leaf", {
    type: "spray", weight: 3, scatter: 4, opacity: 80,
    spacing: 0.8, pressure: [1, 0.5], rotate: "random"
  });

  // Subtle ground hatch
  brush.noFill();
  brush.hatchStyle("2H", "#151515", 0.2);
  brush.hatch(55, 25, { rand: 0.5 });
  brush.rect(0, 0, width, height);
  brush.noHatch();

  // ============================================================
  // WATERCOLOR LAYER
  // ============================================================
  wcGfx = createGraphics(width, height);
  // CRITICAL: Tyler Hobbs watercolor needs a solid background for alpha stacking
  wcGfx.background(13, 13, 13);

  // Spiral path — bigger, fills the canvas
  const sCx = width * 0.48, sCy = height * 0.35;
  const sp = spiral(sCx, sCy, 18, 3, 180);

  // --- SAZ LEAVES ---
  const leafI = [12, 26, 40, 55, 70, 85, 100, 115];
  const leafData = [];
  for (const idx of leafI) {
    if (idx >= sp.length) continue;
    const [lx, ly, la] = sp[idx];
    const side = idx % 2 === 0 ? 1 : -1;
    const lAngle = la + side * Math.PI/2 + gaussRand(0, 0.2);
    const lLen = 50 + Math.random()*40;
    const lW = 16 + Math.random()*10;
    const [cr,cg,cb] = hexRgb(Math.random()>0.4 ? OTTOMAN.forestGreen : OTTOMAN.forestGreenLight);

    watercolorFill(sazPoly(lx, ly, lAngle, lLen, lW), cr, cg, cb, 30, 14, 0.13);
    leafData.push({x:lx, y:ly, a:lAngle, len:lLen, w:lW});
  }

  // --- CRIMSON ROSE at center ---
  const roseCx = sCx, roseCy = sCy, rS = 75;
  const rRings = [
    {n:7, dist:rS*0.32, len:rS*1.0,  w:rS*0.58, c:hexRgb(OTTOMAN.crimsonLight), off:0.15},
    {n:8, dist:rS*0.17, len:rS*0.7,  w:rS*0.44, c:hexRgb(OTTOMAN.crimson), off:0.5},
    {n:6, dist:rS*0.07, len:rS*0.45, w:rS*0.32, c:hexRgb(OTTOMAN.crimsonDark), off:0.3},
    {n:4, dist:rS*0.02, len:rS*0.28, w:rS*0.2,  c:[110,28,35], off:0},
  ];
  for (const ring of rRings) {
    for (let i = 0; i < ring.n; i++) {
      const a = (i/ring.n)*Math.PI*2 + ring.off + gaussRand(0,0.12);
      const px = roseCx + Math.cos(a)*ring.dist;
      const py = roseCy + Math.sin(a)*ring.dist;
      const ta = a + Math.PI/2 + gaussRand(0,0.08);
      watercolorFill(ogeePetal(px,py,ta,ring.len,ring.w), ring.c[0],ring.c[1],ring.c[2], 30, 14, 0.12);
    }
  }

  // --- GOLD ROSE at outer spiral ---
  const gi = Math.min(sp.length-1, 90);
  const [grx, gry] = sp[gi];
  const gS = 50;
  const gRings = [
    {n:6, dist:gS*0.3,  len:gS*0.95, w:gS*0.5,  c:hexRgb(OTTOMAN.goldLight)},
    {n:7, dist:gS*0.14, len:gS*0.6,  w:gS*0.38, c:hexRgb(OTTOMAN.gold)},
    {n:4, dist:gS*0.04, len:gS*0.35, w:gS*0.24, c:hexRgb(OTTOMAN.goldDark)},
  ];
  for (const ring of gRings) {
    for (let i = 0; i < ring.n; i++) {
      const a = (i/ring.n)*Math.PI*2 + gaussRand(0,0.15);
      const px = grx + Math.cos(a)*ring.dist;
      const py = gry + Math.sin(a)*ring.dist;
      const ta = a + Math.PI/2;
      watercolorFill(ogeePetal(px,py,ta,ring.len,ring.w), ring.c[0],ring.c[1],ring.c[2], 22, 16, 0.12);
    }
  }

  // --- SMALL CRIMSON ROSE at another spiral position ---
  const si2 = Math.min(sp.length-1, 55);
  const [sr2x, sr2y] = sp[si2];
  const s2S = 38;
  const s2Rings = [
    {n:5, dist:s2S*0.28, len:s2S*0.9,  w:s2S*0.5,  c:hexRgb(OTTOMAN.crimson)},
    {n:6, dist:s2S*0.12, len:s2S*0.55, w:s2S*0.35, c:hexRgb(OTTOMAN.crimsonDark)},
    {n:3, dist:s2S*0.03, len:s2S*0.3,  w:s2S*0.2,  c:[100,25,30]},
  ];
  for (const ring of s2Rings) {
    for (let i = 0; i < ring.n; i++) {
      const a = (i/ring.n)*Math.PI*2 + gaussRand(0,0.2);
      const px = sr2x + Math.cos(a)*ring.dist;
      const py = sr2y + Math.sin(a)*ring.dist;
      const ta = a + Math.PI/2;
      watercolorFill(ogeePetal(px,py,ta,ring.len,ring.w), ring.c[0],ring.c[1],ring.c[2], 18, 16, 0.12);
    }
  }

  // ============================================================
  // COMPOSITE watercolor onto WEBGL canvas
  // ============================================================
  image(wcGfx, 0, 0);

  // ============================================================
  // P5.BRUSH STROKES
  // ============================================================

  // Vine stem along spiral
  brush.set("charcoal", OTTOMAN.forestGreenDark, 2);
  for (let i = 1; i < sp.length; i++) {
    brush.line(sp[i-1][0], sp[i-1][1], sp[i][0], sp[i][1]);
  }
  brush.set("rotring", OTTOMAN.goldDark, 0.4);
  for (let i = 1; i < sp.length; i += 3) {
    brush.line(sp[i-1][0], sp[i-1][1], sp[i][0], sp[i][1]);
  }

  // Leaf veins
  for (const ld of leafData) {
    const ca = Math.cos(ld.a), sa = Math.sin(ld.a), nx = -sa, ny = ca;
    brush.set("tahrir", OTTOMAN.forestGreenDark, 0.3);
    brush.line(ld.x, ld.y, ld.x+ca*ld.len*0.9, ld.y+sa*ld.len*0.9);
    brush.set("2H", OTTOMAN.forestGreenDark, 0.2);
    for (let v = 1; v <= 5; v++) {
      const t = 0.12+(v/6)*0.72;
      const vx = ld.x+ca*t*ld.len, vy = ld.y+sa*t*ld.len;
      const vL = ld.w*0.35*Math.sin(t*Math.PI);
      brush.line(vx, vy, vx+nx*vL+ca*vL*0.2, vy+ny*vL+sa*vL*0.2);
      brush.line(vx, vy, vx-nx*vL*0.5, vy-ny*vL*0.5);
    }
  }

  // Buds along vine
  const budI = [18, 32, 48, 63, 80, 95];
  for (const idx of budI) {
    if (idx >= sp.length) continue;
    const [bx, by, ba] = sp[idx];
    const side = idx % 2 === 0 ? 1 : -1;
    push();
    translate(bx, by);
    rotate(ba + side * HALF_PI * 0.7);
    brush.noStroke();
    brush.fill(OTTOMAN.crimsonLight, random(70,100));
    brush.fillBleed(random(0.2,0.5), "out");
    brush.fillTexture(random(0.3,0.5), 0.3);
    brush.beginShape(0.8);
    brush.vertex(0,0); brush.vertex(7,-5); brush.vertex(14,-3);
    brush.vertex(18,0); brush.vertex(14,2); brush.vertex(7,3);
    brush.endShape(true);
    brush.fill(OTTOMAN.forestGreenDark, 90);
    brush.fillBleed(0.2);
    brush.beginShape(0.6);
    brush.vertex(-2,0); brush.vertex(4,-3); brush.vertex(7,0); brush.vertex(4,3);
    brush.endShape(true);
    pop();
  }

  // Pollen spray at flower centers
  brush.set("gold_leaf", OTTOMAN.goldLight, 3);
  for (let i = 0; i < 40; i++) {
    const a = random(TWO_PI), d = random(3,14);
    brush.line(roseCx+cos(a)*d, roseCy+sin(a)*d, roseCx+cos(a)*(d+5), roseCy+sin(a)*(d+5));
  }
  for (let i = 0; i < 25; i++) {
    const a = random(TWO_PI), d = random(2,10);
    brush.line(grx+cos(a)*d, gry+sin(a)*d, grx+cos(a)*(d+3), gry+sin(a)*(d+3));
  }
  for (let i = 0; i < 15; i++) {
    const a = random(TWO_PI), d = random(2,6);
    brush.line(sr2x+cos(a)*d, sr2y+sin(a)*d, sr2x+cos(a)*(d+2), sr2y+sin(a)*(d+2));
  }

  // Tahrir outlines — selective on outer petals
  brush.noFill();
  brush.set("tahrir", OTTOMAN.crimsonDark, 0.3);
  for (let i = 0; i < 5; i++) {
    const a = (i/5)*TWO_PI + 0.3;
    const px = roseCx + cos(a)*rS*0.32;
    const py = roseCy + sin(a)*rS*0.32;
    const ta = a + HALF_PI;
    brush.beginShape(0.7);
    brush.vertex(px, py);
    brush.vertex(px+cos(ta)*rS*0.4-sin(ta)*rS*0.3, py+sin(ta)*rS*0.4+cos(ta)*rS*0.3);
    brush.vertex(px+cos(ta)*rS*0.8-sin(ta)*rS*0.12, py+sin(ta)*rS*0.8+cos(ta)*rS*0.12);
    brush.vertex(px+cos(ta)*rS, py+sin(ta)*rS);
    brush.endShape(false);
  }

  brush.set("tahrir", OTTOMAN.goldDark, 0.25);
  for (let i = 0; i < 4; i++) {
    const a = (i/4)*TWO_PI + 0.5;
    const px = grx + cos(a)*gS*0.3;
    const py = gry + sin(a)*gS*0.3;
    const ta = a + HALF_PI;
    brush.line(px, py, px+cos(ta)*gS*0.9, py+sin(ta)*gS*0.9);
  }

  // Atmospheric glow
  brush.noStroke();
  brush.fill(OTTOMAN.crimsonLight, 12);
  brush.fillBleed(0.7, "out");
  brush.circle(roseCx, roseCy, rS * 1.5);

  brush.fill(OTTOMAN.goldLight, 12);
  brush.fillBleed(0.6, "out");
  brush.circle(grx, gry, gS * 1.4);

  // Gold dust
  brush.set("gold_leaf", OTTOMAN.gold, 1);
  for (let i = 0; i < 30; i++) {
    brush.flowLine(random(30,width-30), random(30,height-30), random(4,12), random(TWO_PI));
  }

  console.log("Ottoman garden skill test complete");
}
</script>
</body>
</html>
