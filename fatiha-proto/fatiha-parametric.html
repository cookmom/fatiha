<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Fatiha — Parametric Audio-Reactive Door</title>
  <script src="https://cdn.jsdelivr.net/npm/p5@2/lib/p5.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/p5.brush@2.0.0-beta"></script>
  <style>
    html, body { margin: 0; padding: 0; overflow: hidden; background: #1a1a1a; display: flex; justify-content: center; align-items: center; height: 100vh; }
    canvas { display: block; }
  </style>
</head>
<body>
<script>
// ═══════════════════════════════════════════════════════════════
// FATIHA PARAMETRIC — DOOR PAINTING + LIGHTING MODULATION
// The painting is on the wall. The lighting changes. The painting doesn't.
// ═══════════════════════════════════════════════════════════════

// ===== TAJWEED EVENTS =====
var TAJWEED_EVENTS = [
  {t:0.35, rule:'madd'}, {t:0.55, rule:'madd'}, {t:1.05, rule:'madd'},
  {t:1.35, rule:'madd'}, {t:2.15, rule:'madd'}, {t:2.65, rule:'madd'},
  {t:3.15, rule:'madd'}, {t:3.95, rule:'madd'}, {t:4.35, rule:'madd'},
  {t:4.75, rule:'madd'}, {t:5.15, rule:'madd'},
  {t:0.45, rule:'ghunna'}, {t:1.15, rule:'ghunna'}, {t:2.25, rule:'ghunna'},
  {t:3.25, rule:'ghunna'}, {t:4.05, rule:'ghunna'}, {t:4.85, rule:'ghunna'},
  {t:1.25, rule:'idgham'}, {t:2.35, rule:'idgham'}, {t:3.35, rule:'idgham'},
  {t:0.95, rule:'ikhfa'}, {t:2.85, rule:'ikhfa'}, {t:4.55, rule:'ikhfa'},
  {t:0.08, rule:'qalqalah'}, {t:1.55, rule:'qalqalah'}, {t:3.08, rule:'qalqalah'}
].sort(function(a,b){ return a.t - b.t; });

var WORDS = [
  {start:0.00, end:0.75, label:'bismi'},
  {start:0.75, end:1.50, label:'allah'},
  {start:1.50, end:3.00, label:'ar-rahman'},
  {start:3.00, end:5.50, label:'ar-raheem'}
];

// ===== GLOBALS =====
var doorImg = null;
var doorCaptured = false;
var audioCtx, analyser, audioSource, audioStartTime = 0;
var timeData, freqData;
var audioReady = false, audioEnded = false;
var animStart = 0;

var sAmp = 0, sBass = 0, sTreble = 0, sPitch = 0.5;
var tajweedState = { madd: 0, ghunna: 0, idgham: 0, ikhfa: 0, qalqalah: 0 };
var wordsRevealed = 0;

var DX = 110, DW = 860, DY = 80, DH = 1760;
var CX = 540, SPRING_Y = 580;

var WASH_ZONES = [
  {x: 150, y: 140, w: 473, h: 550, color: [16, 64, 160]},
  {x: 190, y: 530, w: 430, h: 400, color: [200, 136, 0]},
  {x: 170, y: 1030, w: 473, h: 550, color: [16, 88, 48]}
];

var particles = [];

function setup() {
  createCanvas(1080, 1920, WEBGL);
  setAttributes('preserveDrawingBuffer', true);
  brush.load();
  pixelDensity(1);
  frameRate(30);
  randomSeed(42);

  // Render the M10 door painting
  renderDoor();

  // Init gold dust particles
  for (var i = 0; i < 50; i++) {
    particles.push({
      x: random(-440, 440), y: random(-960, 960),
      sz: random(1.5, 4), spd: random(0.2, 0.8),
      alpha: random(15, 40), drift: random(-0.15, 0.15),
      phase: random(TWO_PI)
    });
  }

  animStart = millis();
  window._setupDone = true;
  console.log('Setup complete — door rendered');
  initAudio();
}

// ===== M10 DOOR PAINTING (rendered once in setup) =====
function renderDoor() {
  push();
  translate(-width / 2, -height / 2);
  background(242, 234, 218);
  brush.scaleBrushes(2.5);
  brush.wiggle(2);

  function pencilW() { return random(0.3, 2.5); }
  function pencilWLight() { return random(0.3, 1.2); }
  function crayonW() { return random(1.0, 4.0); }

  var W = 1080, H = 1920, cx = W / 2;
  var doorW = 860, doorH = 1760;
  var doorX = (W - doorW) / 2, doorY = (H - doorH) / 2;
  var halfW = doorW / 2;

  var archSpringY = doorY + 500;
  var centerOffset = halfW * 0.6;
  var leftArcCx = cx + centerOffset;
  var rightArcCx = cx - centerOffset;
  var arcR = halfW + centerOffset;
  var archPeakY = archSpringY - sqrt(arcR * arcR - centerOffset * centerOffset);

  var PENCIL = "#9a9080", PENCIL2 = "#b0a898";
  brush.noFill(); brush.noHatch();

  // LAYER 1: WATERCOLOR WASHES
  brush.noStroke();
  brush.fill("#1040A0", 75); brush.fillBleed(0.6);
  brush.rect(doorX + 40, doorY + 60, doorW * 0.55, 550);
  brush.fill("#C88800", 70); brush.fillBleed(0.55);
  brush.rect(doorX + 80, archSpringY - 50, doorW * 0.5, 400);
  brush.fill("#105830", 80); brush.fillBleed(0.55);
  brush.rect(doorX + 60, archSpringY + 450, doorW * 0.55, 550);
  brush.noFill();

  // LAYER 2: PENCIL DOOR
  drawFrameVaried(doorX, archSpringY, doorW, doorY + doorH - archSpringY, PENCIL, 0.8, 2.5);
  drawFrameVaried(doorX - 10, archSpringY - 6, doorW + 20, doorY + doorH - archSpringY + 10, PENCIL2, 0.3, 1.5);
  drawPointedArch(cx, archSpringY, halfW, leftArcCx, rightArcCx, arcR, PENCIL, 1.2);
  var ihw = halfW - 30, ico = ihw * 0.6;
  drawPointedArch(cx, archSpringY, ihw, cx + ico, cx - ico, ihw + ico, PENCIL2, 0.7);

  brush.set("2H", PENCIL, pencilW());
  var cdTop = archSpringY + 3, cdBot = doorY + doorH - 18;
  brush.spline([[cx, cdTop, 0.4], [cx, cdTop + (cdBot - cdTop) * 0.3, 1.0], [cx, cdTop + (cdBot - cdTop) * 0.6, 0.5], [cx, cdBot, 0.8]]);

  var pY = archSpringY + 18, pBot = doorY + doorH - 25, pH = pBot - pY;
  var lX = doorX + 16, lW = cx - 14 - lX;
  var rX = cx + 14, rW = doorX + doorW - 16 - rX;
  drawFrameVaried(lX, pY, lW, pH, PENCIL, 0.6, 2.2);
  drawFrameVaried(rX, pY, rW, pH, PENCIL, 0.6, 2.2);
  drawFrameVaried(lX + 14, pY + 14, lW - 28, pH - 28, PENCIL2, 0.3, 1.2);
  drawFrameVaried(rX + 14, pY + 14, rW - 28, pH - 28, PENCIL2, 0.3, 1.2);

  var mg = 26, iT = pY + mg, iH = pH - 2 * mg;
  var topH = iH * 0.22, gH = iH * 0.03, midH = iH * 0.50;
  var d1 = iT + topH, d2 = d1 + gH, d3 = d2 + midH, d4 = d3 + gH;
  [lX, rX].forEach(function(px, i) {
    var pw = i === 0 ? lW : rW;
    [d1, d2, d3, d4].forEach(function(dy) {
      brush.set("2H", PENCIL2, pencilWLight());
      brush.line(px + 10, dy, px + pw - 10, dy);
    });
  });

  var lCx = lX + lW / 2, rCx = rX + rW / 2, piW = lW - 2 * mg;
  var topCY = iT + topH / 2, topR = min(piW / 2, topH / 2) * 0.85;
  var midCY = d2 + midH / 2, midR = min(piW / 2, midH / 2) * 0.85;
  var botCY = d4 + topH / 2;

  brush.noFill();
  brush.set("2H", PENCIL2, pencilWLight()); brush.circle(lCx, topCY, topR * 2, true);
  brush.set("2H", PENCIL2, pencilWLight()); brush.circle(rCx, topCY, topR * 2, true);
  brush.set("2H", PENCIL2, pencilWLight()); brush.circle(lCx, midCY, midR * 2, true);
  brush.set("2H", PENCIL2, pencilWLight()); brush.circle(rCx, midCY, midR * 2, true);
  brush.set("2H", PENCIL2, pencilWLight()); brush.circle(lCx, botCY, topR * 2, true);
  brush.set("2H", PENCIL2, pencilWLight()); brush.circle(rCx, botCY, topR * 2, true);

  var tCY = archPeakY + (archSpringY - archPeakY) * 0.45;
  var tR = (archSpringY - archPeakY) * 0.15;
  brush.set("2H", PENCIL2, pencilWLight()); brush.circle(cx, tCY, tR * 2, true);

  brush.set("2H", PENCIL2, pencilWLight()); brush.line(lX + mg, iT, lX + lW - mg, iT + topH);
  brush.set("2H", PENCIL2, pencilWLight()); brush.line(lX + lW - mg, iT, lX + mg, iT + topH);
  brush.set("2H", PENCIL2, pencilWLight()); brush.line(rX + mg, iT, rX + rW - mg, iT + topH);
  brush.set("2H", PENCIL2, pencilWLight()); brush.line(rX + rW - mg, iT, rX + mg, iT + topH);
  brush.set("2H", PENCIL2, pencilWLight()); brush.line(lX + mg, d2, lX + lW - mg, d2 + midH);
  brush.set("2H", PENCIL2, pencilWLight()); brush.line(lX + lW - mg, d2, lX + mg, d2 + midH);
  brush.set("2H", PENCIL2, pencilWLight()); brush.line(rX + mg, d2, rX + rW - mg, d2 + midH);
  brush.set("2H", PENCIL2, pencilWLight()); brush.line(rX + rW - mg, d2, rX + mg, d2 + midH);

  brush.set("2H", PENCIL, random(1.5, 2.5));
  brush.line(doorX - 10, doorY + doorH - 6, doorX + doorW + 10, doorY + doorH - 6);

  // LAYER 3: CRAYON SCRIBBLES
  brush.noFill(); brush.noHatch(); brush.wiggle(8);
  brush.set("2B", "#4A7A5A", crayonW()); brush.line(cx - 80, archSpringY - 20, cx - 30, archSpringY + 15);
  brush.set("2B", "#4A7A5A", crayonW()); brush.line(cx + 20, archSpringY - 10, cx + 70, archSpringY + 20);
  brush.set("2B", "#4A7A5A", crayonW()); brush.line(doorX + 30, archSpringY + 60, doorX + 90, archSpringY + 40);
  brush.set("2B", "#4A7EC2", crayonW()); brush.line(lCx - 60, d1 - 5, lCx - 10, d1 + 10);
  brush.set("2B", "#4A7EC2", crayonW()); brush.line(rCx + 10, d3 - 8, rCx + 60, d3 + 5);
  brush.set("2B", "#C9A832", crayonW()); brush.line(lX + 20, pY + 10, lX + 70, pY - 5);
  brush.set("2B", "#C9A832", crayonW()); brush.line(rX + rW - 70, pBot - 15, rX + rW - 20, pBot + 5);
  brush.wiggle(2);

  // LAYER 4: SECTION FILLS
  brush.noStroke();
  brush.fill("#4010A0", 120); brush.fillBleed(0.4);
  brush.rect(lX + mg + 5, iT + 5, piW - 10, topH - 10);
  brush.fill("#B01008", 110); brush.fillBleed(0.4);
  brush.rect(rX + mg + 5, d2 + 5, piW - 10, midH * 0.3);
  brush.fill("#085868", 130); brush.fillBleed(0.4);
  brush.circle(cx, tCY, tR * 1.6);
  brush.noFill();

  // LAYER 5: THIN PAINT LINES
  brush.set("marker", "#C9A832", 0.8);
  brush.line(doorX + 120, archSpringY + 200, doorX + doorW - 200, doorY + doorH - 300);
  brush.set("marker", "#4A7EC2", 0.7);
  brush.line(doorX + doorW - 100, archSpringY + 160, doorX + 220, doorY + doorH - 250);

  pop();
}

// ===== AUDIO =====
async function initAudio() {
  try {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    analyser = audioCtx.createAnalyser();
    analyser.fftSize = 512;
    analyser.smoothingTimeConstant = 0.7;
    var response = await fetch('bismillah.mp3');
    var buf = await response.arrayBuffer();
    var audioBuffer = await audioCtx.decodeAudioData(buf);
    audioSource = audioCtx.createBufferSource();
    audioSource.buffer = audioBuffer;
    audioSource.connect(analyser);
    analyser.connect(audioCtx.destination);
    timeData = new Uint8Array(analyser.frequencyBinCount);
    freqData = new Uint8Array(analyser.frequencyBinCount);
    audioSource.onended = function() { audioEnded = true; };
    audioSource.start(0);
    audioStartTime = audioCtx.currentTime;
    audioReady = true;
    animStart = millis();
    console.log('Audio started');
  } catch (e) {
    console.log('Audio fallback:', e.message);
  }
}

function getAudioTime() {
  if (audioReady && audioCtx) return audioCtx.currentTime - audioStartTime;
  return (millis() - animStart) / 1000;
}

function getAudioParams() {
  if (audioReady && analyser && !audioEnded) {
    analyser.getByteTimeDomainData(timeData);
    analyser.getByteFrequencyData(freqData);
    var ampSum = 0;
    for (var i = 0; i < timeData.length; i++) ampSum += abs(timeData[i] - 128);
    var amplitude = ampSum / (timeData.length * 128.0);
    var bassSum = 0;
    for (var i = 0; i < 8; i++) bassSum += freqData[i];
    var bass = bassSum / (8 * 255.0);
    var trebleSum = 0, tStart = floor(freqData.length * 0.75);
    for (var i = tStart; i < freqData.length; i++) trebleSum += freqData[i];
    var treble = trebleSum / ((freqData.length - tStart) * 255.0);
    var wSum = 0, fSum = 0;
    for (var i = 0; i < freqData.length; i++) { wSum += freqData[i] * i; fSum += freqData[i]; }
    var centroid = fSum > 0 ? wSum / fSum / freqData.length : 0.5;
    return { amplitude: amplitude, bass: bass, treble: treble, pitch: centroid };
  }
  // Simulated
  var t = (millis() - animStart) / 1000;
  if (!audioEnded) {
    var a = 0.4 + 0.25 * abs(sin(t * 2.5)) + 0.15 * abs(sin(t * 6.3)) + 0.1 * abs(sin(t * 11.7));
    a *= ss(0, 0.5, t);
    if (t > 6) a *= ss(7, 6, t);
    return {
      amplitude: constrain(a, 0.2, 0.95),
      bass: constrain(0.4 + 0.3 * abs(sin(t * 3.0)), 0, 1),
      treble: constrain(0.25 + 0.2 * abs(sin(t * 5.0)), 0, 1),
      pitch: constrain(0.3 + 0.4 * abs(sin(t * 3.8)), 0, 1)
    };
  }
  return {
    amplitude: 0.2 + 0.15 * abs(sin(t * 2.5)),
    bass: 0.25 + 0.2 * abs(sin(t * 2.0)),
    treble: 0.15 + 0.12 * abs(sin(t * 3.5)),
    pitch: 0.4 + 0.25 * sin(t * 1.5)
  };
}

function ss(e0, e1, x) {
  var t = constrain((x - e0) / (e1 - e0), 0, 1);
  return t * t * (3 - 2 * t);
}

function updateTajweedState(audioTime) {
  var DECAY = 0.88, DURATION = 0.5;
  tajweedState.madd *= DECAY;
  tajweedState.ghunna *= DECAY;
  tajweedState.idgham *= DECAY;
  tajweedState.ikhfa *= DECAY;
  tajweedState.qalqalah *= DECAY * 0.8;
  for (var i = 0; i < TAJWEED_EVENTS.length; i++) {
    var ev = TAJWEED_EVENTS[i];
    var dt = audioTime - ev.t;
    if (dt >= 0 && dt < DURATION) {
      var intensity = 1.0 - (dt / DURATION);
      intensity = intensity * intensity;
      tajweedState[ev.rule] = max(tajweedState[ev.rule], intensity);
    }
  }
  wordsRevealed = 0;
  for (var i = 0; i < WORDS.length; i++) {
    if (audioTime >= WORDS[i].start) wordsRevealed = i + 1;
  }
}

// ═══════════════════════════════════════════════════════════════
// DRAW — The painting is on the wall. The light changes.
// ═══════════════════════════════════════════════════════════════
function draw() {
  // Frame 1: capture the door painting as an image
  if (!doorCaptured) {
    // Door was rendered in setup — capture it now
    doorImg = get();
    doorCaptured = true;
    console.log('Door captured: ' + doorImg.width + 'x' + doorImg.height);
    // If capture failed (0x0), we'll re-render next frame
    if (doorImg.width === 0) {
      doorCaptured = false;
      renderDoor();
    }
    return;
  }

  // Safety: if image still empty, keep trying
  if (!doorImg || doorImg.width === 0) {
    renderDoor();
    doorImg = get();
    console.log('Re-capture: ' + doorImg.width + 'x' + doorImg.height);
    return;
  }

  var t = (millis() - animStart) / 1000;
  var audioTime = getAudioTime();
  var p = getAudioParams();

  // Smooth audio
  sAmp = lerp(sAmp, p.amplitude, 0.22);
  sBass = lerp(sBass, p.bass, 0.15);
  sTreble = lerp(sTreble, p.treble, 0.18);
  sPitch = lerp(sPitch, p.pitch, 0.12);
  updateTajweedState(audioTime);

  // ── CREAM BACKGROUND (the wall) ──
  background(242, 234, 218);

  // ── THE PAINTING with subtle lighting modulation ──
  push();

  // Amplitude → very subtle breathing scale
  var breathScale = 1.0 + sAmp * 0.02;

  // Qalqalah → tiny staccato scale snap
  var qPulse = 1.0 + tajweedState.qalqalah * 0.04;

  // Madd → slight horizontal elongation
  var maddX = 1.0 + tajweedState.madd * 0.025;
  var maddY = 1.0 - tajweedState.madd * 0.008;

  // Gentle sway — like the viewer breathing
  var sway = sin(t * 1.5) * 0.004 + sAmp * sin(t * 3) * 0.006;
  rotate(sway);

  // Combined scale
  scale(breathScale * qPulse * maddX, breathScale * qPulse * maddY);

  // COLOR TEMPERATURE — the "lighting" (warm golden vs cool blue)
  var warmth = sPitch;
  var tR = lerp(235, 255, warmth);   // cool: slightly blue-ish → warm: full white-warm
  var tG = lerp(240, 252, warmth);
  var tB = lerp(255, 230, warmth);   // cool: blue tint → warm: less blue

  // Ikhfa → the painting becomes slightly translucent (veil of concealment)
  var doorAlpha = 255 - tajweedState.ikhfa * 50;

  tint(tR, tG, tB, doorAlpha);
  imageMode(CORNER);
  image(doorImg, -width / 2, -height / 2, width, height);
  pop();
  noTint();

  // ═══════════════════════════════════════════════════════════
  // SUBTLE OVERLAYS — like light playing on the wall
  // Total overlay alpha should NEVER exceed ~40 combined
  // ═══════════════════════════════════════════════════════════

  // Ghunna: soft warm glow near the arch (nasalization = dreamy haze)
  if (tajweedState.ghunna > 0.05) {
    push();
    noStroke();
    var ga = tajweedState.ghunna * 20;
    fill(255, 240, 215, ga);
    ellipse(0, -350, 500 + sin(t * 1.3) * 30, 350 + sin(t * 0.9) * 20);
    fill(255, 235, 200, ga * 0.5);
    ellipse(0, 0, 400, 500);
    pop();
  }

  // Idgham: wash zones blend — subtle gradient band between zones
  if (tajweedState.idgham > 0.05) {
    push();
    translate(-width / 2, -height / 2);
    noStroke();
    var ia = tajweedState.idgham * 18;
    // Blend band between lapis and gold
    for (var i = 0; i < 5; i++) {
      var frac = i / 5;
      var r = lerp(16, 200, frac);
      var g = lerp(64, 136, frac);
      var b = lerp(160, 0, frac);
      fill(r, g, b, ia * (1 - abs(frac - 0.5) * 2));
      rect(DX + 60, 650 + i * 20, DW - 120, 20);
    }
    pop();
  }

  // Madd: horizontal stretch accents — thin golden lines extend
  if (tajweedState.madd > 0.05) {
    push();
    translate(-width / 2, -height / 2);
    stroke(200, 170, 80, tajweedState.madd * 30);
    strokeWeight(1);
    noFill();
    for (var i = 0; i < 3; i++) {
      var yy = SPRING_Y - 150 + i * 60;
      var extW = 200 + tajweedState.madd * 250;
      line(CX - extW / 2, yy, CX + extW / 2, yy);
    }
    pop();
  }

  // Ikhfa: translucent cream veil (concealment)
  if (tajweedState.ikhfa > 0.05) {
    push();
    noStroke();
    fill(242, 234, 218, tajweedState.ikhfa * 40);
    rect(-width / 2, -height / 2, width, height);
    pop();
  }

  // Qalqalah: expanding ring from door center (bouncing)
  if (tajweedState.qalqalah > 0.05) {
    push();
    noFill();
    var qa = tajweedState.qalqalah;
    stroke(200, 180, 120, qa * 50);
    strokeWeight(1.5 * qa);
    var ringR = (1 - qa) * 300 + 50;
    ellipse(0, -150, ringR * 2, ringR * 2.2);
    // Second ring
    stroke(200, 180, 120, qa * 25);
    strokeWeight(1);
    ellipse(0, -150, ringR * 2.8, ringR * 3.1);
    pop();
  }

  // Progressive reveal: subtle glowing accents at word timestamps
  if (wordsRevealed >= 1) {
    push(); translate(-width / 2, -height / 2);
    noStroke();
    fill(16, 64, 160, 12 + sAmp * 8);
    ellipse(CX, 280, 120 + sin(t * 1.8) * 15, 100 + sin(t * 1.8) * 10);
    pop();
  }
  if (wordsRevealed >= 2) {
    push(); translate(-width / 2, -height / 2);
    noFill();
    stroke(200, 160, 60, 15 + sAmp * 10);
    strokeWeight(1.5);
    beginShape();
    for (var i = 0; i <= 40; i++) {
      var frac = i / 40;
      var angle = PI + frac * PI;
      vertex(CX + cos(angle) * 350, SPRING_Y - 50 + sin(angle) * 250);
    }
    endShape();
    pop();
  }
  if (wordsRevealed >= 3) {
    push(); translate(-width / 2, -height / 2);
    noStroke();
    fill(64, 16, 120, 8 + sAmp * 6);
    rect(DX + 50, SPRING_Y + 80, DW / 2 - 80, 500);
    pop();
  }
  if (wordsRevealed >= 4) {
    push(); translate(-width / 2, -height / 2);
    noStroke();
    fill(120, 16, 16, 8 + sAmp * 6);
    rect(CX + 30, SPRING_Y + 80, DW / 2 - 80, 500);
    // Threshold glow
    fill(200, 160, 60, 12 + sAmp * 8);
    rect(DX, DY + DH - 50, DW, 30);
    pop();
  }

  // Gold dust particles — very subtle, floating upward
  push();
  noStroke();
  for (var i = 0; i < particles.length; i++) {
    var pt = particles[i];
    pt.y -= pt.spd * (0.5 + sAmp * 1.0);
    pt.x += pt.drift + sin(t * 0.5 + pt.phase) * 0.3;
    if (pt.y < -height / 2 - 20) {
      pt.y = height / 2 + random(10, 50);
      pt.x = random(-440, 440);
    }
    var a = pt.alpha * (0.4 + 0.6 * sin(t * 3 + pt.phase * 5));
    if (a > 1) {
      fill(220, 195, 110, a);
      ellipse(pt.x, pt.y, pt.sz, pt.sz);
    }
  }
  pop();

  // Subtle edge vignette — just darkened corners
  push();
  noStroke();
  for (var i = 0; i < 4; i++) {
    var frac = i / 4;
    var a = 6 * (1 - frac);
    if (a < 1) continue;
    fill(30, 25, 15, a);
    var inset = frac * 150;
    rect(-width / 2, -height / 2, width, inset);                 // top
    rect(-width / 2, height / 2 - inset, width, inset);          // bottom
    rect(-width / 2, -height / 2 + inset, inset, height - 2 * inset); // left
    rect(width / 2 - inset, -height / 2 + inset, inset, height - 2 * inset); // right
  }
  pop();
}

// ===== INTERACTION =====
function mousePressed() { if (!audioReady) initAudio(); }

// ===== DOOR GEOMETRY HELPERS =====
function drawFrameVaried(x, y, w, h, col, wMin, wMax) {
  brush.set("2H", col, random(wMin, wMax)); brush.line(x, y, x + w, y);
  brush.set("2H", col, random(wMin, wMax)); brush.line(x + w, y, x + w, y + h);
  brush.set("2H", col, random(wMin, wMax)); brush.line(x + w, y + h, x, y + h);
  brush.set("2H", col, random(wMin, wMax)); brush.line(x, y + h, x, y);
}
function drawPointedArch(cx, springY, halfW, leftCx, rightCx, R, col, weight) {
  var steps = 50;
  for (var i = 0; i < steps; i++) {
    var t1 = i / steps, t2 = (i + 1) / steps;
    var pm = 0.4 + 1.6 * sin(PI * t1);
    brush.set("2H", col, constrain(weight * pm * random(0.6, 1.4), 0.3, 2.5));
    var x1 = (cx - halfW) + halfW * t1, x2 = (cx - halfW) + halfW * t2;
    var y1 = springY - sqrt(max(0, R * R - pow(x1 - leftCx, 2)));
    var y2 = springY - sqrt(max(0, R * R - pow(x2 - leftCx, 2)));
    brush.line(x1, y1, x2, y2);
  }
  for (var i = 0; i < steps; i++) {
    var t1 = i / steps, t2 = (i + 1) / steps;
    var pm = 0.4 + 1.6 * sin(PI * t1);
    brush.set("2H", col, constrain(weight * pm * random(0.6, 1.4), 0.3, 2.5));
    var x1 = cx + halfW * t1, x2 = cx + halfW * t2;
    var y1 = springY - sqrt(max(0, R * R - pow(x1 - rightCx, 2)));
    var y2 = springY - sqrt(max(0, R * R - pow(x2 - rightCx, 2)));
    brush.line(x1, y1, x2, y2);
  }
}
