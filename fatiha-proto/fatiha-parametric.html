<!-- بسم الله الرحمن الرحيم -->
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Fatiha — Parametric Door</title>
<style>
  * { margin: 0; padding: 0; }
  body { background: #0a0a10; overflow: hidden; display: flex; align-items: center; justify-content: center; height: 100vh; }
  canvas { display: block; max-width: 100vw; max-height: 100vh; }
  #tap { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; z-index: 10; cursor: pointer; }
  #tap span { color: rgba(255,255,255,0.4); font: 16px Georgia, serif; }
</style>
</head>
<body>
<div id="tap"><span>tap to begin</span></div>
<canvas id="c"></canvas>
<script>
const W = 1080, H = 1920;
const canvas = document.getElementById('c');
canvas.width = W; canvas.height = H;
const ctx = canvas.getContext('2d');

// Tajweed events (Bismillah timing)
const TAJWEED = [
  {t:0.05, rule:'start'},
  {t:0.35, rule:'madd'}, {t:0.45, rule:'ghunna'},
  {t:0.55, rule:'madd'}, {t:0.95, rule:'ikhfa'},
  {t:1.05, rule:'madd'}, {t:1.15, rule:'ghunna'}, {t:1.25, rule:'idgham'},
  {t:1.35, rule:'madd'},
  {t:2.15, rule:'madd'}, {t:2.25, rule:'ghunna'}, {t:2.35, rule:'idgham'},
  {t:2.65, rule:'madd'}, {t:2.85, rule:'ikhfa'},
  {t:3.15, rule:'madd'}, {t:3.25, rule:'ghunna'}, {t:3.35, rule:'idgham'},
  {t:3.95, rule:'madd'}, {t:4.05, rule:'ghunna'},
  {t:4.35, rule:'madd'}, {t:4.55, rule:'ikhfa'},
  {t:4.75, rule:'madd'}, {t:4.85, rule:'ghunna'},
  {t:5.15, rule:'madd'}, {t:5.50, rule:'end'}
];

// Audio
let audioCtx, analyser, audioBuffer, audioSource, audioStartTime = 0;
let isPlaying = false;
let freqData, timeData;

// Load bismillah.mp3
async function loadAudio() {
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  analyser = audioCtx.createAnalyser();
  analyser.fftSize = 256;
  analyser.smoothingTimeConstant = 0.8;
  freqData = new Uint8Array(analyser.frequencyBinCount);
  timeData = new Uint8Array(analyser.fftSize);
  
  const resp = await fetch('bismillah.mp3');
  const buf = await resp.arrayBuffer();
  audioBuffer = await audioCtx.decodeAudioData(buf);
}

function startAudio() {
  if (isPlaying) return;
  audioSource = audioCtx.createBufferSource();
  audioSource.buffer = audioBuffer;
  audioSource.connect(analyser);
  analyser.connect(audioCtx.destination);
  audioSource.start(0);
  audioStartTime = audioCtx.currentTime;
  isPlaying = true;
  audioSource.onended = () => { isPlaying = false; };
}

function getAudioTime() {
  if (!isPlaying) return -1;
  return audioCtx.currentTime - audioStartTime;
}

function getAmplitude() {
  if (!analyser || !isPlaying) return 0;
  analyser.getByteTimeDomainData(timeData);
  let sum = 0;
  for (let i = 0; i < timeData.length; i++) sum += Math.abs(timeData[i] - 128);
  return sum / timeData.length / 128;
}

function getBass() {
  if (!analyser || !isPlaying) return 0;
  analyser.getByteFrequencyData(freqData);
  let sum = 0;
  for (let i = 0; i < 8; i++) sum += freqData[i];
  return sum / 8 / 255;
}

function getTreble() {
  if (!analyser || !isPlaying) return 0;
  analyser.getByteFrequencyData(freqData);
  let sum = 0;
  const n = freqData.length;
  for (let i = n - 16; i < n; i++) sum += freqData[i];
  return sum / 16 / 255;
}

function getActiveTajweed(t) {
  // Return active tajweed rules within 0.4s window
  const active = {};
  for (const ev of TAJWEED) {
    const dt = t - ev.t;
    if (dt >= 0 && dt < 0.4) {
      const intensity = 1 - dt / 0.4; // fade out
      active[ev.rule] = Math.max(active[ev.rule] || 0, intensity);
    }
  }
  return active;
}

// ============================================================
// BASE PAINTING — draw once, capture as image
// ============================================================
let baseImage = null;

function drawBasePainting() {
  // Cream paper
  ctx.fillStyle = '#f2eada';
  ctx.fillRect(0, 0, W, H);
  
  const cx = W/2, doorW = 860, doorH = 1760;
  const doorX = (W - doorW)/2, doorY = (H - doorH)/2;
  const archSpringY = doorY + 500;
  
  // Watercolor washes — simulated with radial gradients + noise
  function wash(x, y, w, h, color, opacity) {
    ctx.save();
    ctx.globalAlpha = opacity;
    const grd = ctx.createRadialGradient(x+w/2, y+h/2, 0, x+w/2, y+h/2, Math.max(w,h)*0.6);
    grd.addColorStop(0, color);
    grd.addColorStop(0.7, color + '80');
    grd.addColorStop(1, color + '00');
    ctx.fillStyle = grd;
    ctx.fillRect(x-20, y-20, w+40, h+40);
    ctx.restore();
  }
  
  wash(doorX+40, doorY+60, doorW*0.55, 550, '#1040A0', 0.35);
  wash(doorX+80, archSpringY-50, doorW*0.5, 400, '#C88800', 0.3);
  wash(doorX+60, archSpringY+450, doorW*0.55, 550, '#105830', 0.35);
  wash(doorX+doorW*0.3, doorY+200, 300, 300, '#B01008', 0.2);
  wash(doorX+100, archSpringY+200, 350, 350, '#085868', 0.25);
  
  // Pencil door geometry
  ctx.strokeStyle = '#9a908080';
  ctx.lineWidth = 1.5;
  ctx.lineCap = 'round';
  
  // Outer frame
  ctx.strokeRect(doorX, archSpringY, doorW, doorY+doorH-archSpringY);
  
  // Pointed arch
  ctx.beginPath();
  const halfW = doorW/2;
  const centerOffset = halfW * 0.6;
  const arcR = halfW + centerOffset;
  for (let i = 0; i <= 50; i++) {
    const t = i/50;
    const x = (cx - halfW) + halfW * t;
    const dx = x - (cx + centerOffset);
    const y = archSpringY - Math.sqrt(Math.max(0, arcR*arcR - dx*dx));
    i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  }
  for (let i = 0; i <= 50; i++) {
    const t = i/50;
    const x = cx + halfW * t;
    const dx = x - (cx - centerOffset);
    const y = archSpringY - Math.sqrt(Math.max(0, arcR*arcR - dx*dx));
    ctx.lineTo(x, y);
  }
  ctx.stroke();
  
  // Center divider
  ctx.beginPath();
  ctx.moveTo(cx, archSpringY);
  ctx.lineTo(cx, doorY + doorH);
  ctx.stroke();
  
  // Panel rectangles
  const panels = [
    [doorX+16, archSpringY+18, cx-14-doorX-16, doorY+doorH-25-archSpringY-18],
    [cx+14, archSpringY+18, doorX+doorW-16-cx-14, doorY+doorH-25-archSpringY-18]
  ];
  panels.forEach(([x,y,w,h]) => {
    ctx.strokeRect(x, y, w, h);
    ctx.strokeRect(x+14, y+14, w-28, h-28);
  });
  
  // Cross lines in panels
  ctx.strokeStyle = '#b0a89840';
  ctx.lineWidth = 0.8;
  panels.forEach(([x,y,w,h]) => {
    ctx.beginPath(); ctx.moveTo(x+26,y+26); ctx.lineTo(x+w-26,y+h-26); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(x+w-26,y+26); ctx.lineTo(x+26,y+h-26); ctx.stroke();
  });
  
  // Rosette circles
  ctx.strokeStyle = '#b0a89830';
  panels.forEach(([x,y,w,h]) => {
    const pcx = x+w/2, pcy = y+h*0.3;
    ctx.beginPath(); ctx.arc(pcx, pcy, w*0.3, 0, Math.PI*2); ctx.stroke();
    const pcy2 = y+h*0.7;
    ctx.beginPath(); ctx.arc(pcx, pcy2, w*0.3, 0, Math.PI*2); ctx.stroke();
  });
  
  // Section fills — jewel spots
  wash(doorX+42, archSpringY+40, 200, 180, '#4010A0', 0.3);
  wash(cx+40, archSpringY+400, 200, 200, '#B01008', 0.25);
  
  // Thin accent lines
  ctx.strokeStyle = '#C9A83240';
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(doorX+120, archSpringY+200); ctx.lineTo(doorX+doorW-200, doorY+doorH-300); ctx.stroke();
  ctx.strokeStyle = '#4A7EC240';
  ctx.beginPath(); ctx.moveTo(doorX+doorW-100, archSpringY+160); ctx.lineTo(doorX+220, doorY+doorH-250); ctx.stroke();
  
  // Capture as image
  baseImage = ctx.getImageData(0, 0, W, H);
}

// ============================================================
// ANIMATION LOOP
// ============================================================
let frame = 0;

function animate() {
  requestAnimationFrame(animate);
  frame++;
  
  const t = getAudioTime();
  const amp = getAmplitude();
  const bass = getBass();
  const treble = getTreble();
  const taj = getActiveTajweed(Math.max(0, t));
  
  // Ambient oscillation (always active)
  const ambientBreath = 0.5 + 0.5 * Math.sin(frame * 0.03);
  const ambientSlow = 0.5 + 0.5 * Math.sin(frame * 0.008);
  
  // Effective amplitude (audio + ambient)
  const effectiveAmp = isPlaying ? amp + 0.1 : ambientBreath * 0.3 + 0.05;
  
  // Draw base painting
  ctx.putImageData(baseImage, 0, 0);
  
  // === PARAMETRIC OVERLAYS ===
  
  // 1. BREATHING SCALE — pulse with amplitude (DRAMATIC)
  const breathScale = 1.0 + effectiveAmp * 0.25 + Math.sin(frame * 0.04) * 0.03;
  
  // 2. COLOR TEMPERATURE — bass=warm, treble=cool (DRAMATIC)
  const warmth = isPlaying ? bass * 0.8 + 0.1 : ambientSlow * 0.2;
  const coolness = isPlaying ? treble * 0.6 : ambientBreath * 0.1;
  
  // 3. TAJWEED EFFECTS
  const maddStretch = (taj.madd || 0);
  const ghunnaBlur = (taj.ghunna || 0);
  const idghamMerge = (taj.idgham || 0);
  const ikhfaFade = (taj.ikhfa || 0);
  
  // Apply scale breathing via transform
  ctx.save();
  ctx.translate(W/2, H/2);
  ctx.scale(breathScale, breathScale + maddStretch * 0.05);
  ctx.translate(-W/2, -H/2);
  ctx.drawImage(canvas, 0, 0); // redraw scaled version on top
  ctx.restore();
  
  // Warm color overlay (bass-reactive)
  if (warmth > 0.01) {
    ctx.save();
    ctx.globalAlpha = warmth * 0.15;
    ctx.fillStyle = '#c4602020';
    const grd = ctx.createRadialGradient(W/2, H*0.4, 100, W/2, H*0.4, H*0.5);
    grd.addColorStop(0, `rgba(196, 96, 32, ${warmth * 0.3})`);
    grd.addColorStop(1, 'rgba(196, 96, 32, 0)');
    ctx.fillStyle = grd;
    ctx.fillRect(0, 0, W, H);
    ctx.restore();
  }
  
  // Cool color overlay (treble-reactive)
  if (coolness > 0.01) {
    ctx.save();
    ctx.globalAlpha = coolness * 0.12;
    const grd = ctx.createRadialGradient(W/2, H*0.5, 100, W/2, H*0.5, H*0.4);
    grd.addColorStop(0, `rgba(30, 60, 180, ${coolness * 0.25})`);
    grd.addColorStop(1, 'rgba(30, 60, 180, 0)');
    ctx.fillStyle = grd;
    ctx.fillRect(0, 0, W, H);
    ctx.restore();
  }
  
  // GHUNNA — soft glow blur (simulated with large semi-transparent circle)
  if (ghunnaBlur > 0.05) {
    ctx.save();
    ctx.globalAlpha = ghunnaBlur * 0.5;
    const grd = ctx.createRadialGradient(W/2, H*0.4, 0, W/2, H*0.4, H*0.35);
    grd.addColorStop(0, 'rgba(255, 240, 220, 0.3)');
    grd.addColorStop(1, 'rgba(255, 240, 220, 0)');
    ctx.fillStyle = grd;
    ctx.fillRect(0, 0, W, H);
    ctx.restore();
  }
  
  // IDGHAM — two color zones merge (overlay gradient)
  if (idghamMerge > 0.05) {
    ctx.save();
    ctx.globalAlpha = idghamMerge * 0.4;
    ctx.globalCompositeOperation = 'overlay';
    const grd = ctx.createLinearGradient(0, 0, W, H);
    grd.addColorStop(0, '#1a3a8a');
    grd.addColorStop(1, '#c43020');
    ctx.fillStyle = grd;
    ctx.fillRect(0, 0, W, H);
    ctx.restore();
  }
  
  // IKHFA — fade/translucency (lighten overlay)
  if (ikhfaFade > 0.05) {
    ctx.save();
    ctx.globalAlpha = ikhfaFade * 0.45;
    ctx.fillStyle = '#f2eada';
    ctx.fillRect(0, 0, W, H);
    ctx.restore();
  }
  
  // MADD — radial expansion pulse
  if (maddStretch > 0.05) {
    ctx.save();
    ctx.globalAlpha = maddStretch * 0.3;
    ctx.strokeStyle = '#c4a040';
    ctx.lineWidth = 2;
    const r = 100 + maddStretch * 200;
    ctx.beginPath();
    ctx.arc(W/2, H*0.4, r, 0, Math.PI*2);
    ctx.stroke();
    ctx.restore();
  }
  
  // Breathing vignette — always active, modulated by amplitude
  const vigAlpha = 0.15 + effectiveAmp * 0.3;
  ctx.save();
  const vig = ctx.createRadialGradient(W/2, H*0.45, H*0.25, W/2, H*0.45, H*0.6);
  vig.addColorStop(0, 'rgba(0,0,0,0)');
  vig.addColorStop(1, `rgba(10,10,16,${vigAlpha})`);
  ctx.fillStyle = vig;
  ctx.fillRect(0, 0, W, H);
  ctx.restore();
  
  // Subtle geometric pulse — rotating triangle at tajweed events
  const anyTajweed = Object.values(taj).some(v => v > 0.1);
  if (anyTajweed) {
    ctx.save();
    ctx.translate(W/2, H*0.4);
    ctx.rotate(frame * 0.02);
    ctx.globalAlpha = 0.2;
    ctx.strokeStyle = '#c4a040';
    ctx.lineWidth = 1;
    const r = 150 + effectiveAmp * 100;
    ctx.beginPath();
    for (let i = 0; i < 7; i++) {
      const a = (i/7) * Math.PI * 2;
      const x = Math.cos(a) * r, y = Math.sin(a) * r;
      i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    }
    ctx.closePath();
    ctx.stroke();
    ctx.restore();
  }
}

// ============================================================
// INIT
// ============================================================
async function init() {
  await loadAudio();
  drawBasePainting();
  
  document.getElementById('tap').addEventListener('click', () => {
    document.getElementById('tap').style.display = 'none';
    if (audioCtx.state === 'suspended') audioCtx.resume();
    startAudio();
  });
  
  animate();
}

init();
</script>
</body>
</html>
