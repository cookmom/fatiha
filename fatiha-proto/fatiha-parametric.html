<!-- بسم الله الرحمن الرحيم -->
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Fatiha — Meditative Door</title>
<script src="https://cdn.jsdelivr.net/npm/p5@2.0.3/lib/p5.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/p5.brush@2.0.2-beta"></script>
<style>
  * { margin: 0; padding: 0; }
  body { background: #f2eada; overflow: hidden; }
  #tap { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; z-index: 10; cursor: pointer; }
  #tap span { color: rgba(100,90,70,0.4); font: 16px Georgia, serif; }
</style>
</head>
<body>
<div id="tap"><span>tap to begin</span></div>
<script>
var audioCtx, analyser, audioBuffer, freqData, timeData;
var isPlaying = false, smoothAmp = 0;
async function loadAudio() {
  try {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    analyser = audioCtx.createAnalyser(); analyser.fftSize = 256; analyser.smoothingTimeConstant = 0.92;
    freqData = new Uint8Array(analyser.frequencyBinCount); timeData = new Uint8Array(analyser.fftSize);
    var resp = await fetch('bismillah.mp3'); if (!resp.ok) throw new Error('no audio');
    audioBuffer = await audioCtx.decodeAudioData(await resp.arrayBuffer());
  } catch(e) { console.warn('Audio unavailable:', e.message); }
}
function startAudio() {
  if (isPlaying || !audioBuffer) return;
  var src = audioCtx.createBufferSource(); src.buffer = audioBuffer;
  src.connect(analyser); analyser.connect(audioCtx.destination); src.start(0);
  isPlaying = true; src.onended = function() { isPlaying = false; };
}
function getAmp() {
  if (!isPlaying || !timeData) return 0;
  analyser.getByteTimeDomainData(timeData);
  var s = 0; for (var i = 0; i < timeData.length; i++) s += Math.abs(timeData[i] - 128);
  return s / timeData.length / 128;
}

var W = 1080, H = 1920, cx = W / 2;
var doorW = 720, doorH = 1500;
var doorX = (W - doorW) / 2, doorY = (H - doorH) / 2 + 80;
var archSpringY = doorY + 380, bot = doorY + doorH, halfDW = doorW / 2;
var panelTop = archSpringY + 15, panelBot = bot - 15, panelH = panelBot - panelTop;

function archY(x) {
  var co = halfDW * 0.55, R = halfDW + co;
  if (x <= cx) { var dx = x - (cx + co); var v = R*R - dx*dx; return v > 0 ? archSpringY - Math.sqrt(v) : archSpringY; }
  else { var dx = x - (cx - co); var v = R*R - dx*dx; return v > 0 ? archSpringY - Math.sqrt(v) : archSpringY; }
}
var archPts = [];
for (var ai = 0; ai <= 40; ai++) { var ax = doorX + (doorW * ai / 40); archPts.push([ax, archY(ax)]); }

function makePetalPoly(bx, by, ang, len, wid, curv) {
  var pts = [], n = 8, ca = Math.cos(ang), sa = Math.sin(ang);
  for (var i = 0; i <= n; i++) {
    var t = i/n, w = Math.sin(t * Math.PI);
    var along = t * len, across = w * wid * 0.5;
    var co = curv * Math.sin(t * Math.PI) * len * 0.08;
    pts.push([bx + along*ca - (across+co)*sa, by + along*sa + (across+co)*ca]);
  }
  for (var i = n; i >= 0; i--) {
    var t = i/n, w = Math.sin(t * Math.PI);
    var along = t * len, across = -w * wid * 0.5;
    var co = curv * Math.sin(t * Math.PI) * len * 0.08;
    pts.push([bx + along*ca - (across+co)*sa, by + along*sa + (across+co)*ca]);
  }
  return pts;
}

function makeSazLeafPoly(bx, by, ang, len, wid, curv) {
  var pts = [], n = 10, ca = Math.cos(ang), sa = Math.sin(ang);
  for (var i = 0; i <= n; i++) {
    var t = i/n, w;
    if (t < 0.15) w = t / 0.15 * 0.4;
    else if (t < 0.5) w = 0.4 + (t - 0.15) / 0.35 * 0.6;
    else if (t < 0.85) w = 1.0 - (t - 0.5) * 1.0;
    else w = Math.max(0, (1 - t) / 0.15 * 0.15);
    w = Math.max(0, w + 0.05 * Math.sin(t * 6 * Math.PI));
    var along = t * len, across = w * wid * 0.5;
    var sc = curv * Math.sin(t * Math.PI * 1.2) * len * 0.06;
    pts.push([bx + along*ca - (across+sc)*sa, by + along*sa + (across+sc)*ca]);
  }
  for (var i = n; i >= 0; i--) {
    var t = i/n, w;
    if (t < 0.15) w = t / 0.15 * 0.4;
    else if (t < 0.5) w = 0.4 + (t - 0.15) / 0.35 * 0.6;
    else if (t < 0.85) w = 1.0 - (t - 0.5) * 1.0;
    else w = Math.max(0, (1 - t) / 0.15 * 0.15);
    w = Math.max(0, w + 0.05 * Math.sin(t * 6 * Math.PI));
    var along = t * len, across = -w * wid * 0.5;
    var sc = curv * Math.sin(t * Math.PI * 1.2) * len * 0.06;
    pts.push([bx + along*ca - (across+sc)*sa, by + along*sa + (across+sc)*ca]);
  }
  return pts;
}

var flowerElements = [], flowerIdx = 0;
var flowerGroups = [], flowerGroupIdx = 0;
// CHANGE 1: washes 30-58, pencil starts 60, flowers start 100, reach peak ~400
var PENCIL_END = 360, FLOWER_START = 100, FLOWER_INTERVAL = 19;
var setupDone = false;

// CHANGE 2: Growth paths — bottom center splits left+right, climbs frame, meets at peak
function leftPathPos(t) {
  // t=0: bottom of left jamb, t~0.65: left spring, t=1: arch peak
  if (t < 0.65) {
    var jt = t / 0.65;
    return {x: doorX - 5, y: bot - jt * (bot - archSpringY)};
  } else {
    var at = (t - 0.65) / 0.35;
    var idx = Math.min(20, Math.floor(at * 20));
    return {x: archPts[idx][0], y: archPts[idx][1] - 10};
  }
}
function rightPathPos(t) {
  if (t < 0.65) {
    var jt = t / 0.65;
    return {x: doorX + doorW + 5, y: bot - jt * (bot - archSpringY)};
  } else {
    var at = (t - 0.65) / 0.35;
    var idx = Math.max(20, 40 - Math.floor(at * 20));
    return {x: archPts[idx][0], y: archPts[idx][1] - 10};
  }
}

function buildRose(px, py, s, cols) {
  var roseGroup = [];
  // APPROVED RECIPE: 3 rings (5+5+4), from CENTER (no gap), fillBleed 'in'
  var rings = [
    {count:5, len:45*s, w:14*s, color:cols.outer, opacity:100},
    {count:5, len:35*s, w:12*s, color:cols.mid, opacity:110},
    {count:4, len:25*s, w:10*s, color:cols.inner, opacity:120},
  ];
  for (var r = 0; r < rings.length; r++) {
    var ring = rings[r], angleOff = r * 0.3;
    for (var p = 0; p < ring.count; p++) {
      var angle = (p / ring.count) * Math.PI * 2 + angleOff + (Math.random()-0.5)*0.15;
      var pts = makePetalPoly(px, py, angle, ring.len, ring.w, 0.3);
      var el = {color: ring.color, opacity: ring.opacity, polygon: pts, bleedDir: 'in'};
      flowerElements.push(el);
      roseGroup.push(el);
    }
  }
  var centerPoly = makePetalPoly(px, py, Math.random()*Math.PI*2, 12*s, 8*s, 0.4);
  var centerEl = {color:'#c4a040', opacity:170, polygon: centerPoly, bleedDir:'out'};
  flowerElements.push(centerEl);
  roseGroup.push(centerEl);
  return roseGroup;
}

function buildLeaf(px, py, ang, s) {
  var pts = makeSazLeafPoly(px, py, ang, 65*s, 16*s, 0.5);
  var el = {color:'#1a4a2e', opacity:100, polygon:pts, bleedDir:'in'};
  flowerElements.push(el);
  return [el];
}

function buildFlowers() {
  // Growth path: flowers placed along left+right paths, ordered bottom→top
  // Interleaved: left→right→left→right climbing the frame
  var rc1 = {outer:'#6a1020', mid:'#a02040', inner:'#e06080'};
  var rc2 = {outer:'#7a1828', mid:'#b03050', inner:'#e87090'};

  // 1. Bottom center rose
  flowerGroups.push(buildRose(cx, bot + 10, 0.9, rc1));

  // 2-3. Bottom leaves splitting left and right
  flowerGroups.push(buildLeaf(cx - 100, bot + 15, -1.2, 0.75));
  flowerGroups.push(buildLeaf(cx + 100, bot + 15, Math.PI + 1.2, 0.75));

  // 4-5. Lower roses (t=0.15 — about 1/3 up the jambs)
  var lp1 = leftPathPos(0.15), rp1 = rightPathPos(0.15);
  flowerGroups.push(buildRose(lp1.x, lp1.y, 0.7, rc1));
  flowerGroups.push(buildRose(rp1.x, rp1.y, 0.7, rc2));

  // 6-7. Lower leaves (t=0.3)
  var ll1 = leftPathPos(0.3), rl1 = rightPathPos(0.3);
  flowerGroups.push(buildLeaf(ll1.x - 10, ll1.y, -0.5, 0.7));
  flowerGroups.push(buildLeaf(rl1.x + 10, rl1.y, Math.PI + 0.5, 0.7));

  // 8-9. Mid roses (t=0.45 — about 2/3 up the jambs)
  var lp2 = leftPathPos(0.45), rp2 = rightPathPos(0.45);
  flowerGroups.push(buildRose(lp2.x, lp2.y, 0.8, rc2));
  flowerGroups.push(buildRose(rp2.x, rp2.y, 0.8, rc1));

  // 10-11. Upper leaves (t=0.6 — near arch spring)
  var ll2 = leftPathPos(0.6), rl2 = rightPathPos(0.6);
  flowerGroups.push(buildLeaf(ll2.x - 10, ll2.y, -0.3, 0.8));
  flowerGroups.push(buildLeaf(rl2.x + 10, rl2.y, Math.PI + 0.3, 0.8));

  // 12-13. Arch roses (t=0.8 — climbing the arch)
  var lp3 = leftPathPos(0.8), rp3 = rightPathPos(0.8);
  flowerGroups.push(buildRose(lp3.x, lp3.y, 0.85, rc1));
  flowerGroups.push(buildRose(rp3.x, rp3.y, 0.85, rc2));

  // 14-15. Arch leaves near peak (t=0.92)
  var ll3 = leftPathPos(0.92), rl3 = rightPathPos(0.92);
  flowerGroups.push(buildLeaf(ll3.x, ll3.y - 10, -0.8, 0.9));
  flowerGroups.push(buildLeaf(rl3.x, rl3.y - 10, 0.8, 0.9));

  // 16. Peak rose
  flowerGroups.push(buildRose(cx, archPts[20][1] - 30, 1.0, rc1));

  // Compute interval: spread 16 groups from FLOWER_START to ~frame 400
  FLOWER_INTERVAL = Math.max(1, Math.floor((400 - FLOWER_START) / flowerGroups.length));
}

function buildWashes() {
  // CHANGE 1: washes start at frame 30, spaced ~7 frames apart (30-58)
  return [
    {frame:30, color:'#0D3B8E', opacity:80, bleed:0.5, x:doorX+20, y:doorY-10, w:doorW-40, h:archSpringY-doorY+80},
    {frame:37, color:'#B8860B', opacity:70, bleed:0.45, x:doorX+30, y:archSpringY-30, w:doorW-60, h:300},
    {frame:44, color:'#0E4D2E', opacity:80, bleed:0.5, x:doorX+20, y:archSpringY+350, w:doorW-40, h:panelBot-archSpringY-320},
    {frame:51, color:'#3A0C6E', opacity:100, bleed:0.35, x:doorX+50, y:panelTop+panelH*0.15, w:halfDW-80, h:panelH*0.25},
    {frame:58, color:'#8B1A1A', opacity:90, bleed:0.3, x:cx+30, y:panelTop+panelH*0.55, w:halfDW-80, h:panelH*0.25}
  ];
}

var washSchedule, washIdx = 0;

function setup() {
  createCanvas(W, H, WEBGL); brush.load(); frameRate(30);
  brush.addField('meditative', function(t, field) {
    for (var i = 0; i < field.length; i++)
      for (var j = 0; j < field[i].length; j++)
        field[i][j] = 100*Math.sin(i*0.012+t*0.4)+50*Math.cos(j*0.008+t*0.25)+30*Math.sin((i+j)*0.006+t*0.15);
    return field;
  });
  translate(-width/2, -height/2);
  background(242, 234, 218);
  washSchedule = buildWashes();
  buildFlowers();
  console.log('Flower groups: '+flowerGroups.length+' | Interval: '+FLOWER_INTERVAL+' | Start: '+FLOWER_START+' | End: '+(FLOWER_START+flowerGroups.length*FLOWER_INTERVAL));
  brush.noFill(); setupDone = true;
  loadAudio().then(function() {
    document.getElementById('tap').addEventListener('click', function() {
      document.getElementById('tap').style.display = 'none';
      if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
      startAudio();
    });
  });
}

function draw() {
  if (!setupDone) return;
  translate(-width/2, -height/2);
  var f = frameCount, rawAmp = getAmp();
  smoothAmp = lerp(smoothAmp, rawAmp, 0.05);
  var amp = isPlaying ? smoothAmp : 0.015 + 0.008 * sin(f * 0.003);
  brush.field('meditative'); brush.refreshField(f * 0.0015); brush.wiggle(0.3 + amp * 2);

  // CHANGE 1: Frames 1-29 = blank cream paper. Washes fade in from frame 30.
  if (washIdx < washSchedule.length && f >= washSchedule[washIdx].frame) {
    var wash = washSchedule[washIdx];
    brush.noStroke(); brush.fill(wash.color, wash.opacity);
    brush.fillBleed(wash.bleed, 'out'); brush.fillTexture(0.5, 0.25);
    brush.rect(wash.x, wash.y, wash.w, wash.h); brush.noFill(); washIdx++;
  }

  // PENCIL STAGE 1 (60-180) — shifted +59 from original
  if (f >= 60 && f <= 180) {
    var PO = 59; // pencil offset
    if (f>=1+PO&&f<=30+PO){var t=(f-1-PO)/29; brush.set('HB','#2A2215',3.5+amp*3); brush.line(doorX,lerp(archSpringY,bot,t),doorX,lerp(archSpringY,bot,min(1,t+0.04)));}
    if (f>=10+PO&&f<=40+PO){var t=(f-10-PO)/29; brush.set('HB','#2A2215',3.5+amp*3); brush.line(doorX+doorW,lerp(archSpringY,bot,t),doorX+doorW,lerp(archSpringY,bot,min(1,t+0.04)));}
    if (f>=20+PO&&f<=45+PO){var t=(f-20-PO)/24; brush.set('HB','#2A2215',3.5+amp*3); brush.line(lerp(doorX,doorX+doorW,t),bot,lerp(doorX,doorX+doorW,min(1,t+0.05)),bot);}
    if (f>=30+PO&&f<=70+PO){var idx=Math.floor(((f-30-PO)/40)*20); if(idx<20&&idx>=0){brush.set('HB','#3A3020',3.0+amp*2); brush.line(archPts[idx][0],archPts[idx][1],archPts[idx+1][0],archPts[idx+1][1]);}}
    if (f>=50+PO&&f<=90+PO){var idx=20+Math.floor(((f-50-PO)/40)*20); if(idx<40&&idx>=20){brush.set('HB','#3A3020',3.0+amp*2); brush.line(archPts[idx][0],archPts[idx][1],archPts[idx+1][0],archPts[idx+1][1]);}}
    if (f>=70+PO&&f<=100+PO){var t=(f-70-PO)/29; brush.set('HB','#2A2215',3.0+amp*2); brush.line(cx,lerp(panelTop,panelBot,t),cx,lerp(panelTop,panelBot,min(1,t+0.04)));}
    if (f>=85+PO&&f<=105+PO){var t=(f-85-PO)/19; brush.set('HB','#3A3020',2.5+amp*2); brush.line(lerp(doorX,doorX+doorW,t),archSpringY,lerp(doorX,doorX+doorW,min(1,t+0.06)),archSpringY);}
  }

  // PENCIL STAGE 2 (140-260)
  if (f>=140&&f<=260) {
    var PO = 59;
    var lx=doorX+25,lw=cx-25-lx,rx=cx+25,rw=doorX+doorW-25-rx,py=panelTop+20,ph=panelH-40;
    if (f>=80+PO&&f<=130+PO&&f%2===0){var seg=Math.floor((f-80-PO)/2)%25; brush.set('2B','#3A3525',2.0+amp*2);
      if(seg<7)brush.line(lx+lw*(seg/6),py,lx+lw*((seg+1)/6),py);
      else if(seg<13){var s=(seg-7)/5;brush.line(lx+lw,py+ph*s,lx+lw,py+ph*(s+1/5));}
      else if(seg<19){var s=(seg-13)/5;brush.line(lx+lw*(1-s),py+ph,lx+lw*(1-s-1/5),py+ph);}
      else{var s=(seg-19)/5;brush.line(lx,py+ph*(1-s),lx,py+ph*(1-s-1/5));}
    }
    if (f>=100+PO&&f<=150+PO&&f%2===0){var seg=Math.floor((f-100-PO)/2)%25; brush.set('2B','#3A3525',2.0+amp*2);
      if(seg<7)brush.line(rx+rw*(seg/6),py,rx+rw*((seg+1)/6),py);
      else if(seg<13){var s=(seg-7)/5;brush.line(rx+rw,py+ph*s,rx+rw,py+ph*(s+1/5));}
      else if(seg<19){var s=(seg-13)/5;brush.line(rx+rw*(1-s),py+ph,rx+rw*(1-s-1/5),py+ph);}
      else{var s=(seg-19)/5;brush.line(rx,py+ph*(1-s),rx,py+ph*(1-s-1/5));}
    }
    if (f>=140+PO&&f<=180+PO&&f%5===0){brush.set('2B','#4A4535',1.5+amp);var which=Math.floor((f-140-PO)/5);
      if(which<4){var yOff=py+ph*0.2+(which*ph*0.2),xMid=lx+lw/2;brush.line(xMid-30,yOff-20,xMid+30,yOff+20);brush.line(xMid+30,yOff-20,xMid-30,yOff+20);}
      else{var idx2=which-4,yOff=py+ph*0.2+(idx2*ph*0.2),xMid=rx+rw/2;brush.line(xMid-30,yOff-20,xMid+30,yOff+20);brush.line(xMid+30,yOff-20,xMid-30,yOff+20);}
    }
    if (f>=160+PO&&f<=200+PO&&f%8===0){var which=Math.floor((f-160-PO)/8);brush.set('HB','#3A3525',1.8+amp);
      if(which===0)brush.line(lx,py+ph/3,lx+lw,py+ph/3);if(which===1)brush.line(lx,py+ph*2/3,lx+lw,py+ph*2/3);
      if(which===2)brush.line(rx,py+ph/3,rx+rw,py+ph/3);if(which===3)brush.line(rx,py+ph*2/3,rx+rw,py+ph*2/3);
      if(which===4)brush.line(lx,py+ph/2,lx+lw,py+ph/2);if(which===5)brush.line(rx,py+ph/2,rx+rw,py+ph/2);
    }
  }

  // PENCIL STAGE 3 (210-340) — reduced flow lines
  if (f>=210&&f<=340) {
    var PO = 59;
    var lx=doorX+25,lw=cx-25-lx,rx=cx+25,rw=doorX+doorW-25-rx,py=panelTop+20,ph=panelH-40;
    if (f>=150+PO&&f<=180+PO&&f%10===0){try{brush.hatch(12,45+sin(f*0.02)*8,{rand:0.1});brush.hatchStyle('2H','#5A5040',0.8);brush.rect(lx+10,py+10,lw-20,ph/3-10);brush.noHatch();}catch(e){}}
    if (f>=180+PO&&f<=210+PO&&f%10===0){try{brush.hatch(14,-30+sin(f*0.015)*5,{rand:0.12});brush.hatchStyle('2H','#5A5040',0.8);brush.rect(rx+10,py+ph*2/3+5,rw-20,ph/3-10);brush.noHatch();}catch(e){}}
    if (f>=180+PO&&f%5===0){brush.set('charcoal','#2A2215',1.5+amp*2);brush.flowLine(doorX+40+random(0,doorW-80),panelTop+40+random(0,panelH-80),random(40,80),random(0,TWO_PI));}
  }

  // PENCIL STAGE 4 (260-360)
  if (f>=260&&f<=PENCIL_END) {
    var PO = 59;
    var lx=doorX+25,lw=cx-25-lx,rx=cx+25,rw=doorX+doorW-25-rx,py=panelTop+20,ph=panelH-40;
    if (f>=200+PO&&f<=240+PO&&f%6===0){var which=Math.floor((f-200-PO)/6);brush.set('HB','#4A3A20',1.5+amp);if(which<3)brush.circle(lx+lw/2,py+ph/2,30+which*25);else brush.circle(rx+rw/2,py+ph/2,30+(which-3)*25);}
    if (f>=240+PO&&f<=280+PO&&f%4===0){var which=Math.floor((f-240-PO)/4);brush.set('2H','#5A4A30',1.2+amp);var angle=(which%8)*(TWO_PI/8);if(which<8)brush.line(lx+lw/2,py+ph/2,lx+lw/2+cos(angle)*55,py+ph/2+sin(angle)*55);if(which>=8&&which<16)brush.line(rx+rw/2,py+ph/2,rx+rw/2+cos(angle)*55,py+ph/2+sin(angle)*55);}
  }

  // FLOWERS: one group per FLOWER_INTERVAL frames, growing along path bottom→top
  if (f >= FLOWER_START && flowerGroupIdx < flowerGroups.length) {
    var nextFrame = FLOWER_START + flowerGroupIdx * FLOWER_INTERVAL;
    if (f >= nextFrame) {
      var group = flowerGroups[flowerGroupIdx];
      // Pass 1: all pencil outlines
      for (var gi = 0; gi < group.length; gi++) {
        brush.set('2H', '#c0b8a8', 0.08);
        brush.polygon(group[gi].polygon);
      }
      // Pass 2: all watercolor fills
      for (var gi = 0; gi < group.length; gi++) {
        var el = group[gi];
        brush.noStroke();
        brush.fill(el.color, el.opacity);
        brush.fillBleed(0.35, el.bleedDir || 'in');
        brush.fillTexture(0.45, 0.3);
        brush.polygon(el.polygon);
        brush.noFill();
      }
      flowerGroupIdx++;
    }
  }

  brush.noField(); brush.wiggle(0);
}
</script>
</body>
</html>
