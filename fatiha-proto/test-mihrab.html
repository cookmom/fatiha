<!-- بسم الله الرحمن الرحيم -->
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<script src="https://cdn.jsdelivr.net/npm/p5@2.0.3/lib/p5.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/p5.brush@2.0.2-beta"></script>
<style>* { margin:0; } body { background:#f2eada; }</style>
</head>
<body>
<script>
var W = 1080, H = 1920;
var cx = W/2;

// Arch parameters — equilateral pointed arch
var archSpan = 620;
var halfSpan = archSpan / 2;
var archR = archSpan; // R = S for equilateral
var springY = 1300;
var archH = archSpan * Math.sqrt(3)/2; // = S * √3/2
var peakY = springY - archH;
// Centers at springing points
var C1x = cx - halfSpan, C2x = cx + halfSpan;

// Frame dimensions
var frameL = cx - halfSpan - 80;
var frameR = cx + halfSpan + 80;
var frameT = peakY - 120;
var frameB = H - 80;

function archY(x) {
  // Left arc or right arc
  if (x <= cx) {
    var dx = x - C2x; // left side uses RIGHT center
    return springY - Math.sqrt(Math.max(0, archR*archR - dx*dx));
  } else {
    var dx = x - C1x; // right side uses LEFT center
    return springY - Math.sqrt(Math.max(0, archR*archR - dx*dx));
  }
}

function setup() {
  createCanvas(W, H, WEBGL);
  brush.load();
  translate(-width/2, -height/2);
  background(242, 234, 218);
  randomSeed(42);
  brush.wiggle(1.2);

  // =============================================
  // LAYER 1: NESTED FRAMES (3 layers)
  // =============================================
  brush.noFill();
  
  // Outer frame
  brush.set('2H', '#b0a898', 1.5);
  brush.rect(frameL, frameT, frameR - frameL, frameB - frameT);
  
  // Middle frame
  brush.set('2H', '#b0a898', 1.0);
  brush.rect(frameL + 25, frameT + 25, frameR - frameL - 50, frameB - frameT - 50);
  
  // Inner frame
  brush.set('2H', '#c0b8a8', 0.8);
  brush.rect(frameL + 50, frameT + 50, frameR - frameL - 100, frameB - frameT - 100);
  
  // Column lines flanking arch
  brush.set('2H', '#b0a898', 1.2);
  brush.line(cx - halfSpan, springY, cx - halfSpan, frameB - 55);
  brush.line(cx + halfSpan, springY, cx + halfSpan, frameB - 55);
  // Double columns
  brush.set('2H', '#c0b8a8', 0.6);
  brush.line(cx - halfSpan - 12, springY, cx - halfSpan - 12, frameB - 55);
  brush.line(cx + halfSpan + 12, springY, cx + halfSpan + 12, frameB - 55);
  
  // =============================================
  // LAYER 2: BLUE FILL INSIDE ARCH
  // =============================================
  // Build arch polygon (interior shape)
  var archPoly = [];
  var steps = 60;
  // Left arc
  for (var i = 0; i <= steps; i++) {
    var t = i / steps;
    var x = (cx - halfSpan) + halfSpan * t;
    var dx = x - C2x;
    var y = springY - Math.sqrt(Math.max(0, archR*archR - dx*dx));
    archPoly.push([x, y]);
  }
  // Right arc
  for (var i = 0; i <= steps; i++) {
    var t = i / steps;
    var x = cx + halfSpan * t;
    var dx = x - C1x;
    var y = springY - Math.sqrt(Math.max(0, archR*archR - dx*dx));
    archPoly.push([x, y]);
  }
  // Bottom line
  archPoly.push([cx + halfSpan, springY + 600]);
  archPoly.push([cx - halfSpan, springY + 600]);
  
  // Dark blue fill
  brush.noStroke();
  brush.fill('#0c3a6a', 200);
  brush.fillBleed(0.08, 'out');
  brush.fillTexture(0.3, 0.2);
  brush.polygon(archPoly);
  brush.noFill();
  
  // Lighter blue gradient at top
  var topPoly = [];
  for (var i = 0; i <= steps; i++) {
    var t = i / steps;
    var x = (cx - halfSpan * 0.8) + halfSpan * 1.6 * t;
    var clampX = Math.max(cx - halfSpan + 20, Math.min(cx + halfSpan - 20, x));
    topPoly.push([clampX, archY(clampX) + 10]);
  }
  topPoly.push([cx + halfSpan * 0.6, peakY + archH * 0.4]);
  topPoly.push([cx - halfSpan * 0.6, peakY + archH * 0.4]);
  
  brush.fill('#1a5a9a', 80);
  brush.fillBleed(0.15, 'out');
  brush.polygon(topPoly);
  brush.noFill();
  
  // =============================================
  // LAYER 3: 12-FOLD STAR PATTERN (cream lines on blue)
  // Formula: {12/5} star polygon
  // P_k = (cx + r * cos(k*π/6 - π/2), cy + r * sin(k*π/6 - π/2))
  // Connect P_k to P_{(k+5) mod 12}
  // =============================================
  var starCx = cx;
  var starCy = springY - archH * 0.25; // center of arch interior
  
  brush.set('2H', '#e8e0d0', 0.6); // cream pencil on blue
  
  // Multiple scale layers for dense fill
  var scales = [280, 180, 110, 60];
  
  for (var si = 0; si < scales.length; si++) {
    var r = scales[si];
    
    // 12 vertices
    var verts = [];
    for (var k = 0; k < 12; k++) {
      var angle = k * Math.PI / 6 - Math.PI / 2;
      verts.push([starCx + r * Math.cos(angle), starCy + r * Math.sin(angle)]);
    }
    
    // {12/5} connections — each vertex to vertex+5
    for (var k = 0; k < 12; k++) {
      var k2 = (k + 5) % 12;
      brush.line(verts[k][0], verts[k][1], verts[k2][0], verts[k2][1]);
    }
    
    // {12/4} connections — each vertex to vertex+4 (secondary pattern)
    if (si < 2) {
      brush.set('2H', '#d8d0c0', 0.4);
      for (var k = 0; k < 12; k++) {
        var k2 = (k + 4) % 12;
        brush.line(verts[k][0], verts[k][1], verts[k2][0], verts[k2][1]);
      }
      brush.set('2H', '#e8e0d0', 0.6);
    }
    
    // Dodecagon outline
    if (si === 0) {
      for (var k = 0; k < 12; k++) {
        var k2 = (k + 1) % 12;
        brush.line(verts[k][0], verts[k][1], verts[k2][0], verts[k2][1]);
      }
    }
    
    // Radial lines from center
    if (si === 0) {
      brush.set('2H', '#d0c8b8', 0.3);
      for (var k = 0; k < 12; k++) {
        brush.line(starCx, starCy, verts[k][0], verts[k][1]);
      }
      brush.set('2H', '#e8e0d0', 0.6);
    }
  }
  
  // Inner concentric circles
  brush.set('2H', '#d8d0c0', 0.4);
  brush.circle(starCx, starCy, 40);
  brush.circle(starCx, starCy, 100);
  
  // =============================================
  // LAYER 4: ARCH OUTLINE (pencil)
  // =============================================
  brush.noFill();
  brush.set('2H', '#8a8070', 1.8);
  
  // Left arc
  var archLinePts = [];
  for (var i = 0; i <= 40; i++) {
    var t = i / 40;
    var x = (cx - halfSpan) + halfSpan * t;
    var dx = x - C2x;
    var y = springY - Math.sqrt(Math.max(0, archR*archR - dx*dx));
    archLinePts.push([x, y, 0.3 + 0.7 * Math.sin(Math.PI * t)]);
  }
  brush.spline(archLinePts, 0.3);
  
  // Right arc
  archLinePts = [];
  for (var i = 0; i <= 40; i++) {
    var t = i / 40;
    var x = cx + halfSpan * t;
    var dx = x - C1x;
    var y = springY - Math.sqrt(Math.max(0, archR*archR - dx*dx));
    archLinePts.push([x, y, 0.3 + 0.7 * Math.sin(Math.PI * t)]);
  }
  brush.spline(archLinePts, 0.3);
  
  // =============================================
  // LAYER 5: BORDER BAND (simple zigzag)
  // =============================================
  brush.set('2H', '#b0a898', 0.5);
  var bandY1 = frameT + 30, bandY2 = frameT + 45;
  var bandStep = 30;
  for (var x = frameL + 55; x < frameR - 55; x += bandStep) {
    brush.line(x, bandY1, x + bandStep/2, bandY2);
    brush.line(x + bandStep/2, bandY2, x + bandStep, bandY1);
  }
  // Bottom band
  bandY1 = frameB - 80; bandY2 = frameB - 65;
  for (var x = frameL + 55; x < frameR - 55; x += bandStep) {
    brush.line(x, bandY1, x + bandStep/2, bandY2);
    brush.line(x + bandStep/2, bandY2, x + bandStep, bandY1);
  }
  
  // Side bands
  var bandX1 = frameL + 30, bandX2 = frameL + 45;
  for (var y = frameT + 55; y < frameB - 55; y += bandStep) {
    brush.line(bandX1, y, bandX2, y + bandStep/2);
    brush.line(bandX2, y + bandStep/2, bandX1, y + bandStep);
  }
  bandX1 = frameR - 45; bandX2 = frameR - 30;
  for (var y = frameT + 55; y < frameB - 55; y += bandStep) {
    brush.line(bandX1, y, bandX2, y + bandStep/2);
    brush.line(bandX2, y + bandStep/2, bandX1, y + bandStep);
  }
}
</script>
</body>
</html>
