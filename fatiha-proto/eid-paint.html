<!-- بسم الله الرحمن الرحيم -->
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8">
<title>Eid Mubarak</title>
<style>
  * { margin: 0; padding: 0; }
  body { background: #0a0a10; overflow: hidden; display: flex; align-items: center; justify-content: center; height: 100vh; }
</style>
</head>
<body>
<script>
const W = 1080, H = 1920;
const canvas = document.createElement('canvas');
canvas.width = W; canvas.height = H;
document.body.appendChild(canvas);
canvas.style.maxWidth = '100vw';
canvas.style.maxHeight = '100vh';
canvas.style.objectFit = 'contain';
const ctx = canvas.getContext('2d');

const BG = '#0a0a10';
const GOLD = '#c9a84c';
const GOLD_LIGHT = '#ecd888';
const DARK_GREEN = '#1a5a32';
const SAGE = '#4a8a5a';
const CRIMSON = '#b82040';

let seed = 42;
function sRand() { seed=(seed*16807)%2147483647; return(seed-1)/2147483646; }

// Ottoman leaf
function drawLeaf(cx, cy, angle, size, color) {
  ctx.save();
  ctx.translate(cx, cy);
  ctx.rotate(angle);
  ctx.globalAlpha = 0.55 + sRand() * 0.15;
  ctx.beginPath();
  ctx.moveTo(0, 0);
  ctx.bezierCurveTo(size*.4, -size*.5, size*.9, -size*.25, size, 0);
  ctx.bezierCurveTo(size*.9, size*.25, size*.4, size*.5, 0, 0);
  ctx.fillStyle = color;
  ctx.fill();
  ctx.globalAlpha = 0.2;
  ctx.beginPath();
  ctx.moveTo(size*.08, 0);
  ctx.lineTo(size*.82, 0);
  ctx.strokeStyle = '#041008';
  ctx.lineWidth = 1.2;
  ctx.stroke();
  ctx.restore();
}

// Rose
function drawRose(cx, cy, size, color) {
  ctx.save();
  ctx.translate(cx, cy);
  for (let ring = 2; ring >= 0; ring--) {
    const rs = size * (0.35 + ring * 0.35);
    const np = 5 + Math.floor(sRand() * 3);
    for (let i = 0; i < np; i++) {
      const a = (i/np)*Math.PI*2 + ring*0.4 + sRand()*0.3;
      ctx.save();
      ctx.rotate(a);
      ctx.globalAlpha = 0.3 + ring*0.1;
      ctx.beginPath();
      ctx.ellipse(rs*0.42, 0, rs*0.42, rs*0.18, 0, 0, Math.PI*2);
      ctx.fillStyle = color;
      ctx.fill();
      ctx.restore();
    }
  }
  ctx.globalAlpha = 0.75;
  ctx.beginPath();
  ctx.arc(0, 0, size*0.1, 0, Math.PI*2);
  ctx.fillStyle = GOLD_LIGHT;
  ctx.fill();
  ctx.restore();
}

let frame = 0;
const FPS = 30, DUR = 10, TOTAL = FPS * DUR;

async function init() {
  // Load traced SVG
  const resp = await fetch('eid-traced-color.svg');
  const svgText = await resp.text();
  
  // Parse SVG paths
  const parser = new DOMParser();
  const doc = parser.parseFromString(svgText, 'image/svg+xml');
  const svgPaths = doc.querySelectorAll('path');
  
  console.log('SVG paths:', svgPaths.length);
  
  // Convert to Path2D objects with transforms and colors
  // Skip background paths (very light fills) and keep calligraphy
  const layers = [];
  for (const p of svgPaths) {
    const d = p.getAttribute('d');
    const fill = p.getAttribute('fill') || '#000';
    const transform = p.getAttribute('transform') || '';
    
    // Parse fill color brightness — skip light fills (background)
    const hex = fill.replace('#','');
    const r = parseInt(hex.substr(0,2),16);
    const g = parseInt(hex.substr(2,2),16);
    const b = parseInt(hex.substr(4,2),16);
    const brightness = (r + g + b) / 3;
    
    // Skip very light paths (background, white elements)
    if (brightness > 180) continue;
    
    // Parse translate
    let tx = 0, ty = 0;
    const m = transform.match(/translate\(([^,)]+)[,\s]([^)]+)\)/);
    if (m) { tx = parseFloat(m[1]); ty = parseFloat(m[2]); }
    
    // Classify: dark = main calligraphy, mid = gold accents
    const type = brightness < 130 ? 'calligraphy' : 'accent';
    
    layers.push({ d, fill, tx, ty, type, brightness, path2d: new Path2D(d) });
  }
  console.log('Filtered layers:', layers.length, '(removed bg)');
  
  // Source SVG is 800x800 — scale to fill 9:16 portrait
  const svgW = 800, svgH = 800;
  const targetW = W * 0.92;
  const targetH = targetW; // keep square aspect
  const scaleX = targetW / svgW;
  const scaleY = targetH / svgH;
  const offsetX = (W - targetW) / 2;
  const offsetY = H * 0.18; // position in upper portion
  
  requestAnimationFrame(function loop() {
    frame++;
    const t = Math.min(frame / TOTAL, 1.0);
    
    ctx.fillStyle = BG;
    ctx.fillRect(0, 0, W, H);
    
    // Warm vignette
    const vig = ctx.createRadialGradient(W/2, H*.38, 100, W/2, H*.38, H*.5);
    vig.addColorStop(0, 'rgba(30,25,15,0.25)');
    vig.addColorStop(1, 'rgba(10,10,16,0)');
    ctx.fillStyle = vig;
    ctx.fillRect(0, 0, W, H);
    
    // Progressive reveal of SVG layers
    const layersToShow = Math.ceil(layers.length * Math.min(t * 2, 1.0));
    
    for (let li = 0; li < layersToShow; li++) {
      const layer = layers[li];
      const layerProgress = Math.min((t * 2 - li / layers.length) * layers.length * 0.5, 1.0);
      if (layerProgress <= 0) continue;
      
      ctx.save();
      ctx.translate(offsetX + layer.tx * scaleX, offsetY + layer.ty * scaleY);
      ctx.scale(scaleX, scaleY);
      
      // Multi-pass watercolor fill
      const passes = Math.ceil(layerProgress * 10);
      for (let pass = 0; pass < passes; pass++) {
        ctx.save();
        const jx = (sRand() - 0.5) * 2;
        const jy = (sRand() - 0.5) * 2;
        ctx.translate(jx, jy);
        
        if (layer.type === 'calligraphy') {
          // Main calligraphy: dark base → gold → bright gold
          if (pass < 3) {
            ctx.globalAlpha = 0.18;
            ctx.fillStyle = '#3a2a10'; // dark warm base
          } else if (pass < 7) {
            ctx.globalAlpha = 0.12;
            ctx.fillStyle = GOLD;
          } else {
            ctx.globalAlpha = 0.08;
            ctx.fillStyle = GOLD_LIGHT;
          }
        } else {
          // Accents: warm gold/amber
          if (pass < 5) {
            ctx.globalAlpha = 0.12;
            ctx.fillStyle = GOLD;
          } else {
            ctx.globalAlpha = 0.08;
            ctx.fillStyle = GOLD_LIGHT;
          }
        }
        
        ctx.fill(layer.path2d);
        ctx.restore();
      }
      
      // Fine outline
      if (layerProgress > 0.5) {
        ctx.globalAlpha = 0.25 * Math.min((layerProgress - 0.5) * 2, 1.0);
        ctx.strokeStyle = layer.type === 'calligraphy' ? GOLD : GOLD_LIGHT;
        ctx.lineWidth = 1.2 / scaleX;
        ctx.stroke(layer.path2d);
      }
      
      ctx.restore();
    }
    
    // Garden wreath
    if (t > 0.25) {
      const gp = Math.min((t - 0.25) / 0.5, 1.0);
      seed = 555;
      
      const nc = 40; // leaves
      for (let i = 0; i < Math.floor(gp * nc); i++) {
        const a = sRand() * Math.PI * 2;
        const r = 350 + sRand() * 280;
        drawLeaf(
          W/2 + Math.cos(a) * r,
          H*0.38 + Math.sin(a) * r * 0.45,
          a + 1 + sRand() * 0.5,
          25 + sRand() * 42,
          [DARK_GREEN, SAGE, '#2a7a42', '#3a6a4a'][i%4]
        );
      }
      
      seed = 666;
      const nf = 10;
      for (let i = 0; i < Math.floor(gp * nf); i++) {
        const a = sRand() * Math.PI * 2;
        const r = 380 + sRand() * 200;
        drawRose(
          W/2 + Math.cos(a) * r,
          H*0.38 + Math.sin(a) * r * 0.4,
          16 + sRand() * 24,
          [CRIMSON, '#E83E6C', '#d44060'][i%3]
        );
      }
      
      // Gold dust
      seed = 777;
      for (let i = 0; i < Math.floor(gp * 60); i++) {
        ctx.save();
        ctx.globalAlpha = 0.2 + sRand() * 0.45;
        ctx.beginPath();
        ctx.arc(W*0.08+sRand()*W*0.84, H*0.15+sRand()*H*0.5, 1+sRand()*3.5, 0, Math.PI*2);
        ctx.fillStyle = GOLD;
        ctx.fill();
        ctx.restore();
      }
    }
    
    // "Eid Mubarak" English
    if (t > 0.55) {
      ctx.save();
      ctx.globalAlpha = Math.min((t - 0.55) / 0.15, 1.0) * 0.4;
      ctx.fillStyle = GOLD;
      ctx.font = '300 32px Georgia, serif';
      ctx.textAlign = 'center';
      ctx.fillText('Eid Mubarak', W/2, H * 0.72);
      ctx.restore();
    }
    
    window._frame = frame;
    window._done = frame >= TOTAL;
    
    if (frame < TOTAL) requestAnimationFrame(loop);
  });
}

init();
</script>
</body>
</html>
