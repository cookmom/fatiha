<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Watercolor Chris — Brush Stroke Painting</title>
<style>
  body { margin: 0; background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; }
  canvas { display: block; }
</style>
</head>
<body>
<canvas id="c" width="430" height="932"></canvas>
<script>
// ============================================================
// BRUSH STROKE WATERCOLOR — Paint strokes, not stamps
// Each petal is a bezier curve drawn by a brush over frames,
// then wet pigment bleeds outward via polygon deformation.
// PERSISTENT canvas — each frame accumulates, never clears.
// ============================================================

const W = 430, H = 932;
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d', { willReadFrequently: true });

// --- Seeded RNG ---
let seed = 777;
function rand() { seed = (seed * 16807 + 0) % 2147483647; return (seed - 1) / 2147483646; }
function gauss(mean, std) {
  const u1 = rand(), u2 = rand();
  return mean + std * Math.sqrt(-2 * Math.log(u1 || 0.001)) * Math.cos(2 * Math.PI * u2);
}
function lerp(a, b, t) { return a + (b - a) * t; }
function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }

// ============================================================
// Value noise for paper texture
// ============================================================
const NOISE_SIZE = 128;
const noiseGrid = [];
for (let i = 0; i < NOISE_SIZE * NOISE_SIZE; i++) noiseGrid.push(rand());

function smoothNoise(x, y) {
  const ix = Math.floor(x) % NOISE_SIZE, iy = Math.floor(y) % NOISE_SIZE;
  const fx = x - Math.floor(x), fy = y - Math.floor(y);
  const sx = fx * fx * (3 - 2 * fx), sy = fy * fy * (3 - 2 * fy);
  const i00 = noiseGrid[iy * NOISE_SIZE + ix];
  const i10 = noiseGrid[iy * NOISE_SIZE + (ix + 1) % NOISE_SIZE];
  const i01 = noiseGrid[((iy + 1) % NOISE_SIZE) * NOISE_SIZE + ix];
  const i11 = noiseGrid[((iy + 1) % NOISE_SIZE) * NOISE_SIZE + (ix + 1) % NOISE_SIZE];
  return lerp(lerp(i00, i10, sx), lerp(i01, i11, sx), sy);
}

function fbmNoise(x, y, octaves) {
  let val = 0, amp = 1, freq = 1, total = 0;
  for (let i = 0; i < octaves; i++) {
    val += amp * smoothNoise(x * freq, y * freq);
    total += amp; amp *= 0.5; freq *= 2;
  }
  return val / total;
}

// ============================================================
// Paper background
// ============================================================
function drawPaperBackground() {
  ctx.fillStyle = '#f4ede3';
  ctx.fillRect(0, 0, W, H);
  const imgData = ctx.getImageData(0, 0, W, H);
  const d = imgData.data;
  for (let y = 0; y < H; y++) {
    for (let x = 0; x < W; x++) {
      const idx = (y * W + x) * 4;
      const grain = gauss(0, 3.5);
      const tooth = (fbmNoise(x * 0.15, y * 0.15, 3) - 0.5) * 6;
      const localVar = (fbmNoise(x * 0.012, y * 0.012, 5) - 0.5) * 16;
      const fiber = (fbmNoise(x * 0.06, y * 0.012, 4) - 0.5) * 7;
      const total = grain + tooth + localVar + fiber;
      d[idx]     = clamp(d[idx] + total, 0, 255);
      d[idx + 1] = clamp(d[idx + 1] + total, 0, 255);
      d[idx + 2] = clamp(d[idx + 2] + total - 1.5, 0, 255);
    }
  }
  ctx.putImageData(imgData, 0, 0);
}
drawPaperBackground();

// Save seed after paper generation
const postPaperSeed = seed;

// ============================================================
// Bezier helpers
// ============================================================
function cubicBezier(p0, p1, p2, p3, t) {
  const u = 1 - t;
  return [
    u*u*u*p0[0] + 3*u*u*t*p1[0] + 3*u*t*t*p2[0] + t*t*t*p3[0],
    u*u*u*p0[1] + 3*u*u*t*p1[1] + 3*u*t*t*p2[1] + t*t*t*p3[1]
  ];
}

// ============================================================
// Tyler Hobbs Polygon Deformation (for bleed phase)
// ============================================================
function deformOnce(poly, variance) {
  const result = [];
  for (let i = 0; i < poly.length; i++) {
    const a = poly[i];
    const c = poly[(i + 1) % poly.length];
    result.push([a[0], a[1]]);
    const bx = (a[0] + c[0]) / 2;
    const by = (a[1] + c[1]) / 2;
    const dx = c[0] - a[0];
    const dy = c[1] - a[1];
    const len = Math.sqrt(dx * dx + dy * dy);
    if (len < 0.5) continue;
    const nx = -dy / len;
    const ny = dx / len;
    const offset = gauss(0, variance * len);
    result.push([bx + nx * offset, by + ny * offset]);
  }
  return result;
}

function deformN(poly, n, variance) {
  let p = poly.map(pt => [pt[0], pt[1]]);
  for (let i = 0; i < n; i++) p = deformOnce(p, variance * Math.pow(0.7, i));
  return p;
}

// ============================================================
// Stroke shape: build polygon from points+widths
// ============================================================
function strokeTrailToPolygon(points, widths) {
  const right = [], left = [];
  for (let i = 0; i < points.length; i++) {
    const prev = points[Math.max(0, i - 1)];
    const next = points[Math.min(points.length - 1, i + 1)];
    const dx = next[0] - prev[0], dy = next[1] - prev[1];
    const len = Math.sqrt(dx*dx + dy*dy) || 1;
    const nx = -dy / len, ny = dx / len;
    const w = widths[i];
    right.push([points[i][0] + nx * w, points[i][1] + ny * w]);
    left.push([points[i][0] - nx * w, points[i][1] - ny * w]);
  }
  return [...right, ...left.reverse()];
}

// ============================================================
// Define petal strokes — bezier curves with width/color
// ============================================================
const roseCx = W * 0.50, roseCy = H * 0.38;

// Reset to deterministic seed for geometry
seed = postPaperSeed;

function makePetalStroke(baseX, baseY, angle, length, maxWidth, curvature, color) {
  const ca = Math.cos(angle), sa = Math.sin(angle);
  const cn = -sa, sn = ca;
  const p0 = [baseX, baseY];
  const p1 = [baseX + ca * length * 0.33 + cn * curvature * length * 0.25,
              baseY + sa * length * 0.33 + sn * curvature * length * 0.25];
  const p2 = [baseX + ca * length * 0.66 + cn * curvature * length * 0.4,
              baseY + sa * length * 0.66 + sn * curvature * length * 0.4];
  const p3 = [baseX + ca * length + cn * curvature * length * 0.12,
              baseY + sa * length + sn * curvature * length * 0.12];
  return { p0, p1, p2, p3, maxWidth, color, length };
}

// Width profile: thin base → swell → taper at tip
function petalWidth(t) {
  if (t < 0.08) return t / 0.08 * 0.25;
  if (t < 0.25) return 0.25 + (t - 0.08) / 0.17 * 0.75;
  if (t < 0.65) return 1.0;
  return 1.0 - ((t - 0.65) / 0.35) * 0.85;
}

function varyColor(base) {
  const s = gauss(0, 8);
  return [clamp(Math.round(base[0]+s),0,255), clamp(Math.round(base[1]+s*0.4),0,255), clamp(Math.round(base[2]+s*0.6),0,255)];
}

const COL_OUTER = [215, 55, 85];
const COL_MID   = [175, 30, 60];
const COL_INNER = [135, 18, 45];
const COL_CENTER= [95, 12, 32];
const COL_LEAF  = [38, 100, 45];
const COL_STALK = [35, 88, 35];

const allStrokes = [];

// --- Stalk ---
allStrokes.push({
  ...makePetalStroke(W*0.50, H*0.78, -Math.PI/2+0.04, H*0.38, 8, 0.06, COL_STALK),
  _isStalk: true
});

// --- Leaves ---
allStrokes.push(makePetalStroke(W*0.46, H*0.56, Math.PI+0.5, 110, 20, -0.45, varyColor(COL_LEAF)));
allStrokes.push(makePetalStroke(W*0.54, H*0.56, -0.4, 95, 17, 0.4, varyColor(COL_LEAF)));

// --- Outer petals: 8 long sweeping strokes ---
for (let i = 0; i < 8; i++) {
  const a = (i/8)*Math.PI*2 + gauss(0,0.12);
  const d = gauss(18,4);
  const curv = (i % 2 === 0 ? 1 : -1) * (0.35 + rand() * 0.45);
  allStrokes.push(makePetalStroke(
    roseCx+Math.cos(a)*d, roseCy+Math.sin(a)*d,
    a+gauss(0,0.15), gauss(90,6), gauss(36,4), curv,
    varyColor(COL_OUTER)
  ));
}

// --- Mid petals: 8 overlapping ---
for (let i = 0; i < 8; i++) {
  const a = (i/8)*Math.PI*2 + gauss(0,0.15) + 0.22;
  const d = gauss(12,3);
  const curv = (i % 2 === 0 ? -1 : 1) * (0.3 + rand() * 0.5);
  allStrokes.push(makePetalStroke(
    roseCx+Math.cos(a)*d, roseCy+Math.sin(a)*d,
    a+gauss(0,0.2), gauss(65,5), gauss(30,4), curv,
    varyColor(COL_MID)
  ));
}

// --- Inner petals: 6 tight, curving to create spiral center ---
for (let i = 0; i < 6; i++) {
  const a = (i/6)*Math.PI*2 + gauss(0,0.2);
  const d = gauss(5,2);
  const curv = (i % 2 === 0 ? 1 : -1) * (0.5 + rand() * 0.5);
  allStrokes.push(makePetalStroke(
    roseCx+Math.cos(a)*d, roseCy+Math.sin(a)*d,
    a+gauss(0,0.25), gauss(42,4), gauss(22,3), curv,
    varyColor(COL_INNER)
  ));
}

// --- Center fill: 5 short dabs ---
for (let i = 0; i < 5; i++) {
  const a = (i/5)*Math.PI*2 + gauss(0,0.4);
  const curv = gauss(0, 0.7);
  allStrokes.push(makePetalStroke(
    roseCx+gauss(0,4), roseCy+gauss(0,4),
    a, gauss(24,3), gauss(16,3), curv,
    varyColor(COL_CENTER)
  ));
}

// Save geometry seed
const postGeomSeed = seed;

// ============================================================
// Pre-compute per-stroke sample points (deterministic)
// ============================================================
const SAMPLES_PER_STROKE = 80;

for (const s of allStrokes) {
  s._samples = [];
  for (let i = 0; i <= SAMPLES_PER_STROKE; i++) {
    const t = i / SAMPLES_PER_STROKE;
    const pt = cubicBezier(s.p0, s.p1, s.p2, s.p3, t);
    const pressure = s._isStalk ? 0.55 : petalWidth(t);
    const radius = s.maxWidth * pressure * 0.5;
    // Pre-compute jitter
    const jx = gauss(0, radius * 0.1);
    const jy = gauss(0, radius * 0.1);
    s._samples.push({ x: pt[0]+jx, y: pt[1]+jy, r: radius, pressure, t });
  }
  // Pre-compute stroke polygon for bleed phase
  const pts = s._samples.map(s => [s.x, s.y]);
  const wds = s._samples.map(s => s.r);
  s._polygon = strokeTrailToPolygon(pts, wds);
}

// ============================================================
// Animation schedule
// Stalk: frames 0-7 draw, 8-19 bleed
// Left leaf: frames 4-11 draw, 12-23 bleed
// Right leaf: frames 8-15 draw, 16-27 bleed
// Outer petals (7): each 3 frames apart starting frame 14
//   petal 0: 14-21 draw, 22-33 bleed
//   petal 1: 17-24 draw, 25-36 bleed...
// Mid petals: continue after outer
// Inner petals: continue after mid
// Center: last
// ============================================================

const DRAW_FRAMES = 8;
const BLEED_FRAMES = 14;

let nextStart = 0;
// Stalk
allStrokes[0]._startFrame = 0;
nextStart = 5;
// Leaves
allStrokes[1]._startFrame = nextStart; nextStart += 5;
allStrokes[2]._startFrame = nextStart; nextStart += 5;
// Petals: tight stagger — 2 frame gap
for (let i = 3; i < allStrokes.length; i++) {
  allStrokes[i]._startFrame = nextStart;
  nextStart += 2;
}

// State per stroke
const states = allStrokes.map(s => ({
  stroke: s,
  startFrame: s._startFrame,
  phase: 'waiting',
  drawProgress: 0,   // 0→1
  bleedFrame: 0,
  bleedPolys: [],
  _bleedSeed: Math.floor(rand() * 100000),
}));

// ============================================================
// Draw brush dabs onto canvas — ADDITIVE, no clearing
// ============================================================
function drawDabsRange(stroke, fromT, toT) {
  const [r, g, b] = stroke.color;
  const samples = stroke._samples;

  for (const s of samples) {
    if (s.t < fromT || s.t > toT) continue;
    if (s.r < 0.5) continue;

    // Multi-pass dab: concentric circles for soft brush feel
    ctx.fillStyle = `rgb(${r},${g},${b})`;

    // Core: solid, high alpha
    ctx.globalAlpha = stroke._isStalk ? 0.22 : 0.18;
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r * 0.45, 0, Math.PI * 2);
    ctx.fill();

    // Mid ring
    ctx.globalAlpha = stroke._isStalk ? 0.14 : 0.12;
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r * 0.7, 0, Math.PI * 2);
    ctx.fill();

    // Outer haze
    ctx.globalAlpha = stroke._isStalk ? 0.06 : 0.05;
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r * 1.0, 0, Math.PI * 2);
    ctx.fill();

    // Extra soft bloom
    ctx.globalAlpha = 0.02;
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r * 1.3, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1.0;
}

// Draw a visible brush head at the leading edge
function drawBrushTip(stroke, t) {
  if (t < 0.01 || t > 0.99) return;
  const pt = cubicBezier(stroke.p0, stroke.p1, stroke.p2, stroke.p3, t);
  const pressure = stroke._isStalk ? 0.55 : petalWidth(t);
  const r = stroke.maxWidth * pressure * 0.55;
  const [cr, cg, cb] = stroke.color;
  const dr = Math.max(0, Math.round(cr * 0.65));
  const dg = Math.max(0, Math.round(cg * 0.65));
  const db = Math.max(0, Math.round(cb * 0.65));

  // Dense wet pigment at brush head
  ctx.globalAlpha = 0.38;
  ctx.fillStyle = `rgb(${dr},${dg},${db})`;
  ctx.beginPath();
  ctx.arc(pt[0], pt[1], r * 0.35, 0, Math.PI * 2);
  ctx.fill();

  // Medium wet halo
  ctx.globalAlpha = 0.18;
  ctx.fillStyle = `rgb(${cr},${cg},${cb})`;
  ctx.beginPath();
  ctx.arc(pt[0], pt[1], r * 0.7, 0, Math.PI * 2);
  ctx.fill();

  // Outer wet spread
  ctx.globalAlpha = 0.06;
  ctx.beginPath();
  ctx.arc(pt[0], pt[1], r * 1.4, 0, Math.PI * 2);
  ctx.fill();

  ctx.globalAlpha = 1.0;
}

// Draw bleed polygon layer
function drawBleedLayer(poly, color, alpha) {
  const [r, g, b] = color;
  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.fillStyle = `rgb(${r},${g},${b})`;
  ctx.beginPath();
  ctx.moveTo(poly[0][0], poly[0][1]);
  for (let i = 1; i < poly.length; i++) ctx.lineTo(poly[i][0], poly[i][1]);
  ctx.closePath();
  ctx.fill();
  ctx.restore();
}

// ============================================================
// FRAME-DRIVEN ANIMATION — called via window._step()
// Persistent canvas: each frame only ADDS new paint
// ============================================================

let frameCount = 0;
window._renderComplete = false;

window._step = function() {
  for (const st of states) {
    if (st.phase === 'done') continue;

    if (st.phase === 'waiting' && frameCount >= st.startFrame) {
      st.phase = 'drawing';
      st.drawProgress = 0;
    }

    if (st.phase === 'drawing') {
      const prevProgress = st.drawProgress;
      st.drawProgress += 1 / DRAW_FRAMES;
      if (st.drawProgress > 1) st.drawProgress = 1;

      // Draw new dabs for this frame's progress increment
      drawDabsRange(st.stroke, prevProgress, st.drawProgress);

      // Brush tip highlight
      drawBrushTip(st.stroke, st.drawProgress);

      if (st.drawProgress >= 1) {
        st.phase = 'bleeding';
        st.bleedFrame = 0;
      }
    }

    if (st.phase === 'bleeding') {
      st.bleedFrame++;
      // Add deformed bleed layer every frame
      seed = st._bleedSeed + st.bleedFrame * 31;
      const variance = 0.08 + st.bleedFrame * 0.006;
      const bleedPoly = deformN(st.stroke._polygon, 4, variance);
      // Bleed alpha decreases over time (drying)
      const alpha = 0.035 * (1 - st.bleedFrame / BLEED_FRAMES);
      drawBleedLayer(bleedPoly, st.stroke.color, Math.max(0.008, alpha));

      if (st.bleedFrame >= BLEED_FRAMES) {
        st.phase = 'done';
      }
    }
  }

  frameCount++;

  if (states.every(s => s.phase === 'done')) {
    window._renderComplete = true;
    console.log('Brush stroke watercolor complete — ' + frameCount + ' frames');
  }

  return frameCount;
};

// Auto-play mode (for browser preview)
// If ?noauto is in the URL, don't auto-play (for puppeteer)
const autoPlay = !location.search.includes('noauto');
function autoTick() {
  if (!autoPlay) return;
  if (window._renderComplete) return;
  window._step();
  requestAnimationFrame(autoTick);
}
if (autoPlay) requestAnimationFrame(autoTick);

console.log('Watercolor stroke engine ready — ' + allStrokes.length + ' strokes, call _step() to advance');
</script>
</body>
</html>
