<!-- بسم الله الرحمن الرحيم -->
<!-- SZM v2 — Built from SAM 2 extraction data -->
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<script src="https://cdn.jsdelivr.net/npm/p5@2.0.3/lib/p5.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/p5.brush@2.0.2-beta"></script>
<style>
* { margin:0; }
body { background:#f2eada; overflow:hidden; margin:0; padding:0; }
canvas { object-fit:contain !important; display:block; }
#hud {
  position:fixed; top:0; left:0; width:100vw; height:100%;
  pointer-events:none; font-family:'SF Mono','Fira Code',monospace;
  overflow:hidden;
}
.track-box {
  position:absolute; transition: opacity 0.3s ease, left 0.4s ease, top 0.4s ease, width 0.4s ease, height 0.4s ease;
  min-width:60px; min-height:60px; overflow:visible;
}
.track-box::before, .track-box::after,
.track-box .bl::before, .track-box .br::before {
  content:''; position:absolute; width:30px; height:30px;
  border-color:#5a5248; border-style:solid; border-width:0;
}
.track-box::before { top:-2px; left:-2px; border-top-width:1.5px; border-left-width:1.5px; }
.track-box::after  { top:-2px; right:-2px; border-top-width:1.5px; border-right-width:1.5px; }
.track-box .bl::before { bottom:-2px; left:-2px; border-bottom-width:1.5px; border-left-width:1.5px; position:absolute; }
.track-box .br::before { bottom:-2px; right:-2px; border-bottom-width:1.5px; border-right-width:1.5px; position:absolute; }
.corner-circ { position:absolute; width:4px; height:4px; border:1px solid #5a5248; border-radius:50%; }
.corner-circ.tl { top:-2px; left:-2px; }
.corner-circ.tr { top:-2px; right:-2px; }
.corner-circ.bl2 { bottom:-2px; left:-2px; }
.corner-circ.br2 { bottom:-2px; right:-2px; }
.hud-info {
  position:absolute; bottom:100%; left:0; margin-bottom:4px;
  background:rgba(242,234,218,0.88); border:1px solid rgba(90,82,72,0.3);
  border-radius:4px; padding:4px 8px; white-space:nowrap;
}
.hud-label { color:#3a3430; font-weight:500; letter-spacing:0.3px; text-transform:uppercase; margin-bottom:3px; }
.hud-formula { color:#5a5248; font-weight:normal; letter-spacing:0.3px; margin-bottom:2px; }
.hud-coords { color:#8a8278; font-weight:normal; letter-spacing:0.3px; }
.track-box.complete { animation: pulse-complete 0.5s ease; }
@keyframes pulse-complete {
  0% { filter: drop-shadow(0 0 4px rgba(90,82,72,0.6)); }
  50% { filter: drop-shadow(0 0 12px rgba(90,82,72,0.8)); }
  100% { filter: drop-shadow(0 0 2px rgba(90,82,72,0.1)); }
}
#pencil-dot { position:absolute; width:14px; height:14px; pointer-events:none; z-index:15; }
#pencil-dot::before { content:''; position:absolute; left:6px; top:0; width:1px; height:14px; background:#5a5248; }
#pencil-dot::after { content:''; position:absolute; top:6px; left:0; width:14px; height:1px; background:#5a5248; }
#pencil-dot .ch-circle { position:absolute; top:4px; left:4px; width:6px; height:6px; border:1px solid #5a5248; border-radius:50%; }
</style>
</head>
<body>
<div id="hud"><div id="pencil-dot" style="display:none"><div class="ch-circle"></div></div></div>
<script>
// =============================================
// SZM v2 — Sheikh Zayed Grand Mosque
// Proportions from SAM 2 extraction (v3)
// System: Islamic Synthesis (φ + √2 + √3)
// Coherence: 82/100 | 37 strong matches
// =============================================
var PHI = (1 + Math.sqrt(5)) / 2;
var ROOT2 = Math.sqrt(2), ROOT3 = Math.sqrt(3);
var W = 1080, H = 1920, cx = W/2;

// === REAL PROPORTIONS FROM SAM 2 ===
// Main lancet arch frame (rise/span=1.386)
var archW = W * 0.700, archH = H * 0.868;
var archTop = H * 0.132, archBot = H * 1.0;
var archL = cx - archW/2, archR = cx + archW/2;
var wallW = (W - archW) / 2; // ~162px each side

// Main dome zone (slightly_pointed, rise/span=0.644)
var domeZoneCy = H * 0.396, domeZoneW = W * 0.402, domeZoneH = H * 0.323;
var domeR = domeZoneW * 0.42;
var domeCy = H * 0.30; // dome center
var drumTop = domeCy + domeR * 0.2;
var drumBot = drumTop + domeR / (PHI*PHI);
var drumL = cx - domeR * 0.85, drumR = cx + domeR * 0.85;

// Crescent finial
var finialY = H * 0.042;
var finialBot = domeCy - domeR + 10;

// Portal zone (0.264×0.230 at y=0.575)
var portalCy = H * 0.575, portalW = W * 0.264, portalH = H * 0.230;
var portalL = cx - portalW/2, portalR2 = cx + portalW/2;
var portalTop = portalCy - portalH/2, portalBot = portalCy + portalH/2;

// Portal arch (rise/span=0.586, slightly pointed)
var paW = W * 0.260, paH = H * 0.185;
var paRise = paW * 0.586;

// Small colonnade dome (h/d=1.395)
var sDomeCy = H * 0.927, sDomeW = W * 0.122, sDomeH = H * 0.146;
var sDomeR = sDomeW / 2;

// Symmetric colonnade arches
var colArchLx = W * 0.322, colArchRx = W * 0.683;
var colArchY = H * 0.947, colArchW = W * 0.058, colArchH = H * 0.106;

// Floor zone
var floorY = H * 0.85;

// Annotation constants
var ANNOT_FONT = 13;

// === HELPERS ===
function drawSegments(segs, p) {
  var tl = 0, ls = [];
  for (var i = 0; i < segs.length; i++) {
    var dx = segs[i].to[0]-segs[i].from[0], dy = segs[i].to[1]-segs[i].from[1];
    ls.push(Math.sqrt(dx*dx+dy*dy)); tl += ls[i];
  }
  var target = p * tl, d = 0, tx = segs[0].from[0], ty = segs[0].from[1];
  for (var i = 0; i < segs.length; i++) {
    if (d + ls[i] <= target) {
      brush.line(segs[i].from[0],segs[i].from[1],segs[i].to[0],segs[i].to[1]);
      d += ls[i]; tx = segs[i].to[0]; ty = segs[i].to[1];
    } else {
      var t = (target-d)/ls[i];
      var px = segs[i].from[0]+(segs[i].to[0]-segs[i].from[0])*t;
      var py = segs[i].from[1]+(segs[i].to[1]-segs[i].from[1])*t;
      brush.line(segs[i].from[0],segs[i].from[1],px,py);
      tx = px; ty = py; break;
    }
  }
  return [tx, ty];
}

// Lancet arch points (two arcs meeting at apex)
function lancetArcPts(cx2, springY, halfSpan, riseSpan, nPts) {
  var rise = halfSpan * 2 * riseSpan;
  var apexY = springY - rise;
  // Two-center pointed arch: each arc center is at the opposite springing point
  var R = Math.sqrt(rise*rise + halfSpan*halfSpan * 4) / 2;
  // Simplified: use quadratic bezier for each half
  var pts = [];
  for (var i = 0; i <= nPts; i++) {
    var t = i / nPts;
    var x, y;
    if (t <= 0.5) {
      // Left half: from left springing up to apex
      var tt = t * 2;
      x = cx2 - halfSpan + halfSpan * tt;
      y = springY - rise * Math.sin(Math.PI/2 * tt);
    } else {
      // Right half: from apex down to right springing
      var tt = (t - 0.5) * 2;
      x = cx2 + halfSpan * tt;
      y = apexY + rise * (1 - Math.cos(Math.PI/2 * tt));
    }
    pts.push([x, y, 0.3 + 0.7*Math.sin(Math.PI*t)]);
  }
  return pts;
}

// Dome hemisphere
function domePts(dcx, dcy, dr, n) {
  var pts = [];
  for (var i = 0; i <= n; i++) {
    var t = i/n, a = Math.PI*(1-t);
    pts.push([dcx + dr*Math.cos(a), dcy - dr*Math.sin(a), 0.3+0.7*Math.sin(Math.PI*t)]);
  }
  return pts;
}

var mainArchPts = lancetArcPts(cx, archBot - 50, archW/2, 1.386, 50);
var mainDomePts = domePts(cx, domeCy, domeR, 40);
var smallDomePts = domePts(cx, sDomeCy, sDomeR, 20);

// HUD labels
var _dimLabels = [], _lastDimStep = -1;
function clearDimLabels() { for(var i=0;i<_dimLabels.length;i++) _dimLabels[i].remove(); _dimLabels=[]; }
function addDimText(x,y,t,a) {
  for(var i=0;i<_dimLabels.length;i++) if(_dimLabels[i]._t===t) return;
  var el=document.createElement('div'); el._t=t;
  var s=window._hudScale||1, r=window._canvasEl?window._canvasEl.getBoundingClientRect():{left:0,top:0};
  el.style.cssText='position:absolute;color:#8a8278;font-family:SF Mono,Fira Code,monospace;font-size:'+Math.max(9,Math.round(ANNOT_FONT*s))+'px;white-space:nowrap;pointer-events:none;letter-spacing:0.3px;';
  el.style.left=(x*s+r.left)+'px'; el.style.top=(y*s+r.top)+'px';
  if(a==='center') el.style.transform='translateX(-50%)';
  else if(a==='right') el.style.transform='translateX(-100%)';
  el.textContent=t; document.getElementById('hud').appendChild(el); _dimLabels.push(el);
}

function drawAnnotations(step) {
  if(step!==_lastDimStep){clearDimLabels();_lastDimStep=step;}
  if(step>=0) {
    addDimText(cx, archBot-60, 'SAM\u2082 extraction | Islamic Synthesis (\u03C6+\u221A2+\u221A3)', 'center');
    addDimText(cx, archBot-40, 'Coherence: 82/100 | 37 strong matches | rise/span=1.386', 'center');
  }
  if(step>=3) addDimText(archR+10, archTop+archH/2, 'lancet 1.386', 'left');
  if(step>=4) addDimText(cx+domeR+15, domeCy, 'R='+Math.round(domeR), 'left');
  if(step>=8) addDimText(portalR2+10, portalCy, 'portal 0.586', 'left');
}

// === STEPS ===
var FPS = 30;
var STEPS = [
  // 0: Ground line
  {name:'GROUND LINE', formula:'y = archBot', dur:0.4,
   bbox:[30,archBot-30,W-30,archBot+10],
   draw:function(p){brush.set('2H','#5a5248',2.0); return drawSegments([{from:[30,archBot-20],to:[W-30,archBot-20]}],p);}},

  // 1: Left wall
  {name:'LEFT WALL', formula:'w = '+(wallW|0)+'px (15%)', dur:0.6,
   bbox:[0,archTop,archL+10,archBot],
   draw:function(p){
     brush.set('2H','#5a5248',2.0);
     var endY=archBot-20-(archBot-20-archTop)*p;
     brush.line(10,archBot-20,10,endY); brush.line(archL,archBot-20,archL,endY);
     if(p>0.2){brush.set('2H','#c0b8a8',0.3);var bh=(archBot-archTop)/10;
       for(var by=archBot-20-bh;by>endY;by-=bh) brush.line(15,by,archL-5,by);}
     return[archL,endY];}},

  // 2: Right wall
  {name:'RIGHT WALL', formula:'mirror', dur:0.6,
   bbox:[archR-10,archTop,W,archBot],
   draw:function(p){
     brush.set('2H','#5a5248',2.0);
     var endY=archBot-20-(archBot-20-archTop)*p;
     brush.line(W-10,archBot-20,W-10,endY); brush.line(archR,archBot-20,archR,endY);
     if(p>0.2){brush.set('2H','#c0b8a8',0.3);var bh=(archBot-archTop)/10;
       for(var by=archBot-20-bh;by>endY;by-=bh) brush.line(archR+5,by,W-15,by);}
     return[archR,endY];}},

  // 3: Main lancet arch (rise/span=1.386)
  {name:'LANCET ARCH', formula:'rise/span = 1.386 (SAM\u2082)', dur:1.8,
   bbox:[archL-10,archTop-10,archR+10,archBot],
   draw:function(p){
     brush.set('2H','#5a5248',2.5);
     var n=Math.max(3,Math.round(p*50));
     var pts=mainArchPts.slice(0,n+1);
     if(pts.length>=2) brush.spline(pts,0.3);
     var tip=pts[pts.length-1];
     if(p<0.9){brush.set('2H','#a09888',0.6);brush.line(cx,archBot-50,tip[0],tip[1]);brush.circle(cx,archBot-50,5);}
     return[tip[0],tip[1]];}},

  // 4: Main dome (compass sweep)
  {name:'MAIN DOME', formula:'R = '+Math.round(domeR)+' | \u03C6 hierarchy', dur:1.4,
   bbox:[cx-domeR-10,domeCy-domeR-10,cx+domeR+10,drumBot+5],
   draw:function(p){
     if(p<=0.7){
       brush.set('2H','#5a5248',2.0);
       var n=Math.max(3,Math.round(p/0.7*40));
       var pts=mainDomePts.slice(0,n+1);
       if(pts.length>=2) brush.spline(pts,0.3);
       var tip=pts[pts.length-1];
       brush.set('2H','#a09888',0.6);brush.line(cx,domeCy,tip[0],tip[1]);brush.circle(cx,domeCy,5);
       return[tip[0],tip[1]];
     } else {
       brush.set('2H','#5a5248',2.0); brush.spline(mainDomePts,0.3);
       brush.set('2H','#a09888',0.5); brush.circle(cx,domeCy,4);
       // Tile grid lines
       var t=(p-0.7)/0.3; brush.set('2H','#c0b8a8',0.35);
       var nl=Math.max(1,Math.round(t*5));
       for(var i=0;i<nl;i++){var f=(i+1)/6;var gy=domeCy-domeR+domeR*f;
         if(gy<domeCy){var dx2=Math.sqrt(domeR*domeR-(gy-domeCy)*(gy-domeCy));brush.line(cx-dx2,gy,cx+dx2,gy);}}
       return[cx+domeR,domeCy];
     }}},

  // 5: Drum with windows
  {name:'DOME DRUM', formula:'h = R/\u03C6\u00B2', dur:0.7,
   bbox:[drumL-5,drumTop-5,drumR+5,drumBot+5],
   draw:function(p){
     brush.set('2H','#5a5248',1.8);
     if(p<=0.4){return drawSegments([{from:[drumL,drumTop],to:[drumR,drumTop]},{from:[drumR,drumTop],to:[drumR,drumBot]},{from:[drumR,drumBot],to:[drumL,drumBot]},{from:[drumL,drumBot],to:[drumL,drumTop]}],p/0.4);}
     brush.line(drumL,drumTop,drumR,drumTop);brush.line(drumR,drumTop,drumR,drumBot);brush.line(drumR,drumBot,drumL,drumBot);brush.line(drumL,drumBot,drumL,drumTop);
     var t=(p-0.4)/0.6;brush.set('2H','#8a8278',0.7);var nw=5,wc=Math.max(1,Math.round(t*nw));
     var dw=drumR-drumL,dh=drumBot-drumTop,ww=dw*0.08,wh=dh*0.7,wy=drumTop+dh*0.15;
     for(var w=0;w<wc;w++){var wt=(w+1)/(nw+1),wcx2=drumL+dw*wt;
       brush.line(wcx2-ww/2,wy+wh,wcx2-ww/2,wy+wh*0.3);brush.line(wcx2+ww/2,wy+wh,wcx2+ww/2,wy+wh*0.3);
       var ap=[];for(var a=0;a<=8;a++){var at2=a/8;ap.push([wcx2-ww/2+ww*at2,wy+wh*0.3-wh*0.25*Math.sin(Math.PI*at2),0.3]);}
       brush.spline(ap,0.3);brush.line(wcx2-ww/2,wy+wh,wcx2+ww/2,wy+wh);}
     return[cx,drumBot];}},

  // 6: Crescent finial
  {name:'CRESCENT', formula:'apex finial', dur:0.5,
   bbox:[cx-30,finialY-10,cx+30,finialBot+10],
   draw:function(p){
     brush.set('2H','#5a5248',1.8);
     if(p<=0.5){var t=p/0.5;brush.line(cx,finialBot,cx,finialBot-(finialBot-finialY)*t);return[cx,finialBot-(finialBot-finialY)*t];}
     brush.line(cx,finialBot,cx,finialY);
     var t=(p-0.5)/0.5;brush.set('2H','#5a5248',1.5);var cR2=12;
     var n2=Math.max(3,Math.round(t*16));var cPts=[];
     for(var i=0;i<=n2;i++){var a=-Math.PI/2+Math.PI*(i/16);cPts.push([cx+5+cR2*Math.cos(a),finialY+20+cR2*Math.sin(a),0.5]);}
     if(cPts.length>=2) brush.spline(cPts,0.3);
     return[cx,finialY];}},

  // 7: Secondary dome (smaller, between main dome and portal)
  {name:'SECONDARY DOME', formula:'R = mainR/\u03C6', dur:0.8,
   bbox:[cx-domeR/PHI-10,domeZoneCy-5,cx+domeR/PHI+10,domeZoneCy+domeR/PHI+10],
   draw:function(p){
     var sr=domeR/PHI, scy=domeCy+domeR+sr*1.2;
     brush.set('2H','#5a5248',1.5);
     var pts=domePts(cx,scy,sr,24);
     var n=Math.max(3,Math.round(p*24));var sub=pts.slice(0,n+1);
     if(sub.length>=2) brush.spline(sub,0.3);
     var tip=sub[sub.length-1];
     brush.set('2H','#a09888',0.5);brush.line(cx,scy,tip[0],tip[1]);brush.circle(cx,scy,3);
     return[tip[0],tip[1]];}},

  // 8: Portal arch (rise/span=0.586)
  {name:'PORTAL ARCH', formula:'rise/span = 0.586', dur:1.0,
   bbox:[portalL-10,portalTop-10,portalR2+10,portalBot+10],
   draw:function(p){
     brush.set('2H','#5a5248',1.8);
     var pts=lancetArcPts(cx,portalBot,paW/2,0.586,30);
     if(p<=0.7){
       var n=Math.max(3,Math.round(p/0.7*30));var sub=pts.slice(0,n+1);
       if(sub.length>=2) brush.spline(sub,0.3);
       var tip=sub[sub.length-1]; return[tip[0],tip[1]];
     }
     brush.spline(pts,0.3);
     var t=(p-0.7)/0.3;var legEnd=portalBot+(portalBot-portalTop)*0.15*t;
     brush.line(portalL,portalBot,portalL,legEnd);brush.line(portalR2,portalBot,portalR2,legEnd);
     return[portalR2,legEnd];}},

  // 9: Nested inner arches
  {name:'INNER ARCHES', formula:'receding perspective', dur:0.6,
   bbox:[portalL+15,portalTop+10,portalR2-15,portalBot-5],
   draw:function(p){
     brush.set('2H','#8a8278',1.0);
     var scales=[0.78,0.58];var nc=Math.max(1,Math.round(p*2));var tx=cx,ty=portalBot;
     for(var ai=0;ai<nc;ai++){var sc=scales[ai],iw=paW*sc,il=cx-iw/2,ir=cx+iw/2;
       var iBot=portalBot-(portalBot-portalTop)*(1-sc)*0.3;
       var pts2=lancetArcPts(cx,iBot,iw/2,0.586,16);
       brush.spline(pts2,0.3);brush.line(il,iBot,il,iBot+15);brush.line(ir,iBot,ir,iBot+15);
       tx=ir;ty=iBot;}
     return[tx,ty];}},

  // 10: Left colonnade arch
  {name:'LEFT COL. ARCH', formula:'x=0.322 \u2194 0.683 (\u03C6 pair)', dur:0.5,
   bbox:[colArchLx-colArchW,colArchY-colArchH,colArchLx+colArchW,colArchY+10],
   draw:function(p){
     brush.set('2H','#8a8278',1.2);
     var pts2=lancetArcPts(colArchLx,colArchY,colArchW,1.0,16);
     var n=Math.max(3,Math.round(p*16));var sub=pts2.slice(0,n+1);
     if(sub.length>=2) brush.spline(sub,0.3);
     if(p>0.7){brush.line(colArchLx-colArchW,colArchY,colArchLx-colArchW,colArchY+colArchH*0.3);
       brush.line(colArchLx+colArchW,colArchY,colArchLx+colArchW,colArchY+colArchH*0.3);}
     var tip=sub[sub.length-1]; return[tip[0],tip[1]];}},

  // 11: Right colonnade arch (mirror)
  {name:'RIGHT COL. ARCH', formula:'bilateral pair (dev=0.005)', dur:0.5,
   bbox:[colArchRx-colArchW,colArchY-colArchH,colArchRx+colArchW,colArchY+10],
   draw:function(p){
     brush.set('2H','#8a8278',1.2);
     var pts2=lancetArcPts(colArchRx,colArchY,colArchW,1.0,16);
     var n=Math.max(3,Math.round(p*16));var sub=pts2.slice(0,n+1);
     if(sub.length>=2) brush.spline(sub,0.3);
     if(p>0.7){brush.line(colArchRx-colArchW,colArchY,colArchRx-colArchW,colArchY+colArchH*0.3);
       brush.line(colArchRx+colArchW,colArchY,colArchRx+colArchW,colArchY+colArchH*0.3);}
     var tip=sub[sub.length-1]; return[tip[0],tip[1]];}},

  // 12: Small colonnade dome (h/d=1.395)
  {name:'COLONNADE DOME', formula:'h/d = 1.395 (onion)', dur:0.6,
   bbox:[cx-sDomeR-10,sDomeCy-sDomeH/2-5,cx+sDomeR+10,sDomeCy+5],
   draw:function(p){
     brush.set('2H','#5a5248',1.5);
     var n=Math.max(3,Math.round(p*20));var sub=smallDomePts.slice(0,n+1);
     if(sub.length>=2) brush.spline(sub,0.3);
     var tip=sub[sub.length-1];
     brush.set('2H','#a09888',0.5);brush.circle(cx,sDomeCy,3);
     // Drum line
     if(p>0.5){brush.set('2H','#8a8278',0.8);brush.line(cx-sDomeR*0.85,sDomeCy,cx+sDomeR*0.85,sDomeCy);}
     return[tip[0],tip[1]];}},

  // 13: Geometric panels
  {name:'FACADE PANELS', formula:'flanking portal', dur:0.5,
   bbox:[archL+10,portalTop-10,archR-10,portalBot+10],
   draw:function(p){
     brush.set('2H','#8a8278',0.8);
     var lpL=archL+20,lpR=portalL-15,lpT=portalTop+10,lpB=portalBot-10;
     var rpL=portalR2+15,rpR=archR-20;
     if(p<=0.5){return drawSegments([{from:[lpL,lpT],to:[lpR,lpT]},{from:[lpR,lpT],to:[lpR,lpB]},{from:[lpR,lpB],to:[lpL,lpB]},{from:[lpL,lpB],to:[lpL,lpT]}],p/0.5);}
     brush.line(lpL,lpT,lpR,lpT);brush.line(lpR,lpT,lpR,lpB);brush.line(lpR,lpB,lpL,lpB);brush.line(lpL,lpB,lpL,lpT);
     brush.set('2H','#b0a898',0.4);for(var gi=1;gi<3;gi++){brush.line(lpL+(lpR-lpL)*gi/3,lpT+5,lpL+(lpR-lpL)*gi/3,lpB-5);brush.line(lpL+5,lpT+(lpB-lpT)*gi/3,lpR-5,lpT+(lpB-lpT)*gi/3);}
     var t=(p-0.5)/0.5;brush.set('2H','#8a8278',0.8);
     return drawSegments([{from:[rpL,lpT],to:[rpR,lpT]},{from:[rpR,lpT],to:[rpR,lpB]},{from:[rpR,lpB],to:[rpL,lpB]},{from:[rpL,lpB],to:[rpL,lpT]}],t);}},

  // 14: Floor pattern
  {name:'FLOOR PATTERN', formula:'perspective lines', dur:0.4,
   bbox:[archL+10,floorY-10,archR-10,archBot],
   draw:function(p){
     brush.set('2H','#b0a898',0.5);
     var nl=4,dc=Math.max(1,Math.round(p*nl));
     for(var i=0;i<dc;i++){var ly=floorY+(archBot-20-floorY)*i/nl;brush.line(archL+20,ly,archR-20,ly);}
     if(p>0.5){brush.set('2H','#c0b8a8',0.3);
       brush.line(cx,floorY,archL+30,archBot-20);brush.line(cx,floorY,archR-30,archBot-20);
       brush.line(cx-80,floorY,cx-120,archBot-20);brush.line(cx+80,floorY,cx+120,archBot-20);}
     return[cx,floorY];}},

  // === WASHES ===
  {name:'SKY WASH',formula:'#87CEEB \u03B1=35',dur:0.05,
   bbox:[archL,archTop,archR,archBot],
   draw:function(p){if(p>=0){randomSeed(3001);brush.noStroke();brush.fill('#87CEEB',35);brush.fillBleed(0.001);brush.fillTexture(0,0);
     var poly=[];for(var i=0;i<mainArchPts.length;i++)poly.push([mainArchPts[i][0],mainArchPts[i][1]]);
     brush.polygon(poly);brush.noFill();}return[cx,archTop];}},

  {name:'DOME WASH',formula:'warm grey',dur:0.05,
   bbox:[cx-domeR,domeCy-domeR,cx+domeR,domeCy],
   draw:function(p){if(p>=0){randomSeed(3002);brush.noStroke();brush.fill('#D4C5B0',25);brush.fillBleed(0.001);brush.fillTexture(0,0);
     var poly=[];for(var i=0;i<mainDomePts.length;i++)poly.push([mainDomePts[i][0],mainDomePts[i][1]]);
     poly.push([cx+domeR,domeCy+5],[cx-domeR,domeCy+5]);brush.polygon(poly);brush.noFill();}return[cx,domeCy];}},

  {name:'GOLD ACCENT',formula:'#C4A35A crescent',dur:0.05,
   bbox:[cx-20,finialY,cx+20,finialY+40],
   draw:function(p){if(p>=0){randomSeed(3003);brush.noStroke();brush.fill('#C4A35A',50);brush.fillBleed(0.001);brush.fillTexture(0,0);
     brush.circle(cx+5,finialY+20,14);brush.noFill();}return[cx,finialY];}},

  {name:'SHADOW WASH',formula:'portal depth',dur:0.05,
   bbox:[portalL,portalTop,portalR2,portalBot],
   draw:function(p){if(p>=0){randomSeed(3004);brush.noStroke();brush.fill('#4A5568',20);brush.fillBleed(0.001);brush.fillTexture(0,0);
     brush.rect(portalL+5,portalTop+5,portalW-10,portalH-10);brush.noFill();}return[cx,portalCy];}},

  {name:'FLOOR WASH',formula:'marble',dur:0.05,
   bbox:[archL,floorY,archR,archBot],
   draw:function(p){if(p>=0){randomSeed(3005);brush.noStroke();brush.fill('#D4C5B0',30);brush.fillBleed(0.001);brush.fillTexture(0,0);
     brush.rect(archL+10,floorY,archW-20,archBot-20-floorY);brush.noFill();}return[cx,archBot];}},

  {name:'WALL TINT',formula:'sandstone',dur:0.05,
   bbox:[0,archTop,wallW,archBot],
   draw:function(p){if(p>=0){
     randomSeed(3006);brush.noStroke();brush.fill('#C4B89A',25);brush.fillBleed(0.001);brush.fillTexture(0,0);
     brush.rect(5,archTop,wallW-10,archBot-20-archTop);brush.noFill();
     randomSeed(3007);brush.fill('#C4B89A',25);brush.fillBleed(0.001);brush.fillTexture(0,0);
     brush.rect(archR+5,archTop,wallW-10,archBot-20-archTop);brush.noFill();}return[cx,archBot];}}
];

// === TIMELINE ===
var PAUSE_S=0.14, WASH_START=15;
var frameStarts=[],frameEnds=[],f2=0;
for(var i=0;i<STEPS.length;i++){frameStarts.push(Math.round(f2));f2+=STEPS[i].dur*FPS;frameEnds.push(Math.round(f2));if(i<STEPS.length-1&&i<WASH_START-1)f2+=PAUSE_S*FPS;}
var totalAnimFrames=Math.round(f2);

// === HUD ===
var trackBox=null,pencilDot=null;
function createTrackBox(step){
  var hud=document.getElementById('hud');if(trackBox)trackBox.remove();
  var box=document.createElement('div');box.className='track-box';
  var s=window._hudScale||1,r=window._canvasEl?window._canvasEl.getBoundingClientRect():{left:0,top:0};
  var b=step.bbox,pad=12*s;
  var cb0=Math.max(20,b[0]),cb1=Math.max(20,b[1]),cb2=Math.min(W-20,b[2]),cb3=Math.min(H-20,b[3]);
  box.style.left=(cb0*s+r.left-pad)+'px';box.style.top=(cb1*s+r.top-pad)+'px';
  box.style.width=((cb2-cb0)*s+pad*2)+'px';box.style.height=((cb3-cb1)*s+pad*2)+'px';
  ['tl','tr','bl2','br2'].forEach(function(c){var ci=document.createElement('div');ci.className='corner-circ '+c;box.appendChild(ci);});
  var bl=document.createElement('div');bl.className='bl';bl.style.cssText='position:absolute;bottom:0;left:0;width:100%;height:100%;pointer-events:none;';box.appendChild(bl);
  var br=document.createElement('div');br.className='br';br.style.cssText='position:absolute;bottom:0;right:0;width:100%;height:100%;pointer-events:none;';box.appendChild(br);
  var _fs=Math.max(9,Math.round(ANNOT_FONT*(window._hudScale||1)))+'px';
  var info=document.createElement('div');info.className='hud-info';
  if((cb1*s+r.top-pad)<80){info.style.bottom='auto';info.style.top='6px';info.style.marginBottom='0';}
  var lbl=document.createElement('div');lbl.className='hud-label';lbl.style.fontSize=_fs;lbl.textContent=step.name;info.appendChild(lbl);
  var frm=document.createElement('div');frm.className='hud-formula';frm.style.fontSize=_fs;frm.textContent=step.formula;info.appendChild(frm);
  var crd=document.createElement('div');crd.className='hud-coords';crd.style.fontSize=_fs;crd.id='live-coords';crd.textContent='x:\u2014 y:\u2014';info.appendChild(crd);
  box.appendChild(info);hud.appendChild(box);trackBox=box;
}
function updatePencilDot(x,y){
  if(!pencilDot)pencilDot=document.getElementById('pencil-dot');
  pencilDot.style.display='block';var s=window._hudScale||1,r=window._canvasEl?window._canvasEl.getBoundingClientRect():{left:0,top:0};
  pencilDot.style.left=(x*s+r.left-7)+'px';pencilDot.style.top=(y*s+r.top-7)+'px';
  var el=document.getElementById('live-coords');if(el)el.textContent='x:'+Math.round(x)+' y:'+Math.round(y);
}

// === MAIN LOOP ===
var lastHudStep=-1,_inFillPhase=false;
function setup(){
  var c=createCanvas(W,H,WEBGL);pixelDensity(1);
  c.elt.style.width='100vw';c.elt.style.height=(window.innerWidth/(W/H))+'px';
  c.elt.style.display='block';c.elt.style.margin='0';
  brush.load();frameRate(FPS);
  window._hudScale=c.elt.getBoundingClientRect().width/W;window._canvasEl=c.elt;
  window.addEventListener('resize',function(){window._hudScale=c.elt.getBoundingClientRect().width/W;_lastDimStep=-1;});
}
function draw(){
  translate(-width/2,-height/2);
  var f3=frameCount-1;if(f3>=totalAnimFrames)f3=totalAnimFrames-1;
  var activeStep=0;for(var i=STEPS.length-1;i>=0;i--){if(f3>=frameStarts[i]){activeStep=i;break;}}
  if(activeStep<WASH_START){_inFillPhase=false;background(242,234,218);for(var i=0;i<activeStep;i++)STEPS[i].draw(1);}
  else{if(!_inFillPhase){background(242,234,218);for(var i=0;i<WASH_START;i++)STEPS[i].draw(1);drawAnnotations(WASH_START-1);_inFillPhase=true;}}
  var sf=f3-frameStarts[activeStep],sd=Math.max(1,frameEnds[activeStep]-frameStarts[activeStep]);
  var prog=Math.min(1,sf/sd);var tip=STEPS[activeStep].draw(prog);
  if(!_inFillPhase)drawAnnotations(activeStep-1);
  if(activeStep!==lastHudStep){
    if(lastHudStep>=0&&trackBox&&activeStep<WASH_START){
      var _s2=window._hudScale||1,_r2=window._canvasEl?window._canvasEl.getBoundingClientRect():{left:0,top:0};
      var oB=STEPS[lastHudStep].bbox,nB=STEPS[activeStep].bbox,_p2=12*_s2;
      var ox=oB[0]*_s2+_r2.left-_p2,oy=oB[1]*_s2+_r2.top-_p2,nx=nB[0]*_s2+_r2.left-_p2,ny=nB[1]*_s2+_r2.top-_p2;
      var ln=document.createElement('div');ln.style.cssText='position:absolute;pointer-events:none;z-index:5;';
      var dx3=nx-ox,dy3=ny-oy,len=Math.sqrt(dx3*dx3+dy3*dy3),ang=Math.atan2(dy3,dx3)*180/Math.PI;
      ln.style.left=ox+'px';ln.style.top=oy+'px';ln.style.width=len+'px';ln.style.height='1.5px';
      ln.style.background='#5a5248';ln.style.transformOrigin='0 0';ln.style.transform='rotate('+ang+'deg)';
      ln.style.opacity='0.7';ln.style.transition='opacity 0.55s ease';
      document.getElementById('hud').appendChild(ln);setTimeout(function(){ln.style.opacity='0';},300);setTimeout(function(){ln.remove();},900);
    }
    createTrackBox(STEPS[activeStep]);lastHudStep=activeStep;
  }
  if(trackBox){var _r3=window._canvasEl?window._canvasEl.getBoundingClientRect():{left:0,top:0},_s3=window._hudScale||1,_b3=STEPS[activeStep].bbox,_p3=12*_s3;
    trackBox.style.left=(Math.max(20,_b3[0])*_s3+_r3.left-_p3)+'px';trackBox.style.top=(Math.max(20,_b3[1])*_s3+_r3.top-_p3)+'px';}
  if(tip)updatePencilDot(tip[0],tip[1]);
  if(f3>=totalAnimFrames-1){noLoop();if(pencilDot)pencilDot.style.display='none';if(trackBox)trackBox.remove();trackBox=null;
    setTimeout(function(){clearDimLabels();_lastDimStep=-1;},6500);setTimeout(function(){window.location.reload();},7000);}
}
</script>
