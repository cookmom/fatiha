<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Ottoman Flower Options - 9 Styles</title>
  <script src="p5.min.js"></script>
  <script src="p5.brush.min.js"></script>
  <style>
    html, body { margin: 0; padding: 0; overflow: hidden; background: #1a1a1a; display: flex; justify-content: center; align-items: center; height: 100vh; }
    canvas { display: block; }
    .label { position: absolute; color: #6b5a48; font-family: Georgia, serif; font-size: 14px; text-align: center; pointer-events: none; }
  </style>
</head>
<body>
<script>
// Round petal: wide elliptical
function roundPetal(cx, cy, angle, len, wid) {
  var pts = [], n = 28;
  for (var i = 0; i <= n; i++) {
    var t = i / n;
    var w = Math.sin(t * Math.PI) * (0.6 + 0.4 * Math.sin(t * Math.PI * 0.8));
    var along = t * len, across = w * wid * 0.5;
    pts.push([cx + Math.cos(angle)*along - Math.sin(angle)*across, cy + Math.sin(angle)*along + Math.cos(angle)*across]);
  }
  for (var i = n; i >= 0; i--) {
    var t = i / n;
    var w = Math.sin(t * Math.PI) * (0.6 + 0.4 * Math.sin(t * Math.PI * 0.8));
    var along = t * len, across = -w * wid * 0.5;
    pts.push([cx + Math.cos(angle)*along - Math.sin(angle)*across, cy + Math.sin(angle)*along + Math.cos(angle)*across]);
  }
  return pts;
}

// Almond petal: pointed tip
function almondPetal(cx, cy, angle, len, wid) {
  var pts = [], n = 24;
  for (var i = 0; i <= n; i++) {
    var t = i / n, w = Math.sin(t * Math.PI), along = t * len, across = w * wid * 0.5;
    pts.push([cx + Math.cos(angle)*along - Math.sin(angle)*across, cy + Math.sin(angle)*along + Math.cos(angle)*across]);
  }
  for (var i = n; i >= 0; i--) {
    var t = i / n, w = -Math.sin(t * Math.PI), along = t * len, across = w * wid * 0.5;
    pts.push([cx + Math.cos(angle)*along - Math.sin(angle)*across, cy + Math.sin(angle)*along + Math.cos(angle)*across]);
  }
  return pts;
}

// Thin pointed petal
function thinPetal(cx, cy, angle, len, wid) {
  var pts = [], n = 24;
  for (var i = 0; i <= n; i++) {
    var t = i / n, w = Math.sin(t * Math.PI) * (1 - 0.5 * t), along = t * len, across = w * wid * 0.35;
    pts.push([cx + Math.cos(angle)*along - Math.sin(angle)*across, cy + Math.sin(angle)*along + Math.cos(angle)*across]);
  }
  for (var i = n; i >= 0; i--) {
    var t = i / n, w = Math.sin(t * Math.PI) * (1 - 0.5 * t), along = t * len, across = -w * wid * 0.35;
    pts.push([cx + Math.cos(angle)*along - Math.sin(angle)*across, cy + Math.sin(angle)*along + Math.cos(angle)*across]);
  }
  return pts;
}

// Wide round petal with narrow base
function wideRoundPetal(cx, cy, angle, len, wid) {
  var pts = [], n = 28;
  for (var i = 0; i <= n; i++) {
    var t = i / n, w;
    if (t < 0.15) w = t / 0.15 * 0.2;
    else if (t < 0.4) w = 0.2 + (t - 0.15) / 0.25 * 0.8;
    else if (t < 0.85) w = 1.0;
    else w = Math.cos((t - 0.85) / 0.15 * Math.PI * 0.5);
    var along = t * len, across = w * wid * 0.5;
    pts.push([cx + Math.cos(angle)*along - Math.sin(angle)*across, cy + Math.sin(angle)*along + Math.cos(angle)*across]);
  }
  for (var i = n; i >= 0; i--) {
    var t = i / n, w;
    if (t < 0.15) w = t / 0.15 * 0.2;
    else if (t < 0.4) w = 0.2 + (t - 0.15) / 0.25 * 0.8;
    else if (t < 0.85) w = 1.0;
    else w = Math.cos((t - 0.85) / 0.15 * Math.PI * 0.5);
    var along = t * len, across = -w * wid * 0.5;
    pts.push([cx + Math.cos(angle)*along - Math.sin(angle)*across, cy + Math.sin(angle)*along + Math.cos(angle)*across]);
  }
  return pts;
}

// Bud petal: short cupped
function budPetal(cx, cy, angle, len, wid) {
  var pts = [], n = 20;
  for (var i = 0; i <= n; i++) {
    var t = i / n, w = Math.sin(t * Math.PI) * (0.7 + 0.3 * Math.cos(t * Math.PI * 0.6));
    var along = t * len, across = w * wid * 0.55, curve = Math.sin(t * Math.PI) * len * 0.06;
    pts.push([cx + Math.cos(angle)*along - Math.sin(angle)*(across+curve), cy + Math.sin(angle)*along + Math.cos(angle)*(across+curve)]);
  }
  for (var i = n; i >= 0; i--) {
    var t = i / n, w = Math.sin(t * Math.PI) * (0.7 + 0.3 * Math.cos(t * Math.PI * 0.6));
    var along = t * len, across = -w * wid * 0.4, curve = Math.sin(t * Math.PI) * len * 0.06;
    pts.push([cx + Math.cos(angle)*along - Math.sin(angle)*(across+curve), cy + Math.sin(angle)*along + Math.cos(angle)*(across+curve)]);
  }
  return pts;
}

// Daisy petal: thin uniform
function daisyPetal(cx, cy, angle, len, wid) {
  var pts = [], n = 20;
  for (var i = 0; i <= n; i++) {
    var t = i / n, w;
    if (t < 0.1) w = t / 0.1 * 0.7;
    else if (t < 0.85) w = 0.7 + 0.3 * Math.sin((t - 0.1) / 0.75 * Math.PI);
    else w = Math.cos((t - 0.85) / 0.15 * Math.PI * 0.5) * 0.7;
    var along = t * len, across = w * wid * 0.35;
    pts.push([cx + Math.cos(angle)*along - Math.sin(angle)*across, cy + Math.sin(angle)*along + Math.cos(angle)*across]);
  }
  for (var i = n; i >= 0; i--) {
    var t = i / n, w;
    if (t < 0.1) w = t / 0.1 * 0.7;
    else if (t < 0.85) w = 0.7 + 0.3 * Math.sin((t - 0.1) / 0.75 * Math.PI);
    else w = Math.cos((t - 0.85) / 0.15 * Math.PI * 0.5) * 0.7;
    var along = t * len, across = -w * wid * 0.35;
    pts.push([cx + Math.cos(angle)*along - Math.sin(angle)*across, cy + Math.sin(angle)*along + Math.cos(angle)*across]);
  }
  return pts;
}

// ============================================================
// FLOWER FUNCTIONS
// ============================================================

function drawFlower1(cx, cy) {
  var centerR = 18;
  brush.noStroke();
  for (var i = 0; i < 8; i++) {
    var a = (i / 8) * TWO_PI + random(-0.05, 0.05);
    brush.fill('#8a1020', 95 + random(-10, 10));
    brush.fillBleed(random(0.22, 0.28), 'out');
    brush.fillTexture(0.45, 0.3);
    brush.polygon(roundPetal(cx + Math.cos(a)*centerR, cy + Math.sin(a)*centerR, a, 65, 40));
  }
  brush.fill('#c4a040', 170); brush.fillBleed(0.15); brush.fillTexture(0.3, 0.2);
  brush.circle(cx, cy, centerR);
}

function drawFlower2(cx, cy) {
  var centerR = 16;
  brush.noStroke();
  for (var i = 0; i < 6; i++) {
    var a = (i / 6) * TWO_PI + random(-0.06, 0.06);
    brush.fill('#a02040', 100 + random(-8, 8));
    brush.fillBleed(random(0.2, 0.28), 'out');
    brush.fillTexture(0.45, 0.3);
    brush.polygon(almondPetal(cx + Math.cos(a)*centerR, cy + Math.sin(a)*centerR, a, 70, 28));
  }
  brush.fill('#c4a040', 170); brush.fillBleed(0.15); brush.fillTexture(0.3, 0.2);
  brush.circle(cx, cy, centerR);
}

function drawFlower3(cx, cy) {
  var centerR = 16;
  brush.noStroke();
  for (var i = 0; i < 8; i++) {
    var a = (i / 8) * TWO_PI + random(-0.05, 0.05);
    brush.fill('#d06080', 85 + random(-10, 10));
    brush.fillBleed(random(0.22, 0.28), 'out');
    brush.fillTexture(0.4, 0.3);
    brush.polygon(roundPetal(cx + Math.cos(a)*centerR, cy + Math.sin(a)*centerR, a, 60, 38));
  }
  brush.fill('#d4a850', 165); brush.fillBleed(0.15); brush.fillTexture(0.3, 0.2);
  brush.circle(cx, cy, centerR);
}

function drawFlower4(cx, cy) {
  var centerR = 14;
  brush.noStroke();
  for (var i = 0; i < 10; i++) {
    var a = (i / 10) * TWO_PI + random(-0.04, 0.04);
    brush.fill('#c04060', 90 + random(-8, 8));
    brush.fillBleed(random(0.2, 0.26), 'out');
    brush.fillTexture(0.45, 0.3);
    brush.polygon(thinPetal(cx + Math.cos(a)*centerR, cy + Math.sin(a)*centerR, a, 75, 22));
  }
  brush.fill('#c4a040', 175); brush.fillBleed(0.15); brush.fillTexture(0.3, 0.2);
  brush.circle(cx, cy, centerR);
}

function drawFlower5(cx, cy) {
  var centerR = 20;
  brush.noStroke();
  for (var i = 0; i < 5; i++) {
    var a = (i / 5) * TWO_PI - HALF_PI + random(-0.04, 0.04);
    brush.fill('#7a1828', 100 + random(-8, 8));
    brush.fillBleed(random(0.22, 0.28), 'out');
    brush.fillTexture(0.45, 0.35);
    brush.polygon(almondPetal(cx + Math.cos(a)*centerR, cy + Math.sin(a)*centerR, a, 60, 32));
  }
  for (var i = 0; i < 5; i++) {
    var a = (i / 5) * TWO_PI - HALF_PI + Math.PI/5 + random(-0.04, 0.04);
    brush.fill('#a03040', 110);
    brush.fillBleed(random(0.2, 0.26), 'out');
    brush.fillTexture(0.4, 0.3);
    brush.polygon(almondPetal(cx + Math.cos(a)*centerR*0.6, cy + Math.sin(a)*centerR*0.6, a, 36, 22));
  }
  brush.fill('#c4a040', 175); brush.fillBleed(0.15); brush.fillTexture(0.3, 0.2);
  brush.circle(cx, cy, centerR * 0.7);
}

function drawFlower6(cx, cy) {
  var centerR = 10;
  brush.noStroke();
  var angles = [-HALF_PI - 0.3, -HALF_PI + 0.5, -HALF_PI + 1.3];
  for (var i = 0; i < 3; i++) {
    var a = angles[i] + random(-0.05, 0.05);
    brush.fill('#b03050', 100 + i * 15);
    brush.fillBleed(random(0.22, 0.28), 'out');
    brush.fillTexture(0.45, 0.3);
    brush.polygon(budPetal(cx + Math.cos(a)*centerR, cy + Math.sin(a)*centerR, a, 50, 35));
  }
  brush.fill('#c4a040', 170); brush.fillBleed(0.15); brush.fillTexture(0.3, 0.2);
  brush.circle(cx, cy, centerR);
}

function drawFlower7(cx, cy) {
  var centerR = 18;
  brush.noStroke();
  for (var i = 0; i < 5; i++) {
    var a = (i / 5) * TWO_PI - HALF_PI + random(-0.03, 0.03);
    brush.fill('#c03050', 90 + random(-8, 8));
    brush.fillBleed(random(0.22, 0.28), 'out');
    brush.fillTexture(0.45, 0.3);
    brush.polygon(wideRoundPetal(cx + Math.cos(a)*(centerR+2), cy + Math.sin(a)*(centerR+2), a, 70, 44));
  }
  brush.fill('#c4a040', 170); brush.fillBleed(0.15); brush.fillTexture(0.3, 0.2);
  brush.circle(cx, cy, centerR);
}

function drawFlower8(cx, cy) {
  var centerR = 16;
  brush.noStroke();
  for (var i = 0; i < 5; i++) {
    var a = (i / 5) * TWO_PI + random(-0.04, 0.04);
    brush.fill('#7a1828', 95 + random(-8, 8));
    brush.fillBleed(random(0.22, 0.28), 'out');
    brush.fillTexture(0.45, 0.3);
    brush.polygon(roundPetal(cx + Math.cos(a)*(centerR+4), cy + Math.sin(a)*(centerR+4), a, 70, 36));
  }
  for (var i = 0; i < 5; i++) {
    var a = (i / 5) * TWO_PI + Math.PI/5 + random(-0.04, 0.04);
    brush.fill('#d06080', 100 + random(-8, 8));
    brush.fillBleed(random(0.2, 0.26), 'out');
    brush.fillTexture(0.4, 0.3);
    brush.polygon(roundPetal(cx + Math.cos(a)*centerR, cy + Math.sin(a)*centerR, a, 50, 28));
  }
  brush.fill('#c4a040', 175); brush.fillBleed(0.15); brush.fillTexture(0.3, 0.2);
  brush.circle(cx, cy, centerR * 0.8);
}

function drawFlower9(cx, cy) {
  var centerR = 22;
  brush.noStroke();
  for (var i = 0; i < 8; i++) {
    var a = (i / 8) * TWO_PI + random(-0.04, 0.04);
    brush.fill('#e080a0', 85 + random(-10, 10));
    brush.fillBleed(random(0.22, 0.28), 'out');
    brush.fillTexture(0.4, 0.3);
    brush.polygon(daisyPetal(cx + Math.cos(a)*centerR, cy + Math.sin(a)*centerR, a, 60, 18));
  }
  brush.fill('#c4a040', 175); brush.fillBleed(0.18); brush.fillTexture(0.35, 0.25);
  brush.circle(cx, cy, centerR);
}

// MAIN
function setup() {
  createCanvas(1080, 1920, WEBGL);
  brush.load();
  translate(-width / 2, -height / 2);
  randomSeed(42);
  background(248, 242, 228);

  var cols = 3, rows = 3;
  var marginX = 100, marginTop = 120, marginBot = 80;
  var cellW = (1080 - marginX * 2) / cols;
  var cellH = (1920 - marginTop - marginBot) / rows;
  var flowers = [drawFlower1, drawFlower2, drawFlower3, drawFlower4, drawFlower5, drawFlower6, drawFlower7, drawFlower8, drawFlower9];

  for (var i = 0; i < 9; i++) {
    var col = i % cols, row = Math.floor(i / cols);
    var cx = marginX + cellW * col + cellW / 2;
    var cy = marginTop + cellH * row + cellH / 2 - 20;
    flowers[i](cx, cy);
  }
}
</script>
<script>
window.addEventListener('load', function() {
  var names = ['1. Round crimson', '2. Almond crimson', '3. Pink round', '4. Star flower', '5. Ottoman penc', '6. Tight bud', '7. Open bloom', '8. Layered hatayi', '9. Simple daisy'];
  var cols = 3, rows = 3, marginX = 100, marginTop = 120, marginBot = 80;
  var cellW = (1080 - marginX * 2) / cols, cellH = (1920 - marginTop - marginBot) / rows;
  var canvas = document.querySelector('canvas');
  var rect = canvas.getBoundingClientRect();
  var scaleX = rect.width / 1080, scaleY = rect.height / 1920;
  for (var i = 0; i < 9; i++) {
    var col = i % cols, row = Math.floor(i / cols);
    var cx = marginX + cellW * col + cellW / 2;
    var cy = marginTop + cellH * row + cellH / 2 + 100;
    var div = document.createElement('div');
    div.className = 'label';
    div.textContent = names[i];
    div.style.left = (rect.left + cx * scaleX - 60) + 'px';
    div.style.top = (rect.top + cy * scaleY) + 'px';
    div.style.width = '120px';
    document.body.appendChild(div);
  }
});
</script>
</body>
</html>
