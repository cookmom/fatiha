<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <rect width="800" height="800" fill="#0d0d12"/>

  <!-- Blue — minute hand, furthest offset -->
  <g transform="translate(432,418) scale(22)" fill="none" stroke-linejoin="round" opacity="0.9">
    <polygon points="0,-9.375 8.66,-4.375 8.66,5.625 0,10.625 -8.66,5.625 -8.66,-4.375" stroke="#2255ff" stroke-width=".6"/>
    <line x1="0" y1="-9.375" x2="0" y2="10.625" stroke="#2255ff" stroke-width=".24"/>
    <line x1="-8.66" y1="-4.375" x2="0" y2="-0.375" stroke="#2255ff" stroke-width=".24"/>
    <line x1="8.66" y1="-4.375" x2="0" y2="-0.375" stroke="#2255ff" stroke-width=".24"/>
  </g>

  <!-- Violet-magenta — hour hand, mid offset -->
  <g transform="translate(416,409) scale(22)" fill="none" stroke-linejoin="round" opacity="0.95">
    <polygon points="0,-9.375 8.66,-4.375 8.66,5.625 0,10.625 -8.66,5.625 -8.66,-4.375" stroke="#cc44ff" stroke-width=".6"/>
    <line x1="0" y1="-9.375" x2="0" y2="10.625" stroke="#cc44ff" stroke-width=".24"/>
    <line x1="-8.66" y1="-4.375" x2="0" y2="-0.375" stroke="#cc44ff" stroke-width=".24"/>
    <line x1="8.66" y1="-4.375" x2="0" y2="-0.375" stroke="#cc44ff" stroke-width=".24"/>
  </g>

  <!-- White — second hand, front layer -->
  <g transform="translate(400,400) scale(22)" fill="none" stroke-linejoin="round">
    <polygon points="0,-9.375 8.66,-4.375 8.66,5.625 0,10.625 -8.66,5.625 -8.66,-4.375" stroke="rgba(232,228,220,0.95)" stroke-width=".55"/>
    <line x1="0" y1="-9.375" x2="0" y2="10.625" stroke="rgba(232,228,220,0.95)" stroke-width=".55"/>
    <line x1="-8.66" y1="-4.375" x2="0" y2="-0.375" stroke="rgba(232,228,220,0.95)" stroke-width=".55"/>
    <line x1="8.66" y1="-4.375" x2="0" y2="-0.375" stroke="rgba(232,228,220,0.95)" stroke-width=".55"/>
  </g>
</svg>
