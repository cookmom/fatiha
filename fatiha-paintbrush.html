<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Fatiha — p5.brush Ottoman Garden</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#0d0d0d; display:flex; justify-content:center; align-items:center;
         height:100vh; overflow:hidden; font-family:sans-serif; }
  canvas { display:block; }
  #playBtn { position:fixed; bottom:40px; left:50%; transform:translateX(-50%);
    background:rgba(192,8,48,0.85); color:#fff; border:none; border-radius:28px;
    padding:14px 36px; font-size:16px; cursor:pointer; z-index:10;
    letter-spacing:1px; transition:opacity 0.4s; }
  #playBtn:hover { background:rgba(232,8,72,0.95); }
  #playBtn.hidden { opacity:0; pointer-events:none; }
</style>
</head>
<body>
<button id="playBtn">&#9654; Bismillah</button>

<script src="https://cdn.jsdelivr.net/npm/p5@2.0.3/lib/p5.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/p5.brush@2.0.0-beta/dist/p5.brush.min.js"></script>

<script>
// ── CONSTANTS ──────────────────────────────────────────────
const CW = 430, CH = 932;
const PHI = 1.618033988749;
const TOTAL_DUR = 6.0;
const BG = '#0d0d0d';

// ── COLOR PALETTE (from threejs.html) ──────────────────────
const CRIMSON   = '#C00830';
const ROSE_PINK = '#FF1455';
const HOT_PINK  = '#FF286E';
const AMBER     = '#FF7020';
const GOLD      = '#F8AA19';
const DARK_GOLD = '#C36E08';
const LEAF_GREEN   = '#148210';
const DARK_GREEN   = '#085508';
const FOREST_GREEN = '#0A550A';
const STEM_GREEN   = '#14820F';
const LIGHT_GREEN  = '#23AF19';

const PETAL_HUES = [
  '#FF60A0','#E8105C','#A0082E',
  '#FF5888','#FF1860','#D0105A',
  '#FF7060','#FF2838','#D0282A',
  '#FF5898','#E8105C','#B00838',
  '#FF8838','#FF5010','#C01818'
];

// ── TAJWEED EVENTS (from threejs.html) ─────────────────────
const TAJWEED = [
  {t:0.05,type:'bud',size:0.35,side:-1},
  {t:0.15,type:'leaf',size:0.3,side:1},
  {t:0.28,type:'thorn',size:0.35,side:1},
  {t:0.38,type:'leaf',size:0.25,side:-1},
  {t:0.50,type:'ghunnah',size:0.5,side:-1},
  {t:0.58,type:'bud',size:0.3,side:1},
  {t:0.68,type:'leaf',size:0.2,side:-1},
  {t:0.78,type:'bud',size:0.3,side:1},
  {t:0.85,type:'golden_rose',size:1.0,side:1},
  {t:0.95,type:'vine',size:0.5,side:-1},
  {t:1.08,type:'leaf',size:0.35,side:1},
  {t:1.18,type:'leaf',size:0.3,side:-1},
  {t:1.30,type:'bud',size:0.2,side:-1},
  {t:1.38,type:'leaf',size:0.15,side:1},
  {t:1.52,type:'leaf',size:0.25,side:1},
  {t:1.60,type:'rose',size:0.8,side:1},
  {t:1.72,type:'leaf',size:0.35,side:-1},
  {t:1.85,type:'bud',size:0.4,side:1},
  {t:1.98,type:'thorn',size:0.3,side:-1},
  {t:2.08,type:'leaf',size:0.2,side:1},
  {t:2.18,type:'ghunnah',size:0.55,side:-1},
  {t:2.28,type:'vine',size:0.75,side:1},
  {t:2.42,type:'leaf',size:0.35,side:-1},
  {t:2.55,type:'leaf',size:0.3,side:1},
  {t:2.68,type:'ghunnah',size:0.45,side:-1},
  {t:2.78,type:'bud',size:0.3,side:1},
  {t:2.88,type:'leaf',size:0.2,side:-1},
  {t:3.05,type:'leaf',size:0.25,side:1},
  {t:3.15,type:'rose',size:0.7,side:-1},
  {t:3.28,type:'leaf',size:0.3,side:1},
  {t:3.40,type:'bud',size:0.35,side:-1},
  {t:3.55,type:'bud',size:0.25,side:1},
  {t:3.65,type:'leaf',size:0.2,side:-1},
  {t:3.78,type:'vine',size:1.0,side:1},
  {t:3.95,type:'leaf',size:0.4,side:-1},
  {t:4.15,type:'leaf',size:0.35,side:1},
  {t:4.35,type:'leaf',size:0.3,side:-1},
  {t:4.55,type:'bud',size:0.3,side:1},
  {t:4.75,type:'ghunnah',size:0.4,side:-1},
  {t:4.88,type:'bud',size:0.3,side:1},
  {t:5.00,type:'leaf',size:0.2,side:-1},
  {t:5.15,type:'bloom',size:0.7,side:1},
  {t:5.35,type:'leaf',size:0.15,side:1},
  {t:5.50,type:'leaf',size:0.1,side:-1}
];

// ── GOLDEN SPIRAL ARC MATH (from threejs.html) ─────────────
function buildSpiralPoints() {
  const margin = 24;
  const avW = CW - margin * 2;
  const avH = CH - margin * 2;
  let gw, gh;
  if (avW * PHI <= avH) { gw = avW; gh = avW * PHI; }
  else { gh = avH; gw = avH / PHI; }
  const ox = (CW - gw) / 2;
  const oy = (CH - gh) / 2;

  // Recursive golden rectangle subdivision → arcs
  const arcs = [];
  let rx = ox, ry = oy, rw = gw, rh = gh;
  for (let i = 0; i < 9; i++) {
    const d = i % 4; // 0=bottom,1=left,2=top,3=right
    const sq = Math.min(rw, rh);
    let cx, cy, sa, ea;
    if (d === 0)      { cx = rx + sq; cy = ry;      sa = Math.PI/2;   ea = Math.PI; }
    else if (d === 1) { cx = rx + sq; cy = ry + sq;  sa = Math.PI;     ea = 3*Math.PI/2; }
    else if (d === 2) { cx = rx;      cy = ry + sq;  sa = 3*Math.PI/2; ea = 2*Math.PI; }
    else              { cx = rx;      cy = ry;        sa = 0;           ea = Math.PI/2; }
    arcs.push({ cx, cy, r: sq, sa, ea });

    if (d === 0)      { ry += sq; rh -= sq; }
    else if (d === 1) { rw -= sq; }
    else if (d === 2) { rh -= sq; }
    else              { rx += sq; ry += sq; rw -= sq; rh -= sq; }
  }

  // Sample points along arcs
  const totalR = arcs.reduce((s, a) => s + a.r, 0);
  const TARGET = 900;
  const pts = [];
  for (const arc of arcs) {
    const n = Math.max(6, Math.round(TARGET * arc.r / totalR));
    for (let j = 0; j <= n; j++) {
      const t = j / n;
      const angle = arc.sa + (arc.ea - arc.sa) * t;
      pts.push({
        x: arc.cx + arc.r * Math.cos(angle),
        y: arc.cy + arc.r * Math.sin(angle)
      });
    }
  }
  return pts;
}

function getNormal(pts, i) {
  const ni = Math.min(i + 1, pts.length - 1);
  const pi = Math.max(i - 1, 0);
  const dx = pts[ni].x - pts[pi].x;
  const dy = pts[ni].y - pts[pi].y;
  const l = Math.sqrt(dx * dx + dy * dy) || 1;
  return { x: -dy / l, y: dx / l };
}

// ── AUDIO STATE ────────────────────────────────────────────
let audio, audioCtx, analyser, timeData;
let isPlaying = false;
let smoothAmp = 0;
let tajweedIdx = 0;

// ── DRAWING STATE ──────────────────────────────────────────
let spiralPts;
let drawnVineIdx = 0;     // how far along the vine we've drawn
let spawnedElements = [];  // garden elements spawned by tajweed
let fallingPetals = [];

// ── p5.js SKETCH ───────────────────────────────────────────
function setup() {
  createCanvas(CW, CH, WEBGL);
  brush.load();

  // Register custom brushes
  brush.add('vine', {
    type: 'custom',
    weight: 4,
    vibration: 0.8,
    opacity: 200,
    spacing: 1.5,
    pressure: [0.3, 1.2, 0.3],
    rotate: 'natural',
    tip: (_m) => {
      _m.circle(0, 0, 1);
    }
  });

  brush.add('saz_leaf', {
    type: 'custom',
    weight: 18,
    vibration: 0.3,
    opacity: 180,
    spacing: 0.5,
    pressure: [0.1, 1.0, 0.1],
    rotate: 'natural',
    tip: (_m) => {
      // Elongated saz-leaf shape
      _m.beginShape();
      _m.vertex(0, -0.6);
      _m.bezierVertex(0.35, -0.3, 0.4, 0.2, 0, 0.6);
      _m.bezierVertex(-0.4, 0.2, -0.35, -0.3, 0, -0.6);
      _m.endShape(CLOSE);
    }
  });

  brush.add('rose_stamp', {
    type: 'custom',
    weight: 30,
    vibration: 0,
    opacity: 220,
    spacing: 0.3,
    pressure: [1, 1, 1],
    rotate: 'random',
    tip: (_m) => {
      // Rose petal cluster stamp
      for (let i = 0; i < 5; i++) {
        const a = (i / 5) * TWO_PI;
        _m.push();
        _m.rotate(a);
        _m.ellipse(0.2, 0, 0.4, 0.25);
        _m.pop();
      }
    }
  });

  brush.add('petal_fall', {
    type: 'custom',
    weight: 8,
    vibration: 1.5,
    opacity: 140,
    spacing: 2,
    pressure: [0.5, 1, 0.2],
    rotate: 'random',
    tip: (_m) => {
      _m.ellipse(0, 0, 0.5, 0.3);
    }
  });

  spiralPts = buildSpiralPoints();
  background(BG);
}

function draw() {
  // ── Audio sync ──
  let progress = 0;
  let energy = 0;

  if (isPlaying && audio) {
    const time = audio.currentTime;
    progress = Math.min(time / TOTAL_DUR, 1);
    const rawAmp = getAmp();
    smoothAmp += (rawAmp - smoothAmp) * 0.12;
    energy = Math.min(1, smoothAmp * 3);

    // Dispatch tajweed events
    while (tajweedIdx < TAJWEED.length && time >= TAJWEED[tajweedIdx].t) {
      spawnGardenElement(TAJWEED[tajweedIdx]);
      tajweedIdx++;
    }

    // Check if done
    if (audio.ended || progress >= 1) {
      isPlaying = false;
      document.getElementById('playBtn').classList.remove('hidden');
    }
  }

  if (!isPlaying && drawnVineIdx === 0) return;

  // ── COORDINATE SYSTEM: translate to top-left origin ──
  push();
  translate(-CW / 2, -CH / 2);

  // ── 1. DRAW VINE along spiral ──
  if (isPlaying) {
    const targetIdx = Math.floor(progress * spiralPts.length);
    const batchSize = Math.max(1, targetIdx - drawnVineIdx);

    if (batchSize > 0 && drawnVineIdx < spiralPts.length - 1) {
      // Vine stroke segments
      const segStart = Math.max(0, drawnVineIdx - 1);
      const segEnd = Math.min(spiralPts.length - 1, drawnVineIdx + batchSize);

      // Collect segment points for a spline
      const segPts = [];
      for (let i = segStart; i <= segEnd; i += 3) {
        segPts.push([spiralPts[i].x, spiralPts[i].y]);
      }

      if (segPts.length >= 2) {
        const vineWeight = 2.5 + energy * 3;
        brush.set('vine', STEM_GREEN, vineWeight);
        brush.spline(segPts);

        // Secondary darker vine for depth
        brush.set('vine', DARK_GREEN, vineWeight * 0.6);
        brush.spline(segPts);
      }

      drawnVineIdx = segEnd;
    }
  }

  // ── 2. DRAW GARDEN ELEMENTS (spawned by tajweed) ──
  for (let i = spawnedElements.length - 1; i >= 0; i--) {
    const el = spawnedElements[i];
    if (el.drawn) continue;
    el.drawn = true;

    const spiralT = el.t / TOTAL_DUR;
    const ptIdx = Math.floor(spiralT * (spiralPts.length - 1));
    const pt = spiralPts[ptIdx];
    const norm = getNormal(spiralPts, ptIdx);
    const offDist = 25 * el.size * el.side;
    const ex = pt.x + norm.x * offDist;
    const ey = pt.y + norm.y * offDist;

    switch (el.type) {
      case 'leaf':
        drawLeaf(ex, ey, el.size, ptIdx);
        break;
      case 'bud':
      case 'bloom':
        drawBud(ex, ey, el.size);
        break;
      case 'rose':
      case 'golden_rose':
        drawRose(ex, ey, el.size, el.type === 'golden_rose');
        break;
      case 'ghunnah':
        drawGhunnah(ex, ey, el.size);
        break;
      case 'thorn':
        drawThorn(pt.x, pt.y, el.size, ptIdx);
        break;
      case 'vine':
        drawVineTendril(ex, ey, el.size, ptIdx);
        break;
    }
  }

  // ── 3. FALLING PETALS ──
  if (isPlaying && energy > 0.3 && frameCount % 8 === 0) {
    const ptIdx = Math.floor(Math.random() * drawnVineIdx);
    if (ptIdx > 0 && ptIdx < spiralPts.length) {
      fallingPetals.push({
        x: spiralPts[ptIdx].x + (Math.random() - 0.5) * 40,
        y: spiralPts[ptIdx].y,
        vx: (Math.random() - 0.5) * 1.5,
        vy: Math.random() * 2 + 1,
        life: 60,
        color: PETAL_HUES[Math.floor(Math.random() * PETAL_HUES.length)]
      });
    }
  }

  for (let i = fallingPetals.length - 1; i >= 0; i--) {
    const p = fallingPetals[i];
    p.x += p.vx;
    p.y += p.vy;
    p.life--;
    if (p.life > 40) {
      brush.set('petal_fall', p.color, 6);
      brush.line(p.x, p.y, p.x + p.vx * 3, p.y + p.vy * 3);
    }
    if (p.life <= 0) fallingPetals.splice(i, 1);
  }

  pop();
}

// ── GARDEN ELEMENT DRAWING ─────────────────────────────────

function drawLeaf(x, y, size, ptIdx) {
  const s = 12 * size;
  const angle = getAngleAt(ptIdx);
  const leafPts = [];
  for (let i = 0; i <= 8; i++) {
    const t = i / 8;
    const lx = t * s * 2;
    const ly = Math.sin(t * Math.PI) * s * 0.6;
    const rx = lx * Math.cos(angle) - ly * Math.sin(angle);
    const ry = lx * Math.sin(angle) + ly * Math.cos(angle);
    leafPts.push([x + rx, y + ry]);
  }
  const greens = [LEAF_GREEN, LIGHT_GREEN, FOREST_GREEN];
  brush.set('saz_leaf', greens[Math.floor(Math.random() * 3)], s * 0.8);
  if (leafPts.length >= 2) brush.spline(leafPts);

  // Leaf vein
  brush.set('vine', DARK_GREEN, 1);
  const veinPts = leafPts.filter((_, i) => i % 2 === 0);
  if (veinPts.length >= 2) brush.spline(veinPts);
}

function drawBud(x, y, size) {
  const s = 8 * size;
  const color = PETAL_HUES[Math.floor(Math.random() * PETAL_HUES.length)];
  brush.set('rose_stamp', color, s);
  // Small cluster of strokes
  for (let i = 0; i < 3; i++) {
    const a = (i / 3) * Math.PI * 2;
    const r = s * 0.3;
    brush.line(x, y, x + Math.cos(a) * r, y + Math.sin(a) * r);
  }
  // Sepal
  brush.set('vine', DARK_GREEN, 2);
  brush.line(x, y + s * 0.5, x, y + s * 1.2);
}

function drawRose(x, y, size, isGolden) {
  const s = 15 * size;
  const layers = isGolden ? 5 : 4;
  for (let layer = layers; layer > 0; layer--) {
    const lr = s * (layer / layers);
    let color;
    if (isGolden) {
      color = layer > 3 ? DARK_GOLD : (layer > 1 ? GOLD : '#FFD232');
    } else {
      color = PETAL_HUES[Math.floor(Math.random() * PETAL_HUES.length)];
    }
    brush.set('rose_stamp', color, lr);
    const petalCount = 5 + layer;
    for (let i = 0; i < petalCount; i++) {
      const a = (i / petalCount) * TWO_PI + layer * 0.3;
      const px = x + Math.cos(a) * lr * 0.4;
      const py = y + Math.sin(a) * lr * 0.4;
      brush.line(x, y, px, py);
    }
  }
  // Bright center
  brush.set('rose_stamp', isGolden ? '#FFE850' : '#FF88AA', s * 0.3);
  brush.line(x - 1, y - 1, x + 1, y + 1);
}

function drawGhunnah(x, y, size) {
  // Ghunnah = resonance burst — spray of soft color
  const s = 20 * size;
  for (let i = 0; i < 6; i++) {
    const a = Math.random() * TWO_PI;
    const r = Math.random() * s;
    const color = PETAL_HUES[Math.floor(Math.random() * PETAL_HUES.length)];
    brush.set('petal_fall', color, 4 + Math.random() * 4);
    brush.line(x, y, x + Math.cos(a) * r, y + Math.sin(a) * r);
  }
}

function drawThorn(x, y, size, ptIdx) {
  const angle = getAngleAt(ptIdx);
  const s = 6 * size;
  brush.set('vine', DARK_GREEN, 1.5);
  const tx = x + Math.cos(angle + Math.PI / 2) * s;
  const ty = y + Math.sin(angle + Math.PI / 2) * s;
  brush.line(x, y, tx, ty);
}

function drawVineTendril(x, y, size, ptIdx) {
  const s = 20 * size;
  const pts = [];
  const baseAngle = getAngleAt(ptIdx);
  for (let i = 0; i <= 6; i++) {
    const t = i / 6;
    const curl = t * Math.PI * 1.5;
    const r = s * (1 - t * 0.5);
    pts.push([
      x + Math.cos(baseAngle + curl) * r * t,
      y + Math.sin(baseAngle + curl) * r * t
    ]);
  }
  brush.set('vine', STEM_GREEN, 1.5 * size);
  if (pts.length >= 2) brush.spline(pts);
}

function getAngleAt(idx) {
  if (idx <= 0 || idx >= spiralPts.length - 1) return 0;
  const dx = spiralPts[idx + 1].x - spiralPts[idx - 1].x;
  const dy = spiralPts[idx + 1].y - spiralPts[idx - 1].y;
  return Math.atan2(dy, dx);
}

// ── TAJWEED SPAWNER ────────────────────────────────────────

function spawnGardenElement(ev) {
  spawnedElements.push({ ...ev, drawn: false });
}

// ── AUDIO ──────────────────────────────────────────────────

function getAmp() {
  if (!analyser || !timeData) return 0;
  analyser.getByteTimeDomainData(timeData);
  let rms = 0;
  for (let i = 0; i < timeData.length; i++) {
    const v = (timeData[i] - 128) / 128;
    rms += v * v;
  }
  const live = Math.sqrt(rms / timeData.length);
  return live > 0.005 ? live : 0;
}

function initAudio() {
  audio = new Audio('bismillah.mp3');
  audioCtx = new AudioContext();
  analyser = audioCtx.createAnalyser();
  analyser.fftSize = 2048;
  analyser.smoothingTimeConstant = 0.85;
  timeData = new Uint8Array(2048);
  const source = audioCtx.createMediaElementSource(audio);
  source.connect(analyser);
  analyser.connect(audioCtx.destination);
}

// ── PLAY BUTTON ────────────────────────────────────────────

document.getElementById('playBtn').addEventListener('click', () => {
  if (!audio) initAudio();

  // Reset state for replay
  drawnVineIdx = 0;
  tajweedIdx = 0;
  spawnedElements = [];
  fallingPetals = [];
  smoothAmp = 0;
  background(BG);

  audio.currentTime = 0;
  audio.play().then(() => {
    isPlaying = true;
    document.getElementById('playBtn').classList.add('hidden');
  });
});
</script>
</body>
</html>
