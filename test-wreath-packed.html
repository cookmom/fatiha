<!-- WREATH PACKED — All 9 flower types dense around door frame -->
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Wreath Packed — 9 Flower Types</title>
<script src="p5.min.js"></script>
<script src="p5.brush.min.js"></script>
<style>
  * { margin: 0; padding: 0; }
  body { background: #f2eada; overflow: hidden; }
</style>
</head>
<body>
<script>
var W = 1080, H = 1920, cx = W / 2;
var doorW = 720, doorH = 1500;
var doorX = (W - doorW) / 2, doorY = (H - doorH) / 2 + 80;
var archSpringY = doorY + 380, bot = doorY + doorH, halfDW = doorW / 2;
var panelTop = archSpringY + 15, panelBot = bot - 15, panelH = panelBot - panelTop;

function archY(x) {
  var co = halfDW * 0.55, R = halfDW + co;
  if (x <= cx) { var dx = x - (cx + co); var v = R*R - dx*dx; return v > 0 ? archSpringY - Math.sqrt(v) : archSpringY; }
  else { var dx = x - (cx - co); var v = R*R - dx*dx; return v > 0 ? archSpringY - Math.sqrt(v) : archSpringY; }
}
var archPts = [];
for (var ai = 0; ai <= 40; ai++) { var ax = doorX + (doorW * ai / 40); archPts.push([ax, archY(ax)]); }

// --- Polygon builders ---
function makePetalPoly(bx, by, ang, len, wid, curv) {
  var pts = [], n = 8, ca = Math.cos(ang), sa = Math.sin(ang);
  for (var i = 0; i <= n; i++) {
    var t = i/n, w = Math.sin(t * Math.PI);
    var along = t * len, across = w * wid * 0.5;
    var co = curv * Math.sin(t * Math.PI) * len * 0.08;
    pts.push([bx + along*ca - (across+co)*sa, by + along*sa + (across+co)*ca]);
  }
  for (var i = n; i >= 0; i--) {
    var t = i/n, w = Math.sin(t * Math.PI);
    var along = t * len, across = -w * wid * 0.5;
    var co = curv * Math.sin(t * Math.PI) * len * 0.08;
    pts.push([bx + along*ca - (across+co)*sa, by + along*sa + (across+co)*ca]);
  }
  return pts;
}

function makeSazLeafPoly(bx, by, ang, len, wid, curv) {
  var pts = [], n = 10, ca = Math.cos(ang), sa = Math.sin(ang);
  for (var i = 0; i <= n; i++) {
    var t = i/n, w;
    if (t < 0.15) w = t / 0.15 * 0.4;
    else if (t < 0.5) w = 0.4 + (t - 0.15) / 0.35 * 0.6;
    else if (t < 0.85) w = 1.0 - (t - 0.5) * 1.0;
    else w = Math.max(0, (1 - t) / 0.15 * 0.15);
    w = Math.max(0, w + 0.05 * Math.sin(t * 6 * Math.PI));
    var along = t * len, across = w * wid * 0.5;
    var sc = curv * Math.sin(t * Math.PI * 1.2) * len * 0.06;
    pts.push([bx + along*ca - (across+sc)*sa, by + along*sa + (across+sc)*ca]);
  }
  for (var i = n; i >= 0; i--) {
    var t = i/n, w;
    if (t < 0.15) w = t / 0.15 * 0.4;
    else if (t < 0.5) w = 0.4 + (t - 0.15) / 0.35 * 0.6;
    else if (t < 0.85) w = 1.0 - (t - 0.5) * 1.0;
    else w = Math.max(0, (1 - t) / 0.15 * 0.15);
    w = Math.max(0, w + 0.05 * Math.sin(t * 6 * Math.PI));
    var along = t * len, across = -w * wid * 0.5;
    var sc = curv * Math.sin(t * Math.PI * 1.2) * len * 0.06;
    pts.push([bx + along*ca - (across+sc)*sa, by + along*sa + (across+sc)*ca]);
  }
  return pts;
}

function samplePathEvenly(pts, n) {
  var dists = [0];
  for (var i = 1; i < pts.length; i++) {
    var dx = pts[i][0] - pts[i-1][0], dy = pts[i][1] - pts[i-1][1];
    dists.push(dists[i-1] + Math.sqrt(dx*dx + dy*dy));
  }
  var total = dists[dists.length - 1], result = [];
  for (var si = 0; si < n; si++) {
    var target = (si / Math.max(1, n - 1)) * total, seg = 0;
    for (var j = 1; j < dists.length; j++) { if (dists[j] >= target) { seg = j - 1; break; } }
    if (seg >= pts.length - 1) seg = pts.length - 2;
    var segLen = dists[seg+1] - dists[seg];
    var t = segLen > 0 ? (target - dists[seg]) / segLen : 0;
    result.push({x: pts[seg][0] + t * (pts[seg+1][0] - pts[seg][0]), y: pts[seg][1] + t * (pts[seg+1][1] - pts[seg][1])});
  }
  return result;
}

// --- Build vine paths ---
var leftVinePath = [], rightVinePath = [];

function buildVinePaths() {
  var leftRaw = [], rightRaw = [];
  var m = 35;
  var dcy = (archPts[20][1] + panelBot) / 2;

  for (var i = 0; i <= 6; i++) {
    var t = i / 6;
    leftRaw.push([cx*(1-t) + (doorX+m)*t, panelBot - 4*Math.sin(t*Math.PI)]);
    rightRaw.push([cx*(1-t) + (doorX+doorW-m)*t, panelBot - 4*Math.sin(t*Math.PI)]);
  }
  for (var i = 1; i <= 20; i++) {
    var t = i/20, y = panelBot*(1-t) + archSpringY*t;
    var wobble = Math.sin(t * 5.5 + 0.5) * 30;
    leftRaw.push([doorX + wobble, y]);
    rightRaw.push([doorX + doorW - wobble, y]);
  }
  for (var i = 1; i <= 20; i++) {
    var ax = archPts[i][0], ay = archPts[i][1];
    var dx = cx - ax, dy = dcy - ay, d = Math.sqrt(dx*dx+dy*dy);
    if (d > 0) leftRaw.push([ax + dx/d*m, ay + dy/d*m]);
    else leftRaw.push([ax, ay + m]);
  }
  for (var i = 39; i >= 20; i--) {
    var ax = archPts[i][0], ay = archPts[i][1];
    var dx = cx - ax, dy = dcy - ay, d = Math.sqrt(dx*dx+dy*dy);
    if (d > 0) rightRaw.push([ax + dx/d*m, ay + dy/d*m]);
    else rightRaw.push([ax, ay + m]);
  }

  leftVinePath = samplePathEvenly(leftRaw, 80);
  rightVinePath = samplePathEvenly(rightRaw, 80);
}

// ============================================================
// 9 FLOWER TYPES
// ============================================================

// TYPE 1: Full crimson rose — 3 rings (7+6+4), large
function buildType1(fcx, fcy, s) {
  var f = {x:fcx, y:fcy, petals:[], gold:true, goldR:14*s};
  var ba = Math.random()*Math.PI*2;
  var rings = [
    {n:7, len:55*s, w:38*s, col:'#8a1020', op:200},
    {n:6, len:42*s, w:30*s, col:'#a01828', op:190},
    {n:4, len:28*s, w:22*s, col:'#c03050', op:180}
  ];
  for (var r=0;r<rings.length;r++) {
    var ring=rings[r];
    for (var p=0;p<ring.n;p++) {
      var a=(p/ring.n)*Math.PI*2+ba+r*0.3+(Math.random()-0.5)*0.15;
      f.petals.push({col:ring.col, op:ring.op, pts:makePetalPoly(fcx,fcy,a,ring.len,ring.w,0.3)});
    }
  }
  return f;
}

// TYPE 2: Crimson cabbage rose — 4 dense rings, very full
function buildType2(fcx, fcy, s) {
  var f = {x:fcx, y:fcy, petals:[], gold:true, goldR:12*s};
  var ba = Math.random()*Math.PI*2;
  var rings = [
    {n:8, len:50*s, w:34*s, col:'#6a0818', op:210},
    {n:7, len:40*s, w:28*s, col:'#8a1020', op:200},
    {n:6, len:30*s, w:22*s, col:'#b02040', op:185},
    {n:4, len:20*s, w:16*s, col:'#c04060', op:175}
  ];
  for (var r=0;r<rings.length;r++) {
    var ring=rings[r];
    for (var p=0;p<ring.n;p++) {
      var a=(p/ring.n)*Math.PI*2+ba+r*0.35+(Math.random()-0.5)*0.12;
      f.petals.push({col:ring.col, op:ring.op, pts:makePetalPoly(fcx,fcy,a,ring.len,ring.w,0.35)});
    }
  }
  return f;
}

// TYPE 3: Rose pink medium — 2 rings (6+5)
function buildType3(fcx, fcy, s) {
  var f = {x:fcx, y:fcy, petals:[], gold:true, goldR:10*s};
  var ba = Math.random()*Math.PI*2;
  var rings = [
    {n:6, len:36*s, w:26*s, col:'#c03050', op:185},
    {n:5, len:24*s, w:18*s, col:'#d06080', op:170}
  ];
  for (var r=0;r<rings.length;r++) {
    var ring=rings[r];
    for (var p=0;p<ring.n;p++) {
      var a=(p/ring.n)*Math.PI*2+ba+r*0.4+(Math.random()-0.5)*0.15;
      f.petals.push({col:ring.col, op:ring.op, pts:makePetalPoly(fcx,fcy,a,ring.len,ring.w,0.3)});
    }
  }
  return f;
}

// TYPE 4: Light pink simple — single ring, 5 wide petals
function buildType4(fcx, fcy, s) {
  var f = {x:fcx, y:fcy, petals:[], gold:true, goldR:8*s};
  var ba = Math.random()*Math.PI*2;
  for (var p=0;p<5;p++) {
    var a=(p/5)*Math.PI*2+ba+(Math.random()-0.5)*0.1;
    f.petals.push({col:'#e080a0', op:165, pts:makePetalPoly(fcx,fcy,a,28*s,20*s,0.25)});
  }
  return f;
}

// TYPE 5: Crimson Tudor — 2 rings offset, wide petals
function buildType5(fcx, fcy, s) {
  var f = {x:fcx, y:fcy, petals:[], gold:true, goldR:13*s};
  var ba = Math.random()*Math.PI*2;
  for (var p=0;p<5;p++) {
    var a=(p/5)*Math.PI*2+ba;
    f.petals.push({col:'#8a1020', op:200, pts:makePetalPoly(fcx,fcy,a,52*s,40*s,0.3)});
  }
  for (var p=0;p<5;p++) {
    var a=(p/5)*Math.PI*2+ba+Math.PI/5+(Math.random()-0.5)*0.1;
    f.petals.push({col:'#6a0818', op:190, pts:makePetalPoly(fcx,fcy,a,38*s,28*s,0.35)});
  }
  return f;
}

// TYPE 6: Rosebud — 3 tight petals
function buildType6(fcx, fcy, s) {
  var f = {x:fcx, y:fcy, petals:[], gold:false, goldR:0};
  var ba = Math.random()*Math.PI*2;
  for (var p=0;p<3;p++) {
    var a=ba+(p-1)*0.5;
    f.petals.push({col: p===1?'#d06080':'#b03050', op:160+p*15, pts:makePetalPoly(fcx,fcy,a,18*s,8*s,0.4)});
  }
  return f;
}

// TYPE 7: Pink peony — 3 rings, many petals, wide
function buildType7(fcx, fcy, s) {
  var f = {x:fcx, y:fcy, petals:[], gold:true, goldR:10*s};
  var ba = Math.random()*Math.PI*2;
  var rings = [
    {n:7, len:38*s, w:28*s, col:'#c03050', op:180},
    {n:6, len:28*s, w:20*s, col:'#d06080', op:170},
    {n:4, len:18*s, w:14*s, col:'#e890b0', op:160}
  ];
  for (var r=0;r<rings.length;r++) {
    var ring=rings[r];
    for (var p=0;p<ring.n;p++) {
      var a=(p/ring.n)*Math.PI*2+ba+r*0.3+(Math.random()-0.5)*0.12;
      f.petals.push({col:ring.col, op:ring.op, pts:makePetalPoly(fcx,fcy,a,ring.len,ring.w,0.3)});
    }
  }
  return f;
}

// TYPE 8: Crimson star — 8 narrow pointed petals
function buildType8(fcx, fcy, s) {
  var f = {x:fcx, y:fcy, petals:[], gold:true, goldR:11*s};
  var ba = Math.random()*Math.PI*2;
  for (var p=0;p<8;p++) {
    var a=(p/8)*Math.PI*2+ba+(Math.random()-0.5)*0.1;
    f.petals.push({col:'#8a1020', op:200, pts:makePetalPoly(fcx,fcy,a,48*s,16*s,0.25)});
  }
  return f;
}

// TYPE 9: Light pink tiny — 4 small round petals
function buildType9(fcx, fcy, s) {
  var f = {x:fcx, y:fcy, petals:[], gold:true, goldR:6*s};
  var ba = Math.random()*Math.PI*2;
  for (var p=0;p<4;p++) {
    var a=(p/4)*Math.PI*2+ba+(Math.random()-0.5)*0.15;
    f.petals.push({col:'#d080a0', op:165, pts:makePetalPoly(fcx,fcy,a,20*s,16*s,0.3)});
  }
  return f;
}

var builders = [buildType1, buildType2, buildType3, buildType4, buildType5, buildType6, buildType7, buildType8, buildType9];

// ============================================================
// FLOWER AND LEAF PLACEMENT
// ============================================================
function setup() {
  createCanvas(W, H, WEBGL);
  brush.load();
  translate(-width/2, -height/2);
  background(248, 242, 228); // cream paper

  randomSeed(42);
  buildVinePaths();

  // --- SINGLE-ROW WREATH: flowers sit NEXT to each other, not piled ---
  var allFlowers = [];
  var S = 1.5; // global scale

  // Helper: get normal direction at a vine path point
  function vineNormal(path, i, side) {
    var i0 = Math.max(0, i-1), i1 = Math.min(path.length-1, i+1);
    var dx = path[i1].x - path[i0].x, dy = path[i1].y - path[i0].y;
    var d = Math.sqrt(dx*dx + dy*dy);
    if (d < 0.01) return {x:0, y:side};
    return {x: -dy/d * side, y: dx/d * side};
  }

  // Measure total path length
  function pathLength(path) {
    var total = 0;
    for (var i = 1; i < path.length; i++) {
      var dx = path[i].x - path[i-1].x, dy = path[i].y - path[i-1].y;
      total += Math.sqrt(dx*dx + dy*dy);
    }
    return total;
  }

  // Get point + normal at distance d along path
  function pointAtDist(path, targetDist, sideSign) {
    var accum = 0;
    for (var i = 1; i < path.length; i++) {
      var dx = path[i].x - path[i-1].x, dy = path[i].y - path[i-1].y;
      var segLen = Math.sqrt(dx*dx + dy*dy);
      if (accum + segLen >= targetDist) {
        var t = segLen > 0 ? (targetDist - accum) / segLen : 0;
        var px = path[i-1].x + t * dx, py = path[i-1].y + t * dy;
        var d = segLen > 0.01 ? segLen : 1;
        var nx = -dy/d * sideSign, ny = dx/d * sideSign;
        return {x: px, y: py, nx: nx, ny: ny};
      }
      accum += segLen;
    }
    var last = path[path.length-1];
    return {x: last.x, y: last.y, nx: 0, ny: 0};
  }

  // Size pattern: large(1.1) at key spots, medium(0.75), small(0.5) to fill
  var sizeSeq = [0.8, 0.45, 0.65, 0.4, 0.75, 0.45, 0.6, 0.4, 0.7, 0.45, 0.65, 0.4, 0.55];
  // Base flower radius for spacing — actual petal reach at S=1.0
  var baseFlowerRadius = 52;

  // Place SINGLE ROW of flowers along a vine path
  function placeFlowersAlongPath(path, sideSign, typeOffset) {
    var total = pathLength(path);
    // Walk along path, placing flowers touching but not overlapping
    var dist = 20;
    var idx = 0;
    while (dist < total - 20) {
      var sz = sizeSeq[idx % sizeSeq.length];
      var flowerR = baseFlowerRadius * sz * S;
      var pt = pointAtDist(path, dist, sideSign);
      var fx = pt.x + pt.nx * 5 + (Math.random()-0.5)*5;
      var fy = pt.y + pt.ny * 5 + (Math.random()-0.5)*5;
      var bld = builders[(idx + typeOffset) % 9];
      allFlowers.push(bld(fx, fy, sz * S));
      // Next flower: edges just touching — 90% of sum of radii
      var nextSz = sizeSeq[(idx+1) % sizeSeq.length];
      var nextR = baseFlowerRadius * nextSz * S;
      dist += (flowerR + nextR) * 0.92;
      idx++;
    }
  }

  // Place along both vine paths — different type offsets for variety
  placeFlowersAlongPath(leftVinePath, 1, 0);
  placeFlowersAlongPath(rightVinePath, -1, 4);

  console.log('Total flowers: ' + allFlowers.length);

  // --- LEAVES: fill gaps BETWEEN flowers only ---
  var allLeaves = [];
  // For each pair of adjacent flowers, place 1-2 leaves in the gap
  for (var fi = 0; fi < allFlowers.length - 1; fi++) {
    var f1 = allFlowers[fi], f2 = allFlowers[fi+1];
    var dx = f2.x - f1.x, dy = f2.y - f1.y;
    var gap = Math.sqrt(dx*dx + dy*dy);
    if (gap < 20 || gap > 300) continue; // skip if too close or different sides
    var mx = (f1.x + f2.x)/2, my = (f1.y + f2.y)/2;
    var ang = Math.atan2(dy, dx);
    // 1-2 small leaves pointing along the gap
    var nLeaves = gap > 100 ? 2 : 1;
    for (var li = 0; li < nLeaves; li++) {
      var leafAng = ang + (li === 0 ? 0.6 : -0.6) + (Math.random()-0.5)*0.3;
      var leafLen = 50 + Math.random()*40;
      var leafW = 16 + Math.random()*10;
      var ox = (Math.random()-0.5)*15, oy = (Math.random()-0.5)*15;
      allLeaves.push({pts: makeSazLeafPoly(mx+ox, my+oy, leafAng, leafLen, leafW, 0.4)});
    }
  }
  // Also add a few leaves along vine between first and last flower
  for (var i = 5; i < leftVinePath.length - 5; i += 12) {
    var lp = leftVinePath[i], rp = rightVinePath[i];
    var lNext = leftVinePath[Math.min(i+3,79)], rNext = rightVinePath[Math.min(i+3,79)];
    var lAng = Math.atan2(lNext.y-lp.y, lNext.x-lp.x);
    var rAng = Math.atan2(rNext.y-rp.y, rNext.x-rp.x);
    var s = 0.4 + Math.random()*0.3;
    allLeaves.push({pts: makeSazLeafPoly(lp.x, lp.y, lAng+0.5, 80*s, 24*s, 0.4)});
    allLeaves.push({pts: makeSazLeafPoly(rp.x, rp.y, rAng-0.5, 80*s, 24*s, 0.4)});
  }
  console.log('Total leaves: ' + allLeaves.length);

  // ============================================
  // DRAW ORDER
  // ============================================

  // 1. Door frame pencil
  brush.set('2H', '#c0b8a8', 0.08);
  brush.strokeWeight(1.2);
  brush.line(doorX, archSpringY, doorX, bot);
  brush.line(doorX + doorW, archSpringY, doorX + doorW, bot);
  brush.line(doorX, bot, doorX + doorW, bot);
  for (var i = 0; i < 40; i++) {
    brush.line(archPts[i][0], archPts[i][1], archPts[i+1][0], archPts[i+1][1]);
  }
  brush.line(cx, archSpringY, cx, bot);
  var pi = 25;
  brush.line(doorX+pi, panelTop, cx-pi, panelTop);
  brush.line(doorX+pi, panelBot, cx-pi, panelBot);
  brush.line(doorX+pi, panelTop, doorX+pi, panelBot);
  brush.line(cx-pi, panelTop, cx-pi, panelBot);
  brush.line(cx+pi, panelTop, doorX+doorW-pi, panelTop);
  brush.line(cx+pi, panelBot, doorX+doorW-pi, panelBot);
  brush.line(cx+pi, panelTop, cx+pi, panelBot);
  brush.line(doorX+doorW-pi, panelTop, doorX+doorW-pi, panelBot);

  // 2. Vine
  brush.set('2H', '#5a8a50', 0.2);
  brush.strokeWeight(2.2);
  for (var i = 0; i < leftVinePath.length - 1; i++) {
    brush.line(leftVinePath[i].x, leftVinePath[i].y, leftVinePath[i+1].x, leftVinePath[i+1].y);
  }
  for (var i = 0; i < rightVinePath.length - 1; i++) {
    brush.line(rightVinePath[i].x, rightVinePath[i].y, rightVinePath[i+1].x, rightVinePath[i+1].y);
  }
  brush.set('2H', '#7a9a70', 0.12);
  brush.strokeWeight(1.2);
  for (var i = 0; i < leftVinePath.length - 1; i++) {
    brush.line(leftVinePath[i].x+2, leftVinePath[i].y+1, leftVinePath[i+1].x+2, leftVinePath[i+1].y+1);
  }
  for (var i = 0; i < rightVinePath.length - 1; i++) {
    brush.line(rightVinePath[i].x-2, rightVinePath[i].y+1, rightVinePath[i+1].x-2, rightVinePath[i+1].y+1);
  }

  // 3. ALL leaf fills
  brush.noStroke();
  var leafColors = ['#1a4a2e', '#0e4a22'];
  for (var i = 0; i < allLeaves.length; i++) {
    brush.fill(leafColors[i % 2], 160);
    brush.fillBleed(0.2, 'out');
    brush.fillTexture(0.35, 0.2);
    brush.polygon(allLeaves[i].pts);
  }

  // 4. ALL flower fills — draw in path order, each individually clear

  brush.noStroke();
  for (var i = 0; i < allFlowers.length; i++) {
    var fl = allFlowers[i];
    for (var j = fl.petals.length - 1; j >= 0; j--) {
      var p = fl.petals[j];
      brush.fill(p.col, p.op);
      brush.fillBleed(0.2, 'out');
      brush.fillTexture(0.45, 0.3);
      brush.polygon(p.pts);
    }
  }

  // 5. ALL gold centers — use polygon circle to avoid brush.circle crash
  function makeCirclePoly(cx, cy, r, n) {
    var pts = [];
    for (var i = 0; i < n; i++) {
      var a = (i / n) * Math.PI * 2;
      pts.push([cx + Math.cos(a) * r, cy + Math.sin(a) * r]);
    }
    return pts;
  }
  brush.noStroke();
  for (var i = 0; i < allFlowers.length; i++) {
    var fl = allFlowers[i];
    if (fl.gold && fl.goldR >= 5) {
      brush.fill('#c4a040', 200);
      brush.fillBleed(0.2, 'out');
      brush.fillTexture(0.3, 0.2);
      brush.polygon(makeCirclePoly(fl.x, fl.y, fl.goldR, 16));
      // Bright highlight
      brush.fill('#e8c060', 150);
      brush.fillBleed(0.1, 'out');
      brush.polygon(makeCirclePoly(fl.x, fl.y, fl.goldR * 0.45, 12));
    }
  }

  noLoop();
  console.log('WREATH PACKED DONE — flowers: ' + allFlowers.length + ', leaves: ' + allLeaves.length);
  window._renderComplete = true;
}
