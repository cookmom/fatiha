<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <rect width="800" height="800" fill="#0d0d12"/>

  <!-- Blue shadow — minute hand color, furthest offset -->
  <g transform="translate(417,412) scale(22)" fill="none" stroke="#4477ff" stroke-width=".5" stroke-linejoin="round" opacity="0.75">
    <polygon points="0,-9.375 8.66,-4.375 8.66,5.625 0,10.625 -8.66,5.625 -8.66,-4.375"/>
    <line x1="0" y1="-9.375" x2="0" y2="10.625"/>
    <line x1="-8.66" y1="-4.375" x2="0" y2="-0.375"/>
    <line x1="8.66" y1="-4.375" x2="0" y2="-0.375"/>
  </g>

  <!-- Violet shadow — hour hand color, mid offset -->
  <g transform="translate(409,406) scale(22)" fill="none" stroke="#9955ff" stroke-width=".5" stroke-linejoin="round" opacity="0.85">
    <polygon points="0,-9.375 8.66,-4.375 8.66,5.625 0,10.625 -8.66,5.625 -8.66,-4.375"/>
    <line x1="0" y1="-9.375" x2="0" y2="10.625"/>
    <line x1="-8.66" y1="-4.375" x2="0" y2="-0.375"/>
    <line x1="8.66" y1="-4.375" x2="0" y2="-0.375"/>
  </g>

  <!-- White — second hand color, front layer -->
  <g transform="translate(400,400) scale(22)" fill="none" stroke="rgba(232,228,220,.9)" stroke-width=".5" stroke-linejoin="round">
    <polygon points="0,-9.375 8.66,-4.375 8.66,5.625 0,10.625 -8.66,5.625 -8.66,-4.375"/>
    <line x1="0" y1="-9.375" x2="0" y2="10.625"/>
    <line x1="-8.66" y1="-4.375" x2="0" y2="-0.375"/>
    <line x1="8.66" y1="-4.375" x2="0" y2="-0.375"/>
  </g>
</svg>
