    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0d12;
      --surface: #13131a;
      --border: #1e1e2a;
      --text: #e8e6e1;
      --muted: #6b6979;
      --accent: #2a2a38;

      --vp: #4a9eff;
      --ai: #ff6b6b;
      --tools: #50c878;
      --synths: #c084fc;
      --art: #f59e0b;
      --creative: #06b6d4;
      --research: #8b5cf6;
      --opportunities: #ef4444;
      --discovery: #10b981;
      --concepts: #f472b6;
    }

    html { font-size: 15px; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      font-weight: 400;
      line-height: 1.6;
      min-height: 100vh;
    }

    /* ── Header ── */
    .header {
      padding: 2rem 1.5rem 1rem;
      max-width: 860px;
      margin: 0 auto;
    }
    .header h1 {
      font-size: 1.1rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .header-meta {
      font-size: 0.78rem;
      color: var(--muted);
      margin-top: 0.25rem;
    }

    /* ── Sticky controls ── */
    .controls {
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      padding: 0.75rem 1.5rem;
    }
    .controls-inner {
      max-width: 860px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 0.65rem;
    }

    .search-wrap {
      position: relative;
    }
    .search-wrap input {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-family: inherit;
      font-size: 0.875rem;
      padding: 0.55rem 0.85rem;
      outline: none;
      transition: border-color 0.15s;
    }
    .search-wrap input::placeholder { color: var(--muted); }
    .search-wrap input:focus { border-color: #2d2d44; }

    /* ── Category pills ── */
    .pills {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
    }
    .pill {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      padding: 0.3rem 0.7rem;
      border-radius: 99px;
      font-size: 0.72rem;
      font-weight: 500;
      letter-spacing: 0.02em;
      cursor: pointer;
      border: 1px solid transparent;
      transition: all 0.15s;
      user-select: none;
      background: var(--surface);
      color: var(--muted);
      border-color: var(--border);
    }
    .pill:hover { color: var(--text); }
    .pill.active {
      color: var(--text);
      border-color: var(--pill-color);
      background: color-mix(in srgb, var(--pill-color) 12%, var(--surface));
    }
    .pill-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--pill-color);
      flex-shrink: 0;
    }

    /* ── Content ── */
    .content {
      max-width: 860px;
      margin: 0 auto;
      padding: 1rem 1.5rem 3rem;
    }

    /* ── Date group ── */
    .date-group { margin-bottom: 2rem; }
    .date-label {
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      padding: 0.5rem 0;
      border-bottom: 1px solid var(--border);
      margin-bottom: 0.5rem;
    }

    /* ── Item card ── */
    .item {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 0.5rem 1rem;
      padding: 0.75rem 0;
      border-bottom: 1px solid var(--border);
      align-items: start;
    }
    .item:last-child { border-bottom: none; }

    .item-left { min-width: 0; }

    .item-title {
      font-size: 0.92rem;
      font-weight: 500;
      color: var(--text);
      line-height: 1.4;
    }
    .item-title a {
      color: inherit;
      text-decoration: none;
    }
    .item-title a:hover { color: #fff; }
    .item-title a::after {
      content: ' \2197';
      font-size: 0.75em;
      color: var(--muted);
      vertical-align: super;
    }

    .item-summary {
      font-size: 0.8rem;
      color: var(--muted);
      margin-top: 0.2rem;
      line-height: 1.5;
    }

    .item-badges {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      margin-top: 0.4rem;
      flex-wrap: wrap;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 0.25rem;
      padding: 0.15rem 0.5rem;
      border-radius: 4px;
      font-size: 0.68rem;
      font-weight: 500;
      letter-spacing: 0.03em;
    }
    .badge-cat {
      background: color-mix(in srgb, var(--cat-color) 15%, transparent);
      color: var(--cat-color);
    }
    .badge-deadline {
      background: color-mix(in srgb, #ef4444 18%, transparent);
      color: #ef4444;
      font-weight: 600;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      font-size: 0.63rem;
    }

    /* ── Empty state ── */
    .empty {
      text-align: center;
      padding: 3rem 1rem;
      color: var(--muted);
      font-size: 0.85rem;
    }

    /* ── Status bar ── */
    .status-bar {
      text-align: center;
      font-size: 0.72rem;
      color: var(--muted);
      padding: 0.4rem;
      letter-spacing: 0.03em;
    }
    .status-bar.error { color: #ef4444; }

    /* ── Mobile ── */
    @media (max-width: 600px) {
      .header { padding: 1.25rem 1rem 0.75rem; }
      .controls { padding: 0.65rem 1rem; }
      .content { padding: 0.75rem 1rem 2rem; }
      .item { grid-template-columns: 1fr; }
    }
  </style>
</head>

// ── State ─────────────────────────────────────────────────────────────────
let allItems = [];
let activeCategories = new Set();
let searchQuery = '';
let usingLiveData = false;

// ── Fetch from Supabase ───────────────────────────────────────────────────
async function fetchFromSupabase() {
  const url = `${SUPABASE_URL}/rest/v1/daily_items?order=date.desc,created_at.desc&limit=200`;
  const res = await fetch(url, {
    headers: {
      'apikey': SUPABASE_KEY,
      'Authorization': `Bearer ${SUPABASE_KEY}`,
    }
  });
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  return res.json();
}

async function loadData() {
  const statusEl = document.getElementById('statusBar');
  try {
    const data = await fetchFromSupabase();
    if (data && data.length > 0) {
      allItems = data;
      usingLiveData = true;
      statusEl.textContent = `${data.length} items from Supabase`;
      statusEl.className = 'status-bar';
    } else {
      throw new Error('empty');
    }
  } catch (err) {
    allItems = FALLBACK_DATA;
    usingLiveData = false;
    statusEl.textContent = `Showing embedded data (${FALLBACK_DATA.length} items) — connect Supabase table to go live`;
    statusEl.className = 'status-bar';
  }

  initPills();
  render();
  updateHeader();
}

// ── Pills ─────────────────────────────────────────────────────────────────
function initPills() {
  const cats = [...new Set(allItems.map(i => i.category))];
  // Sort by defined order
  const order = Object.keys(CAT_COLORS);
  cats.sort((a, b) => order.indexOf(a) - order.indexOf(b));

  const container = document.getElementById('pills');
  container.innerHTML = '';

  // All pill
  const all = document.createElement('button');
  all.className = 'pill active';
  all.style.setProperty('--pill-color', '#e8e6e1');
  all.innerHTML = `<span class="pill-dot" style="background:#6b6979"></span>All`;
  all.dataset.cat = '__all__';
  all.addEventListener('click', () => {
    activeCategories.clear();
    updatePillState();
    render();
  });
  container.appendChild(all);

  cats.forEach(cat => {
    const color = CAT_COLORS[cat] || '#888';
    const label = CAT_LABELS[cat] || cat;
    const count = allItems.filter(i => i.category === cat).length;
    const btn = document.createElement('button');
    btn.className = 'pill';
    btn.style.setProperty('--pill-color', color);
    btn.innerHTML = `<span class="pill-dot"></span>${label} <span style="opacity:.45;font-size:.9em">${count}</span>`;
    btn.dataset.cat = cat;
    btn.addEventListener('click', () => {
      if (activeCategories.has(cat)) {
        activeCategories.delete(cat);
      } else {
        activeCategories.add(cat);
      }
      updatePillState();
      render();
    });
    container.appendChild(btn);
  });
}

function updatePillState() {
  document.querySelectorAll('.pill').forEach(btn => {
    const cat = btn.dataset.cat;
    if (cat === '__all__') {
      btn.classList.toggle('active', activeCategories.size === 0);
    } else {
      btn.classList.toggle('active', activeCategories.has(cat));
    }
  });
}

// ── Render ────────────────────────────────────────────────────────────────
function render() {
  let items = allItems;

  if (activeCategories.size > 0) {
    items = items.filter(i => activeCategories.has(i.category));
  }

  if (searchQuery) {
    const q = searchQuery.toLowerCase();
    items = items.filter(i =>
      (i.title || '').toLowerCase().includes(q) ||
      (i.summary || '').toLowerCase().includes(q) ||
      (i.category || '').toLowerCase().includes(q)
    );
  }

  const feed = document.getElementById('feed');

  if (items.length === 0) {
    feed.innerHTML = '<div class="empty">No items match your filter.</div>';
    return;
  }

  // Group by date
  const grouped = {};
  items.forEach(item => {
    const d = item.date || 'unknown';
    if (!grouped[d]) grouped[d] = [];
    grouped[d].push(item);
  });

  const dates = Object.keys(grouped).sort((a, b) => b.localeCompare(a));
  feed.innerHTML = dates.map(date => {
    const label = formatDate(date);
    const rows = grouped[date].map(item => renderItem(item)).join('');
    return `<div class="date-group">
      <div class="date-label">${label}</div>
      ${rows}
    </div>`;
  }).join('');
}

function renderItem(item) {
  const color = CAT_COLORS[item.category] || '#888';
  const catLabel = CAT_LABELS[item.category] || item.category;
  const isDeadline = item.priority === 'high' && item.category === 'opportunities';
  const isHighPriority = item.priority === 'high' && item.category !== 'opportunities';

  const titleEl = item.url
    ? `<a href="${escHtml(item.url)}" target="_blank" rel="noopener">${escHtml(item.title)}</a>`
    : escHtml(item.title);

  const summaryEl = item.summary
    ? `<div class="item-summary">${escHtml(item.summary)}</div>`
    : '';

  const deadlineBadge = isDeadline
    ? `<span class="badge badge-deadline">Deadline</span>` : '';

  const highBadge = isHighPriority
    ? `<span class="badge" style="background:color-mix(in srgb,#f59e0b 15%,transparent);color:#f59e0b;font-size:.66rem">Priority</span>` : '';

  return `<div class="item">
    <div class="item-left">
      <div class="item-title">${titleEl}</div>
      ${summaryEl}
      <div class="item-badges">
        <span class="badge badge-cat" style="--cat-color:${color}">${escHtml(catLabel)}</span>
        ${deadlineBadge}${highBadge}
      </div>
    </div>
  </div>`;
}

function formatDate(dateStr) {
  try {
    const d = new Date(dateStr + 'T12:00:00');
    return d.toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
  } catch { return dateStr; }
}

function escHtml(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function updateHeader() {
  const dates = [...new Set(allItems.map(i => i.date))].sort((a,b) => b.localeCompare(a));
  const latest = dates[0] ? formatDate(dates[0]) : '';
  document.getElementById('headerMeta').textContent =
    `${allItems.length} items · ${dates.length} date${dates.length !== 1 ? 's' : ''} · ${latest}`;
}

// ── Search ────────────────────────────────────────────────────────────────
document.getElementById('search').addEventListener('input', e => {
  searchQuery = e.target.value.trim();
  render();
});

// ── Boot ──────────────────────────────────────────────────────────────────
loadData();
</script>
