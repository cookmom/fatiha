<!-- بسم الله الرحمن الرحيم -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Mihrab Architecture Options</title>
<style>
  body { background: #f5f0e8; margin: 20px; font-family: Georgia, serif; }
  .grid { display: flex; flex-wrap: wrap; gap: 24px; justify-content: center; }
  .card { text-align: center; }
  .card h3 { font-size: 14px; color: #3a3a3a; margin: 8px 0 2px; font-weight: normal; }
  .card p { font-size: 11px; color: #888; margin: 0; font-style: italic; }
  svg { filter: url(#pencil); }
</style>
</head>
<body>
<h2 style="text-align:center;color:#3a3a3a;font-weight:normal;margin-bottom:24px;">Mihrab Architecture — 5 Options</h2>
<div class="grid">

<!-- OPTION 1: Alfiz Frame -->
<div class="card">
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 500" width="280" height="467">
  <defs>
    <filter id="pencil">
      <feTurbulence type="turbulence" baseFrequency="0.03" numOctaves="4" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="1.2" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
  </defs>
  <!-- Cream bg -->
  <rect width="300" height="500" fill="#f5f0e8" rx="4"/>
  <!-- ALFIZ rectangular frame -->
  <rect x="30" y="20" width="240" height="440" fill="none" stroke="#3a3a3a" stroke-width="2" rx="2"/>
  <rect x="36" y="26" width="228" height="428" fill="none" stroke="#3a3a3a" stroke-width="1" rx="1"/>
  <!-- Blue watercolor fill inside niche -->
  <path d="M90,460 L90,220 Q90,160 150,120 Q210,160 210,220 L210,460 Z" fill="rgba(12,58,106,0.18)" stroke="none"/>
  <path d="M95,455 L95,225 Q95,168 150,130 Q205,168 205,225 L205,455 Z" fill="rgba(12,58,106,0.12)" stroke="none"/>
  <!-- Main pointed arch -->
  <path d="M80,460 L80,220 Q80,150 150,100 Q220,150 220,220 L220,460" fill="none" stroke="#3a3a3a" stroke-width="1.8"/>
  <!-- Inner arch line -->
  <path d="M90,460 L90,225 Q90,160 150,115 Q210,160 210,225 L210,460" fill="none" stroke="#3a3a3a" stroke-width="1"/>
  <!-- Crown arch (now grounded by alfiz) -->
  <path d="M60,200 Q60,60 150,30 Q240,60 240,200" fill="none" stroke="#3a3a3a" stroke-width="1.5"/>
  <!-- 12-fold star at crown -->
  <g transform="translate(150,70)">
    <circle r="22" fill="none" stroke="#3a3a3a" stroke-width="1"/>
    <polygon points="0,-20 5,-7 18,-7 8,2 11,16 0,8 -11,16 -8,2 -18,-7 -5,-7" fill="none" stroke="#3a3a3a" stroke-width="0.8"/>
    <polygon points="0,-20 5,-7 18,-7 8,2 11,16 0,8 -11,16 -8,2 -18,-7 -5,-7" fill="none" stroke="#3a3a3a" stroke-width="0.8" transform="rotate(36)"/>
  </g>
  <!-- Spandrel vine scrollwork (left) -->
  <g stroke="#3a3a3a" stroke-width="0.8" fill="none">
    <path d="M38,30 Q55,60 45,90 Q35,110 50,130 Q60,145 48,170"/>
    <path d="M45,60 Q55,55 60,65"/>
    <path d="M42,100 Q52,95 55,105"/>
    <path d="M50,140 Q60,135 62,148"/>
  </g>
  <!-- Spandrel vine scrollwork (right) -->
  <g stroke="#3a3a3a" stroke-width="0.8" fill="none">
    <path d="M262,30 Q245,60 255,90 Q265,110 250,130 Q240,145 252,170"/>
    <path d="M255,60 Q245,55 240,65"/>
    <path d="M258,100 Q248,95 245,105"/>
    <path d="M250,140 Q240,135 238,148"/>
  </g>
  <!-- Base line -->
  <line x1="30" y1="460" x2="270" y2="460" stroke="#3a3a3a" stroke-width="1.5"/>
</svg>
<h3>1 — Alfiz Frame</h3>
<p>Moroccan / Andalusian</p>
</div>

<!-- OPTION 2: Flanking Columns -->
<div class="card">
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 500" width="280" height="467">
  <rect width="300" height="500" fill="#f5f0e8" rx="4"/>
  <!-- Blue watercolor fill -->
  <path d="M100,460 L100,220 Q100,155 150,115 Q200,155 200,220 L200,460 Z" fill="rgba(12,58,106,0.18)" stroke="none"/>
  <path d="M105,455 L105,225 Q105,162 150,125 Q195,162 195,225 L195,455 Z" fill="rgba(12,58,106,0.12)" stroke="none"/>
  <!-- Left column -->
  <rect x="62" y="230" width="14" height="230" fill="none" stroke="#3a3a3a" stroke-width="1.5"/>
  <line x1="62" y1="280" x2="76" y2="280" stroke="#3a3a3a" stroke-width="0.6"/>
  <line x1="62" y1="330" x2="76" y2="330" stroke="#3a3a3a" stroke-width="0.6"/>
  <line x1="62" y1="380" x2="76" y2="380" stroke="#3a3a3a" stroke-width="0.6"/>
  <line x1="62" y1="430" x2="76" y2="430" stroke="#3a3a3a" stroke-width="0.6"/>
  <!-- Left capital -->
  <path d="M55,230 L55,218 Q69,210 83,218 L83,230" fill="none" stroke="#3a3a3a" stroke-width="1.2"/>
  <path d="M58,218 Q69,212 80,218" fill="none" stroke="#3a3a3a" stroke-width="0.8"/>
  <!-- Right column -->
  <rect x="224" y="230" width="14" height="230" fill="none" stroke="#3a3a3a" stroke-width="1.5"/>
  <line x1="224" y1="280" x2="238" y2="280" stroke="#3a3a3a" stroke-width="0.6"/>
  <line x1="224" y1="330" x2="238" y2="330" stroke="#3a3a3a" stroke-width="0.6"/>
  <line x1="224" y1="380" x2="238" y2="380" stroke="#3a3a3a" stroke-width="0.6"/>
  <line x1="224" y1="430" x2="238" y2="430" stroke="#3a3a3a" stroke-width="0.6"/>
  <!-- Right capital -->
  <path d="M217,230 L217,218 Q231,210 245,218 L245,230" fill="none" stroke="#3a3a3a" stroke-width="1.2"/>
  <path d="M220,218 Q231,212 242,218" fill="none" stroke="#3a3a3a" stroke-width="0.8"/>
  <!-- Horizontal inscription band -->
  <rect x="55" y="195" width="190" height="22" fill="none" stroke="#3a3a3a" stroke-width="1"/>
  <text x="150" y="211" text-anchor="middle" font-size="9" fill="#3a3a3a" font-family="serif" letter-spacing="3">بسم الله الرحمن الرحيم</text>
  <!-- Main pointed arch -->
  <path d="M80,460 L80,230 Q80,155 150,110 Q220,155 220,230 L220,460" fill="none" stroke="#3a3a3a" stroke-width="1.8"/>
  <!-- Crown arch sits ON inscription band -->
  <path d="M60,195 Q60,70 150,35 Q240,70 240,195" fill="none" stroke="#3a3a3a" stroke-width="1.5"/>
  <!-- 12-fold star -->
  <g transform="translate(150,72)">
    <circle r="22" fill="none" stroke="#3a3a3a" stroke-width="1"/>
    <polygon points="0,-20 5,-7 18,-7 8,2 11,16 0,8 -11,16 -8,2 -18,-7 -5,-7" fill="none" stroke="#3a3a3a" stroke-width="0.8"/>
    <polygon points="0,-20 5,-7 18,-7 8,2 11,16 0,8 -11,16 -8,2 -18,-7 -5,-7" fill="none" stroke="#3a3a3a" stroke-width="0.8" transform="rotate(36)"/>
  </g>
  <!-- Column bases -->
  <rect x="58" y="456" width="22" height="8" fill="none" stroke="#3a3a3a" stroke-width="1"/>
  <rect x="220" y="456" width="22" height="8" fill="none" stroke="#3a3a3a" stroke-width="1"/>
  <!-- Base -->
  <line x1="40" y1="464" x2="260" y2="464" stroke="#3a3a3a" stroke-width="1.5"/>
</svg>
<h3>2 — Flanking Columns</h3>
<p>Ottoman</p>
</div>

<!-- OPTION 3: Nested Arch -->
<div class="card">
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 500" width="280" height="467">
  <rect width="300" height="500" fill="#f5f0e8" rx="4"/>
  <!-- Blue watercolor fill -->
  <path d="M90,460 L90,200 Q90,100 150,55 Q210,100 210,200 L210,460 Z" fill="rgba(12,58,106,0.18)" stroke="none"/>
  <path d="M100,455 L100,210 Q100,115 150,72 Q200,115 200,210 L200,455 Z" fill="rgba(12,58,106,0.12)" stroke="none"/>
  <!-- Outer arch — one continuous line from base to tip -->
  <path d="M75,460 L75,200 Q75,85 150,40 Q225,85 225,200 L225,460" fill="none" stroke="#3a3a3a" stroke-width="2"/>
  <!-- Second line (double border) -->
  <path d="M82,460 L82,205 Q82,95 150,52 Q218,95 218,205 L218,460" fill="none" stroke="#3a3a3a" stroke-width="1"/>
  <!-- Inner nested arch -->
  <path d="M95,460 L95,220 Q95,140 150,100 Q205,140 205,220 L205,460" fill="none" stroke="#3a3a3a" stroke-width="1.5"/>
  <!-- Third line -->
  <path d="M102,460 L102,225 Q102,150 150,112 Q198,150 198,225 L198,460" fill="none" stroke="#3a3a3a" stroke-width="0.8"/>
  <!-- Decoration between arches — geometric band -->
  <g stroke="#3a3a3a" stroke-width="0.6" fill="none">
    <path d="M85,350 L88,340 L92,350 L88,360 Z"/>
    <path d="M85,310 L88,300 L92,310 L88,320 Z"/>
    <path d="M85,270 L88,260 L92,270 L88,280 Z"/>
    <path d="M208,350 L212,340 L215,350 L212,360 Z"/>
    <path d="M208,310 L212,300 L215,310 L212,320 Z"/>
    <path d="M208,270 L212,260 L215,270 L212,280 Z"/>
  </g>
  <!-- 12-fold star at crown (inside the pointed tip) -->
  <g transform="translate(150,80)">
    <circle r="20" fill="none" stroke="#3a3a3a" stroke-width="1"/>
    <polygon points="0,-18 5,-6 16,-6 7,2 10,14 0,7 -10,14 -7,2 -16,-6 -5,-6" fill="none" stroke="#3a3a3a" stroke-width="0.8"/>
    <polygon points="0,-18 5,-6 16,-6 7,2 10,14 0,7 -10,14 -7,2 -16,-6 -5,-6" fill="none" stroke="#3a3a3a" stroke-width="0.8" transform="rotate(36)"/>
  </g>
  <!-- Base -->
  <line x1="50" y1="460" x2="250" y2="460" stroke="#3a3a3a" stroke-width="1.5"/>
</svg>
<h3>3 — Tiered Nesting</h3>
<p>Persian / Safavid</p>
</div>

<!-- OPTION 4: Muqarnas Hood -->
<div class="card">
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 500" width="280" height="467">
  <rect width="300" height="500" fill="#f5f0e8" rx="4"/>
  <!-- Blue watercolor fill -->
  <path d="M90,460 L90,240 Q90,170 150,130 Q210,170 210,240 L210,460 Z" fill="rgba(12,58,106,0.18)" stroke="none"/>
  <path d="M95,455 L95,242 Q95,176 150,138 Q205,176 205,242 L205,455 Z" fill="rgba(12,58,106,0.12)" stroke="none"/>
  <!-- Main pointed arch -->
  <path d="M80,460 L80,240 Q80,160 150,120 Q220,160 220,240 L220,460" fill="none" stroke="#3a3a3a" stroke-width="1.8"/>
  <!-- Muqarnas tiers bridging gap -->
  <!-- Tier 1 (bottom of muqarnas, just above main arch) -->
  <g stroke="#3a3a3a" fill="none">
    <path d="M80,160 Q90,145 105,155 Q115,140 130,150 Q140,135 150,120" stroke-width="1.2"/>
    <path d="M220,160 Q210,145 195,155 Q185,140 170,150 Q160,135 150,120" stroke-width="1.2"/>
    <!-- Tier 2 -->
    <path d="M72,130 Q85,115 100,125 Q112,108 125,118 Q138,102 150,95" stroke-width="1"/>
    <path d="M228,130 Q215,115 200,125 Q188,108 175,118 Q162,102 150,95" stroke-width="1"/>
    <!-- Tier 3 -->
    <path d="M65,100 Q80,85 97,95 Q112,78 128,88 Q140,74 150,68" stroke-width="0.8"/>
    <path d="M235,100 Q220,85 203,95 Q188,78 172,88 Q160,74 150,68" stroke-width="0.8"/>
    <!-- Shadow hatching -->
    <line x1="90" y1="150" x2="95" y2="140" stroke-width="0.4"/>
    <line x1="110" y1="145" x2="115" y2="135" stroke-width="0.4"/>
    <line x1="130" y1="140" x2="135" y2="128" stroke-width="0.4"/>
    <line x1="210" y1="150" x2="205" y2="140" stroke-width="0.4"/>
    <line x1="190" y1="145" x2="185" y2="135" stroke-width="0.4"/>
    <line x1="170" y1="140" x2="165" y2="128" stroke-width="0.4"/>
    <line x1="85" y1="120" x2="90" y2="110" stroke-width="0.3"/>
    <line x1="105" y1="115" x2="110" y2="105" stroke-width="0.3"/>
    <line x1="215" y1="120" x2="210" y2="110" stroke-width="0.3"/>
    <line x1="195" y1="115" x2="190" y2="105" stroke-width="0.3"/>
  </g>
  <!-- Crown arch emerging from muqarnas -->
  <path d="M60,130 Q60,50 150,25 Q240,50 240,130" fill="none" stroke="#3a3a3a" stroke-width="1.5"/>
  <!-- 12-fold star -->
  <g transform="translate(150,55)">
    <circle r="22" fill="none" stroke="#3a3a3a" stroke-width="1"/>
    <polygon points="0,-20 5,-7 18,-7 8,2 11,16 0,8 -11,16 -8,2 -18,-7 -5,-7" fill="none" stroke="#3a3a3a" stroke-width="0.8"/>
    <polygon points="0,-20 5,-7 18,-7 8,2 11,16 0,8 -11,16 -8,2 -18,-7 -5,-7" fill="none" stroke="#3a3a3a" stroke-width="0.8" transform="rotate(36)"/>
  </g>
  <!-- Base -->
  <line x1="40" y1="460" x2="260" y2="460" stroke="#3a3a3a" stroke-width="1.5"/>
</svg>
<h3>4 — Muqarnas Hood</h3>
<p>Mamluk / Cairo</p>
</div>

<!-- OPTION 5: Keel Arch -->
<div class="card">
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 500" width="280" height="467">
  <rect width="300" height="500" fill="#f5f0e8" rx="4"/>
  <!-- Blue watercolor fill -->
  <path d="M95,460 L95,220 C95,140 120,80 150,45 C180,80 205,140 205,220 L205,460 Z" fill="rgba(12,58,106,0.18)" stroke="none"/>
  <path d="M100,455 L100,225 C100,148 123,88 150,55 C177,88 200,148 200,225 L200,455 Z" fill="rgba(12,58,106,0.12)" stroke="none"/>
  <!-- Left pilaster -->
  <rect x="68" y="100" width="10" height="360" fill="none" stroke="#3a3a3a" stroke-width="1.2"/>
  <!-- Right pilaster -->
  <rect x="222" y="100" width="10" height="360" fill="none" stroke="#3a3a3a" stroke-width="1.2"/>
  <!-- Continuous keel/ogee arch — single tall arch with S-curve tip -->
  <path d="M78,460 L78,220 C78,130 110,70 140,42 Q145,35 150,30 Q155,35 160,42 C190,70 222,130 222,220 L222,460" fill="none" stroke="#3a3a3a" stroke-width="2"/>
  <!-- Inner line -->
  <path d="M88,460 L88,225 C88,140 118,82 145,52 Q148,47 150,43 Q152,47 155,52 C182,82 212,140 212,225 L212,460" fill="none" stroke="#3a3a3a" stroke-width="1"/>
  <!-- 12-fold star as medallion (mid-upper) -->
  <g transform="translate(150,130)">
    <circle r="30" fill="none" stroke="#3a3a3a" stroke-width="1"/>
    <circle r="26" fill="none" stroke="#3a3a3a" stroke-width="0.6"/>
    <polygon points="0,-24 6,-8 22,-8 10,2 14,18 0,10 -14,18 -10,2 -22,-8 -6,-8" fill="none" stroke="#3a3a3a" stroke-width="0.8"/>
    <polygon points="0,-24 6,-8 22,-8 10,2 14,18 0,10 -14,18 -10,2 -22,-8 -6,-8" fill="none" stroke="#3a3a3a" stroke-width="0.8" transform="rotate(36)"/>
  </g>
  <!-- Lotus finial at tip -->
  <path d="M150,30 L146,22 L150,12 L154,22 Z" fill="none" stroke="#3a3a3a" stroke-width="1"/>
  <!-- Base plinth -->
  <rect x="55" y="460" width="190" height="15" fill="none" stroke="#3a3a3a" stroke-width="1.2"/>
  <line x1="55" y1="467" x2="245" y2="467" stroke="#3a3a3a" stroke-width="0.6"/>
</svg>
<h3>5 — Keel Arch + Medallion</h3>
<p>Mughal / Indian</p>
</div>

</div>
</body>
</html>
