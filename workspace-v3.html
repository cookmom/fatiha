<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>kitchen v3</title>
<style>
:root {
  --bg: #08080a;
  --bg-sidebar: #0c0c10;
  --bg-card: #111115;
  --bg-card-hover: #18181e;
  --bg-elevated: #1c1c24;
  --border: #1a1a22;
  --border-subtle: #141418;
  --border-accent: #2a2a36;
  --text: #e8e8ed;
  --text-sec: #9898a4;
  --text-muted: #4a4a56;
  --indigo: #6366f1;
  --indigo-dim: #4f46e5;
  --indigo-glow: rgba(99,102,241,.12);
  --amber: #f59e0b;
  --amber-glow: rgba(245,158,11,.08);
  --purple: #a78bfa;
  --cyan: #22d3ee;
  --emerald: #34d399;
  --gray: #6b7280;
  --gold: #fbbf24;
  --gold-dim: #d4a017;
  --red: #f87171;
  --chat-w: 400px;
  --ref-w: 380px;
  --deadline-h: 38px;
  --radius: 10px;
  --radius-sm: 6px;
  --tr: .18s cubic-bezier(.4,0,.2,1);
  --shadow-sm: 0 1px 3px rgba(0,0,0,.4);
  --shadow-md: 0 4px 16px rgba(0,0,0,.5);
  --shadow-glow: 0 0 20px rgba(99,102,241,.08);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;}
body{font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);line-height:1.5;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;}
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');

/* Deadline Bar */
.deadline-bar{position:sticky;top:0;z-index:100;height:var(--deadline-h);background:linear-gradient(180deg,#0c0c10 0%,#09090b 100%);border-bottom:1px solid var(--border-subtle);display:flex;align-items:center;padding:0 20px;font-size:12px;color:var(--text-sec);cursor:pointer;user-select:none;flex-shrink:0;backdrop-filter:blur(12px);}
.deadline-bar .dot{width:7px;height:7px;border-radius:50%;margin-right:10px;flex-shrink:0;box-shadow:0 0 6px currentColor;}
.deadline-bar .countdown{color:var(--text);font-weight:600;margin-right:6px;font-variant-numeric:tabular-nums;}
.deadline-bar .chevron{margin-left:auto;font-size:9px;color:var(--text-muted);transition:transform .25s cubic-bezier(.4,0,.2,1);}
.deadline-bar.open .chevron{transform:rotate(180deg);}
.deadline-expand{position:absolute;top:var(--deadline-h);left:0;right:0;background:linear-gradient(180deg,#0b0b0f 0%,#09090b 100%);border-bottom:1px solid var(--border-subtle);max-height:0;overflow:hidden;transition:max-height .3s cubic-bezier(.4,0,.2,1);z-index:99;box-shadow:var(--shadow-md);}
.deadline-bar.open+.deadline-expand{max-height:200px;}
.dl-row{display:flex;align-items:center;gap:10px;padding:7px 20px;font-size:12px;color:var(--text-sec);transition:background var(--tr);}
.dl-row:hover{background:rgba(255,255,255,.02);}
.dl-row .dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;box-shadow:0 0 6px currentColor;}
.dl-row .dl-days{margin-left:auto;color:var(--text-muted);font-size:11px;font-variant-numeric:tabular-nums;}

/* App Layout */
.app{display:flex;height:calc(100vh - var(--deadline-h));overflow:hidden;}

/* Code Canvas (Column 2) */
.code-canvas{flex:1;min-width:0;background:var(--bg-sidebar);border-right:1px solid var(--border-subtle);display:flex;flex-direction:column;overflow:hidden;}
.col-header{display:flex;align-items:center;height:42px;padding:0 16px;border-bottom:1px solid var(--border-subtle);gap:8px;flex-shrink:0;box-sizing:border-box;}
.col-header .stage-title{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--text-muted);}
.code-canvas-header{display:flex;align-items:center;height:42px;padding:0 16px;border-bottom:1px solid var(--border-subtle);gap:8px;flex-shrink:0;box-sizing:border-box;}
.code-canvas-header .stage-title{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--text-muted);}
.code-canvas-tabs{display:flex;gap:3px;margin-left:auto;}
.code-canvas-tab{padding:4px 14px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--text-muted);font-size:10px;font-weight:600;cursor:pointer;transition:all var(--tr);}
.code-canvas-tab:hover{color:var(--text);background:rgba(255,255,255,.04);}
.code-canvas-tab.active{background:var(--gold);color:#000;border-color:var(--gold);box-shadow:0 0 12px rgba(251,191,36,.2);}

/* Spotlight Viewer (Column 3) */
.spotlight-viewer{flex:1;display:flex;flex-direction:column;min-width:0;overflow:hidden;background:var(--bg);border-right:1px solid var(--border-subtle);position:relative;}
.spotlight-placeholder{flex:1;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px;color:var(--text-muted);user-select:none;}
.spotlight-placeholder .sp-icon{font-size:56px;opacity:.15;filter:grayscale(1);}
.spotlight-placeholder .sp-text{font-size:12px;opacity:.35;letter-spacing:.02em;}
.spotlight-content{flex:1;overflow-y:auto;padding:24px 28px 32px;display:none;animation:fadeSlideUp .3s cubic-bezier(.4,0,.2,1);}
.spotlight-content.active{display:block;}
@keyframes fadeSlideUp{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
.spotlight-content .cat-pill{display:inline-block;padding:3px 10px;border-radius:20px;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px;}
.spotlight-content h2{font-size:20px;font-weight:700;margin-bottom:10px;letter-spacing:-.01em;line-height:1.3;}
.spotlight-content .desc{font-size:13px;color:var(--text-sec);line-height:1.7;margin-bottom:16px;}
.spotlight-content .source-link{color:var(--cyan);font-size:11px;text-decoration:none;display:inline-flex;align-items:center;gap:4px;padding:4px 0;opacity:.8;transition:opacity var(--tr);}
.spotlight-content .source-link:hover{opacity:1;text-decoration:underline;}
.spotlight-content .insp-nav{display:flex;gap:6px;margin-top:20px;padding-top:16px;border-top:1px solid var(--border-subtle);}
.spotlight-content .insp-nav button{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text-sec);padding:6px 14px;font-size:11px;font-weight:500;cursor:pointer;transition:all var(--tr);}
.spotlight-content .insp-nav button:hover{background:var(--bg-card-hover);color:var(--text);border-color:var(--border-accent);}
.spotlight-content .insp-nav .back-btn{margin-left:auto;background:transparent;border:none;color:var(--text-muted);font-size:11px;cursor:pointer;transition:color var(--tr);}
.spotlight-content .insp-nav .back-btn:hover{color:var(--red);}

/* Chat Panel */
.chat-panel{width:var(--chat-w);min-width:var(--chat-w);background:var(--bg-sidebar);border-right:1px solid var(--border-subtle);display:flex;flex-direction:column;flex-shrink:0;}
.chat-header{height:42px;padding:0 16px;border-bottom:1px solid var(--border-subtle);font-size:11px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.08em;display:flex;align-items:center;justify-content:space-between;box-sizing:border-box;}
.chat-header button{background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:14px;}
.chat-messages{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:8px;scrollbar-width:thin;scrollbar-color:var(--border) transparent;}
.chat-msg{max-width:85%;padding:8px 12px;border-radius:14px;font-size:12.5px;line-height:1.5;word-break:break-word;}
.chat-msg.msg-new{animation:msgIn .2s cubic-bezier(.4,0,.2,1);}
@keyframes msgIn{from{opacity:0;transform:translateY(4px);}to{opacity:1;transform:translateY(0);}}
.chat-msg.user{align-self:flex-end;background:linear-gradient(135deg,var(--indigo) 0%,var(--indigo-dim) 100%);color:#fff;border-bottom-right-radius:4px;box-shadow:0 2px 8px rgba(99,102,241,.2);}
.chat-msg.chef{align-self:flex-start;background:var(--bg-elevated);color:var(--text);border-bottom-left-radius:4px;border:1px solid var(--border-subtle);}
.chat-msg .msg-time{display:block;font-size:9px;margin-top:4px;opacity:.4;font-variant-numeric:tabular-nums;}
.chat-msg .link-card{display:block;margin-top:4px;padding:5px 8px;background:rgba(255,255,255,.05);border-radius:var(--radius-sm);color:var(--cyan);font-size:11px;text-decoration:none;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;transition:background var(--tr);}
.chat-msg .link-card:hover{background:rgba(255,255,255,.08);}
/* Process drawer */
.process-panel{display:block;border-bottom:1px solid var(--border-subtle);flex-shrink:0;overflow:hidden;}
.process-body{display:none;}
.process-panel.open .process-body{display:block;max-height:140px;}
.process-toggle{display:flex;align-items:center;gap:6px;padding:6px 14px;cursor:pointer;font-size:11px;color:var(--text-muted);transition:all var(--tr);user-select:none;position:relative;overflow:hidden;}
.process-toggle:hover{background:rgba(255,255,255,.03);}
.process-toggle.active{color:var(--gold);background:rgba(251,146,60,.06);}
.process-toggle.active::before{content:'';position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(251,146,60,.08),transparent);animation:ovenGlow 2.5s ease-in-out infinite;}
.process-toggle.active .cooking-flame{animation:flame 1.2s ease-in-out infinite alternate;}
.process-toggle .process-chevron{font-size:8px;transition:transform .2s;margin-left:auto;}
@keyframes ovenGlow{0%,100%{opacity:.3;transform:translateX(-100%);}50%{opacity:1;transform:translateX(100%);}}
@keyframes flame{0%{transform:scale(1);filter:brightness(1);}100%{transform:scale(1.15);filter:brightness(1.3);}}
.process-panel.open .process-chevron{transform:rotate(180deg);}
.process-body{max-height:140px;overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--border) transparent;}
.process-indicator{font-size:12px;}
.process-label{font-weight:500;letter-spacing:.02em;}
.process-count{margin-left:auto;font-size:10px;opacity:.5;font-variant-numeric:tabular-nums;}
.process-popup-body{overflow-y:auto;flex:1;padding:8px 0;scrollbar-width:thin;scrollbar-color:var(--border) transparent;}
.process-msg{padding:4px 14px;font-size:10.5px;color:var(--text-muted);line-height:1.5;font-family:'JetBrains Mono','SF Mono',monospace;border-left:2px solid var(--border-subtle);margin:2px 10px;word-break:break-word;opacity:.7;}
.process-msg.fresh{opacity:1;border-left-color:var(--gold);}

.chat-input-area{padding:12px;border-top:1px solid var(--border-subtle);display:flex;gap:8px;}
.chat-input-area input{flex:1;background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:9px 12px;color:var(--text);font-size:12.5px;outline:none;transition:border-color var(--tr),box-shadow var(--tr);}
.chat-input-area input:focus{border-color:var(--indigo);box-shadow:0 0 0 3px var(--indigo-glow);}
.chat-input-area button{background:var(--indigo);border:none;border-radius:var(--radius);color:#fff;padding:0 14px;font-size:13px;font-weight:500;cursor:pointer;transition:all var(--tr);}
.chat-input-area button:hover{background:var(--indigo-dim);box-shadow:0 2px 8px rgba(99,102,241,.3);}

/* Stage title shared */
.stage-title{font-size:14px;font-weight:600;}

/* Canvas pane (inside code-canvas column) */
.canvas-view{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.canvas-view.hidden{display:none;}
.canvas-container{flex:1;background:#000;display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative;}
.canvas-container iframe{border:none;background:#050507;}
.aspect-bar{display:flex;align-items:center;gap:8px;padding:8px 14px;border-top:1px solid var(--border-subtle);font-size:10px;color:var(--text-muted);flex-shrink:0;letter-spacing:.03em;}
/* Gallery */
.gallery-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:8px;margin:12px 0;}
.gallery-grid img{width:100%;aspect-ratio:4/3;object-fit:cover;border-radius:var(--radius);cursor:pointer;transition:all .2s cubic-bezier(.4,0,.2,1);opacity:.75;border:2px solid transparent;}
.gallery-grid img:hover{transform:scale(1.04);opacity:1;border-color:var(--indigo);box-shadow:0 4px 16px rgba(99,102,241,.15);}
.gallery-hero{width:100%;max-height:50vh;object-fit:contain;border-radius:var(--radius);margin-bottom:12px;background:#050507;cursor:pointer;transition:opacity .2s;border:1px solid var(--border-subtle);}
.gallery-hero:hover{opacity:.9;}
.gallery-video{width:100%;aspect-ratio:16/9;border:none;border-radius:var(--radius);margin:10px 0;background:#000;box-shadow:var(--shadow-md);}
.gallery-section-label{font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--text-muted);margin:16px 0 6px;font-weight:600;display:flex;align-items:center;gap:6px;}
.gallery-section-label::after{content:'';flex:1;height:1px;background:var(--border-subtle);}
/* Chef's Take */
.chef-take{margin:16px 0;padding:16px 18px;background:linear-gradient(135deg,rgba(251,191,36,.04) 0%,rgba(99,102,241,.04) 100%);border:1px solid rgba(251,191,36,.12);border-left:3px solid var(--gold);border-radius:var(--radius);font-size:12.5px;line-height:1.7;color:var(--text-sec);white-space:pre-line;}
.chef-take-label{font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--gold);font-weight:700;margin-bottom:8px;display:flex;align-items:center;gap:6px;}
.detail-section{margin:14px 0;font-size:13px;line-height:1.75;color:var(--text-sec);}
.detail-section-label{font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--text-muted);font-weight:600;margin-bottom:6px;display:flex;align-items:center;gap:6px;}
.detail-section-label::after{content:'';flex:1;height:1px;background:var(--border-subtle);}
/* Bookmarks */
.bookmark-btn{background:none;border:1px solid var(--border);border-radius:6px;font-size:16px;cursor:pointer;padding:4px 8px;line-height:1;color:var(--text-muted);opacity:.7;transition:all var(--tr);flex-shrink:0;}
.bookmark-btn:hover{opacity:1;background:rgba(251,191,36,.08);border-color:var(--gold);transform:scale(1.05);}
.bookmark-btn.bookmarked{opacity:1;background:rgba(251,191,36,.12);border-color:var(--gold);filter:drop-shadow(0 0 6px rgba(251,191,36,.3));}
.bookmark-filter{display:flex;align-items:center;gap:6px;padding:8px 10px;border-bottom:1px solid var(--border-subtle);flex-shrink:0;}
.bookmark-filter-btn{padding:3px 10px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--text-muted);font-size:10px;font-weight:500;cursor:pointer;transition:all var(--tr);}
.bookmark-filter-btn:hover{color:var(--text-sec);border-color:var(--border-accent);}
.bookmark-filter-btn.active{background:var(--gold);color:#000;border-color:var(--gold);box-shadow:0 0 10px rgba(251,191,36,.15);}
.bookmark-count{font-size:10px;color:var(--text-muted);margin-left:auto;}
.gallery-lightbox{position:absolute;inset:0;z-index:100;background:rgba(0,0,0,.95);display:flex;align-items:center;justify-content:center;cursor:zoom-out;animation:lbIn .2s ease;backdrop-filter:blur(8px);}
@keyframes lbIn{from{opacity:0;}to{opacity:1;}}
.gallery-lightbox img{max-width:80%;max-height:85%;object-fit:contain;border-radius:var(--radius-sm);box-shadow:0 8px 40px rgba(0,0,0,.6);}
.lb-nav{position:absolute;top:50%;transform:translateY(-50%);background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);color:#fff;font-size:28px;width:40px;height:56px;display:flex;align-items:center;justify-content:center;cursor:pointer;border-radius:var(--radius-sm);transition:all var(--tr);z-index:2;backdrop-filter:blur(4px);}
.lb-nav:hover{background:rgba(255,255,255,.15);border-color:rgba(255,255,255,.2);}
.lb-prev{left:8px;}
.lb-next{right:8px;}
.lb-counter{position:absolute;bottom:12px;left:50%;transform:translateX(-50%);font-size:11px;color:rgba(255,255,255,.5);font-variant-numeric:tabular-nums;background:rgba(0,0,0,.5);padding:3px 10px;border-radius:20px;}
.aspect-btn{padding:4px 12px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--text-muted);font-size:10px;font-weight:500;cursor:pointer;transition:all var(--tr);}
.aspect-btn:hover{color:var(--text);border-color:var(--border-accent);}
.aspect-btn.active{background:var(--indigo);color:#fff;border-color:var(--indigo);box-shadow:0 0 10px rgba(99,102,241,.2);}

/* Code pane */
.code-view{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.code-view.hidden{display:none;}
.code-toolbar{display:flex;align-items:center;gap:8px;padding:8px 14px;border-bottom:1px solid var(--border-subtle);flex-wrap:wrap;flex-shrink:0;background:var(--bg-sidebar);}
.code-toolbar button,.code-toolbar select,.code-toolbar label{font-size:11px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--bg-card);color:var(--text-sec);padding:5px 12px;cursor:pointer;transition:all var(--tr);}
.code-toolbar button:hover{background:var(--bg-card-hover);color:var(--text);}
.code-toolbar .run-btn{background:var(--emerald);color:#000;border-color:var(--emerald);font-weight:600;box-shadow:0 0 10px rgba(52,211,153,.15);}
.code-toolbar .run-btn:hover{background:#2ac48a;box-shadow:0 0 16px rgba(52,211,153,.25);}
.code-toolbar .auto-toggle{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text-sec);border:none;background:none;}
.code-toolbar .auto-toggle input{accent-color:var(--gold);}
.code-toolbar .save-name{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);padding:5px 10px;font-size:11px;width:120px;transition:border-color var(--tr);}
.code-toolbar .save-name:focus{border-color:var(--indigo);outline:none;}
.code-editor-wrap{flex:1;position:relative;overflow:hidden;}
.line-numbers{position:absolute;top:0;left:0;width:40px;padding:14px 8px 14px 0;text-align:right;font-family:'JetBrains Mono','SF Mono','Fira Code',monospace;font-size:12px;line-height:1.6;color:var(--text-muted);pointer-events:none;user-select:none;overflow:hidden;opacity:.6;}
.code-editor{width:100%;height:100%;resize:none;background:#0e0e12;color:var(--text);border:none;padding:14px 14px 14px 48px;font-family:'JetBrains Mono','SF Mono','Fira Code',monospace;font-size:12px;line-height:1.6;outline:none;tab-size:2;caret-color:var(--gold);}

/* Reference Panel */
.ref-panel{width:var(--ref-w);min-width:var(--ref-w);background:var(--bg-sidebar);display:flex;flex-direction:column;flex-shrink:0;overflow:hidden;}
.ref-tabs{display:flex;height:42px;border-bottom:1px solid var(--border-subtle);flex-shrink:0;box-sizing:border-box;align-items:center;gap:0;}
.ref-tab{flex:1;padding:10px 4px;text-align:center;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--text-muted);cursor:pointer;transition:all var(--tr);border-bottom:2px solid transparent;position:relative;}
.ref-tab:hover{color:var(--text-sec);}
.ref-tab.active{color:var(--gold);border-bottom-color:var(--gold);}
.ref-content{flex:1;overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--border) transparent;}
.ref-pane{display:none;padding:10px;}
.ref-pane.active{display:block;}

/* Inspiration cards (sidebar) */
.insp-card-s{padding:10px 12px;background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:8px;cursor:pointer;transition:all .2s cubic-bezier(.4,0,.2,1);position:relative;overflow:hidden;}
.insp-card-s::before{content:'';position:absolute;top:0;left:0;width:3px;height:100%;background:transparent;transition:background var(--tr);border-radius:0 2px 2px 0;}
.insp-card-s:hover{border-color:var(--border-accent);background:var(--bg-card-hover);box-shadow:var(--shadow-sm);}
.insp-card-s:hover::before{background:var(--indigo);}
.insp-card-s .cat-pill{display:inline-block;padding:2px 8px;border-radius:12px;font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;margin-bottom:5px;}
.insp-card-s h4{font-size:12px;font-weight:600;margin-bottom:3px;line-height:1.3;color:var(--text);}
.insp-card-s .desc{font-size:10px;color:var(--text-muted);line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}

/* Algo cards (sidebar) */
.tech-card-s{padding:10px 12px;background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:8px;display:flex;align-items:center;gap:10px;transition:all var(--tr);}
.tech-card-s:hover{border-color:var(--border-accent);background:var(--bg-card-hover);}
.tech-card-s .info{flex:1;min-width:0;}
.tech-card-s h4{font-size:11px;font-weight:600;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.tech-card-s .cat-pill{display:inline-block;padding:2px 7px;border-radius:12px;font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;}
.tech-card-s .load-btn{padding:4px 12px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--text-sec);font-size:10px;cursor:pointer;transition:all var(--tr);font-weight:500;flex-shrink:0;}
.tech-card-s .load-btn:hover{background:var(--gold);color:#000;border-color:var(--gold);box-shadow:0 0 10px var(--amber-glow);}

/* Concepts (sidebar) */

.chat-fab{display:none;position:fixed;bottom:16px;left:16px;z-index:200;width:48px;height:48px;border-radius:50%;background:var(--indigo);border:none;color:#fff;font-size:20px;cursor:pointer;box-shadow:0 4px 16px rgba(99,102,241,.4);}

<body>

<!-- Deadline Bar -->
<div class="deadline-bar" id="deadlineBar">
  <span class="dot" id="dlDot"></span>
  <span class="countdown" id="dlCountdown"></span>
  <span id="dlName"></span>
  <span class="chevron">▼</span>
</div>
<div class="deadline-expand" id="dlExpand"></div>

<!-- App -->
<div class="app">
  <!-- Chat Panel -->
  <aside class="chat-panel" id="chatPanel">
    <div class="chat-header">kitchen chat <span id="chatStatus" style="margin-left:auto">🔴</span></div>
    <!-- Background processes panel -->
    <div class="process-panel" id="processPanel">
      <div class="process-toggle" id="processToggle">
        <span class="cooking-flame">🔥</span><span>cooking…</span>
        <span id="processCount" style="font-size:10px;opacity:.6;"></span>
        <span id="processLatest" style="font-size:10px;color:var(--gold);opacity:.8;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;"></span>
        <span class="process-chevron">▼</span>
      </div>
      <div class="process-body" id="processMessages"></div>
    </div>
    <div class="chat-messages" id="chatMessages"></div>
    <div id="typingIndicator" class="chat-msg chef" style="display:none;opacity:.5;font-style:italic;">chef is cooking…</div>
    <div class="chat-input-area">
      <input type="text" id="chatInput" placeholder="Send a message…" autocomplete="off">
      <button id="chatSend">→</button>
    </div>
  </aside>

  <!-- Code Canvas (Column 2) -->
  <div class="code-canvas" id="codeCanvas">
    <div class="code-canvas-header">
      <span class="stage-title">stove</span>
      <span class="stage-date" id="stageDate"></span>
      <div class="code-canvas-tabs">
        <div class="code-canvas-tab active" data-tab="canvas">Preview</div>
        <div class="code-canvas-tab" data-tab="code">Editor</div>
      </div>
    </div>

    <!-- Canvas View -->
    <div class="canvas-view" id="canvasView">
      <div class="canvas-container" id="canvasContainer">
        <iframe id="canvasFrame" sandbox="allow-scripts"></iframe>
      </div>
      <div class="aspect-bar">
        <span>Aspect:</span>
        <button class="aspect-btn" data-aspect="fill">Fill</button>
        <button class="aspect-btn" data-aspect="1:1">1:1</button>
        <button class="aspect-btn active" data-aspect="9:16">9:16</button>
        <button class="aspect-btn" data-aspect="16:9">16:9</button>
      </div>
    </div>

    <!-- Code View -->
    <div class="code-view hidden" id="codeView">
      <div class="code-toolbar">
        <button class="run-btn" id="runBtn">▶ Run</button>
        <label class="auto-toggle"><input type="checkbox" id="autoRun"> Auto-run</label>
        <input type="text" class="save-name" id="saveName" placeholder="Sketch name…">
        <button id="saveBtn">Save</button>
        <select id="loadSelect"><option value="">Load…</option></select>
      </div>
      <div class="code-editor-wrap">
        <div class="line-numbers" id="lineNumbers"></div>
        <textarea class="code-editor" id="codeEditor" spellcheck="false"></textarea>
      </div>
    </div>
  </div>

  <!-- Top (Column 3) -->
  <div class="spotlight-viewer" id="spotlightViewer">
    <div class="col-header">
      <span class="stage-title">plate</span>
      <span id="spotNavInfo" style="font-size:10px;color:var(--text-muted);margin-left:auto;"></span>
      <button id="spotPrev" class="spot-nav-btn" style="display:none;background:none;border:1px solid var(--border);border-radius:6px;color:var(--text-muted);padding:2px 8px;font-size:12px;cursor:pointer;transition:all var(--tr);" title="Previous (←)">‹</button>
      <button id="spotNext" class="spot-nav-btn" style="display:none;background:none;border:1px solid var(--border);border-radius:6px;color:var(--text-muted);padding:2px 8px;font-size:12px;cursor:pointer;transition:all var(--tr);" title="Next (→)">›</button>
    </div>
    <div class="spotlight-placeholder" id="spotlightPlaceholder">
      <div class="sp-icon" style="font-size:24px;opacity:.3;">+</div>
      <div class="sp-text">plate — select something from the reference panel</div>
    </div>
    <div class="spotlight-content" id="spotlightContent"></div>
  </div>

  <!-- Reference Panel -->
  <aside class="ref-panel" id="refPanel">
    <div class="ref-tabs">
      <div class="ref-tab active" data-ref="inspo">Inspo</div>
      <div class="ref-tab" data-ref="algos">Algos</div>
      <div class="ref-tab" data-ref="concepts">Concepts</div>
      <div class="ref-tab" data-ref="combo" id="comboTab">Combo <span id="comboCount" style="font-size:9px;color:var(--amber);margin-left:2px;"></span></div>

          <button class="bookmark-filter-btn active" id="filterAll">All</button>

          <button class="bookmark-filter-btn" id="filterRanked">Ranked</button>

        <div id="inspoPane"></div>
      </div>
      <div class="ref-pane" data-refpane="algos" id="algosPane"></div>
      <div class="ref-pane" data-refpane="concepts" id="conceptsPane"></div>
      <div class="ref-pane" data-refpane="combo" id="comboPane"></div>
    </div>
  </aside>
</div>

<!-- Mobile: Chat FAB + Sheet -->

<div class="chat-overlay" id="chatOverlay"></div>
<div class="chat-sheet" id="chatSheet">

<script>
// ── Data ──
const INSPIRATIONS = [
  { id:'hulten', cat:'sound', title:'Love Hultén — Ferrofluid Synth Guitar',
    desc:'Modified Arturia MicroFreak in hand-built body with dancing ferrofluid visualizer, steel rod pitch control, magnetic sequencer.',
    link:'https://www.designboom.com/technology/love-hulten-guitar-synth-instrument-ferrofluid-09-22-2025/',
    img:'https://static.designboom.com/wp-content/uploads/2025/09/love-hulten-guitar-synth-instrument-ferrofluid-designboom-01.jpg',
    gallery:[
      'https://static.designboom.com/wp-content/uploads/2025/09/love-hulten-guitar-synth-instrument-ferrofluid-designboom-01.jpg',
      'https://static.designboom.com/wp-content/uploads/2025/09/love-hulten-guitar-synth-instrument-ferrofluid-designboom-02.jpg',
      'https://static.designboom.com/wp-content/uploads/2025/09/love-hulten-guitar-synth-instrument-ferrofluid-designboom-03.jpg',
      'https://static.designboom.com/wp-content/uploads/2025/09/love-hulten-guitar-synth-instrument-ferrofluid-designboom-04.jpg',
      'https://static.designboom.com/wp-content/uploads/2025/09/love-hulten-guitar-synth-instrument-ferrofluid-designboom-05.jpg',
      'https://static.designboom.com/wp-content/uploads/2025/09/love-hulten-guitar-synth-instrument-ferrofluid-designboom-06.jpg',
    ],
    videos:['https://www.youtube.com/embed/6sPbJwzi87k'],
    detail:'Swedish artist Love Hultén (Gothenburg) builds one-of-a-kind electronic instruments inside hand-crafted wooden enclosures. This piece takes an Arturia MicroFreak synth and rebuilds it into a guitar-shaped body with a ferrofluid chamber mounted in the neck. The ferrofluid reacts to magnetic fields generated by the audio signal — so you literally see the sound vibrating as dancing black spikes before you hear it. A steel rod replaces the fretboard for continuous pitch control, and a magnetic ball sequencer on the body triggers patterns. Each piece is unique, sold as art objects — typically $3K-15K range. Hultén has 200K+ Instagram followers and shows at design fairs worldwide.',
    chefTake:'This is the blueprint for "instrument as art object." The ferrofluid is pure callback/reveal — you SEE the sound before you HEAR it. That\'s temporal misdirection.\n\n🔥 For you: Imagine a Moog Muse or Push 3 session where the audio drives a ferrofluid cell filmed in macro, projected large. The instrument watches itself play. Or — generative version: a p5.js piece where particles behave like ferrofluid, reacting to an invisible "magnetic field" that the viewer discovers is actually a hidden + glyph pulling them.\n\n💡 Hultén proves there\'s a premium market for one-off sound sculptures. Your VP fabrication contacts + Moog/Ableton expertise = you could build these. The intersection of physical craft + electronic instrument + visual feedback is underexplored in the generative art world.'
  },
  { id:'vtol', cat:'kinetic', title:'::vtol:: — Kinetic Code Sculptures',
    desc:'Electronic installations reacting to environment + viewers. "Reading My Body" turns tattoos into music. Showed at Sónar+D June 2025.',
    link:'https://www.designboom.com/technology/inside-world-vtol-kinetic-sculptures-robotics-code-driven-installations-dmitry-morozov-interview-08-18-2025/',
    img:'https://static.designboom.com/wp-content/uploads/2025/08/inside-world-vtol-kinetic-sculptures-robotics-code-driven-installations-dmitry-morozov-interview-designboom-1800.jpg',
    gallery:[
      'https://static.designboom.com/wp-content/uploads/2025/08/inside-world-vtol-kinetic-sculptures-robotics-code-driven-installations-dmitry-morozov-interview-designboom-1800.jpg',
      'https://static.designboom.com/wp-content/uploads/2025/08/inside-world-vtol-kinetic-sculptures-robotics-code-driven-installations-dmitry-morozov-interview-designboom-600.jpg',
    ],
    videos:[],
    detail:'Dmitry Morozov (::vtol::) is a Moscow-born, Berlin-based artist building robotic sculptures that translate environmental data into sound and motion. "Reading My Body" uses a custom scanner to read his own tattoos as musical notation — the machine literally plays his skin. "Last Breath" is a wearable mask-organ that converts the wearer\'s breathing into pipe organ sounds. His work shown at Ars Electronica, Sónar+D (June 2025), ZKM Karlsruhe, and major new media festivals globally. He builds everything from scratch — custom PCBs, 3D-printed mechanisms, hand-soldered electronics. Open-source ethos but sells installations at institutional prices ($10K-50K+).',
    chefTake:'vtol is the anti-polish artist — raw electronics, exposed wiring, machines that look alive. The "Reading My Body" piece is a masterclass in the lens: your body IS the score, but you don\'t know it until the machine reveals it. That\'s callback.\n\n🔥 For you: The tattoo-reading concept maps directly to your + glyph work. What if a camera tracked a physical + drawn on paper, and each arm of the cross controlled a different musical parameter? The + becomes an instrument. Draw it bigger = louder. Rotate it = pitch shift. This is a TD + camera tracking piece you could prototype THIS WEEK with your existing setup.\n\n💡 He showed at Sónar+D — that\'s the deadline we\'re tracking (Feb 19). His work is exactly what they program. Your VP camera tracking chops give you an edge he doesn\'t have: real-time, sub-millimeter precision tracking that vtol does with hacky computer vision.'
  },
  { id:'eightnote', cat:'sound', title:'EightNote — Kinetic Magnetic MIDI Controller',
    desc:'MIDI.org Innovation Award 2025. Magnetic balls on a sliding 8-lane panel — rhythm as physical gesture.',
    link:'https://midi.org/innovation-award/eightnote',
    img:'https://midi.org/wp-content/uploads/2025/07/4444-1024x559.jpg',
    gallery:['https://midi.org/wp-content/uploads/2025/07/4444-1024x559.jpg'],
    videos:['https://www.youtube.com/embed/h-du-Fm8QHA'],
    detail:'EightNote won the MIDI Innovation Award 2025. It\'s a tangible MIDI controller with 8 parallel lanes — you place magnetic balls on a tilting surface and they roll along tracks, triggering MIDI notes as they cross contact points. Tilt the panel to control speed/direction. The physical movement of the balls IS the rhythm — gravity becomes your sequencer. Created by a small hardware team, open-source firmware planned. Euclidean rhythm patterns emerge naturally from the physics of rolling balls on angled surfaces. Currently in prototype stage, no retail yet.',
    chefTake:'Gravity as sequencer. This is Euclidean rhythms made physical — the balls naturally fall into patterns that mirror the mathematical distributions you\'re already exploring in Ableton.\n\n🔥 For you: Two paths here. (1) Physical: Build a version using your eurorack exploration — magnetic triggers + contact mics + a tilting surface could be a weekend prototype. (2) Digital: Recreate this in p5.js as a generative piece — simulated balls rolling on lanes, each triggering visual + audio events. The seed determines the tilt angle, so each mint produces different rhythmic patterns. This is a STRONG fxhash concept.\n\n💡 The "open-source firmware" angle means you could fork it, add Ableton Link sync, and make it talk to your Push 3. Physical instrument → digital twin → generative art. Three outputs from one concept.\n\n🕌 Islamic connection: 8 lanes = octagon = a sacred geometric form. The balls finding their pattern = tawhid (divine unity) emerging from apparent chaos.'
  },
  { id:'zimoun', cat:'kinetic', title:'Zimoun — Sound Installations',
    desc:'Hundreds of identical motors + everyday materials = emergent sonic landscapes. New commission: Staatsschauspiel Dresden 2026.',
    link:'https://zimoun.net/',
    img:'https://zimoun.net/site/assets/files/2165/2026-dresden-1.960x640.jpg',
    gallery:[
      'https://zimoun.net/site/assets/files/2165/2026-dresden-1.960x640.jpg',
      'https://zimoun.net/site/assets/files/2159/zimoun-artmuseumnantes-01.960x640.png',
      'https://zimoun.net/site/assets/files/1507/bildschirmfoto_2019-05-24_um_08_56_02.960x640.png',
      'https://zimoun.net/site/assets/files/2107/eos_r5m2_0028-k.960x640.jpg',
      'https://zimoun.net/site/assets/files/1684/zimoun-2021-191.960x640.jpg',
      'https://zimoun.net/site/assets/files/1576/zimoun-2020-1944-2644-6720x4480px.960x640.jpg',
    ],
    videos:[
      'https://player.vimeo.com/video/1158448168',
      'https://player.vimeo.com/video/1133564576',
      'https://player.vimeo.com/video/573962534',
    ],
    detail:'Zimoun (Bern, Switzerland) creates architecturally-scaled sound sculptures using hundreds of identical, simple mechanical elements: DC motors, cotton balls, cardboard boxes, wire. A single motor tapping a box = nothing. 400 motors tapping 400 boxes in a warehouse = a living, breathing organism. He\'s been doing this for 20+ years. Major institutions: MoMA, Barbican, Centre Pompidou, Art Basel. New 2026 commission at Staatsschauspiel Dresden. Also showed at Musée d\'Arts de Nantes (2025), NYU Abu Dhabi (2019), Rewire Den Haag (2025). His work is about emergence — complexity from simplicity. Budgets range from $20K gallery pieces to $200K+ architectural commissions.',
    chefTake:'Zimoun IS the concept we wrote as "Zimoun\'s Law" — one rule iterated 10,000 times. He\'s proof that the simplest possible element, repeated at scale, creates something that feels alive. The audience moment is when they realize every unit is identical.\n\n🔥 For you: This is your generative art thesis. The + glyph IS your motor. One symbol, one rule, scaled to thousands. "follow the +" is already this concept — a field of crosses that resolves into a figure. Push it further: what if you generated a Zimoun-style grid of + symbols, each slightly rotating at different speeds (like his motors), and the emergent pattern slowly reveals sacred geometry?\n\n💡 The NYU Abu Dhabi show is interesting — he\'s already in the Gulf art circuit. Your Islamic geometry angle + his emergence philosophy = a natural curatorial pairing. Worth noting for Diriyah Biennale applications.\n\n🎵 Sound angle: Record 100 instances of a single percussive hit in Ableton, offset them by random ms amounts, pan them spatially. Zimoun\'s installation as a DAW experiment. Feed it to TD for visuals.'
  },
  { id:'trimpin', cat:'sound', title:'Trimpin — The OG MIDI Sculptor',
    desc:'30+ years of electromechanical sculptures via MIDI + microcontrollers. Building-scale instruments that play themselves.',
    link:'https://en.wikipedia.org/wiki/Trimpin',
    img:'https://upload.wikimedia.org/wikipedia/commons/9/95/Trimpin_01.jpg',
    gallery:['https://upload.wikimedia.org/wikipedia/commons/9/95/Trimpin_01.jpg'],
    videos:[],
    detail:'Trimpin (born Gerhard Trimpin, Germany; based in Seattle since 1979) is a sculptor, composer, and inventor who builds massive electromechanical instruments controlled by MIDI and custom microcontrollers. His installations fill entire buildings — pianos that play themselves, guitars suspended from ceilings triggered by solenoids, percussion walls spanning 40+ feet. He received a MacArthur "Genius" Fellowship (1997). Notable works include "Klompen" (250 wooden shoes as percussion), "If VI Was IX" (Jimi Hendrix Museum guitar tower — 500+ guitars played by MIDI), and "Sheng High" (30-foot-tall glass pipe organ). He builds everything by hand, often spending years on a single piece.',
    chefTake:'Trimpin is the godfather of everything in this inspo feed. MacArthur Genius, 30+ years before anyone called it "new media." The man built a 500-guitar MIDI tower in the 90s. He proves that MIDI + physical objects + architectural scale = lasting art career.\n\n🔥 For you: Trimpin\'s work is the physical endpoint of what you\'re exploring digitally. The path: generative MIDI sequences (Ableton/Push 3) → visualize in TD → EVENTUALLY actuate physically. You don\'t need to build 500 guitars — start with one solenoid hitting one object, driven by your Euclidean sequences. Film it. That\'s a piece.\n\n💡 Career model to study: He never went commercial or mass-market. Every piece is a commission or grant-funded. MacArthur, museum commissions, university residencies. That\'s a viable path for your installation ambitions — the opposite of the NFT mint model, but they can coexist.'
  },
  { id:'transient', cat:'industry', title:'Transient Labs — Creator Platform',
    desc:'1/1s, editions, zero seller fees. Preferred minting platform for premium pieces.',
    link:'https://transient.xyz',
    img:'https://www.transient.xyz/opengraph-image.jpg?opengraph-image.30ee4b20.jpg',
    gallery:['https://www.transient.xyz/opengraph-image.jpg?opengraph-image.30ee4b20.jpg'],
    videos:[],
    detail:'Transient Labs is an Ethereum-based minting platform focused on premium digital art. Key features: zero seller fees (buyers pay gas only), support for 1/1s and editions, "Stacks" protocol for layered/evolving artworks, creator-owned smart contracts (you own your contract, not the platform), and clean collector-focused UI. Founded by artists who were frustrated with platform fees eating into creator earnings. Growing reputation among serious digital artists as the "artist-first" alternative to Foundation/SuperRare. They also built tools for synced drops, allowlists, and auction mechanics.',
    chefTake:'This is where the + triptych should live as 1/1s. Zero seller fees means you keep everything. Creator-owned contracts means if Transient Labs disappears, your art still exists on-chain.\n\n🔥 For you: The "Stacks" protocol is interesting — layered artworks that can evolve. Imagine minting the + triptych where each piece has layers that activate over time. Day 1: just the + grid. Week 1: the figure emerges. Month 1: the destruction begins. The collector watches the arc unfold in their wallet. That\'s callback/reveal applied to NFT mechanics.\n\n💡 Priority action: Set up a Transient Labs creator account. Connect your wallet. Prepare the three pieces from June 2025 at proper resolution. We can mint within a week of setting up. Don\'t overthink the first drop — these pieces are DONE.'
  },
  { id:'mori-yuko', cat:'sound', title:'Mori Yuko — Kinetic Sound Sculpture',
    desc:'Ghost orchestra — accordion, bass drum, megaphone, bells all connected by cable networks running solenoids. Calder Prize winner.',
    link:'https://x.com/najapan/status/2019821250030514278',
    img:'https://frieze.com/sites/default/files/styles/hero_image/public/yuko-mohri-kinetic-installation.jpg',
    gallery:['https://frieze.com/sites/default/files/styles/hero_image/public/yuko-mohri-kinetic-installation.jpg','https://glasgowinternational.org/wp-content/uploads/yuko-mohri-gi2024.jpg','https://sculpturemagazine.art/wp-content/uploads/2024/11/yuko-mohri-circulating.jpg'],
    videos:[],
    detail:'Mori Yuko (毛利悠子) is a Calder Prize-winning Japanese artist whose kinetic sound sculptures create "ghost orchestras" — automated instruments playing themselves on stark white platforms. Her exhibition "セカイノコトワリ" (The Logic of the World) at Kyoto National Museum of Modern Art features accordions, bass drums, megaphones, wire sculptures, and bells all connected by black cable networks running solenoids and motors.\n\nNo human performers. Objects play themselves. The stark white gallery backdrop against dark wire networks creates what looks like 3D drawing in space — the cables become lines, the instruments become nodes in a physical generative system.',
    chefTake:'🔥 For you: This IS your MIDI-controlled solenoid/actuator project at museum scale. Study Mori Yuko\'s approach: Ableton/Push → MIDI → Arduino/Teensy → solenoids/motors → physical objects. She\'s already proven the gallery path. Your advantage: you can add the generative layer (TouchDesigner driving the MIDI patterns algorithmically) that she does manually.\n\n💡 The "ghost orchestra" concept is incredibly powerful. Imagine a version where your + glyph is drawn in cable routing — the network of wires between instruments forms the symbol when viewed from above. The music plays, and only from a specific vantage point do you see the hidden pattern. Callback/reveal in physical installation.\n\n🕌 The call to prayer (adhan) is a sonic architecture that fills physical space. A kinetic sound sculpture that performs algorithmic variations on the adhan\'s melodic structure — using solenoids on bells, strings, and resonant objects — would be a profound intersection of your technical and spiritual practice.'
  },
  { id:'fendoap-midi', cat:'sound', title:'Fendoap — MIDI Notes Choreography',
    desc:'Visual MIDI choreography — note data controlling movement/animation. Amplified by Ableton\'s official account.',
    link:'https://x.com/seitokisoukari/status/2018700088239915407',
    img:'https://f4.bcbits.com/img/0025814513_10.jpg',
    gallery:['https://f4.bcbits.com/img/0025814513_10.jpg'],
    videos:[],
    detail:'Fendoap (Yusuie ao, @seitokisoukari) is a Japanese Max for Live developer whose visual MIDI choreography work was impressive enough for Ableton\'s official account to amplify. The piece visualizes MIDI note data as movement and animation — notes become dancers, velocity becomes force, timing becomes rhythm in visual space.\n\nThe work bridges the Japanese generative music community and the global Ableton ecosystem. Fendoap builds Max for Live devices that transform MIDI data into visual output — the same pipeline Tawfeeq is building with Ableton → TouchDesigner.',
    chefTake:'🔥 For you: Fendoap\'s MIDI-as-choreography concept maps directly to your pipeline. Ableton/Push 3 generates MIDI → Max for Live or VOID bridge sends to TouchDesigner → visuals dance with the music. But take it further: MIDI → physical actuators (solenoids) → objects choreographed by your playing. Digital choreography becomes physical choreography.\n\n💡 Monitor Fendoap for Max for Live tools — they\'re building exactly the MIDI visualization devices you need. The Japanese M4L community is small but incredibly skilled. Fendoap, Cycling \'74 Japan, and the Ableton Tokyo meetup scene are all worth connecting with.\n\n🕌 Choreography from unseen data — movement that appears spontaneous but follows hidden rules — is a beautiful metaphor for qadr (divine decree). Things appear random but follow a deeper pattern. A piece that reveals the MIDI data driving the dance only at the end = callback/reveal of the hidden order.'
  },
  { id:'underwater-caustics', cat:'light', title:'Underwater Caustics Light Installation',
    desc:'Projected light creates underwater illusion — caustic patterns rippling across walls and ceiling of a room.',
    link:'https://x.com/sciencegirl/status/2021817986815078685',
    img:'kitchen-img/caustics.jpg',
    gallery:['kitchen-img/caustics.jpg'],
    videos:['kitchen-img/caustics.mp4'],
    detail:'A projected light installation that creates the illusion of being underwater — caustic light patterns ripple across the walls and ceiling of a room. The effect simulates water refraction patterns (caustics) using projection mapping, transforming an ordinary space into a submerged environment.\n\nCaustic simulation is a well-understood shader technique (ray tracing water surface → projecting refracted light patterns). The magic is in the scale — filling an entire room with the effect creates full environmental immersion. The technique can be done in real-time with Unreal Engine or TouchDesigner.',
    chefTake:'🔥 For you: This is RIGHT in your VP wheelhouse. Caustic light simulation is a standard Unreal/TD shader — you could build this in an afternoon. But the art is in the application: project it in a gallery, a mosque, a warehouse. The room becomes the canvas. Imagine a version where the caustic patterns slowly resolve into + glyphs — water revealing hidden geometry.\n\n💡 Projection mapping + environmental illusion is one of the most accessible installation formats. Projector ($500-2K) + computer + shader = immersive experience. Low barrier, high impact. This could be your first physical installation — test it in your own space, document it, submit to open calls.\n\n🕌 Water is sacred in Islam — wudu (ablution), the rivers of Jannah, "We made from water every living thing" (21:30). A caustic light installation in a prayer space would be deeply moving. The light patterns ARE water — purification through light.'
  },
  { id:'butterflies-light', cat:'light', title:'Dancing Butterflies of Light',
    desc:'Light installation — projected or kinetic butterflies made of light. Immersive environmental illusion.',
    link:'https://x.com/BiancoDavinci/status/2022021368867643443',
    img:'kitchen-img/butterflies.jpg',
    gallery:['kitchen-img/butterflies.jpg'],
    videos:['kitchen-img/butterflies.mp4'],
    detail:'A light installation featuring dancing butterflies made entirely of projected or kinetic light, captured in a 13-second vertical video. The butterflies appear to flutter through physical space, creating an immersive environmental illusion that blurs the boundary between digital projection and physical reality.\n\nThis pairs with the underwater caustics piece as part of a clear pattern in Tawfeeq\'s bookmarks: immersive projected light installations that transform spaces through illusion. Light as medium, space as canvas.',
    chefTake:'🔥 For you: Another confirmation that projected light installations are your entry point to physical art. Butterflies as particle systems — each one a sprite with flocking behavior, projected into a room. TouchDesigner particle system → projector → magic. You could build a version where + glyphs behave like butterflies — flocking, landing, resting on surfaces.\n\n💡 The vertical video format (9:16) matters — this went viral because it\'s native to phone viewing. When you document your installations, shoot vertical. The installation lives twice: once in the room, once on social media. Design for both.\n\n🕌 Butterflies represent transformation (metamorphosis) across cultures. In Islamic tradition, the beauty of creation reflects divine artistry. A light installation where butterflies emerge from calligraphic forms — the letter becomes the wing — would bridge the aesthetic and spiritual beautifully.'
  },
  { id:'delahunty-pcb', cat:'generative', title:'David Delahunty — Paint Stripper (PCB Art)',
    desc:'Conceptual design — paint scraper with PCB blade, shot as serious product catalog. Object-based surrealism.',
    link:'https://x.com/Delahuntagram/status/2019984534255583694',
    img:'https://freight.cargo.site/w/1000/i/L2789878882833963638909747836180/screenshot-3089711113.jpg',
    gallery:['https://freight.cargo.site/w/1000/i/L2789878882833963638909747836180/screenshot-3089711113.jpg'],
    videos:[],
    detail:'David Delahunty (@Delahuntagram) is a Dublin-based conceptual designer known as "your favorite designer\'s favorite designer" (25K followers). "Paint Stripper" is a conceptual piece — a paint scraper with a PCB (printed circuit board) as its blade, photographed as a serious product catalog item with straight-faced spec text.\n\nThe comedy comes from misplaced context: a circuit board doing manual labor, technology reduced to a hand tool. Object-based surrealism meets product design meets deadpan humor. Clean, minimal, editorial aesthetic — Duchamp readymade energy with graphic design polish.',
    chefTake:'🔥 For you: The deadpan sincerity is the lesson here. Take a technical object (GPU, MIDI controller, circuit board) and present it in a completely wrong context with total seriousness. A PCB framed as Islamic geometric tilework. A GPU heatsink presented as architectural model. The + glyph etched into silicon and displayed as archaeological artifact. The humor comes from the gap between presentation and reality.\n\n💡 This aesthetic — clean product photography of absurd objects — translates beautifully to NFT presentation. The thumbnail looks "normal" until you read the description and realize what you\'re seeing. Callback/reveal in still image form. Could be a whole 1/1 series on Transient Labs.\n\n🕌 Islamic calligraphy has always played with context — the same word can be an inscription on a mosque, a piece of jewelry, a sword blade. Sacred text in mundane contexts (and vice versa) is a centuries-old tradition. Delahunty\'s approach is the secular version of that same game.'
  },
  { id:'beyer-nature-tech', cat:'kinetic', title:'Hank Beyer — Nature Reclaiming Tech',
    desc:'Computer monitor buried in soil with plants growing from it. Post-digital futurism — earth reclaiming screens.',
    link:'https://x.com/blankspac_e/status/2019071776559669340',
    img:'https://www.ignant.com/wp-content/uploads/2017/11/ignant-design-hank-beyer-caravanserai-005.jpg',
    gallery:['https://www.ignant.com/wp-content/uploads/2017/11/ignant-design-hank-beyer-caravanserai-005.jpg'],
    videos:[],
    detail:'Hank Beyer & Alex Sizemore created a sculptural installation — a computer monitor buried in soil with plants growing from the screen. Cables connect to soil patches shaped like a keyboard and mouse, each sprouting greenery. Shot in Apple product photography style against white.\n\nThe work asks: what comes after the screen age? Nature × technology tension rendered as post-digital futurism. The Apple-clean aesthetic applied to organic decay creates a cognitive dissonance that lingers.',
    chefTake:'🔥 For you: The nature × technology tension is rich territory for generative art. A piece where + glyphs slowly get overgrown by procedural vegetation — L-system plants consuming geometric forms. Time-based: the longer the piece runs, the more nature reclaims the grid. Could be a Transient Labs "Stacks" piece where the artwork evolves over weeks.\n\n💡 The product photography aesthetic is key — presenting the absurd with total seriousness elevates it from "craft project" to "art." When you photograph/render your physical pieces, use this Apple-catalog language. Clean background, perfect lighting, the object speaks for itself.\n\n🕌 "From the earth We created you, and into it We will return you" (20:55). Nature reclaiming technology is literally a visualization of this verse. The screen returns to soil. A generative version — digital geometry dissolving into organic forms — would carry that resonance.'
  },
  { id:'puyoma-eurorack', cat:'sound', title:'Puyoma — Eurorack AV System',
    desc:'Compact Make Noise-centric 2-row eurorack. QPAS, Mimeophon, Data Bender, Beads. Effects-heavy AV rig from Osaka.',
    link:'https://x.com/puyoma99/status/2016136693062287686',
    img:'data:image/svg+xml,%3Csvg%20xmlns=%22http://www.w3.org/2000/svg%22%20width=%22400%22%20height=%22300%22%3E%3Cdefs%3E%3ClinearGradient%20id=%22g%22%20x1=%220%22%20y1=%220%22%20x2=%221%22%20y2=%221%22%3E%3Cstop%20offset=%220%25%22%20stop-color=%22%23111118%22/%3E%3Cstop%20offset=%22100%25%22%20stop-color=%22%230e0e14%22/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect%20fill=%22url(%23g)%22%20width=%22400%22%20height=%22300%22/%3E%3C/svg%3E',
    gallery:[],
    videos:[],
    detail:'Puyoma (@puyoma99) is an Osaka-based audiovisual/experimental electronics artist. Their eurorack system is a compact 2-row setup centered on Make Noise modules: QPAS → Mimeophon → 2× Data Bender → Beads + power (top row), MultiMod → MultiWave → PaliMATHS → 2× AXG (bottom row).\n\nThe system is effects-heavy and texture-focused, designed for AV performance rather than traditional composition. The Make Noise ecosystem is cohesive — modules designed to work together, creating a unified sonic palette ideal for pairing with real-time visuals.',
    chefTake:'🔥 For you: This is your eurorack starting reference. Puyoma\'s system is minimal but complete — effects-heavy, texture-focused, AV-ready. With your Moog Muse as the primary synth voice, a small eurorack effects chain like this would add the textural complexity and happy accidents that make live AV compelling. QPAS (filter) → Mimeophon (delay/loop) → Data Bender (glitch) is a murderous signal chain.\n\n💡 The Make Noise ecosystem is the right starting point — designed for exploration, well-documented, great community. Start with 2-3 modules that complement the Muse rather than replace it. Budget: $1.5-2K for a starter rack including case. The ROI is in the unique textures you can\'t get from software alone.\n\n🕌 Modular synthesis as spiritual practice: the patch is a prayer — you build it, you submit to the signal flow, and what emerges is partly your intention and partly the system\'s nature. Tawakkul (trust in God\'s plan) expressed through voltage.'
  },
  { id:'takao-immersive', cat:'light', title:'Kodai Takao — Immersive Experience Specialist',
    desc:'Japanese immersive experience designer. Large-scale light + projection installations bridging technology and wonder.',
    link:'https://x.com/kodai_takao',
    img:'https://stu.inc/assets/meta/ogp.jpg',
    gallery:['https://stu.inc/assets/meta/ogp.jpg'],
    videos:[],
    detail:'Kodai Takao is a Japanese immersive experience specialist working at the intersection of projection mapping, light design, and interactive installation. Based in Tokyo, he creates large-scale environmental experiences that transform physical spaces through technology.\n\nHis work represents the Japanese approach to immersive art — meticulous attention to detail, seamless integration of technology into space, and an emphasis on wonder over spectacle. Japan\'s immersive art scene (teamLab, NAKED, Rhizomatiks) is the most advanced in the world, and Takao operates in that ecosystem.',
    chefTake:'🔥 For you: Japan is the global leader in immersive light installations. Takao and the broader Tokyo scene (teamLab, Rhizomatiks, NAKED) represent where this medium is going. Your VP experience at ILM maps directly to immersive installation — same tools (LED, projection, real-time rendering), different context (gallery instead of soundstage).\n\n💡 If you visit Tokyo (or when the next industry trip comes up), the immersive art scene is a must-see. teamLab Borderless, NAKED exhibitions, and smaller gallery shows. These aren\'t just inspiration — they\'re market research for your own installation practice.\n\n🕌 Japanese aesthetic concepts like "ma" (negative space) and "wabi-sabi" (beauty in imperfection) have deep parallels with Islamic art principles. Both traditions value what\'s NOT shown as much as what is. A collaboration between Japanese immersive technique and Islamic geometric content would be genuinely groundbreaking.'
  },
  { id:'mark-fell-multistability', cat:'sound', title:'Mark Fell — Multistability',
    desc:'Generative electronic music using algorithmic processes, exploring how pattern recognition creates rhythm from non-repeating sequences.',
    link:'https://markfell.com/',
    img:'https://markfell.com/images/mark-fell-multistability.jpg',
    gallery:['https://markfell.com/images/mark-fell-multistability.jpg'],
    videos:[],
    detail:'Mark Fell makes electronic music that sits at the edge of pattern recognition. His Multistability album uses algorithmic processes to generate sequences that almost repeat but never quite do — your brain constantly predicts the next beat and is constantly slightly wrong.\n\nFell\'s theoretical framework draws from cognitive science and cybernetics. He is interested in the moment where the listener\'s pattern-matching machinery kicks in and imposes structure on what is actually non-repeating.',
    chefTake:'🔥 For you: Fell\'s "almost-repeating" approach is the audio equivalent of your callback/reveal. Program Euclidean rhythms on Push 3 that shift by one step every 17 bars. The audience feels the groove, then feels it drift, then snaps back. The + glyph as temporal structure.\n\n💡 His academic approach to electronic music gives it gallery credibility. Your work can bridge club and gallery the same way — Ableton for the groove, TD for the visual theory.\n\n🕌 Islamic pattern work uses similar near-repetition — the same motif slightly rotated creates infinite variety from finite rules.'
  },
  {
    id:'raven-kwok',
    title:'Raven Kwok — Algorithmic Creatures',
    cat:'code',
    desc:'Shanghai-born artist who codes geometric organisms in Processing — finite subdivision rules evolve into living, breathing architectural forms.',
    link:'https://ravenkwok.com/',
    img:'https://technarte.org/wp-content/uploads/2017/08/1194D3_still01.jpg',
    gallery:['https://technarte.org/wp-content/uploads/2017/08/1194D3_still01.jpg'],
    videos:['https://player.vimeo.com/video/206845869'],
    detail:'Raven Kwok (Guo Ruiwen) is a self-taught programmer turned MFA graduate from Rensselaer Polytechnic Institute. His "Algorithmic Creatures" series — named with hexadecimal IDs like 1194D, 115C8, EDF0 — treats code as biological DNA. Each creature begins as a simple geometric seed (tetrahedron, cube) and evolves through recursive subdivision rules. The results are organisms that pulse, breathe, and morph in real time.\n\nHis work has shown at Ars Electronica, FIBER, Resonate, and the Today Art Museum in Beijing. The triple-screen immersive installation of 1194D\u00B3 (2017) placed viewers inside a tetrahedron-based ecosystem where multiple geometric species coexisted and competed for space.',
    chefTake:'\uD83D\uDD25 Direct inspiration for the "+" collection. Kwok proves that a single geometric primitive + recursive rules = infinite visual complexity. His hex-naming system is a flex — each piece IS its code. The finite subdivision approach maps perfectly to girih tiling and L-systems in the kitchen algos.\n\n\uD83D\uDCA1 His career path (Shanghai \u2192 RPI MFA \u2192 global festivals) is a blueprint for taking algorithmic art seriously as fine art practice.'
  },
  {
    id:'quayola',
    title:'Quayola — Computational Sublime',
    cat:'code',
    desc:'Italian-born, London-based artist who uses algorithms, robotics, and computational processes to reimagine classical art and natural phenomena.',
    link:'https://quayola.com/',
    img:'https://www.designboom.com/wp-content/uploads/2024/05/quayola-fighters-film-max-cooper-seme-designboom-01.jpg',
    gallery:['https://www.designboom.com/wp-content/uploads/2024/05/quayola-fighters-film-max-cooper-seme-designboom-01.jpg'],
    videos:['https://player.vimeo.com/video/121918070'],
    detail:'Quayola operates at the intersection of classical tradition and computational processes. His "Strata" series decomposes Old Master paintings into geometric fragments — Botticelli\\\'s Primavera becomes a field of triangulated mesh, preserving the original\\\'s composition while revealing its underlying structure. His "Sculptures" series uses robot arms to carve marble blocks guided by algorithms that intentionally stop before completion — the resulting forms hover between the classical figure and raw computational geometry.\n\nHis work has shown at the V&A, Park Avenue Armory, Ars Electronica, and most recently on the facade of Gaud\u00ED\\\'s Casa Batll\u00F3. He represented Italy at the Venice Architecture Biennale and received the Golden Nica at Prix Ars Electronica.',
    chefTake:'\uD83D\uDD25 The unfinished sculptures are the most powerful — the algorithm knows when to stop, and the stopping point IS the art. This is callback/reveal at its most literal: classical beauty emerging from computational noise.\n\n\uD83D\uDCA1 His robot arm marble carving is exactly the kind of VP \u00D7 physical fabrication crossover that could define your practice. The Casa Batll\u00F3 projection mapping uses real-time computational processes on heritage architecture — directly relevant to StageCraft LED volume work.'
  },
  {
    id:'lulwah-al-homoud',
    title:'Lulwah Al Homoud — Language of Existence',
    cat:'islamic',
    desc:'Saudi artist who deconstructs Arabic calligraphy into geometric systems — each letter becomes a shape, each word a tessellation, each verse a cosmos.',
    link:'https://www.artsy.net/artist/lulwah-al-homoud',
    img:'https://d7hftxdivxxvm.cloudfront.net/unsafe/fit-in/600x600/filters:fill(white)/https://d32dm0rphc51dk.cloudfront.net/QMdJBfKQ_YVfBJqzqS4D_g/larger.jpg',
    gallery:[],
    videos:[],
    detail:'Lulwah Al Homoud is a pioneering Saudi artist who transforms Arabic calligraphy into geometric abstraction. Her "Language of Existence" series assigns each letter of the Arabic alphabet a unique geometric form derived from Islamic mathematical principles. When words are spelled out, they generate patterns that resemble traditional Islamic tessellations but are entirely original — born from language rather than decoration.\n\nAl Homoud studied at Byam Shaw School of Art and the University of the Arts London. Her work has shown at the British Museum, the Saatchi Gallery, and across the Gulf states. She\\\'s part of a new wave of Saudi artists who use traditional Islamic visual language as the foundation for contemporary practice rather than treating it as heritage to be preserved.',
    chefTake:'\uD83D\uDD25 THIS is the direct model for your Islamic creative tech work. She\\\'s doing exactly what the "Ninety-Nine Parameters" concept describes — using theological structure as generative system. Her letter\u2192geometry mapping is a codeable system: you could implement it in p5.js and generate infinite compositions from any Arabic text.\n\n\uD83D\uDD4C Her approach validates the core thesis: Islamic visual tradition is not decoration, it\\\'s algorithm. The difference between her work and generic "Islamic pattern" art is that she derives the geometry FROM the language rather than applying it TO a surface.'
  },
  {
    id:'spy-urban',
    title:'SpY — Urban Interventions',
    cat:'light',
    desc:'Anonymous Spanish artist who transforms urban infrastructure into art — traffic mirrors become spheres, scaffolding cages light, surveillance cameras form constellations.',
    link:'https://spy-urbanart.com/',
    img:'https://www.designboom.com/wp-content/uploads/2021/11/spy-huge-luminous-red-sphere-scaffolding-structure-madrid-designboom-01.jpg',
    gallery:['https://www.designboom.com/wp-content/uploads/2021/11/spy-huge-luminous-red-sphere-scaffolding-structure-madrid-designboom-01.jpg'],
    videos:[],
    detail:'SpY is an anonymous Spanish street artist whose work hijacks urban infrastructure. His installations repurpose the mundane materials of city life — traffic mirrors, surveillance cameras, scaffolding, traffic cones, life jackets — assembling them into monumental geometric forms that interrupt the urban landscape.\n\n"Order" assembled hundreds of traffic mirrors into a giant sphere. "Nest" caged a luminous red sphere inside scaffolding. "Cameras" arranged 150 CCTV cameras into a spiral that watched the watchers. Each piece uses the city\\\'s own vocabulary against itself — the materials are familiar, the arrangement is impossible, and the cognitive dissonance is the art.',
    chefTake:'\uD83D\uDD25 SpY\\\'s method = Zimoun\\\'s method at urban scale. One element, many copies, emergent geometry. The traffic mirror sphere is literally a Voronoi diagram made physical. His anonymity adds another layer — the art appears without author, like the city grew it.\n\n\uD83D\uDCA1 His use of surveillance cameras as art material is politically charged in a way that resonates with "land of the free" — infrastructure as commentary. The + glyph could work this way: scatter it across a cityscape and let pattern emerge from repetition.'
  },
  {
    id:'cevdet-erek',
    title:'Cevdet Erek — Rhythm Architecture',
    cat:'sound',
    desc:'Turkish artist and musician who builds architectural installations driven by multichannel sound — rhythm becomes space, pulse becomes structure.',
    link:'https://cevdeterek.com/',
    img:'https://manifesta14.org/wp-content/uploads/2022/07/Cevdet_Erek_Brutal_Times_Photo_Ivan_Erofeev-8.jpg',

    detail: 'In Sufi practice, dhikr is not mindless repetition but mindful iteration. The practitioner repeats a phrase — "La ilaha illallah," "Allahu Akbar," or one of the 99 Names — hundreds or thousands of times, and the repetition itself becomes the vehicle for hal (spiritual state change). Ibn Ata Allah al-Iskandari\'s Miftah al-Falah (The Key to Salvation, 13th century) is an entire treatise on the mechanics of this process: how repetition strips away the semantic content of the word and leaves only its vibrational essence. The neuroscience is consistent — repetitive vocalization activates the vagus nerve, shifts brainwave patterns toward theta, and can induce dissociative states. The Sufis knew the mechanism; they called it fana (annihilation of the ego).\n\nSteve Reich\'s process music — particularly It\'s Gonna Rain (1965) and Come Out (1966) — demonstrated how phased repetition of a spoken phrase transforms meaning into texture. Alvin Lucier\'s I Am Sitting in a Room (1969) used recursive playback to dissolve speech into pure resonance. These are dhikr\'s Western cousins: repetition as portal. The Islamic lineage, however, adds intentionality — the repetition is not experiment but devotion, not discovery but return.\n\nMechanism: begin with a single word or phrase, rendered as text on screen and as audio. Each iteration applies a slight transformation — a 0.1% pitch shift, a single-pixel displacement, a one-degree rotation, a fractional opacity change. For the first hundred iterations, the changes are imperceptible. By iteration 500, the text has drifted into abstraction. By iteration 3000, the original word is unrecognizable — it has become pure form, pure frequency. The visual transforms through Perlin noise displacement; the audio through granular re-synthesis. But the loop counter is visible: the audience knows this is the same word, repeated.\n\nThe piece enacts what the Sufis describe: the passage from ilm (knowledge of the word) through hal (experience of the word) to maqam (permanent station beyond the word). The viewer who stays long enough undergoes a miniature version of the process. Those who leave early see a screensaver. Those who stay see a proof.',

    body: 'Kintsugi — the Japanese art of repairing broken pottery with gold lacquer — proposes that breakage is not damage but history. This concept applies that philosophy to digital systems: glitches, errors, and data corruption are highlighted, gilded, and celebrated as the most honest parts of the image.',
    detail: 'Kintsugi emerges from wabi-sabi, the aesthetic philosophy rooted in the three marks of existence in Buddhist teaching: impermanence (mujo), suffering (ku), and emptiness (ku). But the resonance with Islamic thought is deeper than it first appears. The Qur\'anic concept of ibtila\' — divine testing — frames hardship not as punishment but as refinement. The Persian poet Rumi: "The wound is the place where the Light enters you." The broken pot, repaired with gold, is ibtila\' made material: the fracture line is precisely where beauty concentrates.\n\nThe glitch art movement — Rosa Menkman\'s Vernacular of File Formats (2010), Phillip Stearns\'s textile renderings of corrupted data, and the broader post-digital aesthetics theorized by Kim Cascone — established that digital error has aesthetic value. But glitch art typically aestheticizes the error without repairing it. Kintsugi insists on repair: the object must be functional again, and the repair must be visible. This is a crucial distinction. Glitch art says "look at the beautiful wreckage." Golden repair says "this was broken, and now it is more beautiful for having been broken, and it still works."\n\nImplementation: take any digital image or generative output. Introduce controlled corruption — bit-flip regions, shift color channel offsets, fracture the pixel grid along procedural crack lines (generated via Voronoi cell boundaries or DLA branching). Then: fill every corruption artifact with gold. Literally — a luminous amber-to-white gradient that follows the error topology. Anti-alias the gold edges. The corrupted regions become the most visually striking elements of the piece. Optionally, let the audience introduce the breaks: click to crack, watch the gold flow in.\n\nThis reframes the relationship between creator and error. In software culture, errors are eliminated. In kintsugi culture, errors are honored. The piece asks: what if we treated our failures — personal, communal, systemic — not as things to hide but as the seams where light accumulates? This is not inspirational poster philosophy. It is a specific technical practice: find the break, fill it with the most precious material you have, and use the result.',

    body: 'The 99 Names of Allah — Al-Rahman (The Merciful), Al-Khaliq (The Creator), Al-Musawwir (The Fashioner of Forms) — are not mere titles but attributes that describe the full spectrum of divine action. This concept maps each Name to a generative parameter, producing a system where theology literally shapes the output.',
    detail: 'The Asma\' al-Husna (Beautiful Names) are a foundational structure in Islamic theology. Al-Ghazali\'s Al-Maqsad al-Asna (The Highest Goal, 12th century) devotes an entire treatise to their meanings and interrelationships, arguing that the Names are not synonyms but a precise taxonomy of divine attributes — some of majesty (jalal), some of beauty (jamal), some of perfection (kamal). The Names exist in complementary pairs: Al-Qabid (The Constrictor) and Al-Basit (The Expander), Al-Mu\'izz (The Bestower of Honor) and Al-Mudhill (The Humiliator). The system is not a list but a topology — a multidimensional parameter space describing every possible mode of divine action.\n\nThis maps directly onto generative art practice, where a system\'s output is determined by its parameter space. Casey Reas and Ben Fry\'s Processing philosophy established that code is a medium whose expressive range is defined by its variables. The 99 Names propose a parameter space that is theologically complete — every possible quality is accounted for. Map Al-Latif (The Subtle) to opacity. Map Al-Qawi (The Strong) to line weight. Map Al-Sabur (The Patient) to iteration speed. Map Al-Bari (The Evolver) to mutation rate. The result is a generative system whose parameter space is a theological document.\n\nMechanism: define 99 parameters, each named for and semantically mapped to one of the Names. Build a generative system — a flow field, an L-system, a particle ecology — that accepts all 99 as inputs. Create an interface where the user can adjust any Name\'s value. The system responds in real time. Turning up Al-Rahman (Mercy) softens edges and warms colors. Turning up Al-Jabbar (The Compeller) introduces sharp geometric constraint. The user is, in effect, composing a divine attribute profile and watching the universe it implies.\n\nThe theological provocation is intentional: the Names describe God, and this system uses them to generate images. Is this tashbih (anthropomorphism), the cardinal sin of Islamic theology? Or is it tanzih (transcendence) — a demonstration that the Names describe not God\'s being but God\'s effects, and that those effects are visible everywhere in creation? Al-Ghazali would likely approve: he argued that the purpose of knowing the Names is to emulate their qualities. The system is not depicting God; it is depicting the world as it would look if certain divine attributes were amplified.',

    body: 'Sadaqah jariyah — ongoing charity — is a deed whose reward continues after the doer\'s death: a well dug, a tree planted, knowledge shared. This concept proposes generative art that is designed to outlive its author, continuing to produce value — aesthetic, functional, educational — indefinitely and autonomously.',
    detail: 'The hadith is specific: "When a person dies, their deeds come to an end except for three: sadaqah jariyah (ongoing charity), beneficial knowledge, or a righteous child who prays for them." This is an economic and temporal concept as much as a spiritual one — it describes value that compounds after the initial investment of effort ceases. In Western philosophy, the closest parallel is Hans Jonas\'s ethics of responsibility toward future generations (The Imperative of Responsibility, 1979), but the Islamic framing is more specific: the charity must be ongoing, not merely preserved.\n\nThe art historical precedent includes Sol LeWitt\'s wall drawings, which are instructions that can be executed by anyone, anywhere, after the artist\'s death — conceptual immortality through reproducibility. Yoko Ono\'s Instruction Pieces operate similarly. But both require human executors. The sadaqah jariyah machine goes further: it is a system that generates and distributes value without human intervention. The closest existing examples are Wikipedia (knowledge that compounds through collective maintenance) and open-source software libraries that silently power millions of applications.\n\nMechanism: build a generative system that produces usable outputs — patterns for textile printing, melodies for ringtones, tileable textures for game developers, SVG ornaments for designers — and releases them continuously into the public domain via an automated pipeline. The system runs on minimal infrastructure (a Raspberry Pi, solar-powered). It requires no maintenance. It signs each output with a chain of provenance but claims no copyright. Every output is a gift that enables someone else\'s creative work.\n\nThe radical proposition is that the art is not the outputs but the system itself — a machine whose purpose is generosity. It reframes the generative art conversation away from "can a machine make art?" toward "can a machine perform virtue?" The answer, theologically, is no — on     detail: 'The Qur\'an uses barzakh to describe the barrier between fresh and salt water that "neither of them transgresses" (55:19-20) and the liminal state between death and resurrection. Ibn Arabi expanded the concept into a full metaphysics: barzakh is the alam al-mithal (world of images), an intermediate realm where spiritual realities take sensory form and sensory forms reveal spiritual meaning. It is not a wall but a membrane — it separates precisely by connecting.\n\nThis concept has visual art precedents in the work of James Turrell, whose aperture pieces create perceptual thresholds where the viewer cannot determine whether they are seeing a flat surface or infinite depth. Olafur Eliasson\'s Weather Project at the Tate Modern created a similar barzakh — the boundary between real space and reflected space dissolved, and visitors lay on the floor staring at a sun that was and was not there. In digital art, Refik Anadol\'s data sculptures create surfaces that seem to exist between solid and liquid, material and immaterial.\n\nMechanism: run two independent generative systems side by side — say, a rigid girih tessellation (order, the divine realm) and a chaotic particle system (entropy, the material realm). Between them, render a narrow vertical strip — the barzakh — that is a domain-warped interpolation of both systems. The tessellation bleeds rightward into chaos; the chaos bleeds leftward into order. The membrane breathes, its width oscillating. At its narrowest, the two worlds nearly touch. At its widest, the intermediate zone is its own landscape, belonging to neither parent system but borrowing from both.\n\nThe viewer\'s eye is drawn to the membrane — not to either pure state but to the zone of exchange. This is precisely Ibn Arabi\'s point: the most real thing is the interface, the place where opposites meet and interpenetrate. For the viewer, this produces a specific cognitive effect — the inability to categorize what they are seeing, a productive c
