<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <rect width="800" height="800" fill="#0d0d12"/>

  <!-- Blue — furthest, 2px beyond magenta -->
  <g transform="translate(416,410) scale(22)" fill="none" stroke="#2255ff" stroke-width=".25" stroke-linejoin="round" opacity="0.9">
    <polygon points="0,-9.375 8.66,-4.375 8.66,5.625 0,10.625 -8.66,5.625 -8.66,-4.375"/>
    <line x1="0" y1="-9.375" x2="0" y2="10.625"/>
    <line x1="-8.66" y1="-4.375" x2="0" y2="-0.375"/>
    <line x1="8.66" y1="-4.375" x2="0" y2="-0.375"/>
  </g>

  <!-- Magenta — 1px gap from white -->
  <g transform="translate(408,405) scale(22)" fill="none" stroke="#cc44ff" stroke-width=".25" stroke-linejoin="round" opacity="0.95">
    <polygon points="0,-9.375 8.66,-4.375 8.66,5.625 0,10.625 -8.66,5.625 -8.66,-4.375"/>
    <line x1="0" y1="-9.375" x2="0" y2="10.625"/>
    <line x1="-8.66" y1="-4.375" x2="0" y2="-0.375"/>
    <line x1="8.66" y1="-4.375" x2="0" y2="-0.375"/>
  </g>

  <!-- White — original, full weight -->
  <g transform="translate(400,400) scale(22)" fill="none" stroke="rgba(232,228,220,.8)" stroke-width=".5" stroke-linejoin="round">
    <polygon points="0,-9.375 8.66,-4.375 8.66,5.625 0,10.625 -8.66,5.625 -8.66,-4.375"/>
    <line x1="0" y1="-9.375" x2="0" y2="10.625"/>
    <line x1="-8.66" y1="-4.375" x2="0" y2="-0.375"/>
    <line x1="8.66" y1="-4.375" x2="0" y2="-0.375"/>
  </g>
</svg>
