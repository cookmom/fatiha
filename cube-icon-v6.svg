<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <defs>
    <filter id="glow-blue" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-violet" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="800" height="800" fill="#0d0d12"/>

  <!-- Blue shadow — minute hand, furthest offset, glow -->
  <g transform="translate(417,412) scale(22)" fill="none" stroke="#2255ff" stroke-width=".6" stroke-linejoin="round" opacity="0.9" filter="url(#glow-blue)">
    <polygon points="0,-9.375 8.66,-4.375 8.66,5.625 0,10.625 -8.66,5.625 -8.66,-4.375"/>
    <line x1="0" y1="-9.375" x2="0" y2="10.625"/>
    <line x1="-8.66" y1="-4.375" x2="0" y2="-0.375"/>
    <line x1="8.66" y1="-4.375" x2="0" y2="-0.375"/>
  </g>

  <!-- Violet shadow — hour hand, mid offset, glow -->
  <g transform="translate(409,406) scale(22)" fill="none" stroke="#8800ff" stroke-width=".6" stroke-linejoin="round" opacity="0.95" filter="url(#glow-violet)">
    <polygon points="0,-9.375 8.66,-4.375 8.66,5.625 0,10.625 -8.66,5.625 -8.66,-4.375"/>
    <line x1="0" y1="-9.375" x2="0" y2="10.625"/>
    <line x1="-8.66" y1="-4.375" x2="0" y2="-0.375"/>
    <line x1="8.66" y1="-4.375" x2="0" y2="-0.375"/>
  </g>

  <!-- White — second hand, front layer -->
  <g transform="translate(400,400) scale(22)" fill="none" stroke="rgba(232,228,220,0.95)" stroke-width=".55" stroke-linejoin="round">
    <polygon points="0,-9.375 8.66,-4.375 8.66,5.625 0,10.625 -8.66,5.625 -8.66,-4.375"/>
    <line x1="0" y1="-9.375" x2="0" y2="10.625"/>
    <line x1="-8.66" y1="-4.375" x2="0" y2="-0.375"/>
    <line x1="8.66" y1="-4.375" x2="0" y2="-0.375"/>
  </g>
</svg>
