// ══════════════════════════════════════════════════════════════
//  GOLDEN SPIRAL GEOMETRY
// ══════════════════════════════════════════════════════════════

function buildSpiralPoints() {
  const margin = 24;
  const avW = CW - margin * 2;
  const avH = CH - margin * 2;
  let gw, gh;
  if (avW * PHI <= avH) { gw = avW; gh = avW * PHI; }
  else { gh = avH; gw = avH / PHI; }
  const ox = (CW - gw) / 2;
  const oy = (CH - gh) / 2;

  const arcs = [];
  let rx = ox, ry = oy, rw = gw, rh = gh;
  for (let i = 0; i < 9; i++) {
    const d = i % 4;
    const sq = Math.min(rw, rh);
    let cx, cy, sa, ea;
    if (d === 0)      { cx = rx + sq; cy = ry;       sa = Math.PI/2;   ea = Math.PI; }
    else if (d === 1) { cx = rx + sq; cy = ry + sq;   sa = Math.PI;     ea = 3*Math.PI/2; }
    else if (d === 2) { cx = rx;      cy = ry + sq;   sa = 3*Math.PI/2; ea = 2*Math.PI; }
    else              { cx = rx;      cy = ry;         sa = 0;           ea = Math.PI/2; }
    arcs.push({ cx, cy, r: sq, sa, ea });
    if (d === 0)      { ry += sq; rh -= sq; }
    else if (d === 1) { rw -= sq; }
    else if (d === 2) { rh -= sq; }
    else              { rx += sq; ry += sq; rw -= sq; rh -= sq; }
  }

  const totalR = arcs.reduce((s, a) => s + a.r, 0);
  const TARGET = 900;
  const pts = [];
  for (const arc of arcs) {
    const n = Math.max(6, Math.round(TARGET * arc.r / totalR));
    for (let j = 0; j <= n; j++) {
      const t = j / n;
      const angle = arc.sa + (arc.ea - arc.sa) * t;
      pts.push({
        x: arc.cx + arc.r * Math.cos(angle),
        y: arc.cy + arc.r * Math.sin(angle)
      });
    }
  }
  return pts;
}

function getAngleAt(pts, idx) {
  const i = Math.max(1, Math.min(idx, pts.length - 2));
  const dx = pts[i + 1].x - pts[i - 1].x;
  const dy = pts[i + 1].y - pts[i - 1].y;
  return Math.atan2(dy, dx);
}

function getNormal(pts, idx) {
  const i = Math.max(1, Math.min(idx, pts.length - 2));
  const dx = pts[i + 1].x - pts[i - 1].x;
  const dy = pts[i + 1].y - pts[i - 1].y;
  const l = Math.sqrt(dx * dx + dy * dy) || 1;
  return { x: -dy / l, y: dx / l };
}

function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

// ══════════════════════════════════════════════════════════════
//  GARDEN ELEMENT DRAWING — precise polygon geometry + watercolor fill + tahrir outline
//  Pipeline: 1) PRECISE polygon shape  2) watercolor() fill  3) tahrir outline stroke
// ══════════════════════════════════════════════════════════════

// Build a precise saz leaf polygon — long pointed almond with characteristic curve
function makeSazLeafPolygon(x, y, size, angle, side) {
  const leafLen = size * 1.2;
  const leafWidth = size * 0.28;
  const leafCurve = side * 0.15;
  const steps = 24;
  const pts = [];

  // Right side: base to tip
  for (let i = 0; i <= steps; i++) {
    const t = i / steps;
    const along = leafLen * t;
    const width = Math.sin(t * Math.PI) * leafWidth * (1 - t * 0.3);
    const curveOff = Math.sin(t * Math.PI) * leafCurve * leafLen;
    const ax = angle + curveOff / leafLen;
    pts.push({
      x: x + Math.cos(ax) * along + Math.cos(ax + Math.PI / 2) * width,
      y: y + Math.sin(ax) * along + Math.sin(ax + Math.PI / 2) * width
    });
  }
  // Left side: tip back to base
  for (let i = steps; i >= 0; i--) {
    const t = i / steps;
    const along = leafLen * t;
    const width = Math.sin(t * Math.PI) * leafWidth * (1 - t * 0.3);
    const curveOff = Math.sin(t * Math.PI) * leafCurve * leafLen;
    const ax = angle + curveOff / leafLen;
    pts.push({
      x: x + Math.cos(ax) * along + Math.cos(ax - Math.PI / 2) * width,
      y: y + Math.sin(ax) * along + Math.sin(ax - Math.PI / 2) * width
    });
  }
  return pts;
}

// Build a precise ogee/almond petal polygon for roses and buds
function makeOgeePetalPolygon(cx, cy, petalLen, petalWidth, angle) {
  const steps = 14;
  const pts = [];
  // Right side
  for (let j = 0; j <= steps; j++) {
    const t = j / steps;
    const r = petalLen * t;
    const bulge = Math.sin(t * Math.PI) * petalWidth;
    pts.push({
      x: cx + Math.cos(angle) * r + Math.cos(angle + Math.PI / 2) * bulge,
      y: cy + Math.sin(angle) * r + Math.sin(angle + Math.PI / 2) * bulge
    });
  }
  // Left side back
  for (let j = steps; j >= 0; j--) {
    const t = j / steps;
    const r = petalLen * t;
    const bulge = Math.sin(t * Math.PI) * petalWidth;
    pts.push({
      x: cx + Math.cos(angle) * r + Math.cos(angle - Math.PI / 2) * bulge,
      y: cy + Math.sin(angle) * r + Math.sin(angle - Math.PI / 2) * bulge
    });
  }
  return pts;
}

// Build a precise teardrop polygon for buds
function makeTeardropPolygon(cx, cy, radius, angle) {
  const steps = 20;
  const pts = [];
  for (let i = 0; i <= steps; i++) {
    const t = i / steps;
    const a = t * Math.PI * 2;
    // Teardrop: circle squashed at bottom, pointed at top
    const r = radius * (1 + 0.3 * Math.cos(a));
    const px = Math.sin(a) * r * 0.6;
    const py = -Math.cos(a) * r;
    // Rotate into desired angle
    const cos = Math.cos(angle);
    const sin = Math.sin(angle);
    pts.push({
      x: cx + px * cos - py * sin,
      y: cy + px * sin + py * cos
    });
  }
  return pts;
}

function drawLeaf(x, y, size, tangent, side) {
  const s = 75 * size;
  const leafAngle = tangent + side * 0.5;
  const green = pick(GREENS);

  // 1) PRECISE saz leaf polygon
  const leafPoly = makeSazLeafPolygon(x, y, s, leafAngle, side);

  // 2) WATERCOLOR FILL — organic deformation + layered stamps
  fb.watercolor(leafPoly, {
    color: green, layers: 20, opacity: 0.08,
    baseRounds: 3, layerRounds: 2, variance: 0.3,
    layer: 'garden', concentratePigment: true
  });

  // Darker core wash along center
  const leafLen = s * 1.2;
  const leafCurve = side * 0.15;
  const spinePoly = [];
  const steps = 16;
  for (let i = 0; i <= steps; i++) {
    const t = i / steps;
    const along = leafLen * t;
    const curveOff = Math.sin(t * Math.PI) * leafCurve * leafLen;
    const ax = leafAngle + curveOff / leafLen;
    const w = s * 0.08 * Math.sin(t * Math.PI);
    spinePoly.push({
      x: x + Math.cos(ax) * along + Math.cos(ax + Math.PI/2) * w,
      y: y + Math.sin(ax) * along + Math.sin(ax + Math.PI/2) * w
    });
  }
  for (let i = steps; i >= 0; i--) {
    const t = i / steps;
    const along = leafLen * t;
    const curveOff = Math.sin(t * Math.PI) * leafCurve * leafLen;
    const ax = leafAngle + curveOff / leafLen;
    const w = s * 0.08 * Math.sin(t * Math.PI);
    spinePoly.push({
      x: x + Math.cos(ax) * along - Math.cos(ax + Math.PI/2) * w,
      y: y + Math.sin(ax) * along - Math.sin(ax + Math.PI/2) * w
    });
  }
  fb.watercolor(spinePoly, {
    color: DARK_GREEN, layers: 8, opacity: 0.08,
    baseRounds: 2, layerRounds: 1, variance: 0.25,
    layer: 'garden'
  });

  // 3) TAHRIR OUTLINE — clean sharp stroke on top
  fb.drawStroke(leafPoly, {
    color: VINE_DARK, weight: 1.8, alpha: 0.4,
    spacing: 0.25, scatter: 0.02, grain: 0.4,
    pressureStart: 0.5, pressureEnd: 0.5, pressurePeak: 0.95,
    layer: 'garden'
  });

  // Central vein tahrir
  const veinPts = [];
  for (let i = 0; i <= steps; i++) {
    const t = i / steps;
    const along = leafLen * t;
    const curveOff = Math.sin(t * Math.PI) * leafCurve * leafLen;
    const ax = leafAngle + curveOff / leafLen;
    veinPts.push({ x: x + Math.cos(ax) * along, y: y + Math.sin(ax) * along });
  }
  fb.drawStroke(veinPts, {
    color: VINE_DARK, weight: 1.2, alpha: 0.45,
    spacing: 0.3, scatter: 0.02, grain: 0.5,
    pressureStart: 0.7, pressureEnd: 0.05, pressurePeak: 0.95,
    layer: 'garden'
  });
}

function drawBud(x, y, size, tangent) {
  const s = 28 * size;
  const color = pick(PETAL_HUES);

  // 1) PRECISE teardrop polygon
  const budPoly = makeTeardropPolygon(x, y, s * 0.5, tangent);

  // 2) WATERCOLOR FILL — painted body with organic bleed
  fb.watercolor(budPoly, {
    color, layers: 18, opacity: 0.09,
    baseRounds: 3, layerRounds: 1, variance: 0.35,
    layer: 'garden', concentratePigment: true
  });

  // Deeper center concentration
  const innerPoly = makeTeardropPolygon(x, y, s * 0.2, tangent);
  fb.watercolor(innerPoly, {
    color: DEEP_CRIMSON, layers: 8, opacity: 0.09,
    baseRounds: 2, layerRounds: 1, variance: 0.2,
    layer: 'garden'
  });

  // Small ogee petal overlays — precise polygons with watercolor
  for (let i = 0; i < 5; i++) {
    const a = tangent + (i / 5) * Math.PI * 2;
    const petalPoly = makeOgeePetalPolygon(x, y, s * 0.35, s * 0.12, a);
    fb.watercolor(petalPoly, {
      color, layers: 6, opacity: 0.07,
      baseRounds: 2, layerRounds: 1, variance: 0.25,
      layer: 'garden'
    });
  }

  // 3) TAHRIR OUTLINE — clean sharp strokes on top
  fb.drawStroke(budPoly, {
    color: DEEP_CRIMSON, weight: 1.5, alpha: 0.4,
    spacing: 0.25, scatter: 0.02, grain: 0.4,
    pressureStart: 0.5, pressureEnd: 0.5, pressurePeak: 0.95,
    layer: 'garden'
  });

  // Sepal tahrir lines
  const sepalLen = s * 1.2;
  for (let dx = -1; dx <= 1; dx += 2) {
    const sepalPoly = makeOgeePetalPolygon(
      x + dx * 2, y + s * 0.3, sepalLen * 0.4, s * 0.06,
      tangent + Math.PI / 2 + dx * 0.3
    );
    fb.watercolor(sepalPoly, {
      color: DARK_GREEN, layers: 5, opacity: 0.08,
      baseRounds: 2, layerRounds: 1, variance: 0.2,
      layer: 'garden'
    });
    fb.drawStroke(sepalPoly, {
      color: VINE_DARK, weight: 1.0, alpha: 0.35,
      spacing: 0.3, scatter: 0.02, grain: 0.5,
      layer: 'garden'
    });
  }
}

function drawRose(x, y, size, isGolden) {
  const s = (isGolden ? 55 : 50) * size;
  const rings = isGolden ? 6 : 4;
  const petalCounts = [8, 7, 6, 5, 5, 4];

  // 1) PRECISE POLYGON PETALS per ring — each petal is a clean ogee shape
  // Collect all petal polygons first, then watercolor fill, then tahrir outline

  const allPetals = []; // {poly, fillColor, strokeColor, ring}

  for (let ring = 0; ring < rings; ring++) {
    const lr = s * (1 - ring * 0.14);
    const petalCount = petalCounts[ring] || 5;

    let fillColor, strokeColor;
    if (isGolden) {
      fillColor = [DARK_GOLD, GOLD, GOLD, AMBER, PALE_GOLD, '#E8C850'][ring];
      strokeColor = ['#5A4008', '#6A5010', '#7A6018', '#8A7020', '#A08028', '#B09038'][ring];
    } else {
      fillColor = ['#D07888', '#C06070', '#B04858', '#9A3040', '#8B2030'][ring];
      strokeColor = DEEP_CRIMSON;
    }

    for (let i = 0; i < petalCount; i++) {
      const a = (i / petalCount) * Math.PI * 2 + ring * 0.35;
      const petalPoly = makeOgeePetalPolygon(x, y, lr * 0.45, lr * 0.22, a);
      allPetals.push({ poly: petalPoly, fillColor, strokeColor, ring });
    }
  }

  // 2) WATERCOLOR FILL — paint each petal with organic deformation
  // Outer halo wash first
  const haloPoly = FatihaBrush.makePolygon('circle', x, y, s * 0.9, { points: 16 });
  fb.watercolor(haloPoly, {
    color: isGolden ? GOLD : ROSE_PINK,
    layers: 14, opacity: 0.05,
    baseRounds: 3, layerRounds: 2, variance: 0.45,
    layer: 'garden'
  });

  // Paint petals from outer ring inward (interleaved watercolor)
  for (const petal of allPetals) {
    fb.watercolor(petal.poly, {
      color: petal.fillColor,
      layers: 12 + petal.ring * 3, opacity: 0.08 + petal.ring * 0.015,
      baseRounds: 3, layerRounds: 1, variance: 0.25,
      layer: 'garden', concentratePigment: true
    });
  }

  // Center highlight
  const centerPoly = FatihaBrush.makePolygon('circle', x, y, s * 0.12, { points: 10 });
  fb.watercolor(centerPoly, {
    color: isGolden ? '#E8D070' : '#D06080',
    layers: 10, opacity: 0.08,
    baseRounds: 2, layerRounds: 1, variance: 0.2,
    layer: 'garden'
  });

  // 3) TAHRIR OUTLINES — clean sharp strokes on top of every petal
  for (const petal of allPetals) {
    fb.drawStroke(petal.poly, {
      color: petal.strokeColor, weight: 1.4, alpha: 0.35,
      spacing: 0.25, scatter: 0.02, grain: 0.4,
      pressureStart: 0.5, pressureEnd: 0.5, pressurePeak: 0.95,
      layer: 'garden'
    });
  }

  // Pollen spray
  for (let i = 0; i < 14; i++) {
    const a = Math.random() * Math.PI * 2;
    const r = Math.random() * s * 0.2;
    fb.addStamp({
      x: x + Math.cos(a) * r, y: y + Math.sin(a) * r,
      color: isGolden ? PALE_GOLD : ROSE_PINK,
      a: 0.22, rotation: a,
      scaleX: 3 + Math.random() * 4, scaleY: 3 + Math.random() * 4,
      texture: 'spray', layer: 'garden'
    });
  }
}

function drawBloom(x, y, size) {
  const s = 40 * size;

  // 1) PRECISE ogee petal polygons
  const petalPolys = [];
  for (let i = 0; i < 6; i++) {
    const a = i * Math.PI / 3;
    petalPolys.push(makeOgeePetalPolygon(x, y, s * 0.4, s * 0.16, a));
  }

  // 2) WATERCOLOR FILL
  // Outer atmospheric halo
  const haloPoly = FatihaBrush.makePolygon('circle', x, y, s * 0.7, { points: 12 });
  fb.watercolor(haloPoly, {
    color: ROSE_PINK, layers: 10, opacity: 0.06,
    baseRounds: 3, layerRounds: 2, variance: 0.4,
    layer: 'garden'
  });

  // Paint each petal
  for (const poly of petalPolys) {
    fb.watercolor(poly, {
      color: pick(PETAL_HUES), layers: 14, opacity: 0.08,
      baseRounds: 3, layerRounds: 1, variance: 0.3,
      layer: 'garden', concentratePigment: true
    });
  }

  // Core center
  const corePoly = FatihaBrush.makePolygon('circle', x, y, s * 0.1, { points: 8 });
  fb.watercolor(corePoly, {
    color: '#D06080', layers: 8, opacity: 0.09,
    baseRounds: 2, layerRounds: 1, variance: 0.2,
    layer: 'garden'
  });

  // 3) TAHRIR OUTLINES
  for (const poly of petalPolys) {
    fb.drawStroke(poly, {
      color: DEEP_CRIMSON, weight: 1.3, alpha: 0.35,
      spacing: 0.25, scatter: 0.02, grain: 0.4,
      pressureStart: 0.5, pressureEnd: 0.5, pressurePeak: 0.95,
      layer: 'garden'
    });
  }
}

function drawGhunnah(x, y, size) {
  const s = 45 * size;

  // Ghunnah is an ethereal resonance — watercolor blobs on glow layer
  // 1) Outer halo — large soft watercolor circle
  const outerPoly = FatihaBrush.makePolygon('circle', x, y, s * 0.5, { points: 14 });
  fb.watercolor(outerPoly, {
    color: HOT_PINK, layers: 8, opacity: 0.04,
    baseRounds: 3, layerRounds: 1, variance: 0.55,
    layer: 'glow'
  });

  // Inner warm glow
  const innerPoly = FatihaBrush.makePolygon('circle', x, y, s * 0.25, { points: 10 });
  fb.watercolor(innerPoly, {
    color: AMBER, layers: 6, opacity: 0.05,
    baseRounds: 2, layerRounds: 1, variance: 0.4,
    layer: 'glow'
  });

  // Spray particles radiating outward
  for (let i = 0; i < 14; i++) {
    const a = Math.random() * Math.PI * 2;
    const r = Math.random() * s * 0.5;
    fb.addStamp({
      x: x + Math.cos(a) * r, y: y + Math.sin(a) * r,
      color: pick(PETAL_HUES), a: 0.18,
      rotation: a, scaleX: 3 + Math.random() * 5, scaleY: 3 + Math.random() * 5,
      texture: 'spray', layer: 'glow'
    });
  }
}

function drawThorn(px, py, size, tangent, side) {
  const s = 12 * size;
  const thornAngle = tangent + side * Math.PI / 2;
  const tx = px + Math.cos(thornAngle) * s;
  const ty = py + Math.sin(thornAngle) * s;

  // 1) Precise triangle polygon for thorn
  const perpAngle = thornAngle + Math.PI / 2;
  const baseW = s * 0.2;
  const thornPoly = [
    { x: px + Math.cos(perpAngle) * baseW, y: py + Math.sin(perpAngle) * baseW },
    { x: px - Math.cos(perpAngle) * baseW, y: py - Math.sin(perpAngle) * baseW },
    { x: tx, y: ty }
  ];

  // 2) Watercolor fill
  fb.watercolor(thornPoly, {
    color: DARK_GREEN, layers: 5, opacity: 0.09,
    baseRounds: 2, layerRounds: 1, variance: 0.2,
    layer: 'garden'
  });

  // 3) Tahrir outline
  fb.drawStroke(thornPoly.concat([thornPoly[0]]), {
    color: VINE_DARK, weight: 1.0, alpha: 0.4,
    spacing: 0.25, scatter: 0.02, grain: 0.4,
    layer: 'garden'
  });
}

function drawVineTendril(x, y, size, tangent) {
  const s = 50 * size;
  const steps = 24;

  for (let branch = 0; branch < 3; branch++) {
    const angleOff = [0, 0.5, -0.7][branch];
    const len = s * [1.0, 0.6, 0.4][branch];
    const color = [STEM_GREEN, LIGHT_GREEN, DARK_GREEN][branch];
    const weight = [3.0, 2.0, 1.2][branch];

    // Build curving path points
    const branchPts = [];
    for (let i = 0; i <= steps; i++) {
      const t = i / steps;
      const curl = Math.sin(t * Math.PI * 2.5) * len * 0.08;
      const mainAngle = tangent + angleOff + t * 0.4;
      branchPts.push({
        x: x + Math.cos(mainAngle) * len * t + Math.cos(mainAngle + Math.PI / 2) * curl,
        y: y + Math.sin(mainAngle) * len * t + Math.sin(mainAngle + Math.PI / 2) * curl
      });
    }

    // Base stroke for the vine tendril — warm green
    fb.drawStroke(branchPts, {
      color: STEM_GREEN, weight: weight * 1.3, alpha: 0.3,
      spacing: 0.2, scatter: 0.05, grain: 0.5,
      pressureStart: 0.7, pressureEnd: 0.05, pressurePeak: 1.0,
      pressureCenter: 0.2, layer: 'garden'
    });

    // richWash blobs along the tendril for painted feel
    const blobInterval = 4;
    for (let i = 0; i < branchPts.length; i += blobInterval) {
      const pt = branchPts[i];
      const t = i / branchPts.length;
      const blobR = (weight * 2.0) * (1 - t * 0.6);
      fb.richWash(pt.x, pt.y, blobR, {
        color, layers: 10, opacity: 0.06,
        variance: 0.3, edgeStipple: 0,
        shape: 'circle', layer: 'garden'
      });
    }
  }

  // Tiny leaf at tendril tip — precise petal polygon + watercolor
  const tipX = x + Math.cos(tangent) * s * 0.75;
  const tipY = y + Math.sin(tangent) * s * 0.75;
  const tipLeafPoly = FatihaBrush.makePolygon('petal', tipX, tipY, 6 * size, {
    rotation: tangent, aspect: 0.5
  });
  fb.watercolor(tipLeafPoly, {
    color: LEAF_GREEN, layers: 6, opacity: 0.08,
    baseRounds: 2, layerRounds: 1, variance: 0.3,
    layer: 'garden'
  });
  fb.drawStroke(tipLeafPoly, {
    color: DARK_GREEN, weight: 1.0, alpha: 0.35,
    spacing: 0.25, scatter: 0.02, grain: 0.4,
    layer: 'garden'
  });
}

// ══════════════════════════════════════════════════════════════
//  VINE DRAWING — overlapping washes for continuous organic line
// ══════════════════════════════════════════════════════════════

function drawVineSegment(startIdx, endIdx, energy) {
  // Collect segment points for drawStroke
  const pts = [];
  for (let i = startIdx; i <= Math.min(endIdx, spiralPts.length - 1); i++) {
    pts.push(spiralPts[i]);
  }
  if (pts.length < 2) return;

  const globalT = startIdx / spiralPts.length;
  const baseWeight = (5 + energy * 6) * (1.0 - globalT * 0.5);

  // Warm green ribbon base — visible continuous vine
  fb.drawStroke(pts, {
    color: STEM_GREEN, weight: baseWeight * 1.2, alpha: 0.35,
    spacing: 0.2, scatter: 0.04, grain: 0.6,
    pressureStart: 0.3, pressureEnd: 0.15, pressurePeak: 1.0,
    layer: 'garden'
  });

  // richWash blobs along the vine for painted watercolor feel
  const blobInterval = Math.max(2, Math.floor(pts.length / 12));
  for (let i = 0; i < pts.length; i += blobInterval) {
    const pt = pts[i];
    const blobR = baseWeight * 2.0;
    fb.richWash(pt.x, pt.y, blobR, {
      color: STEM_GREEN, layers: 12, opacity: 0.06,
      variance: 0.35, edgeStipple: 0,
      shape: 'circle', layer: 'garden'
    });
  }

  // Darker center detail line on top
  fb.drawStroke(pts, {
    color: VINE_DARK, weight: baseWeight * 0.5, alpha: 0.3,
    spacing: 0.3, scatter: 0.03, grain: 0.4,
    pressureStart: 0.2, pressureEnd: 0.1, pressurePeak: 0.9,
    layer: 'garden'
  });
}

// ══════════════════════════════════════════════════════════════
//  FALLING PETALS
// ══════════════════════════════════════════════════════════════

function spawnPetal() {
  const ptIdx = Math.floor(Math.random() * drawnVineIdx);
  if (ptIdx <= 0 || ptIdx >= spiralPts.length) return;
  fallingPetals.push({
    x: spiralPts[ptIdx].x + (Math.random() - 0.5) * 40,
    y: spiralPts[ptIdx].y,
    vx: (Math.random() - 0.5) * 1.5,
    vy: Math.random() * 2 + 1,
    rot: Math.random() * Math.PI * 2,
    life: 50,
    color: pick(PETAL_HUES)
  });
}

function updatePetals() {
  for (let i = fallingPetals.length - 1; i >= 0; i--) {
    const p = fallingPetals[i];
    p.x += p.vx;
    p.y += p.vy;
    p.rot += 0.05;
    p.life--;

    if (p.life > 20) {
      const alpha = Math.min(1, (p.life - 20) / 20) * 0.3;
      fb.addStamp({
        x: p.x, y: p.y, color: p.color,
        a: alpha, rotation: p.rot,
        scaleX: 4, scaleY: 6,
        texture: 'petal', layer: 'petals',
        lifetime: 40
      });
    }
    if (p.life <= 0) fallingPetals.splice(i, 1);
  }
}

// ══════════════════════════════════════════════════════════════
//  AUDIO
// ══════════════════════════════════════════════════════════════

function initAudio() {
  audio = new Audio('bismillah.mp3');
  audioCtx = new AudioContext();
  analyser = audioCtx.createAnalyser();
  analyser.fftSize = 2048;
  analyser.smoothingTimeConstant = 0.85;
  timeData = new Uint8Array(2048);
  const source = audioCtx.createMediaElementSource(audio);
  source.connect(analyser);
  analyser.connect(audioCtx.destination);
}

// ══════════════════════════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════════════════════════

const canvas = document.createElement('canvas');
document.body.appendChild(canvas);

fb = new FatihaBrush(canvas, {
  maxStamps: 131072,
  layers: ['garden', 'glow', 'petals'],
  background: BG,
  width: CW,
  height: CH,
  grainStrength: 0.5,
  colorJitter: 0.06
});

fb.setLayerBlend('glow', 'additive');
fb.setLayerOpacity('glow', 0.7);
fb.setLayerOpacity('petals', 0.9);

spiralPts = buildSpiralPoints();

// Auto-start for headless capture
if (typeof window._synthTime === 'number') {
  isPlaying = true;
  document.getElementById('playBtn').classList.add('hidden');
}

// ══════════════════════════════════════════════════════════════
//  MAIN LOOP
// ══════════════════════════════════════════════════════════════

function loop() {
  requestAnimationFrame(loop);
  frameCount++;

  if (typeof window._synthTime === 'number' && !isPlaying) {
    isPlaying = true;
  }

  let progress = 0;
  let energy = 0.6;

  if (isPlaying) {
    const time = getTime();
    progress = Math.min(time / TOTAL_DUR, 1);

    // Update audio
    if (analyser && timeData) {
      fb.updateAudio(analyser, timeData);
      energy = fb.audio.energy;
    }

    // ── VINE GROWTH ──────────────────────────────────────
    const targetIdx = Math.floor(progress * spiralPts.length);
    if (targetIdx > drawnVineIdx && drawnVineIdx < spiralPts.length - 1) {
      const segEnd = Math.min(spiralPts.length - 1, targetIdx);
      drawVineSegment(Math.max(0, drawnVineIdx - 1), segEnd, energy);
      drawnVineIdx = segEnd;
    }

    // ── TAJWEED EVENTS ───────────────────────────────────
    while (tajweedIdx < TAJWEED.length && time >= TAJWEED[tajweedIdx].t) {
      const el = TAJWEED[tajweedIdx];
      const spiralT = el.t / TOTAL_DUR;
      const ptIdx = Math.floor(spiralT * (spiralPts.length - 1));

      if (ptIdx >= 1 && ptIdx < spiralPts.length - 1) {
        const pt = spiralPts[ptIdx];
        const norm = getNormal(spiralPts, ptIdx);
        const offDist = 25 * el.size * el.side;
        const ex = pt.x + norm.x * offDist;
        const ey = pt.y + norm.y * offDist;
        const tangent = getAngleAt(spiralPts, ptIdx);

        switch (el.type) {
          case 'leaf':         drawLeaf(ex, ey, el.size, tangent, el.side); break;
          case 'bud':          drawBud(ex, ey, el.size, tangent); break;
          case 'bloom':        drawBloom(ex, ey, el.size); break;
          case 'rose':         drawRose(ex, ey, el.size, false); break;
          case 'golden_rose':  drawRose(ex, ey, el.size, true); break;
          case 'ghunnah':      drawGhunnah(ex, ey, el.size); break;
          case 'thorn':        drawThorn(pt.x, pt.y, el.size, tangent, el.side); break;
          case 'vine_tendril': drawVineTendril(ex, ey, el.size, tangent); break;
        }
      }
      tajweedIdx++;
    }

    // ── FALLING PETALS ───────────────────────────────────
    if (energy > 0.3 && frameCount % 10 === 0) {
      spawnPetal();
    }
    updatePetals();

    // ── FINISHED ─────────────────────────────────────────
    if (isFinished()) {
      isPlaying = false;
      document.getElementById('playBtn').classList.remove('hidden');
    }
  }

  // ── RENDER ───────────────────────────────────────────────
  fb.update(1);
  fb.render();

  // Stats
  if (frameCount % 30 === 0) {
    document.getElementById('stats').textContent =
      `stamps: ${fb.stampCount} | fps: ${Math.round(1000 / Math.max(1, performance.now() - lastTime))}`;
  }
  lastTime = performance.now();
}

loop();

// ══════════════════════════════════════════════════════════════
//  PLAY BUTTON
// ══════════════════════════════════════════════════════════════

document.getElementById('playBtn').addEventListener('click', () => {
  if (!audio) initAudio();

  // Reset
  drawnVineIdx = 0;
  tajweedIdx = 0;
  fallingPetals = [];
  fb.clearAll();

  audio.currentTime = 0;
  audio.play().then(() => {
    isPlaying = true;
    document.getElementById('playBtn').classList.add('hidden');
  });
});
</script>
