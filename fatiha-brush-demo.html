// ══════════════════════════════════════════════════════════════
//  GOLDEN SPIRAL GEOMETRY
// ══════════════════════════════════════════════════════════════

function buildSpiralPoints() {
  const margin = 24;
  const avW = CW - margin * 2;
  const avH = CH - margin * 2;
  let gw, gh;
  if (avW * PHI <= avH) { gw = avW; gh = avW * PHI; }
  else { gh = avH; gw = avH / PHI; }
  const ox = (CW - gw) / 2;
  const oy = (CH - gh) / 2;

  const arcs = [];
  let rx = ox, ry = oy, rw = gw, rh = gh;
  for (let i = 0; i < 9; i++) {
    const d = i % 4;
    const sq = Math.min(rw, rh);
    let cx, cy, sa, ea;
    if (d === 0)      { cx = rx + sq; cy = ry;       sa = Math.PI/2;   ea = Math.PI; }
    else if (d === 1) { cx = rx + sq; cy = ry + sq;   sa = Math.PI;     ea = 3*Math.PI/2; }
    else if (d === 2) { cx = rx;      cy = ry + sq;   sa = 3*Math.PI/2; ea = 2*Math.PI; }
    else              { cx = rx;      cy = ry;         sa = 0;           ea = Math.PI/2; }
    arcs.push({ cx, cy, r: sq, sa, ea });
    if (d === 0)      { ry += sq; rh -= sq; }
    else if (d === 1) { rw -= sq; }
    else if (d === 2) { rh -= sq; }
    else              { rx += sq; ry += sq; rw -= sq; rh -= sq; }
  }

  const totalR = arcs.reduce((s, a) => s + a.r, 0);
  const TARGET = 900;
  const pts = [];
  for (const arc of arcs) {
    const n = Math.max(6, Math.round(TARGET * arc.r / totalR));
    for (let j = 0; j <= n; j++) {
      const t = j / n;
      const angle = arc.sa + (arc.ea - arc.sa) * t;
      pts.push({
        x: arc.cx + arc.r * Math.cos(angle),
        y: arc.cy + arc.r * Math.sin(angle)
      });
    }
  }
  return pts;
}

function getAngleAt(pts, idx) {
  const i = Math.max(1, Math.min(idx, pts.length - 2));
  const dx = pts[i + 1].x - pts[i - 1].x;
  const dy = pts[i + 1].y - pts[i - 1].y;
  return Math.atan2(dy, dx);
}

function getNormal(pts, idx) {
  const i = Math.max(1, Math.min(idx, pts.length - 2));
  const dx = pts[i + 1].x - pts[i - 1].x;
  const dy = pts[i + 1].y - pts[i - 1].y;
  const l = Math.sqrt(dx * dx + dy * dy) || 1;
  return { x: -dy / l, y: dx / l };
}

function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

// ══════════════════════════════════════════════════════════════
//  GARDEN ELEMENT DRAWING — organic watercolor stamps
// ══════════════════════════════════════════════════════════════

function drawLeaf(x, y, size, tangent, side) {
  const s = 75 * size;   // 2.5x larger for proper saz proportions
  const leafAngle = tangent + side * 0.5;
  const green = pick(GREENS);
  const leafCurve = side * 0.15;  // slight saz curve

  // Build saz leaf outline — long pointed almond shape with curve
  const leafLen = s * 1.2;
  const leafWidth = s * 0.28;
  const steps = 20;

  // Right side of leaf (base to tip)
  const rightPts = [];
  for (let i = 0; i <= steps; i++) {
    const t = i / steps;
    const along = leafLen * t;
    const width = Math.sin(t * Math.PI) * leafWidth * (1 - t * 0.3);
    const curveOff = Math.sin(t * Math.PI) * leafCurve * leafLen;
    const ax = leafAngle + curveOff / leafLen;
    rightPts.push({
      x: x + Math.cos(ax) * along + Math.cos(ax + Math.PI / 2) * width,
      y: y + Math.sin(ax) * along + Math.sin(ax + Math.PI / 2) * width
    });
  }

  // Left side of leaf (tip back to base)
  const leftPts = [];
  for (let i = steps; i >= 0; i--) {
    const t = i / steps;
    const along = leafLen * t;
    const width = Math.sin(t * Math.PI) * leafWidth * (1 - t * 0.3);
    const curveOff = Math.sin(t * Math.PI) * leafCurve * leafLen;
    const ax = leafAngle + curveOff / leafLen;
    leftPts.push({
      x: x + Math.cos(ax) * along + Math.cos(ax - Math.PI / 2) * width,
      y: y + Math.sin(ax) * along + Math.sin(ax - Math.PI / 2) * width
    });
  }

  const fullOutline = rightPts.concat(leftPts);

  // Central spine path for vein
  const spinePts = [];
  for (let i = 0; i <= steps; i++) {
    const t = i / steps;
    const along = leafLen * t;
    const curveOff = Math.sin(t * Math.PI) * leafCurve * leafLen;
    const ax = leafAngle + curveOff / leafLen;
    spinePts.push({
      x: x + Math.cos(ax) * along,
      y: y + Math.sin(ax) * along
    });
  }

  // Fill: wide soft wash stroke tracing the full outline
  fb.drawStroke(fullOutline, {
    color: green, weight: s * 0.35, alpha: 0.08,
    spacing: 0.15, scatter: 0.2, grain: 0.85,
    pressureStart: 0.2, pressureEnd: 0.2, pressurePeak: 1.0,
    layer: 'garden'
  });

  // Dense fill: trace right side, then left side separately for solid coverage
  fb.drawStroke(rightPts, {
    color: green, weight: s * 0.5, alpha: 0.12,
    spacing: 0.15, scatter: 0.15, grain: 0.8,
    pressureStart: 0.15, pressureEnd: 0.05, pressurePeak: 1.0,
    layer: 'garden'
  });
  fb.drawStroke(leftPts, {
    color: green, weight: s * 0.5, alpha: 0.12,
    spacing: 0.15, scatter: 0.15, grain: 0.8,
    pressureStart: 0.05, pressureEnd: 0.15, pressurePeak: 1.0,
    layer: 'garden'
  });

  // Darker core wash
  fb.drawStroke(spinePts, {
    color: DARK_GREEN, weight: s * 0.4, alpha: 0.1,
    spacing: 0.2, scatter: 0.1, grain: 0.8,
    pressureStart: 0.3, pressureEnd: 0.05, pressurePeak: 1.0,
    layer: 'garden'
  });

  // Outline for shape definition
  fb.drawStroke(fullOutline, {
    color: VINE_DARK, weight: 1.5, alpha: 0.25,
    spacing: 0.3, scatter: 0.05, grain: 0.6,
    pressureStart: 0.3, pressureEnd: 0.3, pressurePeak: 0.9,
    layer: 'garden'
  });

  // Pointed leaf stamps along spine for texture
  fb.drawStroke(spinePts, {
    color: green, weight: s * 0.3, alpha: 0.2,
    texture: 'pointed_leaf', spacing: 0.35, scatter: 0.08, grain: 0.7,
    pressureStart: 0.15, pressureEnd: 0.05, pressurePeak: 1.0,
    sizeJitter: 0.15, layer: 'garden'
  });

  // Vein hatching
  fb.addHatch(x, y, s * 0.5, leafAngle + Math.PI / 2, s * 0.18, {
    color: VINE_DARK, a: 0.18, layer: 'garden', weight: 0
  });

  // Central vein
  fb.drawStroke(spinePts, {
    color: VINE_DARK, weight: 1.5, alpha: 0.35,
    texture: 'hatch_line', spacing: 0.35, scatter: 0.04, grain: 0.55,
    pressureStart: 0.6, pressureEnd: 0.05, pressurePeak: 0.9,
    layer: 'garden'
  });
}

function drawBud(x, y, size, tangent) {
  const s = 20 * size;
  const color = pick(PETAL_HUES);

  // Outer wash halo
  fb.addWash({
    x, y, color, a: 0.10, layer: 'garden',
    scaleX: s * 0.9, scaleY: s * 1.2,
    rotation: tangent, bleed: 10, bleedRadius: s * 0.35
  });

  // Watercolor body wash
  fb.addWash({
    x, y, color, a: 0.35, layer: 'garden',
    scaleX: s * 0.55, scaleY: s * 0.75,
    rotation: tangent, bleed: 8, bleedRadius: s * 0.2
  });

  // Deeper center
  fb.addWash({
    x, y, color: DEEP_CRIMSON, a: 0.3, layer: 'garden',
    scaleX: s * 0.2, scaleY: s * 0.25,
    rotation: tangent, bleed: 4, bleedRadius: s * 0.06
  });

  // Full ogee petal arcs — 5 complete almond-shaped petals
  for (let i = 0; i < 5; i++) {
    const a = tangent + (i / 5) * Math.PI * 2;
    const petalLen = s * 0.35;
    const petalWidth = s * 0.12;
    const petalPts = [];
    const steps = 8;
    for (let j = 0; j <= steps; j++) {
      const t = j / steps;
      const r = petalLen * t;
      const bulge = Math.sin(t * Math.PI) * petalWidth;
      petalPts.push({
        x: x + Math.cos(a) * r + Math.cos(a + Math.PI / 2) * bulge,
        y: y + Math.sin(a) * r + Math.sin(a + Math.PI / 2) * bulge
      });
    }
    for (let j = steps; j >= 0; j--) {
      const t = j / steps;
      const r = petalLen * t;
      const bulge = Math.sin(t * Math.PI) * petalWidth;
      petalPts.push({
        x: x + Math.cos(a) * r + Math.cos(a - Math.PI / 2) * bulge,
        y: y + Math.sin(a) * r + Math.sin(a - Math.PI / 2) * bulge
      });
    }
    fb.drawStroke(petalPts, {
      color, weight: s * 0.15, alpha: 0.25,
      texture: 'bud', spacing: 0.25, scatter: 0.1, grain: 0.8,
      pressureStart: 0.3, pressureEnd: 0.3, pressurePeak: 1.0,
      pressureCenter: 0.5, layer: 'garden'
    });
  }

  // Sepal strokes
  const sepalLen = s * 1.2;
  for (let dx = -1; dx <= 1; dx += 2) {
    const sepalPts = [
      { x: x + dx * 2, y: y + s * 0.3 },
      { x: x + dx * 3, y: y + s * 0.3 + sepalLen * 0.5 }
    ];
    fb.drawStroke(sepalPts, {
      color: DARK_GREEN, weight: 1.2, alpha: 0.35,
      texture: 'hatch_line', spacing: 0.4, scatter: 0.05, grain: 0.7,
      layer: 'garden'
    });
  }

  // Stem stroke
  fb.drawLine(x, y + s * 0.4, x, y + sepalLen, {
    color: STEM_GREEN, weight: 1.5, alpha: 0.3,
    texture: 'hatch_line', spacing: 0.4, scatter: 0.05, grain: 0.7,
    layer: 'garden'
  });
}

function drawRose(x, y, size, isGolden) {
  const s = (isGolden ? 55 : 40) * size;
  const layers = isGolden ? 6 : 4;
  const petalCounts = [8, 7, 6, 5, 5, 4];

  // Large watercolor bleed halo
  fb.addWash({
    x, y, color: isGolden ? GOLD : ROSE_PINK,
    a: 0.08, layer: 'garden',
    scaleX: s * 1.1, scaleY: s * 1.1,
    bleed: 16, bleedRadius: s * 0.45
  });

  for (let layer = 0; layer < layers; layer++) {
    const lr = s * (1 - layer * 0.14);
    const petalCount = petalCounts[layer] || 5;

    let fillColor, strokeColor;
    if (isGolden) {
      fillColor = [DARK_GOLD, GOLD, GOLD, AMBER, PALE_GOLD, '#E8C850'][layer];
      strokeColor = ['#5A4008', '#6A5010', '#7A6018', '#8A7020', '#A08028', '#B09038'][layer];
    } else {
      fillColor = ['#C06878', '#B05060', '#9A3848', '#8B2838', '#7A1A2B'][layer];
      strokeColor = DEEP_CRIMSON;
    }

    // Wash for this ring
    fb.addWash({
      x, y, color: fillColor,
      a: 0.08 + layer * 0.06, layer: 'garden',
      scaleX: lr * 0.65, scaleY: lr * 0.65,
      bleed: 8 + layer * 2, bleedRadius: lr * 0.2
    });

    // Hatch on inner layers
    if (layer >= 1) {
      fb.addHatch(x, y, lr * 0.35, Math.PI / 4 + layer * 0.5,
        lr * 0.12, { color: strokeColor, a: 0.15, layer: 'garden' });
    }

    // Full ogee/almond petals — two curves meeting at a pointed tip
    for (let i = 0; i < petalCount; i++) {
      const a = (i / petalCount) * Math.PI * 2 + layer * 0.35;
      const petalLen = lr * 0.38;
      const petalWidth = lr * 0.18;
      const steps = 12;

      // Build almond-shaped petal path: base → tip along right curve, tip → base along left curve
      const petalPts = [];
      // Right side: base to tip
      for (let j = 0; j <= steps; j++) {
        const t = j / steps;
        const r = petalLen * t;
        const bulge = Math.sin(t * Math.PI) * petalWidth;
        petalPts.push({
          x: x + Math.cos(a) * r + Math.cos(a + Math.PI / 2) * bulge,
          y: y + Math.sin(a) * r + Math.sin(a + Math.PI / 2) * bulge
        });
      }
      // Left side: tip back to base
      for (let j = steps; j >= 0; j--) {
        const t = j / steps;
        const r = petalLen * t;
        const bulge = Math.sin(t * Math.PI) * petalWidth;
        petalPts.push({
          x: x + Math.cos(a) * r + Math.cos(a - Math.PI / 2) * bulge,
          y: y + Math.sin(a) * r + Math.sin(a - Math.PI / 2) * bulge
        });
      }

      // Fill stroke — thick, low alpha for watercolor fill
      fb.drawStroke(petalPts, {
        color: fillColor, weight: lr * 0.14, alpha: 0.12 + layer * 0.03,
        texture: 'petal', spacing: 0.2, scatter: 0.1, grain: 0.75,
        pressureStart: 0.3, pressureEnd: 0.3, pressurePeak: 1.0,
        pressureCenter: 0.5, alphaJitter: 0.15, sizeJitter: 0.12,
        layer: 'garden'
      });

      // Outline stroke — thinner, higher alpha for definition
      fb.drawStroke(petalPts, {
        color: strokeColor, weight: 1.5, alpha: 0.2,
        spacing: 0.3, scatter: 0.05, grain: 0.6,
        pressureStart: 0.4, pressureEnd: 0.4, pressurePeak: 0.9,
        layer: 'garden'
      });
    }
  }

  // Bright center highlight
  fb.addWash({
    x, y, color: isGolden ? '#E8D070' : '#D06080',
    a: 0.4, layer: 'garden',
    scaleX: s * 0.1, scaleY: s * 0.1,
    bleed: 6, bleedRadius: s * 0.06
  });

  // Spray pollen
  for (let i = 0; i < 14; i++) {
    const a = Math.random() * Math.PI * 2;
    const r = Math.random() * s * 0.2;
    fb.addStamp({
      x: x + Math.cos(a) * r, y: y + Math.sin(a) * r,
      color: isGolden ? PALE_GOLD : ROSE_PINK,
      a: 0.22, rotation: a,
      scaleX: 3 + Math.random() * 4, scaleY: 3 + Math.random() * 4,
      texture: 'spray', layer: 'garden'
    });
  }
}

function drawBloom(x, y, size) {
  const s = 30 * size;

  // Large outer bleed
  fb.addWash({
    x, y, color: ROSE_PINK, a: 0.08, layer: 'garden',
    scaleX: s * 0.9, scaleY: s * 0.9,
    bleed: 12, bleedRadius: s * 0.35
  });

  // Core wash
  fb.addWash({
    x, y, color: CRIMSON, a: 0.25, layer: 'garden',
    scaleX: s * 0.35, scaleY: s * 0.35,
    bleed: 6, bleedRadius: s * 0.12
  });

  // Cross-hatch
  fb.addHatch(x, y, s * 0.3, Math.PI / 3, s * 0.1,
    { color: DEEP_CRIMSON, a: 0.2, layer: 'garden' });
  fb.addHatch(x, y, s * 0.25, -Math.PI / 6, s * 0.12,
    { color: '#4A0A15', a: 0.15, layer: 'garden' });

  // Full ogee petals — 6 complete almond-shaped petals
  for (let i = 0; i < 6; i++) {
    const a = i * Math.PI / 3;
    const petalLen = s * 0.3;
    const petalWidth = s * 0.12;
    const petalPts = [];
    const steps = 10;
    // Right side
    for (let j = 0; j <= steps; j++) {
      const t = j / steps;
      const r = petalLen * t;
      const bulge = Math.sin(t * Math.PI) * petalWidth;
      petalPts.push({
        x: x + Math.cos(a) * r + Math.cos(a + Math.PI / 2) * bulge,
        y: y + Math.sin(a) * r + Math.sin(a + Math.PI / 2) * bulge
      });
    }
    // Left side back
    for (let j = steps; j >= 0; j--) {
      const t = j / steps;
      const r = petalLen * t;
      const bulge = Math.sin(t * Math.PI) * petalWidth;
      petalPts.push({
        x: x + Math.cos(a) * r + Math.cos(a - Math.PI / 2) * bulge,
        y: y + Math.sin(a) * r + Math.sin(a - Math.PI / 2) * bulge
      });
    }
    fb.drawStroke(petalPts, {
      color: pick(PETAL_HUES), weight: s * 0.1, alpha: 0.2,
      texture: 'petal', spacing: 0.2, scatter: 0.08, grain: 0.75,
      pressureStart: 0.3, pressureEnd: 0.3, pressurePeak: 1.0,
      pressureCenter: 0.5, layer: 'garden'
    });
  }

  // Center dot
  fb.addStamp({
    x, y, color: '#D06080', a: 0.45,
    scaleX: 3, scaleY: 3, texture: 'spray', layer: 'garden'
  });
}

function drawGhunnah(x, y, size) {
  const s = 45 * size;

  // Ethereal halo — large atmospheric wash on glow layer
  fb.addWash({
    x, y, color: HOT_PINK, a: 0.06, layer: 'glow',
    scaleX: s * 0.65, scaleY: s * 0.65,
    bleed: 14, bleedRadius: s * 0.45
  });

  // Second halo
  fb.addWash({
    x, y, color: AMBER, a: 0.04, layer: 'glow',
    scaleX: s * 0.38, scaleY: s * 0.38,
    bleed: 8, bleedRadius: s * 0.2
  });

  // Hatch warmth
  fb.addHatch(x, y, s * 0.3, Math.random() * Math.PI, s * 0.12,
    { color: ROSE_PINK, a: 0.12, layer: 'garden' });

  // Spray particles radiating outward
  for (let i = 0; i < 14; i++) {
    const a = Math.random() * Math.PI * 2;
    const r = Math.random() * s * 0.5;
    fb.addStamp({
      x: x + Math.cos(a) * r, y: y + Math.sin(a) * r,
      color: pick(PETAL_HUES), a: 0.18,
      rotation: a, scaleX: 3 + Math.random() * 5, scaleY: 3 + Math.random() * 5,
      texture: 'spray', layer: 'glow'
    });
  }
}

function drawThorn(px, py, size, tangent, side) {
  const s = 12 * size;
  const thornAngle = tangent + side * Math.PI / 2;
  const tx = px + Math.cos(thornAngle) * s;
  const ty = py + Math.sin(thornAngle) * s;

  // Thorn as a tapered stroke from base to tip
  fb.drawLine(px, py, tx, ty, {
    color: DARK_GREEN, weight: 3, alpha: 0.4,
    texture: 'thorn', spacing: 0.3, scatter: 0.05, grain: 0.85,
    pressureStart: 1.0, pressureEnd: 0.05, pressurePeak: 1.0,
    pressureCenter: 0.1, layer: 'garden'
  });

  // Fine dark line overlay
  fb.drawLine(px, py, tx, ty, {
    color: VINE_DARK, weight: 1.0, alpha: 0.3,
    texture: 'hatch_line', spacing: 0.4, scatter: 0.03, grain: 0.6,
    pressureStart: 0.8, pressureEnd: 0.05, pressurePeak: 0.9,
    pressureCenter: 0.15, layer: 'garden'
  });
}

function drawVineTendril(x, y, size, tangent) {
  const s = 50 * size;
  const steps = 24;

  for (let branch = 0; branch < 3; branch++) {
    const angleOff = [0, 0.5, -0.7][branch];
    const len = s * [1.0, 0.6, 0.4][branch];
    const color = [STEM_GREEN, LIGHT_GREEN, DARK_GREEN][branch];
    const weight = [3.0, 2.0, 1.2][branch];

    // Build curving path points
    const branchPts = [];
    for (let i = 0; i <= steps; i++) {
      const t = i / steps;
      const curl = Math.sin(t * Math.PI * 2.5) * len * 0.08;
      const mainAngle = tangent + angleOff + t * 0.4;
      branchPts.push({
        x: x + Math.cos(mainAngle) * len * t + Math.cos(mainAngle + Math.PI / 2) * curl,
        y: y + Math.sin(mainAngle) * len * t + Math.sin(mainAngle + Math.PI / 2) * curl
      });
    }

    // Soft wash stroke
    fb.drawStroke(branchPts, {
      color, weight: weight * 2, alpha: 0.08,
      spacing: 0.2, scatter: 0.3, grain: 0.8,
      pressureStart: 0.8, pressureEnd: 0.05, pressurePeak: 1.0,
      pressureCenter: 0.2, layer: 'garden'
    });

    // Core stroke
    fb.drawStroke(branchPts, {
      color: VINE_DARK, weight, alpha: 0.12,
      spacing: 0.25, scatter: 0.1, grain: 0.75,
      pressureStart: 0.7, pressureEnd: 0.05, pressurePeak: 1.0,
      pressureCenter: 0.2, layer: 'garden'
    });
  }

  // Tiny leaf at tendril tip
  const tipX = x + Math.cos(tangent) * s * 0.75;
  const tipY = y + Math.sin(tangent) * s * 0.75;
  fb.addWash({
    x: tipX, y: tipY, color: LEAF_GREEN, a: 0.2,
    scaleX: 5 * size, scaleY: 9 * size,
    rotation: tangent, layer: 'garden', bleed: 5, bleedRadius: 4
  });
  fb.addStamp({
    x: tipX, y: tipY, color: DARK_GREEN, a: 0.25,
    rotation: tangent, scaleX: 3 * size, scaleY: 6 * size,
    texture: 'pointed_leaf', layer: 'garden'
  });
}

// ══════════════════════════════════════════════════════════════
//  VINE DRAWING — overlapping washes for continuous organic line
// ══════════════════════════════════════════════════════════════

function drawVineSegment(startIdx, endIdx, energy) {
  // Collect segment points for drawStroke
  const pts = [];
  for (let i = startIdx; i <= Math.min(endIdx, spiralPts.length - 1); i++) {
    pts.push(spiralPts[i]);
  }
  if (pts.length < 2) return;

  const globalT = startIdx / spiralPts.length;
  const baseWeight = (5 + energy * 6) * (1.0 - globalT * 0.5);

  // Layer 1: Wide warm olive wash — soft atmospheric halo
  fb.drawStroke(pts, {
    color: '#4A5828', weight: baseWeight * 3.0, alpha: 0.04,
    spacing: 0.2, scatter: 0.4, grain: 0.85,
    pressureStart: 0.3, pressureEnd: 0.15, pressurePeak: 1.0,
    alphaJitter: 0.3, sizeJitter: 0.2,
    layer: 'garden'
  });

  // Layer 2: Medium olive body — dense overlapping for continuous look
  fb.drawStroke(pts, {
    color: '#3A4A20', weight: baseWeight * 1.8, alpha: 0.07,
    spacing: 0.2, scatter: 0.15, grain: 0.9,
    pressureStart: 0.25, pressureEnd: 0.15, pressurePeak: 1.0,
    alphaJitter: 0.2, sizeJitter: 0.12,
    layer: 'garden'
  });

  // Layer 3: Dark core — adds definition
  fb.drawStroke(pts, {
    color: VINE_DARK, weight: baseWeight * 1.0, alpha: 0.1,
    spacing: 0.25, scatter: 0.08, grain: 0.85,
    pressureStart: 0.2, pressureEnd: 0.1, pressurePeak: 1.0,
    layer: 'garden'
  });

  // Layer 4: Fine directional detail line
  fb.drawStroke(pts, {
    color: '#1A2A10', weight: baseWeight * 0.5, alpha: 0.15,
    texture: 'hatch_line', spacing: 0.5, scatter: 0.06, grain: 0.45,
    pressureStart: 0.1, pressureEnd: 0.08, pressurePeak: 0.9,
    layer: 'garden'
  });

  // Layer 5: Warm highlight — sparse shimmer
  fb.drawStroke(pts, {
    color: '#5A7830', weight: baseWeight * 0.7, alpha: 0.05,
    spacing: 0.6, scatter: 0.25, grain: 0.3,
    pressureStart: 0.1, pressureEnd: 0.1, pressurePeak: 0.8,
    alphaJitter: 0.4,
    layer: 'garden'
  });
}

// ══════════════════════════════════════════════════════════════
//  FALLING PETALS
// ══════════════════════════════════════════════════════════════

function spawnPetal() {
  const ptIdx = Math.floor(Math.random() * drawnVineIdx);
  if (ptIdx <= 0 || ptIdx >= spiralPts.length) return;
  fallingPetals.push({
    x: spiralPts[ptIdx].x + (Math.random() - 0.5) * 40,
    y: spiralPts[ptIdx].y,
    vx: (Math.random() - 0.5) * 1.5,
    vy: Math.random() * 2 + 1,
    rot: Math.random() * Math.PI * 2,
    life: 50,
    color: pick(PETAL_HUES)
  });
}

function updatePetals() {
  for (let i = fallingPetals.length - 1; i >= 0; i--) {
    const p = fallingPetals[i];
    p.x += p.vx;
    p.y += p.vy;
    p.rot += 0.05;
    p.life--;

    if (p.life > 20) {
      const alpha = Math.min(1, (p.life - 20) / 20) * 0.3;
      fb.addStamp({
        x: p.x, y: p.y, color: p.color,
        a: alpha, rotation: p.rot,
        scaleX: 4, scaleY: 6,
        texture: 'petal', layer: 'petals',
        lifetime: 40
      });
    }
    if (p.life <= 0) fallingPetals.splice(i, 1);
  }
}

// ══════════════════════════════════════════════════════════════
//  AUDIO
// ══════════════════════════════════════════════════════════════

function initAudio() {
  audio = new Audio('bismillah.mp3');
  audioCtx = new AudioContext();
  analyser = audioCtx.createAnalyser();
  analyser.fftSize = 2048;
  analyser.smoothingTimeConstant = 0.85;
  timeData = new Uint8Array(2048);
  const source = audioCtx.createMediaElementSource(audio);
  source.connect(analyser);
  analyser.connect(audioCtx.destination);
}

// ══════════════════════════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════════════════════════

const canvas = document.createElement('canvas');
document.body.appendChild(canvas);

fb = new FatihaBrush(canvas, {
  maxStamps: 32768,
  layers: ['garden', 'glow', 'petals'],
  background: BG,
  width: CW,
  height: CH,
  grainStrength: 0.5,
  colorJitter: 0.06
});

fb.setLayerBlend('glow', 'additive');
fb.setLayerOpacity('glow', 0.7);
fb.setLayerOpacity('petals', 0.9);

spiralPts = buildSpiralPoints();

// Auto-start for headless capture
if (typeof window._synthTime === 'number') {
  isPlaying = true;
  document.getElementById('playBtn').classList.add('hidden');
}

// ══════════════════════════════════════════════════════════════
//  MAIN LOOP
// ══════════════════════════════════════════════════════════════

function loop() {
  requestAnimationFrame(loop);
  frameCount++;

  if (typeof window._synthTime === 'number' && !isPlaying) {
    isPlaying = true;
  }

  let progress = 0;
  let energy = 0.6;

  if (isPlaying) {
    const time = getTime();
    progress = Math.min(time / TOTAL_DUR, 1);

    // Update audio
    if (analyser && timeData) {
      fb.updateAudio(analyser, timeData);
      energy = fb.audio.energy;
    }

    // ── VINE GROWTH ──────────────────────────────────────
    const targetIdx = Math.floor(progress * spiralPts.length);
    if (targetIdx > drawnVineIdx && drawnVineIdx < spiralPts.length - 1) {
      const segEnd = Math.min(spiralPts.length - 1, targetIdx);
      drawVineSegment(Math.max(0, drawnVineIdx - 1), segEnd, energy);
      drawnVineIdx = segEnd;
    }

    // ── TAJWEED EVENTS ───────────────────────────────────
    while (tajweedIdx < TAJWEED.length && time >= TAJWEED[tajweedIdx].t) {
      const el = TAJWEED[tajweedIdx];
      const spiralT = el.t / TOTAL_DUR;
      const ptIdx = Math.floor(spiralT * (spiralPts.length - 1));

      if (ptIdx >= 1 && ptIdx < spiralPts.length - 1) {
        const pt = spiralPts[ptIdx];
        const norm = getNormal(spiralPts, ptIdx);
        const offDist = 25 * el.size * el.side;
        const ex = pt.x + norm.x * offDist;
        const ey = pt.y + norm.y * offDist;
        const tangent = getAngleAt(spiralPts, ptIdx);

        switch (el.type) {
          case 'leaf':         drawLeaf(ex, ey, el.size, tangent, el.side); break;
          case 'bud':          drawBud(ex, ey, el.size, tangent); break;
          case 'bloom':        drawBloom(ex, ey, el.size); break;
          case 'rose':         drawRose(ex, ey, el.size, false); break;
          case 'golden_rose':  drawRose(ex, ey, el.size, true); break;
          case 'ghunnah':      drawGhunnah(ex, ey, el.size); break;
          case 'thorn':        drawThorn(pt.x, pt.y, el.size, tangent, el.side); break;
          case 'vine_tendril': drawVineTendril(ex, ey, el.size, tangent); break;
        }
      }
      tajweedIdx++;
    }

    // ── FALLING PETALS ───────────────────────────────────
    if (energy > 0.3 && frameCount % 10 === 0) {
      spawnPetal();
    }
    updatePetals();

    // ── FINISHED ─────────────────────────────────────────
    if (isFinished()) {
      isPlaying = false;
      document.getElementById('playBtn').classList.remove('hidden');
    }
  }

  // ── RENDER ───────────────────────────────────────────────
  fb.update(1);
  fb.render();

  // Stats
  if (frameCount % 30 === 0) {
    document.getElementById('stats').textContent =
      `stamps: ${fb.stampCount} | fps: ${Math.round(1000 / Math.max(1, performance.now() - lastTime))}`;
  }
  lastTime = performance.now();
}

loop();

// ══════════════════════════════════════════════════════════════
//  PLAY BUTTON
// ══════════════════════════════════════════════════════════════

document.getElementById('playBtn').addEventListener('click', () => {
  if (!audio) initAudio();

  // Reset
  drawnVineIdx = 0;
  tajweedIdx = 0;
  fallingPetals = [];
  fb.clearAll();

  audio.currentTime = 0;
  audio.play().then(() => {
    isPlaying = true;
    document.getElementById('playBtn').classList.add('hidden');
  });
});
</script>
